  }
  for (const g of games) {
    // Only decided games count toward points/wins/diff/partners. A tied score
    // is an in-progress game (pickleball is win-by-2) — counting it would let a
    // tie pad the standings while it can't advance. This also fixes the "N left"
    // partner badge, which otherwise counted RR's pre-generated unplayed rounds
    // and read 0 from round 1.
    if (!isGameDecided(g)) continue;
    if (!g.isFinal) {
      stats[g.team1[0]-1].partnersUsed.add(g.team1[1]);
      stats[g.team1[1]-1].partnersUsed.add(g.team1[0]);
      stats[g.team2[0]-1].partnersUsed.add(g.team2[1]);
      stats[g.team2[1]-1].partnersUsed.add(g.team2[0]);
    }
    const t1Win = g.score1 > g.score2;
    const t2Win = g.score2 > g.score1;
    for (const slot of g.team1) {
      const st = stats[slot-1];
      st.points += g.score1; st.diff += (g.score1 - g.score2); st.played++; st.gp++;
      if (t1Win) st.wins++; else if (t2Win) st.losses++;
    }
    for (const slot of g.team2) {
      const st = stats[slot-1];
      st.points += g.score2; st.diff += (g.score2 - g.score1); st.played++; st.gp++;
      if (t2Win) st.wins++; else if (t1Win) st.losses++;
    }
  }
  stats.forEach(s => {
    s.avgPoints = s.points / Math.max(1, s.gp);
    s.winRate = s.wins / Math.max(1, s.gp);
    s.avgDiff = s.diff / Math.max(1, s.gp);
  });
  return stats;
}

// Per-player Adjusted Margin stats through `throughRound` (regular rounds only).
// Builds on computeStats for display fields, then layers diminishing-returns
// margin (avgMargin) and strength-adjusted credit (adjScore).
function computeMarginStats(throughRound) {
  const stats = computeStats(throughRound, false);
  const n = stats.length;
  const sumMs = new Array(n + 1).fill(0);
  const sumCredit = new Array(n + 1).fill(0);
  const games = [];
  for (let i = 0; i < (throughRound || 0) && i < state.rounds.length; i++) {
    for (const g of gamesOf(state.rounds[i])) {
      if (isGameDecided(g)) games.push(g);
    }
  }
  // Pass 1 — base margin score per player.
  for (const g of games) {
    const m1 = marginScore(g.score1 - g.score2);
    for (const slot of g.team1) sumMs[slot] += m1;
    for (const slot of g.team2) sumMs[slot] -= m1;
  }
  const base = new Array(n + 1).fill(0);
  let fieldSum = 0, fieldCount = 0;
  for (const s of stats) {
    if (s.gp > 0) { base[s.slot] = sumMs[s.slot] / s.gp; fieldSum += base[s.slot]; fieldCount++; }
  }
  const fieldAvg = fieldCount ? fieldSum / fieldCount : 0;
  const strength = new Array(n + 1).fill(0);
  for (const s of stats) {
    if (s.gp > 0) strength[s.slot] = base[s.slot] - fieldAvg;
  }
  // Pass 2 — strength-adjusted credit per player.
  for (const g of games) {
    const m1 = marginScore(g.score1 - g.score2);
    addMarginCredit(g.team1, g.team2, m1, strength, sumCredit);
    addMarginCredit(g.team2, g.team1, -m1, strength, sumCredit);
  }
  for (const s of stats) {
    s.avgMargin = s.gp > 0 ? base[s.slot] : 0;
    s.adjScore  = s.gp > 0 ? sumCredit[s.slot] / s.gp : 0;
  }
  return stats;
}

// Adds `ms + clamp(k·(opponentStrength − partnerStrength))` to each player on `team`.
function addMarginCredit(team, opp, ms, strength, sumCredit) {
  const O = (strength[opp[0]] + strength[opp[1]]) / 2;
  for (let k = 0; k < team.length; k++) {
    const partner = team[k === 0 ? 1 : 0];
    const P = strength[partner];
    sumCredit[team[k]] += ms + clampAdj(MARGIN_STRENGTH_K * (O - P));
  }
}

function headToHead(slotA, slotB, throughRound) {
  let diff = 0;
  for (let i = 0; i < throughRound && i < state.rounds.length; i++) {
    const r = state.rounds[i];
    for (const g of gamesOf(r)) {
      if (!isGameDecided(g)) continue;
      const aOn1 = g.team1.includes(slotA);
      const aOn2 = g.team2.includes(slotA);
      const bOn1 = g.team1.includes(slotB);
      const bOn2 = g.team2.includes(slotB);
      if (aOn1 && bOn2)      diff += (g.score1 - g.score2);
      else if (aOn2 && bOn1) diff += (g.score2 - g.score1);
    }
  }
  return diff;
}

function rankPlayers(throughRound) {
  const stats = computeMarginStats(throughRound);
  stats.sort((a, b) => {
    if (a.gp === 0 || b.gp === 0) {
      if (a.gp !== b.gp) return a.gp === 0 ? 1 : -1;
      return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
    }
    if (b.adjScore !== a.adjScore) return b.adjScore - a.adjScore;
    if (b.winRate  !== a.winRate)  return b.winRate  - a.winRate;
    const h2h = headToHead(a.slot, b.slot, throughRound);
    if (h2h !== 0) return -h2h;
    return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
  });
  return stats;
}

// Format-aware overall ranking through `throughRound` (1-based, inclusive).
function rankPlayersForFormat(throughRound) {
  if (state.format === "stack") return rankPlayersStack(throughRound);
  if (state.format === "king")  return rankPlayersKing(throughRound);
  return rankPlayers(throughRound); // rr, gauntlet: same ranking
}

const FINAL_TIER_NAMES = ["Championship", "Consolation", "Bronze", "Copper", "Iron", "Stone"];

function buildFinals() {
  const total = totalRegularRounds();
  const activeSet = new Set((state.players || [])
    .filter(p => p.status === "active")
    .map(p => p.slot));
  const ranked = rankPlayersForFormat(total)
    .map(s => s.slot)
    .filter(slot => !activeSet.size || activeSet.has(slot));
  const courtCount = Number.isInteger(state.courtCount) ? state.courtCount : 2;
  const tierCount = Math.min(courtCount, Math.floor(ranked.length / 4));
  const tiers = [];
  for (let i = 0; i < tierCount; i++) {
    const block = ranked.slice(i * 4, i * 4 + 4);
    let team1, team2;
    if (state.mixedMode) {
      [team1, team2] = pairMixedAware(block, {});
    } else {
      team1 = [block[0], block[3]];
      team2 = [block[1], block[2]];
    }
    tiers.push(makeFinalTier(FINAL_TIER_NAMES[i], i + 1, team1, team2));
  }
  state.finals = {
    tiers,
    unseated: ranked.slice(tierCount * 4),
  };
  state.phase = "finals";
  save();
}

// Returns { partner: number, courtKey: number } or { bye: true } for the given
// player's next round, or null if there's no next round or no rounds yet. Partner chips are an RR
// affordance — Stack rounds are built incrementally so the next pairing isn't
// known until after advancing.
function nextPartnerInfo(slot) {
  if (state.phase !== "playing") return null;
  if (state.format === "stack" || state.format === "king" || state.format === "gauntlet") return null;
  if (state.currentRound >= (state.rounds || []).length) return null;
  const next = state.rounds[state.currentRound]; // currentRound is 1-based; this is round N+1
  if (!next) return null;
  if (byesOf(next).includes(slot)) return { bye: true };
  for (const game of gamesOf(next)) {
    const courtKey = game.court || 1;
    for (const team of [game.team1, game.team2]) {
      const idx = team.indexOf(slot);
      if (idx !== -1) return { partner: team[1 - idx], courtKey };
    }
  }
  return null;
}

function showToast(text) {
  let stack = document.querySelector(".toast-stack");
  if (!stack) {
    stack = el("div", { class: "toast-stack" });
    document.body.appendChild(stack);
  }
  const t = el("div", { class: "toast" }, text);
  stack.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}

function maybeFireSlippagePrompt() {
  const tb = state.timeBudget;
  if (!tb || !tb.enabled) return;
  if (state.format === "crown") return;

  // Derive from decided rounds (not notifiedRounds) so reopening a round to a
  // tie correctly lowers the count.
  const completedRounds = state.rounds.filter(r => r && gamesOf(r).length && isRoundDecided(r)).length;
  const totalRounds = totalRegularRounds();
  const warmupThreshold = Math.max(2, Math.ceil(0.25 * totalRounds));
  if (completedRounds < warmupThreshold) return;

  if ((tb.adjustments || []).length >= 3) return;

  const remainingRounds = totalRounds - completedRounds;
  if (remainingRounds === 0) return;

  // Sum completed game durations in minutes
  let elapsedSec = 0;
  let roundsFound = 0;
  for (const r of state.rounds) {
    let roundSec = 0;
    let courtsInRound = 0;
    for (const g of gamesOf(r)) {
      if (Number.isInteger(g.score1) && Number.isInteger(g.score2) && g.gameEndedAt && g.gameStartedAt) {
        const dur = Math.max(0, (g.gameEndedAt - g.gameStartedAt) / 1000 - (g.pauseSec || 0));
        roundSec = Math.max(roundSec, dur);
        courtsInRound++;
      }
    }
    if (courtsInRound > 0) {
      elapsedSec += roundSec;
      roundsFound++;
    }
  }
  if (roundsFound === 0) return;
  const elapsedMin = elapsedSec / 60;

  const avgRoundActual = elapsedMin / roundsFound;
  const cal = readCalibration();
  const activeCourts = timeBudgetActiveCourtsFor(state);
  const [finalsLo] = estimateRoundMinutes(11, 2, "sideout", activeCourts, cal);
  const projectedTotal = elapsedMin + remainingRounds * avgRoundActual + finalsLo + 5;

  if (projectedTotal <= tb.minutes * 1.10) return;

  const remainingBudget = tb.minutes - elapsedMin;
  const newCombo = solveWinCondition(state.format, remainingRounds, remainingBudget, cal, activeCourts);
  if (newCombo.error) return;

  const currentConfig = tb.plannedConfig;
  if (!currentConfig) return;

  const [curLo, curHi] = estimateRoundMinutes(currentConfig.target, currentConfig.winBy, currentConfig.scoring, activeCourts, cal);
  const curMid = (curLo + curHi) / 2;
  const [newLo, newHi] = estimateRoundMinutes(newCombo.target, newCombo.winBy, newCombo.scoring, activeCourts, cal);
  const newMid = (newLo + newHi) / 2;
  if (newMid >= curMid) return;

  const overMin = Math.round(projectedTotal - tb.minutes);
  const currentDesc = (currentConfig.scoring === "sideout" ? "side-out" : "rally") + " to " + currentConfig.target;
  const newDesc = (newCombo.scoring === "sideout" ? "side-out" : "rally") + " to " + newCombo.target;

  if (tb.autoTighten) {
    const prevConfig = currentConfig;
    tb.plannedConfig = newCombo;
    state.winScore = newCombo.target;
    state.winBy = newCombo.winBy;
    state.scoringSystem = newCombo.scoring;
    tb.adjustments.push({ from: prevConfig, to: newCombo, roundAfter: completedRounds, ts: Date.now() });
    const adjIdx = tb.adjustments.length - 1;  // capture before any future pushes
    save();
    render();
    showAutoTightenToast(newDesc, function() {
      _undoChipAdjIdx = -1;
      undoLastTightening();
    }, function() {
      _undoChipAdjIdx = adjIdx;
      render();
    });
    return;
  }

  showSlippageModal(overMin, currentDesc, newDesc, function() {
    tb.plannedConfig = newCombo;
    state.winScore = newCombo.target;
    state.winBy = newCombo.winBy;
    state.scoringSystem = newCombo.scoring;
    if (!tb.adjustments) tb.adjustments = [];
    tb.adjustments.push({ from: currentConfig, to: newCombo, roundAfter: completedRounds, ts: Date.now() });
    save();
    render();
  });
}

// Mount a modal with proper dialog semantics: role/aria-modal, an accessible
// name from its heading, Escape-to-close, and a Tab focus trap.
// - Focus moves into the modal on mount, so the trap is effective and screen
//   readers land inside the dialog (callers may still set a more specific focus
//   afterward).
// - Only the topmost modal reacts to keys, so stacked modals (e.g. the rally
//   prompt opened from Settings) don't both close on one Escape.
// - The key listener is removed synchronously whenever the backdrop leaves the
//   DOM (Escape or a button calling bg.remove()), via an AbortController wired
//   into a patched bg.remove() — no dangling listeners accumulate.
// - opts.onEscape, when given, runs instead of a bare bg.remove() so forced-
//   choice dialogs (rally ack) route Escape through their cancel logic.
let _modalSeq = 0;
function mountModal(bg, modal, opts) {
  opts = opts || {};
  modal.setAttribute("role", "dialog");
  modal.setAttribute("aria-modal", "true");
  const heading = modal.querySelector("h1, h2, h3");
  if (heading) {
    if (!heading.id) heading.id = "modal-title-" + (++_modalSeq);
    modal.setAttribute("aria-labelledby", heading.id);
  } else {
    modal.setAttribute("aria-label", (modal.textContent || "Dialog").trim().slice(0, 60));
  }
  const ac = new AbortController();
  const origRemove = bg.remove.bind(bg);
  bg.remove = () => { ac.abort(); origRemove(); };
  const isTopmost = () => {
    const all = document.querySelectorAll(".modal-bg");
    return all.length === 0 || all[all.length - 1] === bg;
  };
  const focusables = () => modal.querySelectorAll(
    'button:not([disabled]), a[href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])');
  const onKey = (e) => {
    if (!isTopmost()) return;            // only the topmost modal handles keys
    if (e.key === "Escape") {
      e.preventDefault();
      if (opts.onEscape) opts.onEscape(); else bg.remove();
      return;
    }
    if (e.key === "Tab") {
      const f = focusables();
      if (!f.length) return;
      const first = f[0], last = f[f.length - 1];
      // If focus has escaped the modal (e.g. it started on the opener), pull it
      // back in so Tab can't reach background controls.
      if (!modal.contains(document.activeElement)) { e.preventDefault(); first.focus(); return; }
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  };
  document.addEventListener("keydown", onKey, { capture: true, signal: ac.signal });
  document.body.appendChild(bg);
  // Move focus into the modal so the trap is effective from the first Tab.
  const f = focusables();
  if (f.length) f[0].focus();
  else { modal.setAttribute("tabindex", "-1"); modal.focus(); }
}

function showSlippageModal(overMin, currentDesc, newDesc, onTighten) {
  const minuteWord = overMin === 1 ? "minute" : "minutes";
  const bg = el("div", { class: "modal-bg" });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Running about " + overMin + " " + minuteWord + " long"));
  modal.appendChild(el("p", null, "Currently: " + currentDesc + "."));
  modal.appendChild(el("p", null, "To finish on time, switch remaining rounds to " + newDesc + "?"));
  const tightenBtn = el("button", { class: "primary", style: "width:100%;margin-bottom:8px;" }, "Tighten remaining");
  const stayBtn = el("button", { style: "width:100%;" }, "Stay the course");
  tightenBtn.addEventListener("click", function() { bg.remove(); onTighten(); });
  stayBtn.addEventListener("click", function() { bg.remove(); });
  modal.appendChild(tightenBtn);
  modal.appendChild(stayBtn);
  bg.appendChild(modal);
  mountModal(bg, modal);
  tightenBtn.focus();
}

function undoLastTightening() {
  const tb = state.timeBudget;
  if (!tb || !Array.isArray(tb.adjustments) || tb.adjustments.length === 0) return;
  const adj = tb.adjustments[tb.adjustments.length - 1];
  tb.plannedConfig = adj.from;
  state.winScore = adj.from.target;
  state.winBy = adj.from.winBy;
  state.scoringSystem = adj.from.scoring;
  tb.adjustments.pop();
  save();
  render();
}

function showAutoTightenToast(newDesc, onUndo, onCollapse) {
  if (_activeAutoTightenToast) { _activeAutoTightenToast.remove(); _activeAutoTightenToast = null; }
  const wrapper = el("div", {
    style: "position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:80;" +
           "display:flex;align-items:center;gap:8px;background:var(--panel);" +
           "border:1px solid var(--accent);border-radius:999px;padding:12px 22px;" +
           "box-shadow:0 8px 32px rgba(0,0,0,0.4);font-weight:700;font-size:15px;"
  });
  _activeAutoTightenToast = wrapper;
  wrapper.appendChild(document.createTextNode("Tightened to " + newDesc + ". "));
  const undoBtn = el("button", { style: "font-size:13px;padding:2px 10px;border-radius:999px;" }, "Undo");
  let timer;
  undoBtn.addEventListener("click", function() {
    clearTimeout(timer);
    wrapper.remove();
    _activeAutoTightenToast = null;
    onUndo();
  });
  wrapper.appendChild(undoBtn);
  document.body.appendChild(wrapper);
  timer = setTimeout(function() {
    wrapper.remove();
    _activeAutoTightenToast = null;
    onCollapse();
  }, 30000);
}

// Runs after a Crown regular match completes. If projected total > 110% of budget and
// the active preset is not already Sprint, tightens un-played match indices to the next preset.
function maybeTightenCrownPreset(completedMatchIdx) {
  const tb = state.timeBudget;
  if (!tb?.enabled || !tb.crownActiveThemes) return;
  const currentPresetName = tb.plannedConfig?.preset;
  if (!currentPresetName) return;
  const currentPresetIdx = CROWN_PRESETS.findIndex(p => p.name === currentPresetName);
  // Already at tightest or not found
  if (currentPresetIdx < 0 || currentPresetIdx >= CROWN_PRESETS.length - 1) return;

  const elapsedMin = (Date.now() - tb.startedAt) / 60000;
  // Estimate remaining: matches completedMatchIdx+1 through 3 (Crown Final = index 3)
  const cal = readCalibration();
  let remainingMin = 0;
  for (let i = completedMatchIdx + 1; i <= 3; i++) {
    // For indices 0-2 use crownActiveThemes; for Crown Final (3) use preset's Crown Match config
    const matchCfg = (i <= 2 && tb.crownActiveThemes[i])
      || CROWN_PRESETS[currentPresetIdx].matches[i];
    const [lo, hi] = estimateGameMinutes(matchCfg.winScore ?? matchCfg.target, matchCfg.winBy, matchCfg.scoring, cal);
    remainingMin += 2.3 * (lo + hi) / 2 + 3;
  }

  if (elapsedMin + remainingMin <= tb.minutes * 1.10) return;

  const nextPreset = CROWN_PRESETS[currentPresetIdx + 1];
  for (let i = completedMatchIdx + 1; i <= 2; i++) {
    tb.crownActiveThemes[i] = {
      winScore: nextPreset.matches[i].target,
      winBy:    nextPreset.matches[i].winBy,
      scoring:  nextPreset.matches[i].scoring,
    };
  }
  tb.plannedConfig.preset = nextPreset.name;
}

function maybeFireRoundComplete(primaryBtn) {
  if (state.phase !== "playing") return;
  const idx = state.currentRound - 1;
  const round = state.rounds[idx];
  if (!round) return;
  // A tied round can't advance the tournament in any format — don't celebrate
  // it yet (mirrors renderPlaying's advance gate, which requires a decided round).
  if (!isRoundDecided(round)) return;
  if (state.notifiedRounds.includes(state.currentRound)) return;
  _undoChipAdjIdx = -1;
  if (_activeAutoTightenToast) { _activeAutoTightenToast.remove(); _activeAutoTightenToast = null; }
  state.notifiedRounds.push(state.currentRound);
  save();
  showToast("🎉 Round " + state.currentRound + " complete!");
  if (primaryBtn) {
    primaryBtn.classList.remove("shimmering");
    // force reflow so the keyframe restarts
    void primaryBtn.offsetWidth;
    primaryBtn.classList.add("shimmering");
    setTimeout(() => primaryBtn.classList.remove("shimmering"), 1600);
  }
  maybeFireSlippagePrompt();
}

// rank: 1-based seed number; kind: "gold" (championship) or "silver" (consolation)
function seedPill(rank, kind) {
  return el("span", { class: "seed-pill " + kind }, "#" + rank);
}

// Returns stat objects in tournament-outcome tier order. Undecided tiers keep
// their four players grouped by season rank; decided tiers split winners then
// losers, also by season rank.
function finalRanking() {
  const seasonOrder = rankPlayersForFormat(totalRegularRounds());
  const seasonRank = new Map();
  seasonOrder.forEach((s, i) => seasonRank.set(s.slot, i));
  const bySlot = new Map();
  seasonOrder.forEach(s => bySlot.set(s.slot, s));

  const f = state.finals;
  const sortByseason = arr => arr.slice().sort((a, b) => seasonRank.get(a) - seasonRank.get(b));
  if (!f || !finalTiers(f).length) return seasonOrder.slice();

  const ordered = [];
  for (const tier of finalTiers(f)) {
    const tierSlots = [...tier.team1, ...tier.team2];
    if (!isGameComplete(tier) || tier.score1 === tier.score2) {
      ordered.push(...sortByseason(tierSlots));
      continue;
    }
    const winTeam = tier.score1 > tier.score2 ? tier.team1 : tier.team2;
    const loseTeam = tier.score1 > tier.score2 ? tier.team2 : tier.team1;
    ordered.push(...sortByseason(winTeam), ...sortByseason(loseTeam));
  }
  ordered.push(...sortByseason(f.unseated || []));
  for (const s of seasonOrder) {
    if (!ordered.includes(s.slot)) ordered.push(s.slot);
  }
  return ordered.map(slot => bySlot.get(slot)).filter(Boolean);
}

// ====================== rendering ======================
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      const v = props[k];
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "style") e.setAttribute("style", v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

// RUMBLE:STATS:end
// RUMBLE:LIFETIME:start
// Lifetime (permanent) player stats — identity, store, recording, aggregation.
// Filled in across Phase A/B tasks. These are top-level function declarations
// (hoisted), so they are callable from finish handlers and boot regardless of
// their textual position here.
// ---------- identity ----------
// Canonical lifetime identity key. Collapses 5552013344 / 15552013344 / +15552013344.
function lifetimePhoneKey(raw) {
  const digits = normalizePhone(raw).replace(/\D/g, "");          // normalizePhone keeps a leading +; drop it here
  if (digits.length === 11 && digits[0] === "1") return digits.slice(1); // NANP country code
  return digits;
}
// Stricter than isValidPhone (>=7): lifetime tracking needs a real 10-digit number.
function lifetimeTrackable(raw) {
  return lifetimePhoneKey(raw).length >= 10;
}

// ---------- ledger (pure) ----------
function emptyLedger() {
  return { players: {}, tournaments: {}, sync: { lastSyncedAt: 0, pendingTournamentIds: [], pendingDeletes: [], pendingPlayerDeletes: [] } };
}

// Collapse multiple rows that share a canonical key within ONE tournament record.
function dedupeRecordResults(results) {
  const byKey = {};
  for (const r of results) {
    if (!r.phoneKey) continue;
    const cur = byKey[r.phoneKey];
    if (!cur) { byKey[r.phoneKey] = Object.assign({}, r); continue; }
    cur.gamesPlayed += r.gamesPlayed; cur.wins += r.wins; cur.losses += r.losses;
    cur.pointsFor += r.pointsFor; cur.pointDiff += r.pointDiff;
    if ((r.finalRank || 1e9) < (cur.finalRank || 1e9)) {   // keep the better finish + its podium/partial/status
      cur.finalRank = r.finalRank; cur.podium = r.podium; cur.partial = r.partial; cur.status = r.status; cur.name = r.name;
    }
  }
  return Object.values(byKey);
}

// Merge one tournament record into a ledger (idempotent by id; last-write-wins by revisedAt).
function ledgerPutRecord(ledger, record) {
  const out = Object.assign({}, ledger, {
    tournaments: Object.assign({}, ledger.tournaments),
    players: Object.assign({}, ledger.players),
  });
  const existing = out.tournaments[record.id];
  if (!existing || (record.revisedAt || 0) >= (existing.revisedAt || 0)) {

  }
  for (const r of record.results) out.players[r.phoneKey] = mergePlayer(out.players[r.phoneKey], r, record.completedAt);
  return out;
}

function mergePlayer(prev, row, seenAt) {
  const aliases = new Set((prev && prev.aliases) || []);
  if (prev && prev.displayName && prev.displayName !== row.name) aliases.add(prev.displayName);
  return {
    phoneKey: row.phoneKey,
    displayName: row.name,
    aliases: Array.from(aliases).slice(-5),
    firstSeenAt: prev ? Math.min(prev.firstSeenAt || seenAt, seenAt) : seenAt,
    lastSeenAt: Math.max((prev && prev.lastSeenAt) || 0, seenAt),
  };
}

// Union two ledgers (cross-device merge and import).

  let out = { players: Object.assign({}, a.players), tournaments: Object.assign({}, a.tournaments), sync: a.sync };
  for (const rec of Object.values(b.tournaments)) out = ledgerPutRecord(out, rec);
  return out;
}

// Cross-device right-to-be-forgotten (pure; mutates `led`). removePlayer scrubs only the
// records THIS device holds, so a record containing the player that was authored on another
// device and not yet pulled here would resurrect them on the next sync. Given a freshly
// pulled `remote` ledger, scrub `phoneKey` from every cloud record the local ledger doesn't
// already hold scrubbed, queueing each change for push (scrubbed) or delete (emptied).
// Records already scrubbed locally are skipped — their revisedAt bump wins last-write-wins.
// Returns true if anything changed.

    const local = led.tournaments[id];
    if (local && Array.isArray(local.results) && !local.results.some(r => r.phoneKey === phoneKey)) continue;  // already scrubbed locally

}

// ---------- cross-format normalization ----------
// Map a format's per-slot stat object into the common results-row shape.
function normalizeStatRow(format, st) {
  if (format === "king") {                                  // King has no losses field or points-against
    return { gamesPlayed: st.gp, wins: st.wins, losses: Math.max(0, st.gp - st.wins),
             pointsFor: st.pointsScored, pointDiff: 0 };
  }
  if (format === "stack") {                                 // Stack tracks real wins/losses + points-against
    return { gamesPlayed: st.gp, wins: st.wins, losses: st.losses,
             pointsFor: st.pointsScored, pointDiff: st.pointsScored - st.pointsAgainst };
  }
  if (format === "crown") {                                 // Crown counts best-of-3 sub-games
    return { gamesPlayed: (st.gamesWon || 0) + (st.gamesLost || 0), wins: st.gamesWon, losses: st.gamesLost,
             pointsFor: st.pointsScored, pointDiff: st.pointDiff };
  }
  return { gamesPlayed: st.gp, wins: st.wins, losses: st.losses,   // rr / gauntlet (computeStats rows)
           pointsFor: st.points, pointDiff: st.diff };
}

// ---------- aggregation (derive on read) ----------
function playerCareer(ledger, phoneKey) {
  const recs = Object.values(ledger.tournaments || {}).filter(t => Array.isArray(t.results) && t.results.some(r => r.phoneKey === phoneKey));
  let wins = 0, losses = 0, games = 0, pointsFor = 0, diffSum = 0, best = null;
  const podiums = { 1: 0, 2: 0, 3: 0 };
  for (const t of recs) {
    const r = t.results.find(x => x.phoneKey === phoneKey);
    wins += r.wins; losses += r.losses; games += r.gamesPlayed;
    pointsFor += r.pointsFor; diffSum += r.pointDiff;
    if (r.finalRank && (best === null || r.finalRank < best)) best = r.finalRank;
    if (r.podium) podiums[r.podium]++;
  }
  const player = (ledger.players || {})[phoneKey] || { phoneKey, displayName: phoneKey, aliases: [] };
  return {
    phoneKey, displayName: player.displayName, aliases: player.aliases || [],
    tournaments: recs.length, wins, losses, games,
    winPct: games ? wins / games : 0,
    pointsFor, avgPointDiff: games ? diffSum / games : 0,
    bestFinish: best, podiums,
  };
}
function allCareers(ledger) { return Object.keys(ledger.players || {}).map(k => playerCareer(ledger, k)).filter(c => c.tournaments > 0); }

      status: p.status || "active",

// ---------- cloud auth wiring (Phase C) ----------

async function setupLifetimeAuth() {

  // A non-null redirect result means the user JUST completed an interactive
  // sign-in (the page navigated to Google and back) — the only moment we may
  // offer to move anonymous on-device data into their account. Awaiting it here
  // (rather than in a separate, racing .then()) guarantees the signal is known
  // before the first onAuthStateChanged fires; otherwise the observer could win
  // the microtask race and the merge offer would be silently missed on redirect.

  // here would only destroy a modal opened during load. Re-render on later
  // transitions (interactive sign-in / sign-out) so the sync UI updates.

      const interactive = (_redirectUid && _redirectUid === user.uid) || !wasFirst;

    "Sign out? This device's local copy of your lifetime stats will be cleared — it stays safe in the cloud.",
    () => {
      // disconnect() (via onAuthStateChanged) evicts this owner's cached ledger.
      // _lifetimeOwner still holds the outgoing uid at that point, so eviction
      // targets the right ledger; no need to thread the uid through explicitly.
      fb.api.signOut(fb.auth).catch(() => {});
    },
    { title: "Sign out", confirmText: "Sign out" }
  );
}

function render() {
  // Dismiss any open dialog (settings/paste/etc.) on a full re-render so it can't
  // stay stacked over a new view. Dialogs use .modal-bg; the shuffle-reveal
  // overlay uses .shuffle-overlay and is intentionally left alone.
  document.querySelectorAll(".modal-bg").forEach(n => n.remove());
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.classList.toggle("display-app", isDisplayMode());
  if (isSnapshotRoute()) {
    try {
      app.appendChild(renderSnapshotView(decodeSnapshotHash(location.hash)));
    } catch (e) {
      app.appendChild(el("div", { class: "card" },
        el("h2", null, "Snapshot unavailable"),
        el("p", { class: "muted" }, "This snapshot link could not be decoded.")));
    }
    return;
  }
  if (isDisplayMode()) {
    state = readDisplayState() || newState();
    app.appendChild(renderDisplayMode(displayModeModel(buildTournamentSnapshot("live"))));
    return;
  }
  app.appendChild(renderHeader());
  if (state.phase === "setup")        app.appendChild(renderSetup());
  else if (state.phase === "playing") app.appendChild(renderPlaying());
  else if (state.phase === "finals")  app.appendChild(renderFinalsScreen());
  else if (state.phase === "crown")   app.appendChild(renderCrownPhaseScreen());
  else if (state.phase === "done")    app.appendChild(renderDoneScreen());
  window.scrollTo({ top: 0, behavior: "auto" });
  if (state.phase === "playing") {
    const primaryBtn = app.querySelector(".row-actions button.primary");
    maybeFireRoundComplete(primaryBtn);
  }
}

function totalRegularRounds() {
  if (state.format === "stack")    return state.stackRounds;
  if (state.format === "king")     return state.kingRounds;
  if (state.format === "gauntlet") return state.gauntletRounds;
  if (state.format === "crown")    return 3;
  return state.rrScheduleMode === "generated" ? state.rrRounds : 7;
}

function timeBudgetStripEl() {
  if (!state.timeBudget || !state.timeBudget.enabled) return null;
  const phase = state.phase;
  if (phase === "setup" || phase === "done") return null;

  const cal = readCalibration();
  const proj = projectFinishTime(state, cal, Date.now());
  if (!proj) return null;  // Crown returns null here

  const [projLow, projHigh] = proj;
  const mid = (projLow + projHigh) / 2;
  const budgetEnd = (state.timeBudget.startedAt || Date.now()) + state.timeBudget.minutes * 60000;

  const fmtTs = ts => {
    const d = new Date(ts);
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? "pm" : "am";
    h = h % 12 || 12;
    return h + ":" + String(m).padStart(2, "0") + " " + ampm;
  };

  const adjCount = (state.timeBudget.adjustments || []).length;
  if (adjCount >= 3) {
    const overMin = Math.max(0, Math.round((mid - budgetEnd) / 60000));
    const leftText = overMin > 0 ? "🕐 ~" + overMin + " min over" : "🕐 Likely done: " + fmtTs(projLow) + "–" + fmtTs(projHigh);
    return el("div", { class: "tb-header-strip" },
      el("span", null, leftText + " · "),
      el("span", {
        style: "color:#888;",
        title: "Re-solver hit the 3-adjustment cap. Consider ending early or playing through.",
      }, "adjustments exhausted")
    );
  }

  const ratio = mid / budgetEnd;
  let paceText, paceFg, paceBg;
  if (ratio < 0.90) {
    paceText = "ahead of pace"; paceFg = "#34d399"; paceBg = "rgba(52,211,153,0.15)";
  } else if (ratio <= 1.05) {
    paceText = "on pace";       paceFg = "#88cc88"; paceBg = "rgba(136,204,136,0.15)";
  } else if (ratio <= 1.10) {
    paceText = "behind";        paceFg = "#ccaa44"; paceBg = "rgba(204,170,68,0.18)";
  } else {
    paceText = "running long";  paceFg = "#e87c3e"; paceBg = "rgba(232,124,62,0.18)";
  }

  return el("div", { class: "tb-header-strip" },
    el("span", null, "🕐 Likely done: "),
    el("strong", null, fmtTs(projLow) + "–" + fmtTs(projHigh)),
    el("span", {
      style: "margin-left:6px; padding:2px 8px; border-radius:10px; font-size:12px; font-weight:600;" +
             "color:" + paceFg + "; background:" + paceBg + "; border:1px solid " + paceFg + "33;"
    }, paceText)
  );
}

function renderHeader() {
  let progressText = "Setup";

  const header = el("header", { class: "top" });
  header.appendChild(el("div", { class: "title" }, "🏓 Rumble Pickleball"));

    });
    header.appendChild(chip);
  }
  return header;
}

  function canStart() {
    const validation = validateSetupConfig(state.format, setupNames(), state.courtCount);

// Human-readable reason the Start button is disabled (empty string = ready).
  function startBlockReason() {
    if (!state) return "";
    const validation = validateSetupConfig(state.format, setupNames(), state.courtCount);
    if (!validation.ok) return validation.error || "Check the player list.";
    if (state.timeBudget && state.timeBudget.enabled && !state.timeBudget.plannedConfig)
      return "Pick an event time for the time budget (or turn it off).";
    return "";
}

// Keep the Start button + its hint in sync without a full re-render.
function updateStartState() {
  if (!state) return;
  const btn = document.getElementById("start-btn");
  if (btn) btn.disabled = !canStart();
  // Highlight the specific name inputs that fail validation (e.g. a duplicate pair),
  // so the error is actionable next to the field rather than only at the bottom.
  const validation = validateSetupConfig(state.format, setupNames(), state.courtCount);
  const invalid = new Set(validation.invalidSlots || []);
  document.querySelectorAll(".setup-list .name-input[id^='setup-name-']").forEach(inp => {
    const idx = parseInt(inp.id.slice("setup-name-".length), 10);
    const bad = invalid.has(idx);
    inp.classList.toggle("invalid", bad);
    if (bad) inp.setAttribute("aria-invalid", "true"); else inp.removeAttribute("aria-invalid");
  });
  
  // Highlight tab buttons that have validation errors
  const playersTabBtn = document.querySelector(".setup-tab-btn[data-tab='players']");
  if (playersTabBtn) {
    playersTabBtn.classList.toggle("has-error", !validation.ok);
  }
  const timingTabBtn = document.querySelector(".setup-tab-btn[data-tab='timing']");
  if (timingTabBtn) {
    const timingError = state.timeBudget && state.timeBudget.enabled && !state.timeBudget.plannedConfig;
    timingTabBtn.classList.toggle("has-error", !!timingError);
  }

  const hint = document.getElementById("start-hint");
  if (hint) {
    const reason = startBlockReason();
    hint.textContent = reason;
    hint.style.display = reason ? "" : "none";
    // A duplicate/range problem is a real error (red); an incomplete count is neutral guidance.
    const isError = !validation.ok && validation.errorKind && validation.errorKind !== "incomplete";
    hint.classList.toggle("is-error", !!isError);
  }
}

function setupRoundCountForSummary(players, activeCourts) {
  if (state.format === "rr") return players === 8 && activeCourts === 2 ? 7 : Math.max(4, Math.min(12, parseInt(state.rrRounds, 10) || 7));
  if (state.format === "stack") return state.stackRounds;
  if (state.format === "king") return state.kingRounds;
  if (state.format === "gauntlet") return state.gauntletRounds;
  return 3;
}

function preStartSummaryModel() {
  const names = setupNames();
  const validation = validateSetupConfig(state.format, names, state.courtCount);
  const players = validation.playerCount || names.length;
  const configuredCourts = state.courtCount;
  const effectiveCourts = validation.effectiveCourtCount || effectiveCourtCountForFormat(state.format, configuredCourts);
  const shape = roundShapeFor(players, effectiveCourts);
  const activeCourts = state.format === "crown" ? 1 : shape.activeCourts;
  const rounds = setupRoundCountForSummary(players, activeCourts);
  const cfg = state.timeBudget && state.timeBudget.enabled && state.timeBudget.plannedConfig
    ? state.timeBudget.plannedConfig : null;
  const scoringSystem = cfg ? cfg.scoring : state.scoringSystem;
  const winScore = cfg ? cfg.target : state.winScore;
  const winBy = cfg ? cfg.winBy : state.winBy;
  const scoring = cfg && cfg.preset
    ? cfg.preset + " preset"
    : (scoringSystem === "rally" ? "Rally" : "Side-out") + " to " + winScore + ", win by " + winBy;
  let estimatedDuration = "";
  if (state.timeBudget && state.timeBudget.enabled) {
    const readout = formatTimeBudgetReadout(cfg, state.timeBudget.minutes, null);
    estimatedDuration = readout.likelyDone ? readout.willPlay + " · " + readout.likelyDone : readout.willPlay;
  }
  const tierCount = state.format === "crown" ? 0 : Math.min(activeCourts, Math.floor(players / 4));
  const unseated = state.format === "crown" ? 0 : Math.max(0, players - tierCount * 4);
  const finalsStyle = state.format === "crown"
    ? "Crown Match after 3 themed rounds"
    : tierCount + " finals tier" + (tierCount === 1 ? "" : "s") + (unseated ? " · " + unseated + " unseated by seed" : "");
  const phoneCount = (state.rawPhones || []).slice(0, players).filter(isValidPhone).length;
  const warnings = [];
  if (!validation.ok) warnings.push(validation.error || "Check the player list.");
  if (shape.byesNeeded > players / 3) warnings.push("More than one third of the field sits each round.");
  if (state.timeBudget && state.timeBudget.enabled && !cfg) warnings.push("Time budget needs a playable scoring plan.");
  return {
    formatLabel: formatNameForSnapshot(state.format),
    players,
    configuredCourts,
    activeCourts,
    byesPerRound: state.format === "crown" ? 0 : shape.byesNeeded,
    rounds,
    scoring,
    estimatedDuration,
    finalsStyle,
    phoneCount,
    nameValidation: validation.ok ? "Names ready" : (validation.error || "Check names"),
    warnings
  };
}

// Returns { ok: true, names: string[] } or { ok: false, count: number, error: string }.
// Splits on newlines or commas, trims, drops empties. Validates exactly `count` unique
// (case-insensitive). count defaults to 8 for backward compat with existing callers.
function parsePastedNames(text, count) {
  count = count || 8;
  const parts = String(text || "")
    .split(/[\n,]/)
    .map(s => s.trim())
    .filter(Boolean);
  const lower = parts.map(s => s.toLowerCase());
  const uniqueCount = new Set(lower).size;
  if (parts.length !== count || uniqueCount !== count) {
    return { ok: false, count: parts.length, error:
      `found ${parts.length}${parts.length === uniqueCount ? "" : ` (${parts.length - uniqueCount} duplicate)`} — need ${count} unique names` };
  }

const TOURNAMENT_TEMPLATES = [
  { id: "lunch-45",          title: "Lunch Break 45",    goal: "fast",        blurb: "4 quick rounds, 45-min budget." },
  { id: "club-90",           title: "Club Night 90",     goal: "balanced",    blurb: "Full Round Robin, 90-min budget." },
  { id: "competitive-ladder", title: "Competitive Ladder", goal: "competitive", blurb: "Stack ladder, side-out to 11." },
  { id: "social-mixer",      title: "Social Mixer",      goal: "social",      blurb: "Round Robin, max partner variety." },
];

function templateConfigFor(id, ctx = {}) {
  const players = clampSetupRosterCount(ctx.players || setupRosterCount());
  const courts = effectiveCourtCountForFormat("rr", ctx.courts || state.courtCount);
  const eightTwo = players === 8 && courts === 2;
  switch (id) {
    case "lunch-45":
      return { format: "rr", rrRounds: 4, timeBudget: { enabled: true, minutes: 45 },
        winScore: 11, winBy: 2, scoringSystem: "rally" };
    case "club-90":
      return { format: "rr", rrRounds: eightTwo ? 7 : 6, timeBudget: { enabled: true, minutes: 90 },
        winScore: 11, winBy: 2, scoringSystem: "sideout" };
    case "competitive-ladder":
      return { format: "stack", stackRounds: 8, timeBudget: { enabled: false, minutes: 90 },
        winScore: 11, winBy: 2, scoringSystem: "sideout" };
    case "social-mixer":
      return { format: "rr", rrRounds: eightTwo ? 7 : 6, timeBudget: { enabled: false, minutes: 90 },
        winScore: 11, winBy: 2, scoringSystem: "sideout" };
    default:
      return null;
  }
}

function applyTournamentTemplate(id) {
  const cfg = templateConfigFor(id, { players: setupRosterCount(), courts: state.courtCount });
  if (!cfg) return { ok: false };
  state.format = cfg.format;
  if (cfg.format === "rr" && Number.isInteger(cfg.rrRounds)) state.rrRounds = cfg.rrRounds;
  if (cfg.format === "stack" && Number.isInteger(cfg.stackRounds)) state.stackRounds = cfg.stackRounds;
  if (cfg.format === "king" && Number.isInteger(cfg.kingRounds)) state.kingRounds = cfg.kingRounds;
  if (cfg.format === "gauntlet" && Number.isInteger(cfg.gauntletRounds)) state.gauntletRounds = cfg.gauntletRounds;
  state.timeBudget.enabled = !!cfg.timeBudget.enabled;
  state.timeBudget.minutes = cfg.timeBudget.minutes;
  state.winScore = cfg.winScore;
  state.winBy = cfg.winBy;
  state.scoringSystem = cfg.scoringSystem;
  state.lastAppliedTemplate = id;
  // Court suggestion: if >1/3 of players sit each round, suggest a better court count.
  const players = setupRosterCount();
  const shape = roundShapeFor(players, state.courtCount);
  if (shape.byesNeeded > players / 3) {
    // Find lowest court count that reduces byes, up to 6 and floor(players/4)
    const maxCourts = Math.min(6, Math.floor(players / 4));
    for (let c = state.courtCount + 1; c <= maxCourts; c++) {
      const s2 = roundShapeFor(players, c);
      if (s2.byesNeeded <= players / 3) {
        if (window.confirm(`This setup sits ${shape.byesNeeded} players each round. Use ${c} courts instead?`)) {
          setCourtCount(c);
        }
        break;
      }
    }
  }
  save();
  return { ok: true };
}

// -------- Smart Setup Assistant (Task 7) --------
function setupRoundCountFor(format, players, courts, goal) {
  if (format === "rr") return players === 8 && courts === 2 ? 7 : (goal === "fastest" ? 4 : 6);
  if (format === "stack") return goal === "fastest" ? 4 : 8;
  if (format === "king" || format === "gauntlet") return goal === "fastest" ? 6 : 8;
  return 3;
}

function recommendationFor(format, title, ctx, tradeoffs) {
  const rounds = setupRoundCountFor(format, ctx.players, ctx.courts, ctx.goal);
  const shape = roundShapeFor(ctx.players, effectiveCourtCountForFormat(format, ctx.courts));
  const warnings = [];
  if (shape.byesNeeded > ctx.players / 3) warnings.push("More than one third of players sit each round.");
  if (ctx.minutes < 60) warnings.push("Short event: use rally scoring or fewer rounds.");
  return {
    id: format + "-" + ctx.goal + "-" + ctx.minutes,
    title,
    format,
    courtCount: ctx.courts,
    rounds,
    timeBudget: { enabled: true, minutes: ctx.minutes },
    scoring: ctx.goal === "fastest"
      ? { target: 7, winBy: 1, system: "rally" }
      : { target: 11, winBy: 2, system: "sideout" },
    tradeoffs: tradeoffs.concat(shape.byesNeeded ? [shape.byesNeeded + " sitting each round"] : ["everyone plays each round"]),
    warnings,
  };
}

function recommendSetups({ players, courts, minutes, goal }) {
  const ctx = {
    players: clampSetupRosterCount(players),
    courts: effectiveCourtCountForFormat("rr", courts),
    minutes: parseInt(minutes, 10) || 90,
    goal: goal || "balanced",
  };
  const recs = [];
  if (ctx.goal === "competitive") {
    recs.push(recommendationFor("stack", "Competitive Ladder", ctx, ["court movement rewards winning"]));
    recs.push(recommendationFor("king", "King of the Court", ctx, ["clear top-court pressure"]));
    recs.push(recommendationFor("gauntlet", "Ranked Gauntlet", ctx, ["re-ranks after every round"]));
  } else if (ctx.goal === "fastest") {
    recs.push(recommendationFor("rr", "Fast Mixer", ctx, ["few rounds", "fast rally scoring"]));
    recs.push(recommendationFor("stack", "Fast Ladder", ctx, ["movement format", "shorter scoring"]));
  } else {
    recs.push(recommendationFor("rr", ctx.goal === "social" ? "Social Mixer" : "Round Robin Mixer", ctx,
      ["best partner variety", "easy to explain"]));
    recs.push(recommendationFor("king", "Light Competitive Option", ctx, ["movement without complex standings"]));
  }
  return recs;
}

function applySetupRecommendation(rec) {
  state.format = rec.format;
  state.courtCount = rec.courtCount;
  if (rec.format === "rr") state.rrRounds = rec.rounds;
  if (rec.format === "stack") state.stackRounds = rec.rounds;
  if (rec.format === "king") state.kingRounds = rec.rounds;
  if (rec.format === "gauntlet") state.gauntletRounds = rec.rounds;
  state.timeBudget.enabled = !!rec.timeBudget.enabled;
  state.timeBudget.minutes = rec.timeBudget.minutes;
  state.winScore = rec.scoring.target;
  state.winBy = rec.scoring.winBy;
  state.scoringSystem = rec.scoring.system;
  state.lastAppliedTemplate = null;
  state.setupAssistant.goal = state.setupAssistant.goal || "balanced";
  save();
  return { ok: true };
}

function setupRecommendationSummary(rec) {
  return rec.title + ": " + rec.rounds + " rounds, " + rec.courtCount + " court" +
    (rec.courtCount === 1 ? "" : "s") + ", " + rec.scoring.system + " to " + rec.scoring.target + ".";
}

function getTimeBudgetRounds() {
  if (state.format === "rr")       return state.rrScheduleMode === "wh8" ? 7 : state.rrRounds;
  if (state.format === "stack")    return state.stackRounds;
  if (state.format === "king")     return state.kingRounds;

  return 3; // crown: 3 rounds + crown match
}

function timeBudgetActiveCountFor(s) {
  if (!s || s.format === "crown") return 4;
  if (Array.isArray(s.players) && s.players.length) {
    return s.players.filter(p => p.status === "active").length;
  }
  if (Array.isArray(s.rawNames) && s.rawNames.length) return clampSetupRosterCount(s.rawNames.length);
  if (Array.isArray(s.slots)) {
    const count = s.slots.filter(Boolean).length;
    if (count) return count;
  }
  return 8;
}

function timeBudgetActiveCourtsFor(s = state) {
  if (!s || s.format === "crown") return 1;
  const activeN = timeBudgetActiveCountFor(s);
  const courtCount = effectiveCourtCountForFormat(s.format, s.courtCount);
  return Math.max(1, roundShapeFor(activeN, courtCount).activeCourts);
}

function readCalibration() {
  try {
    const raw = localStorage.getItem("pb_calibration_v1");
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

// Reads pb_durations_v1, computes blended pointsPerMinute per scoring system,
// and persists to pb_calibration_v1. Call after each game completion.
// Algorithm: simple avg for first 5 samples per system, then EMA α=0.15.
// Caps result within ±50% of defaults (sideout=0.85, rally=2.0).
function updateCalibration() {
  const DEFAULT_PPM = { sideout: 0.85, rally: 2.0 };
  const MIN_SAMPLES = 5;
  const EMA_ALPHA   = 0.15;
  try {
    const log = JSON.parse(localStorage.getItem("pb_durations_v1") || "[]");
    // Sort chronologically; entries are appended in order but sort defensively
    log.sort((a, b) => a.ts - b.ts);
    const groups = { sideout: [], rally: [] };
    for (const e of log) {
      if (e.durationSec > 0 && (e.scoring === "sideout" || e.scoring === "rally")) {
        groups[e.scoring].push((e.winnerScore + e.loserScore) / (e.durationSec / 60));
      }
    }
    let anyEnough = false;
    const blended = {};
    for (const scoring of ["sideout", "rally"]) {
      const vals = groups[scoring];
      if (vals.length < MIN_SAMPLES) { blended[scoring] = DEFAULT_PPM[scoring]; continue; }
      anyEnough = true;
      let est = vals.slice(0, MIN_SAMPLES).reduce((a, b) => a + b, 0) / MIN_SAMPLES;
      for (let i = MIN_SAMPLES; i < vals.length; i++) {
        est = (1 - EMA_ALPHA) * est + EMA_ALPHA * vals[i];
      }
      const def = DEFAULT_PPM[scoring];
      blended[scoring] = Math.max(def * 0.5, Math.min(def * 1.5, est));
    }
    if (!anyEnough) return;
    localStorage.setItem("pb_calibration_v1", JSON.stringify({ pointsPerMinute: blended }));
  } catch (e) {}
}

function applyTimeBudgetSolve() {
  const minutes = state.timeBudget.minutes;
  const cal = readCalibration();
  let config = null, error = null, suggestion = null;

  if (state.format === "crown") {
    const preset = pickCrownPreset(minutes, cal);
    if (typeof preset === "string") {
      const presetObj = CROWN_PRESETS.find(p => p.name === preset);
      const crownMatch = presetObj ? presetObj.matches[3] : { target: 11, winBy: 2, scoring: "sideout" };
      config = { target: crownMatch.target, winBy: crownMatch.winBy, scoring: crownMatch.scoring, preset };
    } else {
      error = preset.error;
      suggestion = "Increase time to at least 90 minutes.";
    }
  } else {
    const rounds = getTimeBudgetRounds();
    const result = solveWinCondition(state.format, rounds, minutes, cal, timeBudgetActiveCourtsFor(state));
    if (!result.error) {
      config = result;
    } else {
      error = result.error;
      suggestion = result.suggestion || null;
    }
  }

  state.timeBudget.plannedConfig = config;
  if (config) {
    state.winScore = config.target;
    state.winBy    = config.winBy;
    state.scoringSystem = config.scoring;
  }

  let isTight = false;
  if (config && state.format !== "crown") {
    isTight = config.target === 7 && config.winBy === 1 && config.scoring === "rally";
  } else if (config && state.format === "crown") {
    isTight = config.preset === "Sprint";
  }

  // plannedConfig affects canStart() — keep the setup Start button/hint in sync
  // (no-ops when the setup screen isn't mounted, e.g. the settings modal).
  updateStartState();

  return { config, error, isTight, suggestion };
}

// Returns a human-readable calibration confidence string for the UI.
function calibrationReadout() {
  try {
    const log = JSON.parse(localStorage.getItem("pb_durations_v1") || "[]");
    const n = log.filter(e => e.durationSec > 0 &&
      (e.scoring === "sideout" || e.scoring === "rally")).length;
    if (n === 0) return "using defaults (no history)";
    if (n < 5)   return `Using defaults — ${n} game${n !== 1 ? "s" : ""} logged (need 5)`;
    return `Using your last ${n} game${n !== 1 ? "s" : ""}.`;
  } catch { return "using defaults"; }
}

function getNowTimeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

function generate15MinIntervals() {
  const options = [];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 15) {
      const hh = String(h).padStart(2, "0");
      const mm = String(m).padStart(2, "0");
      const val = `${hh}:${mm}`;
      
      const ampm = h >= 12 ? "PM" : "AM";
      const displayHour = h % 12 || 12;
      const displayMin = mm;
      const displayLabel = `${displayHour}:${displayMin} ${ampm}`;
      options.push({ val, label: displayLabel });
    }
  }
  return options;
}

function getClosest15MinInterval() {
  const d = new Date();
  const m = d.getMinutes();
  const roundedMin = Math.round(m / 15) * 15;
  
  let h = d.getHours();
  let finalMin = roundedMin;
  if (roundedMin === 60) {
    finalMin = 0;
    h = (h + 1) % 24;
  }
  
  const hh = String(h).padStart(2, "0");
  const mm = String(finalMin).padStart(2, "0");
  return `${hh}:${mm}`;
}

function getBaseTimestamp() {
  const timeStr = state.timeBudget && state.timeBudget.startTime;
  if (!timeStr) return Date.now();
  try {
    const [h, m] = timeStr.split(":").map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return d.getTime();
  } catch {
    return Date.now();
  }
}

function formatTimeBudgetReadout(config, minutes, suggestion) {
  const cal = readCalibration();

  // willPlay
  let willPlay = "—";
  if (!config) {
    return {
      willPlay: suggestion || "Budget too tight — increase time or reduce rounds.",
      likelyDone: "",
      confidence: "",
    };
  }
  if (config) {
    if (config.preset) {
      willPlay = config.preset + " preset";
    } else {
      const scoringLabel = config.scoring === "sideout" ? "side-out" : "rally";
      const winByLabel   = config.winBy === 1 ? "win by 1" : "win by 2";
      willPlay = scoringLabel + " to " + config.target + ", " + winByLabel;
    }
  }

  // likelyDone — setup-time projection of full event
  let likelyDone = "—";
  if (config) {
    let loMin, hiMin;
    if (state.format === "crown") {
      const presetName = config.preset;
      const presetObj = presetName ? CROWN_PRESETS.find(p => p.name === presetName) : null;
      if (presetObj) {
        let lo = 0, hi = 0;
        presetObj.matches.forEach(m => {
          const [glo, ghi] = estimateGameMinutes(m.target, m.winBy, m.scoring, cal);
          lo += 2.3 * glo + 3;
          hi += 2.3 * ghi + 3;
        });
        loMin = Math.round(lo);
        hiMin = Math.round(hi);
      }
    } else {
      const rounds = getTimeBudgetRounds();
      const activeCourts = timeBudgetActiveCourtsFor(state);
      const [roundLo, roundHi] = estimateRoundMinutes(config.target, config.winBy, config.scoring, activeCourts, cal);
      const [finLo, finHi]     = estimateRoundMinutes(11, 2, "sideout", activeCourts, cal);
      loMin = rounds * roundLo + finLo + 5;
      hiMin = rounds * roundHi + finHi + 5;
    }
    if (loMin != null) {
      const fmtTs = ts => {
        const d = new Date(ts);
        let h = d.getHours(), m = d.getMinutes();
        const ampm = h >= 12 ? "pm" : "am";
        h = h % 12 || 12;
        return h + ":" + String(m).padStart(2, "0") + " " + ampm;
      };
      const baseTs = getBaseTimestamp();
      likelyDone = "~" + fmtTs(baseTs + loMin * 60000) + "–" + fmtTs(baseTs + hiMin * 60000);
    }
  }

  // confidence
  const confidence = calibrationReadout();

  return { willPlay, likelyDone, confidence };
}

function updateTimeBudgetReadoutDOM(readout, isTight, hasError) {
  ["tb-will-play", "tb-likely-done", "tb-confidence",
   "tb-s-will-play", "tb-s-likely-done", "tb-s-confidence"].forEach((id, i) => {
    const domEl = document.getElementById(id);
    if (!domEl) return;
    const vals = [readout.willPlay, readout.likelyDone, readout.confidence];
    domEl.textContent = vals[i % 3];
  });

  // Hide the Likely-done / Confidence rows entirely when there's no estimate
  // (e.g. the budget can't be met) so we don't render dangling label-only lines.
  [["tb-likely-done-row", readout.likelyDone], ["tb-confidence-row", readout.confidence],
   ["tb-s-likely-done-row", readout.likelyDone], ["tb-s-confidence-row", readout.confidence]
  ].forEach(([id, val]) => {
    const row = document.getElementById(id);
    if (row) row.style.display = val ? "" : "none";
  });

  // tight banners
  ["tb-tight-banner", "tb-s-tight-banner"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = (isTight && !hasError) ? "block" : "none";
  });

  // Start button — disable on error, enable on success
  const startBtn = document.getElementById("start-btn");
  if (startBtn) startBtn.disabled = hasError || !canStart();
}

// Themed replacement for window.confirm(): runs onConfirm only if the user
// confirms. Escape / Cancel / backdrop all dismiss without confirming.
function showConfirm(message, onConfirm, opts) {
  opts = opts || {};
  const bg = el("div", { class: "modal-bg" });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, opts.title || "Are you sure?"));
  modal.appendChild(el("p", null, message));
  const confirmBtn = el("button", {
    class: opts.danger ? "danger" : "primary",
    style: "width:100%;margin-bottom:8px;",
  }, opts.confirmText || "Confirm");
  const cancelBtn = el("button", { style: "width:100%;" }, opts.cancelText || "Cancel");
  // Cancel = dismiss with no side effects. Confirm / Cancel / Escape (handled by
  // mountModal's default) / backdrop click all dismiss; only Confirm runs onConfirm.
  const cancel = () => { bg.remove(); };
  confirmBtn.addEventListener("click", () => { bg.remove(); onConfirm(); });
  cancelBtn.addEventListener("click", cancel);
  bg.addEventListener("click", (e) => { if (e.target === bg) cancel(); });
  modal.appendChild(confirmBtn);
  modal.appendChild(cancelBtn);
  bg.appendChild(modal);
  mountModal(bg, modal);
}

      });
      const when = entry.ts ? new Date(entry.ts).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
      row.appendChild(el("div", { style: "flex:1;min-width:0;" },
        el("div", { style: "font-weight:700;" }, entry.label),
        el("div", { class: "muted", style: "font-size:12px;margin-top:2px;" },
          (entry.kind || "event") + (when ? " · " + when : "") + (entry.detail ? " · " + entry.detail : ""))));
      if (idx === 0 && undo && entry.undoId === undo.id) {
        row.appendChild(el("button", {
          class: "ghost",
          style: "min-height:36px;padding:0 12px;",
          onclick: () => {
            close();
            const res = undoLastEvent();
            showToast(res.ok ? "Undid last event" : res.error);
          }
        }, "Undo"));
      }
      modal.appendChild(row);
    });
  }
  modal.appendChild(el("button", { style: "width:100%;margin-top:12px;", onclick: close }, "Close"));
  bg.appendChild(modal);
  mountModal(bg, modal);
}

  modal.appendChild(copyBtn);

function openQrSnapshotModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });
  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "QR Snapshot"));
  const payload = buildTournamentSnapshot("snapshot");
  const url = snapshotUrl(payload);
  const matrix = qrMatrixForText(url);
  if (Array.isArray(matrix)) {
    const qr = el("div", { style: "background:#fff;padding:12px;border-radius:8px;display:flex;justify-content:center;margin:10px 0;" });
    qr.innerHTML = renderQrSvg(matrix);
    modal.appendChild(qr);
    modal.appendChild(el("p", { class: "muted" }, "Players can scan this static snapshot. It does not live update."));
  } else {
    modal.appendChild(el("p", { class: "muted" },
      "This snapshot is too large for the built-in QR encoder. Use Copy link instead."));
  }
  const linkBox = el("textarea", {
    readonly: "readonly",
    style: "width:100%;min-height:84px;border-radius:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px;font-family:inherit;font-size:12px;"
  }, url);
  modal.appendChild(linkBox);
  const copyBtn = el("button", { class: "primary", style: "width:100%;margin:10px 0 8px;" }, "Copy link");
  copyBtn.addEventListener("click", () => {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => showToast("Snapshot link copied"));
    } else {
      linkBox.focus();
      linkBox.select();
      try { document.execCommand("copy"); showToast("Snapshot link copied"); } catch (e) {}
    }
  });
  modal.appendChild(copyBtn);
  modal.appendChild(el("button", { style: "width:100%;", onclick: close }, "Close"));
  bg.appendChild(modal);
  mountModal(bg, modal);
}

function renderTimeBudgetBlock() {
  const enabled = !!(state.timeBudget && state.timeBudget.enabled);
  const cal = readCalibration();
  const isCrown = state.format === "crown";

  // Solve/Calculate based on mode
  let config = null, error = null, isTight = false, suggestion = null;
  if (enabled) {
    const solve = applyTimeBudgetSolve();
    config = solve.config;
    error = solve.error;
    isTight = solve.isTight;
    suggestion = solve.suggestion;
  } else {
    config = { target: state.winScore, winBy: state.winBy, scoring: state.scoringSystem };
    error = null;
    isTight = false;
    suggestion = null;
  }

  const readout = formatTimeBudgetReadout(config, state.timeBudget.minutes, suggestion);

  // Estimate total minutes
  let loMin = null, hiMin = null;
  if (config) {
    if (state.format === "crown") {
      const presetName = config.preset || "Standard";
      const presetObj = CROWN_PRESETS.find(p => p.name === presetName) || CROWN_PRESETS[1];
      let lo = 0, hi = 0;
      presetObj.matches.forEach(m => {
        const [glo, ghi] = estimateGameMinutes(m.target, m.winBy, m.scoring, cal);
        lo += 2.3 * glo + 3;
        hi += 2.3 * ghi + 3;
      });
      loMin = Math.round(lo);
      hiMin = Math.round(hi);
    } else {
      const rounds = getTimeBudgetRounds();
      const activeCourts = timeBudgetActiveCourtsFor(state);
      const [roundLo, roundHi] = estimateRoundMinutes(config.target, config.winBy, config.scoring, activeCourts, cal);
      const [finLo, finHi]     = estimateRoundMinutes(11, 2, "sideout", activeCourts, cal);
      loMin = rounds * roundLo + finLo + 5;
      hiMin = rounds * roundHi + finHi + 5;
    }
  }

  const card = el("div", { class: "card" });
  card.appendChild(el("h3", null, "Tournament Timing"));

  // --- Section 1: Event Schedule Controls (Inputs on top) ---
  
  // Start Time selector
  const startRow = el("div", { class: "settings-row", style: "margin-bottom:12px;" });
  startRow.appendChild(el("label", { for: "tb-start-time", style: "font-weight:600;" }, "Start Time"));
  const startSelect = el("select", {
    id: "tb-start-time",
    style: "min-height:36px;font-size:14px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-family:inherit;width:140px;"
  });
  const intervals = generate15MinIntervals();
  const currentStart = state.timeBudget.startTime || getClosest15MinInterval();
  intervals.forEach(item => {
    const opt = el("option", { value: item.val }, item.label);
    if (item.val === currentStart) opt.setAttribute("selected", "selected");
    startSelect.appendChild(opt);
  });
  startSelect.addEventListener("change", () => {
    state.timeBudget.startTime = startSelect.value;
    save();
    render();
  });
  startRow.appendChild(startSelect);
  card.appendChild(startRow);

  // Time Budget Toggle and Inputs
  const tbCard = el("div", { style: "border-top:1px solid var(--border);padding-top:12px;margin-bottom:16px;" });
  
  const toggleLabel = el("label", { class: "tb-toggle-row", style: "cursor:pointer;font-size:16px;min-height:44px;" });
  const toggleChk = el("input", {
    type: "checkbox",
    id: "tb-enabled",
    style: "width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;",
  });
  if (enabled) toggleChk.setAttribute("checked", "checked");
  toggleLabel.appendChild(toggleChk);
  toggleLabel.appendChild(document.createTextNode("Automatically manage time (Time Budget)"));
  tbCard.appendChild(toggleLabel);
  
  const details = el("div", {
    id: "tb-details",
    style: "display:" + (enabled ? "block" : "none") + ";margin-top:12px;"
  });

  // Time target row
  const timeRow = el("div", { class: "tb-row" });
  timeRow.appendChild(el("label", { for: "tb-minutes" }, "Target Event time:"));
  const minutesSel = el("select", { id: "tb-minutes" });
  const timeOptions = isCrown
    ? [90, 105, 120, 150, 180]
    : [
        { value: 60,  label: "60 min (very tight)" },
        { value: 75,  label: "75 min (very tight)" },
        { value: 90,  label: "90 min" },
        { value: 105, label: "105 min" },
        { value: 120, label: "120 min" },
        { value: 150, label: "150 min" },
        { value: 180, label: "180 min" },

  const savedMinutes = (state.timeBudget && state.timeBudget.minutes) || 90;
  timeOptions.forEach(opt => {
    const val = typeof opt === "number" ? opt : opt.value;

  timeRow.appendChild(minutesSel);
  details.appendChild(timeRow);

  // Auto-tighten row
  const autoRow = el("div", { class: "tb-toggle-row", style: "margin-top:8px;" });
  const autoChk = el("input", { type: "checkbox", id: "tb-auto-tighten" });

  autoRow.appendChild(autoChk);
  const autoLabelText = el("div");
  autoLabelText.appendChild(document.createTextNode("Auto-tighten if running long"));
  autoLabelText.appendChild(el("span", { class: "tb-subtext" }, " (default: prompt before tightening)"));
  autoRow.appendChild(autoLabelText);
  details.appendChild(autoRow);

  const tbExplanation = el("p", { class: "muted", style: "font-size:12px;margin-top:10px;line-height:1.4;" },
    "🎯 When enabled, Rumble adjusts the scoring system (Rally vs Side-out) and target scores automatically to fit the selected time constraint."
  );
  details.appendChild(tbExplanation);

  // Tight banner
  const tightBanner = el("div", {
    id: "tb-tight-banner",
    class: "tb-tight-banner",
    style: "display:" + (isTight && !error ? "block" : "none") + ";margin-top:10px;",
  }, "This budget is tight — even our shortest games may run over.");
  details.appendChild(tightBanner);

  tbCard.appendChild(details);
  card.appendChild(tbCard);

  // Scoring Mechanic Panel (Manual Controls)

    ));

  // Scoring Type (Traditional vs Rally)

  typeRow.appendChild(el("label", null, "Scoring System"));
  
  const typeBtns = el("div", { class: "setup-tabs", style: "margin:0;flex:1;max-width:240px;height:36px;padding:2px;background:var(--panel);" });
  const traditionalBtn = el("button", {
    class: "setup-tab-btn" + (state.scoringSystem === "sideout" ? " active" : ""),

    disabled: enabled
  }, "Traditional");
  const rallyBtn = el("button", {
    class: "setup-tab-btn" + (state.scoringSystem === "rally" ? " active" : ""),
    style: "font-size:12px;padding:4px 8px;border-radius:6px;min-height:auto;",
    disabled: enabled
  }, "Rally");
  
  traditionalBtn.addEventListener("click", () => {
    state.scoringSystem = "sideout";
    save();
    render();
  });
  rallyBtn.addEventListener("click", () => {
    state.scoringSystem = "rally";
    save();
    render();

  typeBtns.appendChild(traditionalBtn);
  typeBtns.appendChild(rallyBtn);
  typeRow.appendChild(typeBtns);
  scoringCard.appendChild(typeRow);

  // Short Explanations for scoring systems
  const typeDesc = el("p", { class: "muted", style: "font-size:12px;margin:4px 0 12px;line-height:1.45;" },
    state.scoringSystem === "rally"
      ? "⚡ Rally: A point is scored on every single rally. Fast-paced, games typically take 7–10 minutes."
      : "🐢 Traditional (Side-out): Points can only be scored when your team is serving. Typical games take 15–20 minutes."
  );
  scoringCard.appendChild(typeDesc);

  // Win Score selector
  const scoreRow = el("div", { class: "settings-row", style: (enabled || state.format === "crown") ? "opacity:0.5;pointer-events:none;" : "" });
  scoreRow.appendChild(el("label", null, "Target Score"));
  const scoreSel = el("select", { disabled: enabled || state.format === "crown" });
  [11, 15, 21].forEach(v => {
    const opt = el("option", { value: String(v) }, String(v));
    if (state.winScore === v) opt.setAttribute("selected", "selected");
    scoreSel.appendChild(opt);
  });
  scoreSel.addEventListener("change", () => {
    state.winScore = parseInt(scoreSel.value, 10);
    save();
    render();
  });
  scoreRow.appendChild(scoreSel);
  scoringCard.appendChild(scoreRow);

  // Win By selector
  const winByRow = el("div", { class: "settings-row", style: enabled ? "opacity:0.5;pointer-events:none;" : "" });
  winByRow.appendChild(el("label", null, "Win By"));
  const winBySel = el("select", { disabled: enabled });
  [[1, "Win by 1"], [2, "Win by 2"]].forEach(([v, lbl]) => {
    const opt = el("option", { value: String(v) }, lbl);
    if (state.winBy === v) opt.setAttribute("selected", "selected");
    winBySel.appendChild(opt);
  });
  winBySel.addEventListener("change", () => {
    state.winBy = parseInt(winBySel.value, 10);
    save();
    render();
  });
  winByRow.appendChild(winBySel);
  scoringCard.appendChild(winByRow);

  card.appendChild(scoringCard);

  // --- Section 2: Estimated Results (Outputs at the bottom) ---
  
  const summaryPanel = el("div", {
    style: "background:var(--panel-2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:20px;border-top:1px solid var(--border);"
  });
  
  summaryPanel.appendChild(el("h4", { style: "margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:var(--muted);text-align:center;" }, "Estimated Projection"));
  
  // Large duration + finish time grid
  const grid = el("div", { style: "display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center;margin-bottom:12px;" });
  
  // Col 1: Duration
  const durCol = el("div");
  durCol.appendChild(el("div", { class: "muted", style: "font-size:12px;" }, "Total Duration"));
  let durationText = "—";
  if (config && loMin != null && hiMin != null) {
    const formatHours = mins => {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    };
    durationText = `~${loMin}–${hiMin} min\n(${formatHours(loMin)} – ${formatHours(hiMin)})`;
  } else if (error) {
    durationText = "Budget Too Tight";
  }
  const durVal = el("div", { style: "font-size:18px;font-weight:800;color:var(--accent);margin-top:4px;white-space:pre-line;" }, durationText);
  durCol.appendChild(durVal);

  finCol.appendChild(el("div", { class: "muted", style: "font-size:12px;" }, "Estimated Finish"));
  const finVal = el("div", { id: "tb-likely-done", style: "font-size:18px;font-weight:800;color:var(--accent);margin-top:4px;" }, readout.likelyDone || "—");
  finCol.appendChild(finVal);
  
  grid.appendChild(durCol);
  grid.appendChild(finCol);
  summaryPanel.appendChild(grid);

  // Status Badge row
  const badgeContainer = el("div", { style: "text-align:center;margin-bottom:16px;" });
  let badgeText = "";
  let badgeStyle = "display:inline-block;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;";
  if (enabled) {
    if (error) {
      badgeText = "⚠️ Exceeds Budget";
      badgeStyle += "background:#3d1a1a;color:#ff6b6b;border:1px solid #5a2424;";
    } else if (isTight) {
      badgeText = "⚠️ Tight Budget";
      badgeStyle += "background:#3d301a;color:#ffb86c;border:1px solid #5a4524;";
    } else {
      badgeText = "✅ Fits Budget";
      badgeStyle += "background:#1a3d24;color:#50fa7b;border:1px solid #245a33;";
    }
  } else {
    badgeText = "ℹ️ Manual Scoring Estimate";
    badgeStyle += "background:var(--panel);color:var(--muted);border:1px solid var(--border);";
  }
  badgeContainer.appendChild(el("span", { style: badgeStyle }, badgeText));
  summaryPanel.appendChild(badgeContainer);

  // Setup Details list
  const detailsList = el("div", { class: "tb-readout", style: "border-top:1px solid var(--border);padding-top:12px;font-size:13px;" });
  
  const displayRounds = getTimeBudgetRounds();
  let roundsText = "";
  if (state.format === "crown") {
    roundsText = "4 matches (3 themed rounds + 1 Championship)";
  } else {
    const formatLabel = state.format === "rr" ? "Round Robin" :
                        state.format === "stack" ? "Stack Format" :
                        state.format === "king" ? "King of the Court" :
                        state.format === "gauntlet" ? "Gauntlet" : "Tournament";
    roundsText = `${displayRounds} rounds of ${formatLabel} + 1 Championship round`;
  }
  
  detailsList.appendChild(el("div", { style: "margin-bottom:6px;" }, "Rounds / Matches: ", el("span", { style: "font-weight:700;color:var(--accent);" }, roundsText)));
  detailsList.appendChild(el("div", { style: "margin-bottom:6px;" }, "Will play: ", el("span", { id: "tb-will-play", style: "font-weight:600;" }, readout.willPlay)));
  detailsList.appendChild(el("div", { id: "tb-confidence-row", style: readout.confidence ? "" : "display:none;" }, "Confidence: ", el("span", { id: "tb-confidence", class: "muted" }, readout.confidence)));

  // Math/Calculation breakdown accordion
  const activeCourts = timeBudgetActiveCourtsFor(state);
  const rounds = getTimeBudgetRounds();
  let calcExplanation = "";
  if (state.format === "crown") {
    calcExplanation = `• Crown Court consists of 4 matches (3 themed rounds + 1 Championship Crown match). \n` +
                      `• Matches run sequentially on one court. \n` +
                      `• Transition buffer included between matches.`;
  } else if (config) {
    const [roundLo, roundHi] = estimateRoundMinutes(config.target, config.winBy, config.scoring, activeCourts, cal);
    const [finLo, finHi]     = estimateRoundMinutes(11, 2, "sideout", activeCourts, cal);
    const formatLabel = state.format === "rr" ? "Round Robin" :
                        state.format === "stack" ? "Stack Format" :
                        state.format === "king" ? "King of the Court" :
                        state.format === "gauntlet" ? "Gauntlet" : "Tournament";
    calcExplanation = `• Rounds: ${rounds} rounds of ${formatLabel} + 1 Championship round.\n` +
                      `• Active courts: ${activeCourts} court${activeCourts === 1 ? "" : "s"}.\n` +
                      `• Round duration: ~${Math.round(roundLo)}–${Math.round(roundHi)} min per round.\n` +
                      `• Final championship: ~${Math.round(finLo)}–${Math.round(finHi)} min.\n` +

    const calcBody = el("div", { style: "padding:8px 4px 0;line-height:1.5;color:var(--muted);white-space:pre-line;" }, calcExplanation);
    calcDetails.appendChild(calcBody);
    summaryPanel.appendChild(calcDetails);
  }
  
  card.appendChild(summaryPanel);

  // --- Event Listeners and Callbacks ---

  // Wire time minutes dropdown
  minutesSel.addEventListener("change", () => {
    state.timeBudget.minutes = parseInt(minutesSel.value, 10);
    const { config: c } = applyTimeBudgetSolve();
    if (c && c.scoring === "rally" && !state.timeBudget.rallyAcknowledged) {
      showRallyAckDialog(

          state.timeBudget.rallyAcknowledged = true;
          save();
          render();
        },
        () => {
          const STEPS = [60, 75, 90, 105, 120, 150, 180];
          const idx = STEPS.indexOf(state.timeBudget.minutes);
          if (idx < STEPS.length - 1) {
            state.timeBudget.minutes = STEPS[idx + 1];
            save();
            render();
          }
        }
      );
    } else {
      save();
      render();
    }
  });

  // Wire auto-tighten checkbox
  autoChk.addEventListener("change", () => {
    state.timeBudget.autoTighten = autoChk.checked;

function defaultRoundsForMixer(players, courts) {
  const active = Math.min(players, 4 * courts);
  if (active <= 0) return 7;
  return Math.max(4, Math.min(12, Math.ceil(players * (players - 1) / active)));
}

function updateRoundsDefaultIfNeeded(players, courts) {
  if (state.lastSetupPlayers === undefined) {
    state.lastSetupPlayers = players;
    state.lastSetupCourts = courts;
    return;
  }
  if (state.lastSetupPlayers !== players || state.lastSetupCourts !== courts) {
    const prevDefault = defaultRoundsForMixer(state.lastSetupPlayers, state.lastSetupCourts);
    const newDefault = defaultRoundsForMixer(players, courts);
    if (state.rrRounds === prevDefault || !state.rrRounds) {
      state.rrRounds = newDefault;
    }
    state.lastSetupPlayers = players;
    state.lastSetupCourts = courts;
    save();
  }
}

function getRoundStatistics(format, rounds, players, courts) {
  const active = Math.min(players, 4 * courts);
  if (active <= 0) return null;

  const avgGames = rounds * active / players;
  const avgByes = rounds - avgGames;

  let gamesText = "";
  if (Math.abs(avgGames - Math.round(avgGames)) < 0.01) {
    const g = Math.round(avgGames);
    gamesText = `${g} game${g !== 1 ? "s" : ""}`;
  } else {
    gamesText = `${Math.floor(avgGames)} or ${Math.ceil(avgGames)} game${Math.ceil(avgGames) !== 1 ? "s" : ""}`;
  }

  let byesText = "";
  if (Math.abs(avgByes - Math.round(avgByes)) < 0.01) {
    const b = Math.round(avgByes);
    byesText = b === 0 ? "0 byes" : `${b} bye${b !== 1 ? "s" : ""}`;
  } else {
    byesText = `${Math.floor(avgByes)} or ${Math.ceil(avgByes)} bye${Math.ceil(avgByes) !== 1 ? "s" : ""}`;
  }

  let partnerText = "";
  if (format === "rr") {
    const defaultR = defaultRoundsForMixer(players, courts);
    if (rounds >= defaultR) {
      partnerText = `All ${players - 1} other players (full mix)`;
    } else {
      const minG = Math.floor(avgGames);
      const maxG = Math.ceil(avgGames);
      if (minG === maxG) {
        partnerText = `${minG} different partner${minG !== 1 ? "s" : ""} (out of ${players - 1})`;
      } else {
        partnerText = `${minG}–${maxG} different partner${maxG !== 1 ? "s" : ""} (out of ${players - 1})`;
      }
    }
  } else if (format === "stack") {
    partnerText = "Partnered based on ladder rank adjacency";
  } else {
    partnerText = "Ad-hoc court pairings based on ranks";
  }

  return {
    games: gamesText,
    byes: byesText,
    partners: partnerText
  };
}

// ---------- playing screens ----------
function isGameDecided(g) { return isGameComplete(g) && g.score1 !== g.score2; }
function isRoundDecided(r) {
  const games = gamesOf(r);
  return games.length > 0 && games.every(isGameDecided);
}

function movementToastText(prevRound, newRound) {
  // climbers = c2 winners (now on new c1)
  const c1 = gameForCourt(prevRound, 1), c2 = gameForCourt(prevRound, 2);
  if (!c1 || !c2 || gamesOf(prevRound).length !== 2 || gamesOf(newRound).length !== 2) {
    const nextCourt = new Map();
    gamesOf(newRound).forEach(g => [...g.team1, ...g.team2].forEach(slot => nextCourt.set(slot, g.court)));
    const moves = [];
    gamesOf(prevRound).forEach(g => {
      [...g.team1, ...g.team2].forEach(slot => {
        const next = nextCourt.get(slot);
        if (!next || next === g.court) return;
        moves.push(nameOf(slot) + (next < g.court ? " climbs to Court " : " drops to Court ") + next);
      });
    });
    return moves.slice(0, 2).join(" · ") || "Next round ready";
  }
  const c2Win = c2.score1 > c2.score2 ? c2.team1 : c2.team2;
  const c1Lose = c1.score1 > c1.score2 ? c1.team2 : c1.team1;
  return teamName(c2Win) + " climb to Court 1 · " + teamName(c1Lose) + " drop to Court 2";
}
