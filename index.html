<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8F%93%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Rumble Pickleball</title>
<!-- RUMBLE:STYLE:start -->
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --border: #2e3946;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #fbbf24;
    --good: #10b981;
    --bad: #ef4444;
    --court1: #38bdf8;
    --court2: #a78bfa;
    --court3: #34d399;
    --court4: #f472b6;
    --court5: #f59e0b;
    --court6: #22d3ee;
    --gold: #fbbf24;
    --silver: #cbd5e1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    line-height: 1.4;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: none;
  }
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px max(14px, env(safe-area-inset-left)) 80px max(14px, env(safe-area-inset-right));
  }
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    padding: 4px 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 22px; font-weight: 700; }
  .progress {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(251, 191, 36, 0.12);
    padding: 8px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }
  button {
    font-family: inherit;
    font-size: 18px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-height: 60px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    color: #1a1207;
    border-color: var(--accent);
    font-size: 22px;
    padding: 18px 26px;
  }
  button.primary:disabled {
    background: var(--panel);
    color: var(--muted);
    border-color: var(--border);
  }
  button.danger { background: var(--bad); color: white; border-color: var(--bad); }
  button.ghost { background: transparent; }
  /* Themed keyboard-focus ring (replaces the off-theme UA default ring). */
  button:focus-visible,
  a:focus-visible,
  summary:focus-visible,
  select:focus-visible,
  .ka-switch:focus-within {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .icon-btn {
    width: 60px; min-width: 60px; height: 60px; min-height: 60px;
    padding: 0; font-size: 26px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .app.display-app {
    max-width: none;
    min-height: 100vh;
    padding: clamp(18px, 3vw, 44px);
  }
  .display-shell {
    min-height: calc(100vh - 36px);
    display: flex;
    flex-direction: column;
    gap: clamp(16px, 2vw, 28px);
  }
  .display-top {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
  }
  .display-title {
    font-size: clamp(34px, 5vw, 72px);
    line-height: 1;
    font-weight: 900;
  }
  .display-status {
    font-size: clamp(22px, 3vw, 42px);
    color: var(--accent);
    font-weight: 800;
    text-align: right;
  }
  .display-meta {
    color: var(--muted);
    font-size: clamp(15px, 1.6vw, 22px);
    margin-top: 8px;
  }
  .display-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(14px, 2vw, 24px);
    align-items: start;
  }
  .display-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: clamp(16px, 2vw, 26px);
  }
  .display-panel h2 {
    margin: 0 0 14px;
    font-size: clamp(22px, 2.4vw, 34px);
  }
  .display-line,
  .display-standing {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    border-top: 1px solid var(--border);
    padding: 12px 0;
    font-size: clamp(18px, 2vw, 30px);
  }
  .display-line:first-of-type,
  .display-standing:first-of-type { border-top: 0; }
  .display-line strong,
  .display-standing strong { font-weight: 850; }
  .display-score {
    color: var(--accent);
    font-weight: 900;
    white-space: nowrap;
  }
  @media (max-width: 780px) {
    .display-top,
    .display-grid { grid-template-columns: 1fr; }
    .display-status { text-align: left; }
  }
  .court-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr));
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) {
    .court-row { grid-template-columns: 1fr; }
  }
  .court-card {
    border-radius: 18px;
    padding: 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-top-width: 6px;
  }
  .court-card.c1 { border-top-color: var(--court1); }
  .court-card.c2 { border-top-color: var(--court2); }
  .court-card.c3 { border-top-color: var(--court3); }
  .court-card.c4 { border-top-color: var(--court4); }
  .court-card.c5 { border-top-color: var(--court5); }
  .court-card.c6 { border-top-color: var(--court6); }
  .court-card.gold { border-top-color: var(--gold); }
  .court-card.silver { border-top-color: var(--silver); }
  .bye-banner {
    margin: 0 0 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel-2);
    color: var(--muted);
    text-align: center;
    font-size: 14px;
  }
  .why-btn {
    min-height: 0;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    line-height: 1.2;
    background: transparent;
    color: var(--accent);
    border-color: rgba(251, 191, 36, 0.45);
    vertical-align: middle;
    white-space: nowrap;
  }
  .bye-banner .why-btn { margin-left: 8px; }
  .rank-trajectory-wrap .why-btn { margin-left: 4px; }
  /* Stack format: top court gets a subtle gold treatment to read as "the top court" */
  .court-card.c1.stack-top {
    border-top-color: var(--gold);
    border-top-width: 6px;
    box-shadow: 0 0 18px rgba(251, 191, 36, 0.10);
  }
  .court-card.c1.stack-top .court-label { color: var(--gold); }
  .court-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .court-score-desc {
    font-size: 11px;
    color: #888;
    margin: 0 0 9px;
    letter-spacing: 0.01em;
  }
  .court-card.c1 .court-label { color: var(--court1); }
  .court-card.c2 .court-label { color: var(--court2); }
  .court-card.c3 .court-label { color: var(--court3); }
  .court-card.c4 .court-label { color: var(--court4); }
  .court-card.c5 .court-label { color: var(--court5); }
  .court-card.c6 .court-label { color: var(--court6); }
  .court-card.gold .court-label { color: var(--gold); }
  .court-card.silver .court-label { color: var(--silver); }
  .court-label.hc {
    display: inline-block;
    color: var(--text);
    background: var(--panel-2);
    border: 2px solid var(--text);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .matchup {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .team-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 12px;
    align-items: center;
    background: var(--panel-2);
    border-radius: 12px;
    padding: 10px 12px;
    border-left: 4px solid transparent;
    transition: border-color 0.15s ease, background-color 0.15s ease;
  }
  .team-row.winner {
    border-left-color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .team-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }
  .team-row.winner .team-name { color: var(--good); }
  .score-input {
    width: 100%;
    font-size: 44px;
    font-weight: 800;
    text-align: center;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 10px;
    padding: 4px;
    height: 70px;
    -moz-appearance: textfield;
    appearance: textfield;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .score-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .score-input:placeholder-shown:not(:focus) {
    border-color: rgba(255, 255, 255, 0.22);
  }
  .score-input.winner {
    border-color: var(--good);
    color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .name-input {
    width: 100%;
    font-size: 22px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 12px;
    min-height: 60px;
    font-family: inherit;
  }
  .name-input:focus { outline: none; border-color: var(--accent); }
  .name-input.invalid { border-color: var(--bad); box-shadow: 0 0 0 1px var(--bad); }
  .name-input.invalid:focus { border-color: var(--bad); }
  #start-hint.is-error { color: var(--bad); font-weight: 600; }
  .court-summary {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 10px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }
  .court-summary.winmsg { color: var(--good); font-weight: 700; }
  .court-summary.tiemsg { color: var(--accent); font-weight: 700; }
  .elapsed-badge {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    min-height: 16px;
    margin: 2px 0 0;
  }

  table.standings { width: 100%; border-collapse: collapse; table-layout: fixed; }
  /* Cap width only on wide/TV-cast/desktop screens so the name and stat columns
     stay close enough to scan in one glance. Phones and portrait tablets
     (< 900px) keep the full-width table. */
  @media (min-width: 900px) {
    table.standings { max-width: 680px; margin-inline: auto; }
  }
  table.standings col.c-rank { width: 56px; }
  @media (max-width: 480px) {
    table.standings col.c-rank { width: 44px; }
    table.standings th.col-hide-mobile,
    table.standings td.col-hide-mobile { display: none; padding: 0; }
  }
  table.standings.hide-advanced th.col-hide-mobile,
  table.standings.hide-advanced td.col-hide-mobile { display: none; padding: 0; }
  table.standings tr.tier-divider td {
    border-top: 1px solid var(--border);
    padding: 10px 8px 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }
  .standings-footer {
    margin: 12px 0 0;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
  }
  .rank-trajectory {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    font-weight: 700;
    vertical-align: middle;
    line-height: 1;
  }
  .rank-trajectory.up   { color: var(--good); }
  .rank-trajectory.down { color: var(--bad); }
  .rank-trajectory.same { color: var(--muted); }
  .standings-view-toggle { display: inline-flex; border: 1px solid var(--muted); border-radius: 999px; overflow: hidden; }
  .standings-view-toggle .seg-btn { background: none; border: 0; color: var(--muted); font: inherit; font-size: 13px;
    font-weight: 600; padding: 5px 14px; min-height: 32px; cursor: pointer; }
  .standings-view-toggle .seg-btn.active { background: var(--accent); color: #1a1207; }
  table.standings th, table.standings td {
    text-align: left;
    padding: 10px 6px;
    border-bottom: 1px solid var(--border);
  }
  table.standings th {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  table.standings td.num,
  table.standings th.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.standings td.num { font-size: 20px; font-weight: 700; }
  table.standings td.name { font-size: 20px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .help-th .col-help-btn {
    background: none; border: 0; color: var(--muted); font: inherit; font-weight: 600;
    cursor: pointer; padding: 6px 2px; min-height: 32px; text-decoration: underline dotted; text-underline-offset: 3px;
  }
  .help-th .col-help-btn:hover, .help-th .col-help-btn:focus-visible { color: var(--text); }
  .col-help-modal { max-width: 360px; }
  .guide-btn { background: none; border: 1px solid var(--muted); color: var(--muted); border-radius: 999px;
    font: inherit; font-size: 12px; font-weight: 600; padding: 4px 10px; cursor: pointer; }
  .guide-btn:hover, .guide-btn:focus-visible { color: var(--text); border-color: var(--text); }
  .col-guide-modal { max-width: 420px; max-height: 80vh; overflow-y: auto; }
  table.standings tr.r1 td.name { color: var(--gold); }
  table.standings .rank {
    text-align: center;
    padding: 6px;
  }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 800;
    font-size: 18px;
    background: var(--panel-2);
    color: var(--muted);
  }
  .rank-badge.medal {
    font-size: 24px;
    background: transparent;
  }
  .partner-badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--muted);
    font-weight: 600;
    vertical-align: middle;
  }
  .partner-badge.done { color: var(--good); background: rgba(16, 185, 129, 0.15); }
  .standings tr.departed { opacity: 0.58; }
  .departed-label {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  details.history {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
  }
  details.history summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: 700;
    user-select: none;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  details.history summary::-webkit-details-marker { display: none; }
  details.history summary::after { content: "▾"; color: var(--muted); }
  details.history[open] summary::after { content: "▴"; }
  details.history .body { padding: 0 16px 14px; }
  .history-round { padding: 12px 0; border-top: 1px solid var(--border); }
  .history-round:first-child { border-top: none; }
  .history-round-title {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .history-game {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 16px;
  }
  .history-game .court-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .history-game .court-tag.c1 { background: rgba(56, 189, 248, 0.15); color: var(--court1); }
  .history-game .court-tag.c2 { background: rgba(167, 139, 250, 0.15); color: var(--court2); }
  .history-game .court-tag.c3 { background: rgba(52, 211, 153, 0.15); color: var(--court3); }
  .history-game .court-tag.c4 { background: rgba(244, 114, 182, 0.15); color: var(--court4); }
  .history-game .court-tag.c5 { background: rgba(245, 158, 11, 0.15); color: var(--court5); }
  .history-game .court-tag.c6 { background: rgba(34, 211, 238, 0.15); color: var(--court6); }
  .history-game .court-tag.hc { color: var(--text); background: var(--panel-2); border: 1.5px solid var(--text); }
  .history-game .game-text { flex: 1; }
  .history-game .game-score {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    font-size: 18px;
    flex-shrink: 0;
  }
  .winning-team { color: var(--good); font-weight: 700; }

  /* Redesigned Tabbed Setup Styles */
  .setup-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .setup-tab-btn {
    flex: 1;
    min-height: 52px;
    border-radius: 12px;
    background: var(--panel);
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 700;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .setup-tab-btn.active {
    background: var(--accent);
    color: #1a1207;
    border-color: var(--accent);
  }
  .setup-tab-btn.has-error::after {
    content: "";
    position: absolute;
    top: 6px;
    right: 6px;
    width: 10px;
    height: 10px;
    background-color: var(--bad);
    border-radius: 50%;
    border: 2px solid var(--panel);
  }
  .setup-tab-btn.active.has-error::after {
    border-color: var(--accent);
  }
  
  .setup-tab-content {
    display: none;
  }
  .setup-tab-content.active {
    display: block;
  }

  .setup-bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 1200px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 100;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
    box-sizing: border-box;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
  
  .setup-bottom-summary {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .setup-summary-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .setup-summary-details {
    font-size: 13px;
    color: var(--muted);
  }
  
  .setup-bottom-bar-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .setup-bottom-bar-right button.primary {
    min-height: 52px;
    padding: 12px 24px;
    font-size: 18px;
    border-radius: 12px;
    white-space: nowrap;
  }
  
  /* Additional spacing to prevent bottom bar from overlapping content */
  .setup-container {
    padding-bottom: 120px;
  }

  @media (max-width: 580px) {
    .setup-tabs {
      gap: 4px;
    }
    .setup-tab-btn {
      font-size: 13px;
      min-height: 48px;
      padding: 4px 6px;
      border-radius: 8px;
    }
    .setup-bottom-bar {
      flex-direction: column;
      align-items: stretch;
      padding: 12px 14px;
      gap: 10px;
    }
    .setup-bottom-bar-right {
      align-items: stretch;
      width: 100%;
    }
    .setup-bottom-bar-right button.primary {
      width: 100%;
      min-height: 48px;
      font-size: 18px;
    }
    .setup-container {
      padding-bottom: 160px;
    }
    .setup-bottom-summary {
      text-align: center;
    }
  }

  .setup-list { display: grid; gap: 10px; margin-bottom: 14px; }
  .format-chooser {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .format-chooser-label {
    font-size: 12px;
    font-weight: 800;

  /* Crown Court format */
  .court-card.crown:not(.c1):not(.c2):not(.gold):not(.silver) {
    border-top-color: var(--gold);
    box-shadow: 0 0 32px rgba(251, 191, 36, 0.15);

  .court-card.crown:not(.c1):not(.c2):not(.gold):not(.silver) .court-label { color: var(--gold); }

  .row-actions {

    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;

  .row-actions button.secondary { flex: 1; min-width: 140px; }

  .mobile-tourney-tabs { display: flex; gap: 6px; margin-bottom: 12px; }

  .modal-bg {

  .modal {

  .seeds-grid {
    display: grid;

  }
  .seed-row {
    padding: 6px 10px;

  .champions { text-align: center; padding: 24px 12px 8px; }
  .champions .crown { font-size: 80px; line-height: 1; }
  .champions h1 {
    font-size: 42px;
    margin: 8px 0 4px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .champions .winners {
    font-size: 36px;
    font-weight: 800;
    margin: 18px 0;
    line-height: 1.15;
  }
  .scorecard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px 16px;
    align-items: center;
    max-width: 480px;

    padding: 14px 16px;
    background: var(--panel-2);

  .scorecard .sc-team.right { text-align: left; }

  .scorecard .sc-score {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);

    letter-spacing: 0.04em;

  }
  .champions .consolation-block {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);

  .consolation-title {
    color: var(--silver);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .consolation-winners {
    font-size: 26px;
    font-weight: 800;
    margin: 8px 0;
  }
  .consolation-block .scorecard {

    padding: 10px 14px;

  @media (max-width: 480px) {

    .scorecard .sc-team.left, .scorecard .sc-team.right { text-align: center; }
    .scorecard .sc-score { font-size: 32px; margin: 2px 0; }

  h2, h3 { margin: 0 0 12px; }
  .muted { color: var(--muted); font-size: 14px; }

  /* Rules block (Setup + Settings) */

    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin: 0 0 14px;
  }
  details.rules summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;

    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);

  details.rules summary::-webkit-details-marker { display: none; }
  details.rules summary::after { content: "▾"; color: var(--muted); }
  details.rules[open] summary::after { content: "▴"; }
  details.rules .rules-body {
    padding: 0 16px 14px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }
  details.rules .rules-body ul { margin: 0; padding-left: 20px; }
  details.rules .rules-body li { margin: 6px 0; }
  details.rules .rules-body strong { color: var(--text); }

  /* Paste-names link and modal */
  .paste-link {
    display: inline-block;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 8px 0;
    margin-bottom: 4px;
    cursor: pointer;
    text-decoration: underline;
    min-height: 36px;
  }
  .paste-textarea {
    width: 100%;
    min-height: 200px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.5;

  .paste-error {
    color: var(--bad);

    font-weight: 600;
    margin: 8px 0 0;

  /* Shuffle reveal overlay */
  .shuffle-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
  }
  .shuffle-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .shuffle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 520px;
    width: 100%;

  .shuffle-slot {
    background: var(--panel);

  .shuffle-skip {
    margin-top: 18px;

  .shuffle-group-label {

    font-weight: 800;

    letter-spacing: 0.06em;
    text-align: center;

  /* Partner-preview chip in standings */
  .partner-chip {

    font-size: 12px;
    font-weight: 700;

  }
  .partner-chip.c1 { color: var(--court1); background: rgba(56, 189, 248, 0.15); }
  .partner-chip.c2 { color: var(--court2); background: rgba(167, 139, 250, 0.15); }
  .partner-chip.c3 { color: var(--court3); background: rgba(52, 211, 153, 0.15); }
  .partner-chip.c4 { color: var(--court4); background: rgba(244, 114, 182, 0.15); }
  .partner-chip.c5 { color: var(--court5); background: rgba(245, 158, 11, 0.15); }
  .partner-chip.c6 { color: var(--court6); background: rgba(34, 211, 238, 0.15); }
  .partner-chip.bye { color: var(--muted); background: var(--panel-2); }
  .mixed-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;

    border-radius: 999px;
    margin-left: 6px;

    background: rgba(16, 185, 129, 0.15);

  .same-group-team {
    border: 1px dashed var(--muted);
    border-radius: 8px;
    padding: 2px 4px;
  }
  .bye-group-tally {
    font-size: 14px;
    color: var(--muted);

  }
  /* Tap-winner quick-fill pill */
  .team-row {
    /* override existing 1fr 110px to allow pill column */
    grid-template-columns: 1fr auto 110px;
  }
  .quickfill-pill {
    background: rgba(251, 191, 36, 0.15);
    color: var(--accent);
    border: 1px solid rgba(251, 191, 36, 0.4);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    align-self: center;
  }
  .quickfill-pill:active { background: rgba(251, 191, 36, 0.3); }
  .large-score-entry .team-row { grid-template-columns: 1fr auto 140px; gap: 14px; }
  .large-score-entry .score-input { width: 140px; height: 84px; font-size: 40px; }
  .large-score-entry .quickfill-pill { min-height: 56px; padding: 10px 16px; font-size: 18px; }
  @media (max-width: 520px) {
    .large-score-entry .team-row { grid-template-columns: 1fr; }
    .large-score-entry .score-input { width: 100%; height: 88px; }
    .large-score-entry .quickfill-pill { justify-content: center; width: 100%; }
  }
  /* Round-complete toast */
  .toast-stack {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 12px 22px;
    font-weight: 800;
    font-size: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transform: translateY(-16px);
    animation: toast-in 220ms ease-out forwards, toast-out 220ms ease-in 2280ms forwards;
  }
  @keyframes toast-in {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    to { opacity: 0; transform: translateY(-16px); }
  }
  /* Shimmer on the primary nav button */
  .row-actions button.primary.shimmering {
    animation: nav-shimmer 1500ms ease-out;
  }
  @keyframes nav-shimmer {
    0%   { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.5); }
    50%  { box-shadow: 0 0 24px 6px rgba(251, 191, 36, 0.5); }
    100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
  }
  /* Honor reduced-motion: collapse CSS animations/transitions (shimmer, toasts,
     toggle slides). JS-driven motion (shuffle reveal, confetti) is gated
     separately via prefersReducedMotion(). */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
  /* Finals seed pills */
  .seed-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 4px;
    vertical-align: middle;
    line-height: 1.4;

  .seed-pill.silver { background: rgba(203, 213, 225, 0.15); color: var(--silver); }

  .awards-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  }

    padding: 8px 12px;
  }
  .awards-strip.secondary .award-label {
    font-size: 10px;
    margin-bottom: 2px;
  }
  .awards-strip.secondary .award-value {
    font-size: 13px;
  }

    font-size: 10px;
    margin-top: 2px;

  }
  .award-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .award-label {
    font-size: 11px;
    color: var(--muted);

  .award-detail {

  .schedule-game .court-tag.c3 { background: rgba(52, 211, 153, 0.15); color: var(--court3); }

  /* Keep-awake toggle + status (Display & TV settings) */
  .ka-section-title {
    margin: 14px 0 0;

<div class="app" id="app"></div>
<script>
"use strict";

// RUMBLE:STATE:start
const APP_VERSION    = "v25";
const STORAGE_KEY    = "pb_tourney_v5";
const STORAGE_KEY_V4 = "pb_tourney_v4";
const STORAGE_KEY_V3 = "pb_tourney_v3";
const STORAGE_KEY_V2 = "pb_tourney_v2";
const STORAGE_KEY_V1 = "pb_tourney_v1";

// Round-robin partner schedule — a balanced whist design Wh(8): every pair
// partners exactly once AND opposes exactly twice across the 7 rounds, and all
// 14 court foursomes are distinct (the same four players never share a court
// twice, so no clique can rotate among themselves). Found by exhaustive search;
// invariants are enforced by the whist self-tests in runSelfTests().
const SCHEDULE = [
  [[[1,2],[3,4]], [[5,6],[7,8]]],
  [[[1,3],[5,7]], [[2,4],[6,8]]],
  [[[1,4],[5,8]], [[2,3],[6,7]]],
  [[[1,5],[2,6]], [[3,7],[4,8]]],
  [[[1,6],[3,8]], [[2,5],[4,7]]],
  [[[1,7],[4,6]], [[2,8],[3,5]]],
  [[[1,8],[2,7]], [[3,6],[4,5]]],
];

const CROWN_SCHEDULE = [
  { team1: [1,2], team2: [3,4], theme: "Opening",      name: "Round 1 — Opening" },
  { team1: [1,3], team2: [2,4], theme: "Power Round",  name: "Round 2 — Power Round" },
  { team1: [1,4], team2: [2,3], theme: "Sudden Death", name: "Round 3 — Sudden Death" },
];
const CROWN_THEMES = {
  "Opening":     { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 1 },
  "Power Round": { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 1.5 },
  "Sudden Death":{ winScore: 7,  winBy: 2, scoring: "rally",   matchPointMultiplier: 1 },
  "Crown":       { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 2 },
};

// -------- Group B: time-budget algorithm (pure functions) --------

// Returns [low, high] game-duration estimate in minutes.
// calibration: {pointsPerMinute: {sideout, rally}} from pb_calibration_v1, or null.
function estimateGameMinutes(target, winBy, scoring, calibration) {
  const ppmSideout = calibration?.pointsPerMinute?.sideout ?? 0.85;
  const ppmRally   = calibration?.pointsPerMinute?.rally   ?? 2.0;
  // loser scores ~60-65% of winner, so avg total points ≈ 1.6-1.65× target
  const pointsRatio = scoring === "rally" ? 1.65 : 1.6;
  const ppm         = scoring === "rally" ? ppmRally : ppmSideout;
  const mid         = pointsRatio * target / ppm * (winBy === 1 ? 0.85 : 1.0);
  return [Math.round(mid * 0.7), Math.round(mid * 1.3)];
}

function roundVarianceFactor(activeCourts) {
  if (activeCourts <= 1) return 1.0;
  if (activeCourts === 2) return 1.15;
  if (activeCourts <= 4) return 1.20;
  return 1.25;
}

// Returns [low, high] round-duration estimate in minutes.
// activeCourts applies slowest-court variance (parallel courts finish at different times).
function estimateRoundMinutes(target, winBy, scoring, activeCourts, calibration) {
  const [gameLow, gameHigh] = estimateGameMinutes(target, winBy, scoring, calibration);
  const variance = roundVarianceFactor(activeCourts);
  return [
    Math.round(gameLow  * variance + 2.5),
    Math.round(gameHigh * variance + 2.5),
  ];
}

// Picks the richest win condition (target/winBy/scoring) that fits the time budget.
// Returns {target, winBy, scoring} or {error, suggestion}.
// T_finals uses low estimate (optimistic) so tight budgets aren't prematurely rejected.
// Round comparison uses midpoint (expected) — optimistic for rounds would bias toward overruns.
function solveWinCondition(format, rounds, budgetMin, calibration, activeCourts = 2) {
  const SETUP_OVERHEAD = 5;
  const TARGETS = [21, 15, 11, 9, 7];  // richest first in each scoring system

  const [finalsLo] = estimateRoundMinutes(11, 2, "sideout", activeCourts, calibration);
  const budgetForRounds = budgetMin - SETUP_OVERHEAD - finalsLo;
  if (budgetForRounds <= 0) return { error: "no_fit_finals" };

  const targetTRound = budgetForRounds / rounds;

  // Iterate in lexicographic richness order: sideout > rally, higher target, winBy 2 > 1
  for (const scoring of ["sideout", "rally"]) {
    for (const target of TARGETS) {
      for (const winBy of [2, 1]) {
        const [lo, hi] = estimateRoundMinutes(target, winBy, scoring, activeCourts, calibration);
        if ((lo + hi) / 2 <= targetTRound) return { target, winBy, scoring };
      }
    }
  }

  let suggestion;
  if (format === "rr") {
    suggestion = "RR is fixed at 7 rounds — increase time, or switch to a different format.";
  } else if (format === "crown") {
    suggestion = "Increase time to at least 90 minutes.";
  } else {
    const fmt = format.charAt(0).toUpperCase() + format.slice(1);
    suggestion = `Reduce ${fmt} rounds (currently ${rounds}) or increase time.`;
  }
  return { error: "no_fit", suggestion };
}

// Crown preset configs ordered richest → tightest.
// matches[] = [Opening, Power Round, Sudden Death, Crown Match].
// Crown Match is always SO/11 (never compressed, spec rule 7).
const CROWN_PRESETS = [
  { name: "Standard", matches: [
    { target:11, winBy:2, scoring:"sideout" },
    { target:11, winBy:2, scoring:"sideout" },
    { target:7,  winBy:2, scoring:"rally"   },
    { target:11, winBy:2, scoring:"sideout" },
  ]},
  { name: "Compact", matches: [
    { target:9,  winBy:2, scoring:"sideout" },
    { target:9,  winBy:2, scoring:"sideout" },
    { target:5,  winBy:2, scoring:"rally"   },
    { target:11, winBy:2, scoring:"sideout" },
  ]},
  { name: "Quick", matches: [
    { target:11, winBy:2, scoring:"rally"   },
    { target:11, winBy:2, scoring:"rally"   },
    { target:5,  winBy:2, scoring:"rally"   },
    { target:11, winBy:2, scoring:"sideout" },
  ]},
  { name: "Sprint", matches: [
    { target:9,  winBy:2, scoring:"rally"   },
    { target:9,  winBy:2, scoring:"rally"   },
    { target:5,  winBy:2, scoring:"rally"   },
    { target:11, winBy:2, scoring:"sideout" },
  ]},
];

// Returns preset name or {error} for Crown format time-budget selection.
// 2.3 = expected games per best-of-3 match (evenly matched rec); 3 min = match changeover.
function pickCrownPreset(budgetMin, calibration) {
  if (budgetMin < 90) return { error: "crown_floor" };
  for (const preset of CROWN_PRESETS) {
    const est = preset.matches.reduce((sum, m) => {
      const [lo, hi] = estimateGameMinutes(m.target, m.winBy, m.scoring, calibration);
      return sum + 2.3 * (lo + hi) / 2 + 3;
    }, 0);
    if (est <= budgetMin) return preset.name;
  }
  return { error: "no_fit", preset: "Sprint" };
}

// Projects when the tournament will finish. Returns [tsLow, tsHigh] ms timestamps, or null.
// Projects remaining rounds + finals from nowTs. T_setup_overhead is excluded because
// by the time this is called (phase="playing"), setup overhead is already underway.
// Crown not supported here (Crown projection is preset-based, handled by T22/T23).
function projectFinishTime(state, calibration, nowTs) {
  if (!state.timeBudget?.enabled || state.format === "crown") return null;
  if (state.phase === "done") return null;
  const config = state.timeBudget.plannedConfig;
  if (!config || !Array.isArray(state.rounds)) return null;

  // A tied round is still in progress, so it stays in the remaining-round
  // estimate until it's decided. Guard court existence before isRoundDecided so
  // a malformed/partial round object can't throw.
  let completedRounds = 0;
  for (const r of state.rounds) {
    if (r && gamesOf(r).length && isRoundDecided(r)) completedRounds++;
  }

  const remainingRounds = Math.max(0, state.rounds.length - completedRounds);
  const activeCourts = timeBudgetActiveCourtsFor(state);
  const [rndLo, rndHi] = estimateRoundMinutes(config.target, config.winBy, config.scoring, activeCourts, calibration);
  const [finLo, finHi] = estimateRoundMinutes(11, 2, "sideout", activeCourts, calibration);
  const msPerMin = 60 * 1000;

  return [
    nowTs + (remainingRounds * rndLo + finLo) * msPerMin,
    nowTs + (remainingRounds * rndHi + finHi) * msPerMin,
  ];
}

// -------- self-tests (gated by ?test URL param) --------

function runSelfTests() {
  let failures = 0;
  const _origAssert = console.assert.bind(console);
  console.assert = (cond, ...rest) => {
    if (!cond) failures++;
    _origAssert(cond, ...rest);
  };
  // Tests are appended by feature tasks below.

  {

    const older = Object.assign({}, rec, { revisedAt: 0, results: [Object.assign({}, rec.results[0], { wins: 99 })] });

    console.assert(dup.length === 1 && dup[0].gamesPlayed === 4 && dup[0].finalRank === 1, "dedupe sums games, keeps best finish", dup);

  {

  // Lifetime A5 — aggregation
  {
    let L = emptyLedger();
    L = ledgerPutRecord(L, { id: "a", completedAt: 1, revisedAt: 1, results: [
      { phoneKey: "k", name: "K", gamesPlayed: 4, wins: 3, losses: 1, pointsFor: 40, pointDiff: 8, finalRank: 2, podium: 2, partial: false, status: "active" } ]});
    L = ledgerPutRecord(L, { id: "b", completedAt: 2, revisedAt: 1, results: [

      { phoneKey: "5550000009", name: "Z", gamesPlayed: 2, wins: 1, losses: 1, pointsFor: 20, pointDiff: 0, finalRank: 3, podium: 3, partial: false, status: "active" } ]};
    LifetimeStore.putTournamentRecord(rec);

    console.assert(LifetimeStore.career("5550000009").tournaments === 0, "removePlayer scrubs rows");
    if (saved !== null) localStorage.setItem("pb_lifetime_v1", saved); else localStorage.removeItem("pb_lifetime_v1");
  }

  {
    const savedState = state;
    state = (function () {
      const s = newState();
      s.format = "rr"; s.phase = "done"; s.tournamentId = "test-1"; s.startedAt = 1; s.saveToLifetime = true;

  // Lifetime MMR fixes — resilience + deletion completeness
  {
    const saved = localStorage.getItem("pb_lifetime_v1");
    localStorage.removeItem("pb_lifetime_v1");
    let threw = false;
    try { playerCareer({ players: { k: { phoneKey: "k", displayName: "K", aliases: [] } }, tournaments: { bad: { id: "bad" } }, sync: {} }, "k"); }
    catch (e) { threw = true; }
    console.assert(!threw, "playerCareer tolerates a record missing results");
    LifetimeStore.putTournamentRecord({ id: "only", completedAt: 1, revisedAt: 1, results: [
      { phoneKey: "5550000007", name: "Solo", gamesPlayed: 2, wins: 2, losses: 0, pointsFor: 22, pointDiff: 8, finalRank: 1, podium: 1, partial: false, status: "active" } ] });
    LifetimeStore.removePlayer("5550000007");

    LifetimeStore.importJSON(JSON.stringify({ tournaments: { x: { id: "x", completedAt: 1, revisedAt: 1, results: [

    console.assert(LifetimeStore.allRecords().length === 1 && LifetimeStore.careers().length === 1, "import without players map is normalized");

    if (saved !== null) localStorage.setItem("pb_lifetime_v1", saved); else localStorage.removeItem("pb_lifetime_v1");
  }
  // Lifetime C6 — sign-out eviction / account-switch isolation / explicit anonymous move
  // Pure (no Firebase): we hand-seed pb_lifetime_v1 with uid-keyed ledgers and drive
  // the store's disconnect()/anonymousPendingCount()/moveAnonymousIntoActive() directly.
  {
    const saved = localStorage.getItem("pb_lifetime_v1");

      { phoneKey: "5550009999", name: "P", gamesPlayed: 2, wins: 1, losses: 1, pointsFor: 20, pointDiff: 0, finalRank: 2, podium: 2, partial: false, status: "active" } ] });
    const seed = (activeOwner, ledgers) => localStorage.setItem("pb_lifetime_v1", JSON.stringify({ schemaVersion: 1, activeOwner, ledgers }));

    // keeps "local", and resets activeOwner to "local".
    seed("uidA", { local: emptyLedger(), uidA: ledgerPutRecord(emptyLedger(), rec("a1")) });
    LifetimeStore.disconnect();
    {

    seed("uidB", {
      local: emptyLedger(),
      uidA: ledgerPutRecord(emptyLedger(), rec("a1")),

  // Whist invariants — the RR schedule must mix players fairly:
  //   (1) all 8 players appear in every round
  //   (2) every pair partners exactly once across the 7 rounds
  //   (3) every pair opposes exactly twice (balanced whist design)
  //   (4) no foursome shares a court in consecutive rounds
  // Run generateRounds() repeatedly since it randomizes round order / courts.
  {
    const pkey = (a, b) => Math.min(a, b) + "-" + Math.max(a, b);
    let badRoster = 0, badPartner = 0, badOppose = 0, badConsecutive = 0;
    for (let trial = 0; trial < 50; trial++) {
      const rounds = generateRounds();
      const partnerCount = new Map(), opposeCount = new Map();
      let prevFoursomes = null;
    for (const r of rounds) {
      const roster = new Set();
      const foursomes = [];
      for (const g of gamesOf(r)) {
          const four = [...g.team1, ...g.team2];
          four.forEach(s => roster.add(s));
          foursomes.push(four.slice().sort().join(","));
          for (const t of [g.team1, g.team2]) {
            const k = pkey(t[0], t[1]);
            partnerCount.set(k, (partnerCount.get(k) || 0) + 1);
          }
          for (const a of g.team1) for (const b of g.team2) {
            const k = pkey(a, b);
            opposeCount.set(k, (opposeCount.get(k) || 0) + 1);
          }
        }
        if (roster.size !== 8) badRoster++;
        if (prevFoursomes && foursomes.some(f => prevFoursomes.includes(f))) badConsecutive++;
        prevFoursomes = foursomes;
      }
      if (partnerCount.size !== 28 || [...partnerCount.values()].some(v => v !== 1)) badPartner++;
      if (opposeCount.size !== 28 || [...opposeCount.values()].some(v => v !== 2)) badOppose++;
    }
    console.assert(badRoster === 0, "whist: all 8 players in every round", { badRoster });
    console.assert(badPartner === 0, "whist: every pair partners exactly once", { badPartner });
    console.assert(badOppose === 0, "whist: every pair opposes exactly twice", { badOppose });
    console.assert(badConsecutive === 0, "whist: no foursome repeats on consecutive rounds", { badConsecutive });
  }

    }

    state = baseState(8, 2, [
      makeRound(1, [sg(1, [1,2], [3,4], 11, 0), sg(2, [5,6], [7,8], 11, 9)], []),

    ]);
    {
      const ms = computeMarginStats(3);
      // player 1: won 11-0, won 11-0, lost 0-11  → base = (√11 + √11 − √11)/3 = √11/3
      // player 5: won 11-9, 11-9, 11-9           → base = √2
      console.assert(find(ms, 5).avgMargin > find(ms, 1).avgMargin,

// Plays full random RR tournaments end-to-end through the real UI components:
// score entry via real input events on renderPlaying()'s score inputs, then the
// rendered Live Standings table is checked after EVERY round against an
// independent recomputation (shared with nothing in computeStats/rankPlayers),
// through buildFinals seeding and the done screen's Final Standings.
// User data is snapshotted and restored — safe to run with a tournament saved.
function runSimulation() {
  const TOURNAMENTS = 3;
  let failures = 0;
  const _origAssert = console.assert.bind(console);
  console.assert = (cond, ...rest) => { if (!cond) failures++; _origAssert(cond, ...rest); };

  const savedState = state;
  const savedStore = {};
  for (const k of [STORAGE_KEY, "pb_durations_v1", "pb_calibration_v1"]) savedStore[k] = localStorage.getItem(k);

  // Independent expectations from the entered scores, following the Adjusted
  // Margin rules: adjScore (diminishing-returns margin + opponent/partner
  // strength, regular rounds only) → win rate → head-to-head → tiebreakRandom.
