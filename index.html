function renderCrownMatchCard(match, sched, externalRefreshes, matchIdx) {
  const refreshes = externalRefreshes || [];
  const themeConfig = (matchIdx != null && state.timeBudget?.crownActiveThemes?.[matchIdx])
    || CROWN_THEMES[sched.theme] || CROWN_THEMES["Opening"];
  const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, matchIdx);
  const matchComplete = isCrownMatchComplete(match);
  // Game 3 enablement is based only on games 1-2, not the final result — keeps Game 3 editable after a 2-1 match.
  const { gamesWon1: g12w1, gamesWon2: g12w2 } = crownGamesWon(match, 2, matchIdx);

  const card = el("div", { class: ("court-card crown c1 " + scoreEntryClass()).trim(), style: "max-width:560px;margin:0 auto 14px;" });
  const hcCrown = (state.accessibilityPrefs && state.accessibilityPrefs.highContrastCourts) ? " hc" : "";
  card.appendChild(el("div", { class: "court-label" + hcCrown }, "👑 " + sched.name.toUpperCase()));

  const scoreIndicator = el("div", {
    style: "text-align:center;font-size:14px;color:var(--muted);margin-bottom:12px;"
  }, "Match score: " + gamesWon1 + "–" + gamesWon2);
  card.appendChild(scoreIndicator);

  if (sched.theme === "Sudden Death") card.appendChild(renderRallyScoringHelp());

  const crownOpts = { winScore: themeConfig.winScore, winBy: themeConfig.winBy, theme: sched.theme, matchIdx };
  const gamesWrap = el("div");

  for (let gi = 0; gi < 3; gi++) {
    const game = match.games[gi];
    if (!game.team1) game.team1 = match.team1;
    if (!game.team2) game.team2 = match.team2;
    const isGame3 = gi === 2;
    const game3Needed = g12w1 === 1 && g12w2 === 1;
    const game3NotNeeded = (g12w1 === 2 && g12w2 === 0) || (g12w2 === 2 && g12w1 === 0);

    const game3Disabled = isGame3 && !game3Needed; // disabled until 1-1 split
    const gameCard = el("div", {
      style: "margin-bottom:10px;" + (game3Disabled ? "opacity:0.4;pointer-events:none;" : "")
    });
    const labelText = isGame3
      ? "Game 3" + (game3NotNeeded ? " (not needed — sweep)" : game3Needed ? " (play now)" : " (if needed)")
      : "Game " + (gi + 1);
    const labelEl = el("div", {
      class: "muted",
      style: "font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;"
    }, labelText);
    gameCard.appendChild(labelEl);

    const matchup = el("div", { class: "matchup" });
    const t1Wrap = renderTeamRow(game, "team1", "score1", "score2", refreshes, crownOpts);
    const t2Wrap = renderTeamRow(game, "team2", "score2", "score1", refreshes, crownOpts);
    matchup.appendChild(t1Wrap.node);
    matchup.appendChild(t2Wrap.node);
    gameCard.appendChild(matchup);

    const summary = el("div", { class: "court-summary" });
    gameCard.appendChild(summary);
    const capturedGame = game;
    const updateSummary = () => {
      const s1 = capturedGame.score1, s2 = capturedGame.score2;
      if (Number.isInteger(s1) && Number.isInteger(s2)) {
        if (s1 === s2) {
          summary.className = "court-summary tiemsg"; summary.textContent = "Tied — enter a tiebreaker";
        } else if (!isValidCrownGameScore(s1, s2, sched.theme, matchIdx)) {
          summary.className = "court-summary tiemsg";
          summary.textContent = "Need " + themeConfig.winScore + "+ pts, win by " + themeConfig.winBy;
        } else if (s1 > s2) {
          summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(match.team1) + " win";
        } else {
          summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(match.team2) + " win";
        }
      } else {
        summary.className = "court-summary";
        summary.textContent = "Awaiting scores";
      }
      t1Wrap.applyWinnerStyle();
      t2Wrap.applyWinnerStyle();
      const { gamesWon1: w1, gamesWon2: w2 } = crownGamesWon(match, undefined, matchIdx);
      scoreIndicator.textContent = "Match score: " + w1 + "–" + w2;
    };
    updateSummary();
    refreshes.push(updateSummary);

    gamesWrap.appendChild(gameCard);

    if (isGame3) {
      const capturedCard = gameCard;
      const capturedGame3 = game;
      refreshes.push(() => {
        const { gamesWon1: cw1, gamesWon2: cw2 } = crownGamesWon(match, 2, matchIdx);
        const nowSweep = (cw1 === 2 && cw2 === 0) || (cw2 === 2 && cw1 === 0);
        const nowNeeded = cw1 === 1 && cw2 === 1;
        const nowDisabled = !nowNeeded;
        // Clear stale game 3 scores when a sweep makes game 3 not needed
        if (nowDisabled && (Number.isInteger(capturedGame3.score1) || Number.isInteger(capturedGame3.score2))) {
          capturedGame3.score1 = null;
          capturedGame3.score2 = null;
          save();
          render(); // full re-render so DOM inputs reflect cleared scores
          return;
        }
        capturedCard.style.opacity = nowDisabled ? "0.4" : "";
        capturedCard.style.pointerEvents = nowDisabled ? "none" : "";
        labelEl.textContent = "Game 3" + (nowSweep ? " (not needed — sweep)" : nowNeeded ? " (play now)" : " (if needed)");
      });
    }
  }
  card.appendChild(gamesWrap);

  const completeBanner = el("div");
  const updateCompleteBanner = () => {
    completeBanner.textContent = "";
    if (isCrownMatchComplete(match) && sched.theme !== "Crown" && state.currentMatch < 2) {
      const nextSched = CROWN_SCHEDULE[state.currentMatch + 1];
      completeBanner.appendChild(el("div", {
        style: "margin-top:12px;padding:10px 12px;background:var(--panel-2);border-radius:10px;text-align:center;color:var(--muted);font-size:14px;"
      },
        el("div", { style: "margin-bottom:4px;color:var(--good);font-weight:700;" }, "Match Complete!"),
        el("div", null, "Next: " + nextSched.name),
      ));
    }
  };
  updateCompleteBanner();
  refreshes.push(updateCompleteBanner);
  card.appendChild(completeBanner);

  return card;
}

function renderCrownPlaying() {
  const wrap = el("div");
  const match = state.crownMatches[state.currentMatch];
  const sched = CROWN_SCHEDULE[state.currentMatch];
  const theme = sched.theme;
  const refreshes = [];

  if (theme === "Power Round") {
    wrap.appendChild(el("div", {
      class: "card",
      style: "text-align:center;background:rgba(251,191,36,0.1);border-color:var(--accent);margin-bottom:14px;padding:12px;"
    }, "⚡ Power Round — match points worth 1.5×"));
  } else if (theme === "Sudden Death") {
    wrap.appendChild(el("div", {
      class: "card",
      style: "text-align:center;background:rgba(239,68,68,0.08);border-color:var(--bad);margin-bottom:14px;padding:12px;"
    }, "🔥 Sudden Death — rally scoring to 7, win by 2"));
  }

  wrap.appendChild(renderCrownMatchCard(match, sched, refreshes, state.currentMatch));

  // Navigation buttons
  const actions = el("div", { class: "row-actions" });
  const matchComplete = isCrownMatchComplete(match);
  const allMatchesComplete = state.crownMatches.every(isCrownMatchComplete);

  if (state.currentMatch > 0) {
    actions.appendChild(el("button", {
      class: "secondary",
      onclick: () => { state.currentMatch--; save(); render(); }
    }, "← Match " + state.currentMatch));
  }

  let primaryBtn;
  if (state.currentMatch < 2) {
    primaryBtn = el("button", {
      class: "primary",
      disabled: !matchComplete,
      onclick: () => {
        if (!isCrownMatchComplete(state.crownMatches[state.currentMatch])) return;
        const beforeState = stateSnapshotForUndo();
        const nextMatch = state.currentMatch + 2;
        maybeTightenCrownPreset(state.currentMatch);
        state.currentMatch++;
        recordEvent({
          kind: "advance",
          label: "Advanced to Crown Match " + nextMatch,
          beforeState,
          reversible: true,
        });
        save();
        render();
      }
    }, "Match " + (state.currentMatch + 2) + " →");
    refreshes.push(() => {
      primaryBtn.disabled = !isCrownMatchComplete(state.crownMatches[state.currentMatch]);
    });
  } else {
    primaryBtn = el("button", {
      class: "primary",
      disabled: !state.crownMatches.every(isCrownMatchComplete),
      onclick: () => {
        if (!state.crownMatches.every(isCrownMatchComplete)) return;
        const beforeState = stateSnapshotForUndo();
        buildCrownMatch();
        recordEvent({
          kind: "finals",
          label: mutationEventLabel("buildCrown", {}),
          beforeState,
          reversible: true,
        });
        render();
      }
    }, "Advance to Crown Match →");
    actions.appendChild(primaryBtn);
    const advanceHint = el("div", {
      class: "muted",
      style: "font-size:12px;margin-top:6px;display:none;"
    }, "Complete all 3 matches first — check that each game meets win score and margin.");
    actions.appendChild(advanceHint);
    refreshes.push(() => {
      const ready = state.crownMatches.every(isCrownMatchComplete);
      primaryBtn.disabled = !ready;
      advanceHint.style.display = ready ? "none" : "";
    });
  }
  if (primaryBtn && !actions.contains(primaryBtn)) actions.appendChild(primaryBtn);
  wrap.appendChild(actions);

  const hist = renderCrownHistory();
  if (hist) wrap.appendChild(hist);

  let standingsNode = renderCrownStandingsCard();
  wrap.appendChild(standingsNode);
  refreshes.push(() => {
    const updated = renderCrownStandingsCard();
    wrap.replaceChild(updated, standingsNode);
    standingsNode = updated;
  });

  return wrap;
}

function buildCrownMatch() {
  const lb = crownLeaderboard();
  const { team1, team2 } = crownPairings(lb);
  const sameTeam = (a, b) => [...a].sort().join() === [...b].sort().join();
  // Preserve existing Crown Match scores if the pairing is unchanged.
  if (state.crownFinal && sameTeam(state.crownFinal.team1, team1) && sameTeam(state.crownFinal.team2, team2)) {
    state.phase = "crown";
    save();
    return;
  }
  state.crownFinal = {
    team1, team2,
    theme: "Crown",
    games: [
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
    ],
  };
  state.phase = "crown";
  save();
}

function renderCrownMatchupDisplay(crownFinal, lb) {

// ---------- Crown history ----------
function renderCrownHistory() {
  const completed = state.crownMatches.filter(isCrownMatchComplete);
  if (!completed.length) return null;
  const det = el("details", { class: "rules", style: "margin:0 0 14px;" });
  det.appendChild(el("summary", null, "Match History (" + completed.length + " complete)"));
  const body = el("div", { class: "rules-body" });
  state.crownMatches.forEach((match, mi) => {
    if (!isCrownMatchComplete(match)) return;
    const sched = CROWN_SCHEDULE[mi];
    const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi);
    const winner = crownMatchWinner(match);
    const section = el("div", { style: "margin-bottom:12px;" });
    section.appendChild(el("div", { style: "font-weight:700;margin-bottom:4px;" }, sched.name));
    // Valid games (same early-exit logic as crownGamesWon)
    const games = [];
    let _w1 = 0, _w2 = 0;
    for (const g of match.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, sched.theme, mi)) break;
      games.push(g);
      if (g.score1 > g.score2) _w1++; else if (g.score2 > g.score1) _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
    games.forEach((g, gi) => {
      const t1w = g.score1 > g.score2;
      section.appendChild(el("div", { style: "font-size:13px;color:var(--muted);margin-bottom:2px;" },
        "G" + (gi+1) + ": " +
        nameOf(match.team1[0]) + "/" + nameOf(match.team1[1]) + (t1w ? " ✓" : "") + " " +
        g.score1 + "–" + g.score2 + " " +
        nameOf(match.team2[0]) + "/" + nameOf(match.team2[1]) + (!t1w && g.score2 > g.score1 ? " ✓" : "")
      ));
    });
    const winnerName = winner === "team1" ? teamName(match.team1) : teamName(match.team2);
    section.appendChild(el("div", { style: "font-size:13px;font-weight:700;margin-top:4px;color:var(--good);" },
      "Winner: " + winnerName + " (" + gamesWon1 + "–" + gamesWon2 + ")"
    ));
    body.appendChild(section);
  });
  det.appendChild(body);
  return det;
}

// ---------- Crown done screen ----------
function renderCrownMatchScorecard(crownFinal) {
  const games = [];
  let _w1 = 0, _w2 = 0;
  for (const g of crownFinal.games) {
    if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2) || g.score1 === g.score2) break;
    if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;
    games.push(g);
    if (g.score1 > g.score2) _w1++; else _w2++;
    if (_w1 === 2 || _w2 === 2) break;
  }
  const wrap = el("div", { style: "margin:12px auto 0;max-width:480px;" });
  games.forEach((g, i) => {
    const t1win = g.score1 > g.score2;
    wrap.appendChild(el("div", { class: "scorecard", style: "margin-bottom:8px;" },
      el("div", { class: "sc-team left" + (t1win ? " win" : "") }, teamName(crownFinal.team1)),
      el("div", { class: "sc-score" }, g.score1 + " – " + g.score2),
      el("div", { class: "sc-team right" + (!t1win ? " win" : "") }, teamName(crownFinal.team2)),
    ));
  });
  return wrap;
}

function renderPodiumCrown(ranking) {
  const stats = crownPlayerStats();
  const matchPts = new Map(stats.map(s => [s.slot, s.matchPoints]));
  const { gamesWon1, gamesWon2 } = crownGamesWon(state.crownFinal);
  const winner = crownMatchWinner(state.crownFinal);
  const winTeam  = winner === "team1" ? state.crownFinal.team1 : state.crownFinal.team2;
  const loseTeam = winner === "team1" ? state.crownFinal.team2 : state.crownFinal.team1;
  const winGames  = winner === "team1" ? gamesWon1 : gamesWon2;
  const loseGames = winner === "team1" ? gamesWon2 : gamesWon1;
  const pts = matchPointsForMatch(winGames, loseGames, "Crown");

  const order = ["silver", "gold", "bronze"];
  const podiumRanks = [ranking[1], ranking[0], ranking[2]];
  const emojis = { silver: "🥈", gold: "👑", bronze: "🥉" };
  const podium = el("div", { class: "podium" });
  order.forEach((kind, i) => {
    const r = podiumRanks[i];
    const totalMp = (matchPts.get(r.slot) || 0) + (winTeam.includes(r.slot) ? pts.perWinner : pts.perLoser);
    const step = el("div", { class: "podium-step " + kind });
    step.appendChild(el("div", { class: "podium-name" }, r.name));
    step.appendChild(el("div", { class: "podium-points" }, totalMp.toFixed(1) + " mp"));
    step.appendChild(el("div", { class: "podium-bar" }, emojis[kind]));
    podium.appendChild(step);
  });

  const wrap = el("div");
  wrap.appendChild(podium);
  if (ranking[3]) {
    const r4 = ranking[3];
    const totalMp = (matchPts.get(r4.slot) || 0) + (winTeam.includes(r4.slot) ? pts.perWinner : pts.perLoser);
    wrap.appendChild(el("div", { style: "text-align:center;padding:8px;color:var(--muted);font-size:15px;" },
      "4th: " + r4.name + " · " + totalMp.toFixed(1) + " mp"
    ));
  }
  return wrap;
}

// ---------- playing screens ----------
function compactMobileTabsForPhase(phase) {
  if (phase === "playing") return [
    { id: "score", label: "Score" },
    { id: "standings", label: "Standings" },
    { id: "more", label: "More" },
  ];
  return [];
}

function shouldUseCompactTournamentView(prefs, width) {
  return !!(prefs && prefs.compactMobileView) && width <= 640;
}

function renderPlaying() {
  if (state.format === "crown") return renderCrownPlaying();
  const wrap = el("div");
  const round = state.rounds[state.currentRound - 1];
  const isStack       = state.format === "stack";
  const isKing        = state.format === "king";
  const isGauntlet    = state.format === "gauntlet";
  const isIncremental = isStack || isKing || isGauntlet; // rounds built one at a time
  const total = totalRegularRounds();

  // Refresh hooks injected by score inputs
  const refreshes = [];
  const refresh = () => refreshes.forEach(fn => fn());

  const scoreSection = el("div");
  const standingsSection = el("div");
  const moreSection = el("div");

  const roundByes = byesOf(round);
  if (roundByes.length) {
    let tallyNode = null;
    if (state.mixedMode) {
      const labels = state.mixedGroupLabels || { a: "Men", b: "Women" };
      const aByes = roundByes.filter(s => groupOf(s) === "a").length;
      const bByes = roundByes.filter(s => groupOf(s) === "b").length;
      tallyNode = el("div", { class: "bye-group-tally" },
        aByes + " " + labels.a + " · " + bByes + " " + labels.b);
    }
    scoreSection.appendChild(el("div", { class: "bye-banner" },
      "☕ Sitting this round: " + roundByes.map(nameOf).join(", ") + " — back next round.",
      whyButton("bye", { slots: roundByes.slice(), round: round.round || state.currentRound }),
      tallyNode));
  }
  scoreSection.appendChild(renderRoundCourts(round, false, refreshes));

  // navigation row
  // A round is "advanceable" only when both courts are decided (no ties) — a
  // tied score means the game hasn't finished (pickleball is win-by-2). This
  // holds for every format now: RR pre-generates all rounds (length === total
  // from the start), incremental formats build up to total; either way every
  // round must be decided.
  // Live predicate (recomputed wherever needed — scores change after render).
  const allRoundsDecided = () => state.rounds.length === total && state.rounds.every(isRoundDecided);
  const advanceReady = isRoundDecided(round);
  const allRoundsAdvanceable = allRoundsDecided();
  const actions = el("div", { class: "row-actions" });
  if (state.currentRound > 1) {
    actions.appendChild(el("button", {
      class: "secondary",
      onclick: () => { state.currentRound--; save(); render(); }
    }, "← Round " + (state.currentRound - 1)));
  }
  let primaryBtn;
  if (state.currentRound < total) {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        if (isIncremental) {
          if (!isRoundDecided(round)) return;
          const beforeState = stateSnapshotForUndo();
          // Build the next round if it doesn't already exist (e.g. user went
          // back, then advanced again — keep the existing pairing). previousRanks
          // is snapshotted only on first-time advance so backward navigation
          // doesn't clobber the baseline used for trajectory arrows.
          let toastMsg = null;
          if (state.rounds.length === state.currentRound) {
            state.previousRanks = rankPlayersForFormat(state.currentRound).map(s => s.slot);
            if (isStack) {
              const next = buildNextStackRound(round);
              state.rounds.push(next);
              toastMsg = movementToastText(round, next);
            } else if (isKing) {
              const next = buildNextKingRound(round);
              state.rounds.push(next);
              toastMsg = kingMovementToastText(round);
            } else {
              state.rounds.push(buildNextGauntletRound(round));
            }
          }
          state.currentRound++;
          recordEvent({
            kind: "advance",
            label: mutationEventLabel("advance", { round: state.currentRound }),
            beforeState,
            reversible: true,
          });
          save();
          render();
          if (toastMsg) showToast(toastMsg);
        } else {
          if (!isRoundDecided(round)) return;
          const beforeState = stateSnapshotForUndo();
          state.currentRound++;
          recordEvent({
            kind: "advance",
            label: mutationEventLabel("advance", { round: state.currentRound }),
            beforeState,
            reversible: true,
          });
          save();
          render();
        }
      }
    }, "Round " + (state.currentRound + 1) + " →");
    primaryBtn.disabled = !advanceReady;
  } else {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        // Re-evaluate at click time — score inputs may have decided the
        // round since this button was rendered.
        if (allRoundsDecided()) {
          const beforeState = stateSnapshotForUndo();
          buildFinals();
          recordEvent({
            kind: "finals",
            label: mutationEventLabel("buildFinals", { round: totalRegularRounds() }),
            beforeState,
            reversible: true,
          });
          render();
        }
      }
    }, "Build Finals →");
    primaryBtn.disabled = !allRoundsAdvanceable;
  }
  actions.appendChild(primaryBtn);
  scoreSection.appendChild(actions);

  // standings — always computed over ALL rounds, not just up to the viewed round,
  // so navigating back to check or fix an earlier score never drops later rounds'
  // wins/points from the Live Standings. (computeStats skips undecided games.)
  const standingsOpts = () => {
    const completedRounds = state.rounds.filter(isRoundDecided).length;
    const sub = completedRounds > 0
      ? "Through " + completedRounds + " round" + (completedRounds > 1 ? "s" : "")
      : "Awaiting first scores";
    return { subtitle: sub };
  };
  let standingsCard = renderStandingsCard(state.rounds.length, standingsOpts());
  standingsSection.appendChild(standingsCard);

  // Mid-event recap (RR/Gauntlet only, once at least one round is complete).
  if (textResultsSupported()) {
    const completedRounds = state.rounds.filter(isRoundDecided).length;
    if (completedRounds >= 1) {
      moreSection.appendChild(renderTextResultsCard({ throughRound: completedRounds }));
    }
  }

  // history
  const history = renderHistory(state.currentRound);
  if (history) moreSection.appendChild(history);

  const compact = shouldUseCompactTournamentView(state.accessibilityPrefs, (typeof window !== "undefined" ? window.innerWidth : 1024));
  if (compact) {
    const tabs = compactMobileTabsForPhase("playing");
    let active = state.mobileTournamentTab;
    if (!tabs.some(t => t.id === active)) active = "score";
    const tabBar = el("div", { class: "mobile-tourney-tabs" });
    tabs.forEach(t => {
      const btn = el("button", { class: "mobile-tourney-tab" + (t.id === active ? " active" : "") },
        t.label);
      btn.addEventListener("click", () => { state.mobileTournamentTab = t.id; save(); render(); });
      tabBar.appendChild(btn);
    });
    wrap.appendChild(tabBar);
    const panel = el("div", { class: "mobile-tourney-panel" });
    panel.appendChild(active === "standings" ? standingsSection : active === "more" ? moreSection : scoreSection);
    wrap.appendChild(panel);
  } else {
    wrap.appendChild(scoreSection);
    wrap.appendChild(standingsSection);
    wrap.appendChild(moreSection);
  }

  // Wire refresh: update primary button state + replace standings live
  refreshes.push(() => {
    if (state.currentRound < total) {
      primaryBtn.disabled = !isRoundDecided(round);
    } else {
      primaryBtn.disabled = !allRoundsDecided();
    }
    const newStandings = renderStandingsCard(state.rounds.length, standingsOpts());
    standingsCard.replaceWith(newStandings);
    standingsCard = newStandings;
    maybeFireRoundComplete(primaryBtn);
  });

  return wrap;
}

function renderRoundCourts(round, isFinals, refreshes) {
  const wrap = el("div", { class: "court-row" });
  if (isFinals) {
    const seeds = seedRankBySlot();
    finalTiers(round).forEach((g, i) => {
      const key = i === 0 ? "champ" : (i === 1 ? "cons" : "tier");
      wrap.appendChild(renderCourtCard(g, key, refreshes, { kind: i === 0 ? "gold" : "silver", seeds }));
    });
  } else {
    for (const g of gamesOf(round)) wrap.appendChild(renderCourtCard(g, g.court, refreshes));
  }
  return wrap;
}

function scoreEntryClass(prefs = state.accessibilityPrefs || {}) {
  return prefs.largeScoreEntry ? "large-score-entry" : "";
}

function renderCourtCard(game, courtKey, refreshes, seedInfo) {
  let className = "court-card";
  let labelText = "";
  const isStack = state.format === "stack";
  if (courtKey === "champ")     { className += " gold";   labelText = "🏆 CHAMPIONSHIP"; }
  else if (courtKey === "cons") { className += " silver"; labelText = "🥈 CONSOLATION"; }
    else if (courtKey === "tier") { className += " silver"; labelText = (game.name || "Final").toUpperCase(); }
    else {
      const courtNum = Math.max(1, Math.min(6, parseInt(courtKey, 10) || 1));
      className += " c" + courtNum + (isStack && courtNum === 1 ? " stack-top" : "");
      labelText = courtCardLabel(courtNum);
    }

  const isFinalCard = courtKey === "champ" || courtKey === "cons" || courtKey === "tier";
  const card = el("div", { class: (className + " " + scoreEntryClass()).trim() });
  const hcCard = (state.accessibilityPrefs && state.accessibilityPrefs.highContrastCourts) ? " hc" : "";
  card.appendChild(el("div", { class: "court-label" + hcCard }, labelText));
  if (!isFinalCard) {
    const scoringWord = state.scoringSystem === "rally" ? "Rally" : "First";
    const winByWord = state.winBy === 1 ? "win by 1" : "win by 2";
    card.appendChild(el("div", { class: "court-score-desc" },
      scoringWord + " to " + state.winScore + " · " + winByWord));
  } else {
    // Finals: tell players which physical court to walk to. Championship gets
    // the court-1 surface, consolation court 2, using the format's court names.
      const finalCourt = game.court || (courtKey === "champ" ? 1 : (courtKey === "cons" ? 2 : 1));
      const courtName = courtLocationLabel(finalCourt);
    card.appendChild(el("div", { class: "court-score-desc" }, "📍 Play on " + courtName));
  }
  if (courtKey === "champ") {
    card.appendChild(el("div", { class: "pairing-caption" },
      "Balanced pairing — top seed + 4th vs 2nd + 3rd"));
  }

  const matchup = el("div", { class: "matchup" });
  const team1Wrap = renderTeamRow(game, "team1", "score1", "score2", refreshes, seedInfo);
  const team2Wrap = renderTeamRow(game, "team2", "score2", "score1", refreshes, seedInfo);
  matchup.appendChild(team1Wrap.node);
  matchup.appendChild(team2Wrap.node);
  card.appendChild(matchup);

  const elapsedBadge = el("div", { class: "elapsed-badge" });
  card.appendChild(elapsedBadge);

  const summary = el("div", { class: "court-summary" });
  card.appendChild(summary);

  function updateElapsed() {
    // A tied score is an in-progress game (pickleball is win-by-2), so keep the
    // clock running until the game is actually decided.
    if (isGameDecided(game)) {
      elapsedBadge.textContent = "";
      return;
    }
    if (!game.gameStartedAt) {
      elapsedBadge.textContent = "0:00";
      return;
    }
    const elapsedMs = Math.max(0, Date.now() - game.gameStartedAt - (game.pauseSec || 0) * 1000);
    const totalSec = Math.floor(elapsedMs / 1000);
    const mm = Math.floor(totalSec / 60);
    const ss = String(totalSec % 60).padStart(2, "0");
    elapsedBadge.textContent = mm + ":" + ss;
  }
  updateElapsed();

  const elapsedTimer = setInterval(() => {
    if (!document.body.contains(card)) {
      clearInterval(elapsedTimer);
      return;
    }
    // Keep ticking even once decided (updateElapsed blanks the badge) so the
    // clock resumes if the score is edited back to a tie. The interval is
    // cleared when the card is removed on the next render.
    updateElapsed();
  }, 1000);

  const updateSummary = () => {
    const s1 = game.score1, s2 = game.score2;
    if (Number.isInteger(s1) && Number.isInteger(s2)) {
      if (s1 > s2)      { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team1) + " win by " + (s1 - s2); }
      else if (s2 > s1) { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team2) + " win by " + (s2 - s1); }
      else              { summary.className = "court-summary tiemsg"; summary.textContent = "Tied — enter a tiebreaker"; }
    } else {
      summary.className = "court-summary";
      summary.textContent = "Awaiting scores";
    }
    team1Wrap.applyWinnerStyle();
    team2Wrap.applyWinnerStyle();
  };
  updateSummary();
  refreshes.push(updateSummary);

  return card;
}

function renderTeamRow(game, teamKey, scoreKey, otherScoreKey, refreshes, opts) {
  const team = game[teamKey];
  // Normalise legacy callers that pass a raw seeds Map as opts.
  if (opts instanceof Map) opts = { seeds: opts };
  const seeds = opts && opts.seeds ? opts.seeds : null;
  const kind = opts && opts.kind != null ? opts.kind : null;
  const quickFillTarget = (opts && opts.winScore != null) ? opts.winScore : state.winScore;
  const crownTheme = opts && opts.theme ? opts.theme : null;
  const crownMatchIdx = opts && opts.matchIdx != null ? opts.matchIdx : null;

  const node = el("div", { class: "team-row" });
  // Mixed-mode badge ("M·W" or "✓") + dashed outline for same-group fallback teams.
  const badgeText = mixedBadgeForTeam(team);
  const isSameGroup = state.mixedMode && !isMixedTeam(team);
  const nameClass = "team-name" + (isSameGroup ? " same-group-team" : "");
  const sameGroupTitle = "Same-group team — not enough of one group to pair everyone.";
  if (seeds) {
    const nameNode = el("div", { class: nameClass });
    if (isSameGroup) nameNode.title = sameGroupTitle;
    nameNode.appendChild(seedPill(seeds.get(team[0]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[0])));
    nameNode.appendChild(document.createTextNode(" & "));
    nameNode.appendChild(seedPill(seeds.get(team[1]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[1])));
    if (badgeText) nameNode.appendChild(el("span", { class: "mixed-badge" }, badgeText.trim()));
    if (isSameGroup) nameNode.appendChild(whyButton("same-group", { team }));
    node.appendChild(nameNode);
  } else {
    node.appendChild(el("div", { class: nameClass, title: isSameGroup ? sameGroupTitle : undefined },
      nameOf(team[0]) + " & " + nameOf(team[1]),
      badgeText ? el("span", { class: "mixed-badge" }, badgeText.trim()) : null,
      isSameGroup ? whyButton("same-group", { team }) : null));
  }

  // Quick-fill pill: shown only when both scores are null.
  const pillSlot = el("div");  // takes the auto column even when empty
  node.appendChild(pillSlot);

  const input = el("input", {
    class: "score-input",
    type: "number",
    inputmode: "numeric",
    pattern: "[0-9]*",
    min: "0",
    max: "99",
    placeholder: "–",
    value: Number.isInteger(game[scoreKey]) ? String(game[scoreKey]) : "",
    "aria-label": "Score for " + nameOf(team[0]) + " and " + nameOf(team[1]),
  });
  let scoreSession = null;
  input.addEventListener("focus", () => {
    scoreSession = { before: scorePairForEvent(game), beforeState: stateSnapshotForUndo() };
  });
  // Normalize the displayed value to the recorded integer on blur, so a stray
  // "-5"/"7.5" left in the field (rejected or truncated when parsed) doesn't
  // linger visually out of sync with the recorded score.
  input.addEventListener("blur", () => {
    input.value = Number.isInteger(game[scoreKey]) ? String(game[scoreKey]) : "";
    if (scoreSession) {
      recordScoreChange(game, scoreSession.before, scoreSession.beforeState);
      scoreSession = null;
    }
  });
  input.addEventListener("input", () => {
    const v = input.value.trim();
    if (v === "") {
      game[scoreKey] = null;
    } else {
      const n = parseInt(v, 10);
      // Floor at 0 and cap at 99 — a value above any real pickleball score is a typo,
      // and an unbounded number produces nonsense like "win by 988". Blur re-syncs the field.
      if (!Number.isNaN(n) && n >= 0) game[scoreKey] = Math.min(n, 99);
    }
    // Editing a decided game back to a tie/blank reopens it — clear the end
    // stamp so the clock resumes and a later re-decide records a fresh duration.
    // Also retract the round from notifiedRounds if it's no longer decided, so
    // the completion toast can re-fire and time-budget counts stay accurate.
    if (!isGameDecided(game)) {
      game.gameEndedAt = null;
      for (let ri = 0; ri < state.rounds.length; ri++) {
        const rr = state.rounds[ri];
        if (gamesOf(rr).includes(game) && !isRoundDecided(rr)) {
          const pos = state.notifiedRounds.indexOf(ri + 1);
          if (pos !== -1) state.notifiedRounds.splice(pos, 1);
          break;
        }
      }
    }
    // Only stamp the end time / log a duration once the game is decided — a
    // tied score is still in progress, and stamping it would freeze gameEndedAt
    // (a later correction wouldn't update it) and pollute time-budget calibration.
    if (game.gameEndedAt == null && isGameDecided(game)) {
      game.gameEndedAt = Date.now();
      let roundIdx = -1, courtIdx = -1;
      for (let ri = 0; ri < state.rounds.length; ri++) {
        const games = gamesOf(state.rounds[ri]);
        const gi = games.indexOf(game);
        if (gi !== -1) { roundIdx = ri; courtIdx = gi; break; }
      }
      if (roundIdx !== -1 && game.gameStartedAt > 0) {
        const durSec = Math.max(0, Math.round((game.gameEndedAt - game.gameStartedAt) / 1000) - (game.pauseSec || 0));
        const winnerScore = Math.max(game.score1, game.score2), loserScore = Math.min(game.score1, game.score2);
        try {
          const durLog = JSON.parse(localStorage.getItem("pb_durations_v1") || "[]");
          durLog.push({ ts: game.gameEndedAt, format: state.format, target: state.winScore,
            winBy: state.winBy, scoring: state.scoringSystem, courtIndex: courtIdx,
            durationSec: durSec, winnerScore, loserScore, roundIndex: roundIdx });
          if (durLog.length > 200) durLog.splice(0, durLog.length - 200);
          localStorage.setItem("pb_durations_v1", JSON.stringify(durLog));
          updateCalibration();
        } catch (e) {}
      }
    }
    save();
    refreshes.forEach(fn => fn());
  });
  node.appendChild(input);

  function applyWinnerStyle() {
    const a = game[scoreKey], b = game[otherScoreKey];
    let isWinner = Number.isInteger(a) && Number.isInteger(b) && a > b;
    if (isWinner && crownTheme) isWinner = isValidCrownGameScore(a, b, crownTheme, crownMatchIdx);
    node.classList.toggle("winner", isWinner);
    input.classList.toggle("winner", isWinner);
  }

  function refreshPill() {
    pillSlot.textContent = "";
    // Quick-fill is a Round/Crown-screen feature; suppress on Finals matchups.
    if (state.phase !== "playing" && state.phase !== "crown") return;
    const bothBlank = !Number.isInteger(game.score1) && !Number.isInteger(game.score2);
    if (!bothBlank) return;
    const pill = el("button", {
      class: "quickfill-pill",
      title: "Fill " + quickFillTarget + " pts for this team — still enter the other score",
    }, "× " + quickFillTarget);
    pill.addEventListener("click", () => {
      const beforeState = stateSnapshotForUndo();
      const before = scorePairForEvent(game);
      game[scoreKey] = quickFillTarget;
      // Reflect the value into this team's own input — refreshes don't re-render
      // the court cards, so without this the box stayed blank after a tap.
      input.value = String(quickFillTarget);
      recordScoreChange(game, before, beforeState);
      save();
      refreshes.forEach(fn => fn());
      // Focus the opponent's input so the user can type the loser's score.
      const allInputs = node.parentElement.querySelectorAll(".score-input");
      for (const inp of allInputs) {
        if (inp !== input) { inp.focus(); break; }
      }
    });
    pillSlot.appendChild(pill);
  }
  refreshPill();
  refreshes.push(refreshPill);

  return { node, applyWinnerStyle };
}

const MEDALS = ["🥇", "🥈", "🥉"];

function rankCell(i) {
  if (i < 3) return el("td", { class: "rank" }, el("span", { class: "rank-badge medal" }, MEDALS[i]));
  return el("td", { class: "rank" }, el("span", { class: "rank-badge" }, "" + (i + 1)));
}
function departedText(slot) {
  const p = playerBySlot(slot);
  return p && p.status === "left" && Number.isInteger(p.leftRound) ? "left after R" + p.leftRound : "";
}
function standingsRowClass(rankClass, slot) {
  return rankClass + (departedText(slot) ? " departed" : "");
}
function standingNameCell(s, ...extras) {
  const departed = departedText(s.slot);
  return el("td", { class: "name", title: s.name }, s.name,
    departed ? el("span", { class: "departed-label" }, departed) : null,
    ...extras);
}

function trajectorySpan(slot, currentIdx) {
  const prev = state.previousRanks || [];
  if (!prev.length) return null;
  const prevIdx = prev.indexOf(slot);
  if (prevIdx < 0) return null;
  const diff = prevIdx - currentIdx;
  const wrap = el("span", { class: "rank-trajectory-wrap" });
  if (diff > 0) wrap.appendChild(el("span", { class: "rank-trajectory up", title: "Up " + diff }, "▲" + diff));
  else if (diff < 0) wrap.appendChild(el("span", { class: "rank-trajectory down", title: "Down " + (-diff) }, "▼" + (-diff)));
  else wrap.appendChild(el("span", { class: "rank-trajectory same", title: "No change" }, "—"));
  wrap.appendChild(whyButton("movement", { slot, previousRank: prevIdx + 1, currentRank: currentIdx + 1 }));
  return wrap;
}

function visualNoiseOptions(prefs = state.accessibilityPrefs || {}) {
  if (prefs.reduceVisualNoise) {
    return { partnerChips: false, partnerBadges: false, trajectory: false, advancedStats: false };
  }
  return {
    partnerChips: prefs.showPartnerChips !== false,
    partnerBadges: prefs.showPartnerBadges !== false,
    trajectory: prefs.showTrajectory !== false,
    advancedStats: prefs.showAdvancedStats !== false,
  };
}

      rankTd,

  ksg:    { short: "KS/G", name: "King Score per game", desc: "Your King ranking score per game (higher is better). It blends your wins, the points you scored, and your wins on the King's Court (the top court) — so winning up top counts most toward your rank.", example: "Two players with the same record rank differently if one won more games on the King's Court." },
  kingw:  { short: "👑W",  name: "King's Court wins", desc: "Games you won on the King's Court (the top court).", example: "👑W 3 = you won three games up on the King's Court." },

  mp:     { short: "MP",   name: "Match Points", desc: "Your Crown ranking score. You earn match points for winning your matches, with partial credit depending on how the match went. Crown standings are ordered by this — most match points wins.", example: "Win your match cleanly and you bank the full match points; a closer result earns a bit less." },
  gwl:    { short: "G W–L", name: "Game win–loss", desc: "Individual games you won and lost across all your Crown matches (each match is a short series).", example: "G W–L 4–2 = you won four games and lost two across your matches." },
};
function columnHelp(id) { return Object.prototype.hasOwnProperty.call(COLUMN_HELP, id) ? COLUMN_HELP[id] : null; }
const RANKING_COLS = {
  rr:       [{ id: "gp" }, { id: "am" }, { id: "wl" }, { id: "winpct", hideMobile: true }, { id: "diffg", hideMobile: true }],
  gauntlet: [{ id: "gp" }, { id: "am" }, { id: "wl" }, { id: "winpct", hideMobile: true }, { id: "diffg", hideMobile: true }],
  stack:    [{ id: "gp" }, { id: "ssg" }, { id: "wl" }, { id: "winpct", hideMobile: true }, { id: "climbs", hideMobile: true }, { id: "c1", hideMobile: true }],
  king:     [{ id: "gp" }, { id: "ksg" }, { id: "wl" }, { id: "winpct", hideMobile: true }, { id: "kingw", hideMobile: true }, { id: "ppg", hideMobile: true }],
  crown:    [{ id: "mp" }, { id: "gwl" }],
};
const POINTS_COLS = ["gp", "pts", "net", "ppg"];
function guideGroups(format) {
  const rankIds = (RANKING_COLS[format] || RANKING_COLS.rr).map(c => c.id);
  // Basics = rank + any of gp/wl/winpct present in the ranking set, shown first.
  const basics = ["rank", "gp", "wl", "winpct"].filter(id => id === "rank" || id === "gp" || rankIds.includes(id));
  const ranking = rankIds.filter(id => !["gp", "wl", "winpct", "pts", "net", "ppg"].includes(id));
  return { Basics: basics, Ranking: ranking, Points: ["pts", "net", "ppg"] };
}

// Derive the three point stats (PTS/NET/PPG) for any format from its stat object.
function pointStatsFor(s, format) {
  let gp, pts, net;
  if (format === "crown") {
    gp = (s.gamesWon || 0) + (s.gamesLost || 0);
    pts = s.pointsScored || 0;
    net = s.pointDiff || 0;
  } else if (format === "stack" || format === "king") {
    gp = s.gp || 0;
    pts = s.pointsScored || 0;
    net = (s.pointsScored || 0) - (s.pointsAgainst || 0);
  } else { // rr | gauntlet
    gp = s.gp || 0;
    pts = s.points || 0;
    net = s.diff || 0;
  }
  const ppg = Math.round((pts / Math.max(1, gp)) * 10) / 10;
  return { gp, pts, net, ppg };
}

function plainTh(label, extraClass) {
  return el("th", { class: extraClass || undefined, style: label === "#" ? "text-align:center;" : undefined }, label);
}
function helpTh(id, extraClass) {
  const h = columnHelp(id) || { short: id };
  const btn = el("button", {
    class: "col-help-btn",
    type: "button",
    "aria-label": "What does " + h.short + " mean?",
    onclick: (e) => { e.stopPropagation(); openColumnHelp(id, state.format); },
  }, h.short);
  return el("th", { class: "num help-th" + (extraClass ? " " + extraClass : "") }, btn);
}
function openColumnHelp(id, format) {
  const h = columnHelp(id); if (!h) return;
  const bg = el("div", { class: "modal-bg" });
  const modal = el("div", { class: "modal col-help-modal" });
  modal.appendChild(el("h3", { style: "margin:0 0 4px;" }, h.short + " · " + h.name));
  modal.appendChild(el("p", { style: "margin:0 0 10px;color:var(--text);" }, h.desc));
  modal.appendChild(el("p", { class: "muted", style: "margin:0 0 16px;font-style:italic;" }, h.example));
  const seeAll = el("button", { class: "primary", style: "width:100%;margin-bottom:8px;" }, "See all columns →");
  seeAll.addEventListener("click", () => { bg.remove(); openColumnGuideModal(format || state.format); });
  const close = el("button", { style: "width:100%;" }, "Close");
  close.addEventListener("click", () => bg.remove());
  modal.appendChild(seeAll);
  modal.appendChild(close);
  bg.appendChild(modal);
  bg.addEventListener("click", (e) => { if (e.target === bg) bg.remove(); });
  mountModal(bg, modal);
}
function openColumnGuideModal(format) {

// Returns { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo }.
// Each award is { names: string[], detail: string|null }. names is empty if no
// qualifying entry; multiple names indicate ties. climber/anchor are only
// populated for Stack format; closer/bestDuo apply to both formats.
function computeAwards() {
  const isStack = state.format === "stack";

  // MVP — format-aware: Stack/King/RR use per-game rates; raw event awards below stay raw.
  let mvp;
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxSS = ss.reduce((m, s) => Math.max(m, s.stackRate), 0);
    const winners = ss.filter(s => s.stackRate === maxSS && maxSS > 0);
    mvp = winners.length
      ? { names: winners.map(s => nameOf(s.slot)), detail: maxSS.toFixed(1) + " SS/game" }
      : { names: [], detail: null };
  } else if (state.format === "king") {
    const ks = computeKingStats(state.rounds.length);
    const maxKS = ks.reduce((m, s) => Math.max(m, s.kingRate), 0);
    const winners = ks.filter(s => s.kingRate === maxKS && maxKS > 0);
    mvp = winners.length
      ? { names: winners.map(s => nameOf(s.slot)), detail: maxKS.toFixed(1) + " KS/game" }
      : { names: [], detail: null };
  } else {
    const stats = computeStats(totalRegularRounds(), true);
    const maxPts = stats.reduce((m, s) => Math.max(m, s.avgPoints), 0);
    const mvpNames = stats.filter(s => s.avgPoints === maxPts).map(s => nameOf(s.slot));
    mvp = { names: mvpNames, detail: maxPts.toFixed(1) + " pts/game" };
  }

    // Build chronological game list: regular rounds, then finals.
    const games = [];
    for (let r = 0; r < state.rounds.length; r++) {
      const round = state.rounds[r];
      for (const g of gamesOf(round)) {
        games.push({ ...g, label: "R" + (r + 1) + " " + courtTagLabel(g.court || 1) });
      }
    }
  if (state.finals) {
    finalTiers().forEach(g => games.push({ ...g, label: g.name }));
  }
  // Two views of the game list:
  //   completed  — every game that has both scores (ties included). Used for Hot Streak so a tied game properly resets streaks.
  //   decided    — completed AND non-tied. Used for Biggest Win / Closest Game.
  const completed = games.filter(g => isGameComplete(g));
  const decided = completed.filter(g => g.score1 !== g.score2);

  // For each decided game, derive winner/loser-side summaries.
  const summarized = decided.map(g => {
    const team1Won = g.score1 > g.score2;
    const winTeam = team1Won ? g.team1 : g.team2;
    const loseTeam = team1Won ? g.team2 : g.team1;
    const winScore = team1Won ? g.score1 : g.score2;
    const loseScore = team1Won ? g.score2 : g.score1;
    return {
      diff: winScore - loseScore,
      winTeam,
      loseTeam,
      winScore,
      loseScore,
      label: g.label,
    };
  });

  // Biggest Win — largest diff. Tied diffs all win; report all winning teams.
  let biggestWin = { names: [], detail: null };
  if (summarized.length) {
    const maxDiff = Math.max(...summarized.map(s => s.diff));
    const winners = summarized.filter(s => s.diff === maxDiff);
    biggestWin = {
      names: winners.map(w => teamName(w.winTeam) + " +" + w.diff),
      detail: winners.map(w => w.winScore + "–" + w.loseScore + " · " + w.label).join(" / "),
    };
  }

  // Closest Game — smallest diff; tiebreak by descending winning score.
  // Multiple games matching the best (diff, -winScore) pair are all reported.
  // Headline is the winning team(s); the score + location go in the detail.
  let closestGame = { names: [], detail: null };
  if (summarized.length) {
    const minDiff = Math.min(...summarized.map(s => s.diff));
    const closestSet = summarized.filter(s => s.diff === minDiff);
    const maxWinScore = Math.max(...closestSet.map(s => s.winScore));
    const tied = closestSet.filter(s => s.winScore === maxWinScore);
    closestGame = {
      names: tied.map(t => teamName(t.winTeam)),
      detail: tied.map(t => t.winScore + "–" + t.loseScore + " · " + t.label).join(" / "),
    };
  }

  // Hot Streak — longest consecutive-wins run for a single player.
  // Iterates every completed game (including ties) so a tied game resets
  // streaks for all four involved players.
  const streaks = new Map(); // slot -> current run
  const best = new Map();    // slot -> max run seen
  for (const g of completed) {
    if (g.score1 === g.score2) {
      for (const slot of [...g.team1, ...g.team2]) {
        best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
        streaks.set(slot, 0);
      }
      continue;
    }
    const team1Won = g.score1 > g.score2;
    const winners = team1Won ? g.team1 : g.team2;
    const losers = team1Won ? g.team2 : g.team1;
    for (const slot of winners) {
      streaks.set(slot, (streaks.get(slot) || 0) + 1);
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot)));
    }
    for (const slot of losers) {
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
      streaks.set(slot, 0);
    }
  }
  for (const [slot, cur] of streaks) {
    best.set(slot, Math.max(best.get(slot) || 0, cur));
  }
  const maxStreak = best.size ? Math.max(...best.values()) : 0;
  const streakSlots = maxStreak > 0
    ? [...best.entries()].filter(([, v]) => v === maxStreak).map(([k]) => k)
    : [];
  const hotStreak = streakSlots.length
    ? { names: streakSlots.map(nameOf), detail: maxStreak + " in a row" }
    : { names: [], detail: null };

  // Climber — most courtClimbs (Stack only).
  // Anchor  — most gamesOnCourt1 (Stack only).
  let climber = { names: [], detail: null };
  let anchor  = { names: [], detail: null };
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxClimbs = ss.reduce((m, s) => Math.max(m, s.courtClimbs), 0);
    if (maxClimbs > 0) {
      const c = ss.filter(s => s.courtClimbs === maxClimbs);
      climber = { names: c.map(s => nameOf(s.slot)), detail: maxClimbs + " climb" + (maxClimbs > 1 ? "s" : "") };
    }
    const maxC1 = ss.reduce((m, s) => Math.max(m, s.gamesOnCourt1), 0);
    if (maxC1 > 0) {
      const a = ss.filter(s => s.gamesOnCourt1 === maxC1);
      anchor = { names: a.map(s => nameOf(s.slot)), detail: maxC1 + " on Court 1" };
    }
  }

  // Closer — best W-L in 1-point games (both formats). Hidden if no 1-pt games.
  // "Best" = most wins, tiebreak fewest losses; ties listed.
  const opg = new Map();
  for (let s = 1; s <= statsSlotCount(totalRegularRounds(), true); s++) opg.set(s, { wins: 0, losses: 0 });
  let anyOPG = false;
  for (const g of decided) {
    if (Math.abs(g.score1 - g.score2) !== 1) continue;
    anyOPG = true;
    const t1Won = g.score1 > g.score2;
    for (const slot of g.team1) {
      if (t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
    for (const slot of g.team2) {
      if (!t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
  }
  let closer = { names: [], detail: null };
  if (anyOPG) {
    const candidates = [...opg.entries()]
      .map(([slot, v]) => ({ slot, ...v }))
      .filter(c => c.wins > 0);
    if (candidates.length) {
      candidates.sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        return a.losses - b.losses;
      });
      const top = candidates[0];
      const tied = candidates.filter(c => c.wins === top.wins && c.losses === top.losses);
      closer = {
        names: tied.map(c => nameOf(c.slot)),
        detail: top.wins + "–" + top.losses + " in 1-pt games",
      };
    }
  }

  // Best Duo — partner pair with highest win rate together (min 1 win).
  // Win-rate ties broken by aggregate point differential across their games together.
  const pairKey = (a, b) => a < b ? a + "-" + b : b + "-" + a;
  const duos = new Map();
  for (const g of decided) {
    for (const teamKey of ["team1", "team2"]) {
      const team = g[teamKey];
      const pts = teamKey === "team1" ? g.score1 : g.score2;
      const ag  = teamKey === "team1" ? g.score2 : g.score1;
      const won = pts > ag;
      const k = pairKey(team[0], team[1]);
      if (!duos.has(k)) duos.set(k, {
        slots: [team[0], team[1]].sort((a,b)=>a-b),
        games: 0, wins: 0, losses: 0, diff: 0,
      });
      const e = duos.get(k);
      e.games++;
      if (won) e.wins++; else e.losses++;
      e.diff += (pts - ag);
    }
  }
  let bestDuo = { names: [], detail: null };
  const eligibleDuos = [...duos.values()].filter(e => e.wins >= 1);
  if (eligibleDuos.length) {
    eligibleDuos.sort((a, b) => {
      const wrA = a.wins / a.games;
      const wrB = b.wins / b.games;
      if (wrB !== wrA) return wrB - wrA;
      return b.diff - a.diff;
    });
    const top = eligibleDuos[0];
    const topRate = top.wins / top.games;
    const tied = eligibleDuos.filter(e =>
      (e.wins / e.games) === topRate && e.diff === top.diff
    );
    bestDuo = {
      names: tied.map(e => teamName(e.slots)),
      detail: top.wins + "–" + top.losses + " (" + Math.round(topRate * 100) + "%)",
    };
  }

  // The Wall — lowest avg points conceded per completed game.
  let theWall = { names: [], detail: null };
  {
    const conceded = new Map(); // slot -> { totalAg, games }
    for (let s = 1; s <= statsSlotCount(totalRegularRounds(), true); s++) conceded.set(s, { totalAg: 0, games: 0 });
    for (const g of completed) {
      for (const slot of g.team1) { const e = conceded.get(slot); e.totalAg += g.score2; e.games++; }
      for (const slot of g.team2) { const e = conceded.get(slot); e.totalAg += g.score1; e.games++; }
    }
    const entries = [...conceded.entries()]
      .filter(([, v]) => v.games > 0)
      .map(([slot, v]) => ({ slot, avg: v.totalAg / v.games }));
    if (entries.length) {
      const minAvg = Math.min(...entries.map(e => e.avg));
      const tied = entries.filter(e => e.avg === minAvg);
      theWall = {
        names: tied.map(e => nameOf(e.slot)),
        detail: minAvg.toFixed(1) + " allowed/game",
      };
    }
  }

  // Cold Streak — longest consecutive-losses run for a single player.
  // Mirrors Hot Streak: ties reset both teams' streaks.
  let coldStreak = { names: [], detail: null };
  {
    const lossStreaks = new Map();
    const lossBest    = new Map();
    for (const g of completed) {
      if (g.score1 === g.score2) {
        for (const slot of [...g.team1, ...g.team2]) {
          lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot) || 0));
          lossStreaks.set(slot, 0);
        }
        continue;
      }
      const t1Won = g.score1 > g.score2;
      const losers  = t1Won ? g.team2 : g.team1;
      const winners = t1Won ? g.team1 : g.team2;
      for (const slot of losers) {
        lossStreaks.set(slot, (lossStreaks.get(slot) || 0) + 1);
        lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot)));
      }
      for (const slot of winners) {
        lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot) || 0));
        lossStreaks.set(slot, 0);
      }
    }
    for (const [slot, cur] of lossStreaks) {
      lossBest.set(slot, Math.max(lossBest.get(slot) || 0, cur));
    }
    const maxLoss = lossBest.size ? Math.max(...lossBest.values()) : 0;
    if (maxLoss > 0) {
      const tied = [...lossBest.entries()].filter(([, v]) => v === maxLoss).map(([k]) => k);
      coldStreak = { names: tied.map(nameOf), detail: maxLoss + " in a row" };
    }
  }

  // Most Improved — biggest jump in rank from after round 2 to final standings.
  // Skipped if we don't have a finalRanking (no decided finals) or fewer than
  // 2 rounds of data. Sample is noisy with so few rounds — that's part of the
  // fun.
  let mostImproved = { names: [], detail: null };
  const champ = finalTier(0), cons = finalTier(1);
  if (state.rounds.length >= 2 && state.finals
      && champ && cons
      && isGameComplete(champ) && champ.score1 !== champ.score2
      && isGameComplete(cons)  && cons.score1  !== cons.score2) {
    const earlyRanked = rankPlayersForFormat(2);
    const earlyRankBy = new Map();
    earlyRanked.forEach((s, i) => earlyRankBy.set(s.slot, i + 1));
    const finalRanked = finalRanking();
    const finalRankBy = new Map();
    finalRanked.forEach((s, i) => finalRankBy.set(s.slot, i + 1));
    let bestImprov = 0;
    let topSlots = [];
    for (const slot of earlyRankBy.keys()) {
      const improv = (earlyRankBy.get(slot) || 0) - (finalRankBy.get(slot) || 0);
      if (improv > bestImprov) { bestImprov = improv; topSlots = [slot]; }
      else if (improv === bestImprov && bestImprov > 0) { topSlots.push(slot); }
    }
    if (topSlots.length) {
      mostImproved = {
        names: topSlots.map(nameOf),
        detail: "↑" + bestImprov + " spot" + (bestImprov > 1 ? "s" : "") + " from R2",
      };
    }
  }

  // Got Stomped — losing team in the biggest blowout; mirrors Biggest Win.
  let gotStomped = { names: [], detail: null };
  if (summarized.length) {
    const maxDiff = Math.max(...summarized.map(s => s.diff));
    const blowouts = summarized.filter(s => s.diff === maxDiff);
    gotStomped = {
      names: blowouts.map(b => teamName(b.loseTeam) + " −" + b.diff),
      detail: blowouts.map(b => b.winScore + "–" + b.loseScore + " · " + b.label).join(" / "),
    };
  }

  return { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo,
           theWall, coldStreak, mostImproved, gotStomped };
}

function computeCrownPerformanceAwards(allGames) {
  const lb = crownLeaderboard();
  const mvp = { names: [nameOf(lb[0].slot)], detail: lb[0].matchPoints.toFixed(1) + " mp" };
  const summarized = allGames.map(g => {
    const t1win = g.score1 > g.score2;
    return {
      diff: Math.abs(g.score1 - g.score2),
      winTeam: t1win ? g.team1 : g.team2,
      loseTeam: t1win ? g.team2 : g.team1,
      winScore: t1win ? g.score1 : g.score2,
      loseScore: t1win ? g.score2 : g.score1,
    };
  });
  const maxDiff = summarized.length ? Math.max(...summarized.map(s => s.diff)) : 0;
  const biggestWin = summarized.length
    ? { names: summarized.filter(s => s.diff === maxDiff).map(w => teamName(w.winTeam) + " +" + w.diff), detail: null }
    : { names: [], detail: null };
  let closestGame = { names: [], detail: null };
  if (summarized.length) {
    const minDiff = Math.min(...summarized.map(s => s.diff));
    const closestSet = summarized.filter(s => s.diff === minDiff);
    const maxWinScore = Math.max(...closestSet.map(s => s.winScore));
    const closest = closestSet.filter(s => s.winScore === maxWinScore);
    closestGame = { names: closest.map(g => teamName(g.winTeam)), detail: closest[0].winScore + "–" + closest[0].loseScore };
  }
  const streaks = new Map(), best = new Map();
  for (const g of allGames) {
    if (g.score1 === g.score2) {
      for (const slot of [...g.team1, ...g.team2]) {
        best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
        streaks.set(slot, 0);
      }
      continue;
    }
    const t1win = g.score1 > g.score2;
    const winners = t1win ? g.team1 : g.team2;
    const losers  = t1win ? g.team2 : g.team1;
    for (const slot of winners) { streaks.set(slot, (streaks.get(slot) || 0) + 1); best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot))); }
    for (const slot of losers)  { best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0)); streaks.set(slot, 0); }
  }
  for (const [slot, cur] of streaks) best.set(slot, Math.max(best.get(slot) || 0, cur));
  const maxStreak = best.size ? Math.max(...best.values()) : 0;
  const hotStreak = maxStreak > 0
    ? { names: [...best.entries()].filter(([, v]) => v === maxStreak).map(([s]) => nameOf(s)), detail: maxStreak + " in a row" }
    : { names: [], detail: null };
  const conceded = new Map([1, 2, 3, 4].map(s => [s, { total: 0, games: 0 }]));
  for (const g of allGames) {
    for (const slot of g.team1) { const e = conceded.get(slot); if (e) { e.total += g.score2; e.games++; } }
    for (const slot of g.team2) { const e = conceded.get(slot); if (e) { e.total += g.score1; e.games++; } }
  }
  const wallEntries = [...conceded.entries()].filter(([, v]) => v.games > 0).map(([slot, v]) => ({ slot, avg: v.total / v.games }));
  const minWall = wallEntries.length ? Math.min(...wallEntries.map(e => e.avg)) : Infinity;
  const theWall = wallEntries.length
    ? { names: wallEntries.filter(e => e.avg === minWall).map(e => nameOf(e.slot)), detail: minWall.toFixed(1) + " allowed/game" }
    : { names: [], detail: null };
  const scored = new Map([1, 2, 3, 4].map(s => [s, 0]));
  for (const g of allGames) {
    for (const slot of g.team1) scored.set(slot, scored.get(slot) + g.score1);
    for (const slot of g.team2) scored.set(slot, scored.get(slot) + g.score2);
  }
  const maxScored = Math.max(...scored.values());
  const theEngine = maxScored > 0
    ? { names: [...scored.entries()].filter(([, v]) => v === maxScored).map(([s]) => nameOf(s)), detail: maxScored + " total pts" }
    : { names: [], detail: null };
  return { mvp, biggestWin, closestGame, hotStreak, theWall, theEngine };
}

function computeCrownMatchAwards(allGames, allMatches) {
  const closerWL = new Map([1, 2, 3, 4].map(s => [s, { wins: 0, losses: 0 }]));
  let anyClose = false;
  for (const g of allGames) {
    const maxScore = Math.max(g.score1, g.score2);
    const diff = Math.abs(g.score1 - g.score2);
    if (!(maxScore >= 7 && diff <= 2)) continue;
    anyClose = true;
    const t1win = g.score1 > g.score2;
    for (const slot of g.team1) { if (t1win) closerWL.get(slot).wins++; else closerWL.get(slot).losses++; }
    for (const slot of g.team2) { if (!t1win) closerWL.get(slot).wins++; else closerWL.get(slot).losses++; }
  }
  let theCloser = { names: [], detail: null };
  if (anyClose) {
    const cands = [...closerWL.entries()].map(([slot, v]) => ({ slot, ...v })).filter(c => c.wins > 0);
    cands.sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : a.losses - b.losses);
    if (cands.length) {
      const top = cands[0];
      const tied = cands.filter(c => c.wins === top.wins && c.losses === top.losses);
      theCloser = { names: tied.map(c => nameOf(c.slot)), detail: top.wins + "–" + top.losses + " in close games" };
    }
  }
  const sweepCount = new Map([1, 2, 3, 4].map(s => [s, 0]));
  allMatches.forEach((match, mi) => {
    const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi);
    if (gamesWon1 === 2 && gamesWon2 === 0) {
      for (const slot of match.team1) sweepCount.set(slot, sweepCount.get(slot) + 1);
    } else if (gamesWon2 === 2 && gamesWon1 === 0) {
      for (const slot of match.team2) sweepCount.set(slot, sweepCount.get(slot) + 1);
    }
  });
  const maxSweeps = Math.max(...sweepCount.values());
  const theSweeper = maxSweeps > 0
    ? { names: [...sweepCount.entries()].filter(([, v]) => v === maxSweeps).map(([s]) => nameOf(s)), detail: maxSweeps + " sweep" + (maxSweeps > 1 ? "s" : "") }
    : { names: [], detail: null };
  const comebackCount = new Map([1, 2, 3, 4].map(s => [s, 0]));
  for (const match of allMatches) {
    if (!isCrownMatchComplete(match)) continue;
    const g0 = match.games[0];
    if (!Number.isInteger(g0.score1) || !Number.isInteger(g0.score2)) continue;
    if (g0.score1 === g0.score2) continue;
    const g0winner = g0.score1 > g0.score2 ? "team1" : "team2";
    const matchW = crownMatchWinner(match);
    if (matchW && g0winner !== matchW) {
      const winSlots = matchW === "team1" ? match.team1 : match.team2;
      for (const slot of winSlots) comebackCount.set(slot, comebackCount.get(slot) + 1);
    }
  }
  const maxComebacks = Math.max(...comebackCount.values());
  const comebackKid = maxComebacks > 0
    ? { names: [...comebackCount.entries()].filter(([, v]) => v === maxComebacks).map(([s]) => nameOf(s)), detail: maxComebacks + " comeback" + (maxComebacks > 1 ? "s" : "") }
    : { names: [], detail: null };
  const partnerWR = new Map([1, 2, 3, 4].map(s => [s, { won: 0, played: 0 }]));
  for (let s = 1; s <= 4; s++) {
    allMatches.forEach((match, mi) => {
      if (!isCrownMatchComplete(match)) return;
      const teamIsTeam1 = match.team1.includes(s);
      const teamIsTeam2 = match.team2.includes(s);
      if (!teamIsTeam1 && !teamIsTeam2) return;
      const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi);
      const e = partnerWR.get(s);
      e.won += teamIsTeam1 ? gamesWon1 : gamesWon2;
      e.played += gamesWon1 + gamesWon2;
    });
  }
  const partnerRatio = (e) => e.played > 0 ? e.won / e.played : 0;
  const maxPWR = Math.max(...[...partnerWR.values()].map(partnerRatio));
  const mvpPartner = maxPWR > 0
    ? { names: [...partnerWR.entries()].filter(([, v]) => partnerRatio(v) === maxPWR).map(([s]) => nameOf(s)),
        detail: Math.round(maxPWR * 100) + "% game win rate" }
    : { names: [], detail: null };
  const g3WL = new Map([1, 2, 3, 4].map(s => [s, { wins: 0, losses: 0 }]));
  const g3Games = allGames.filter(g => g.gameIdx === 2 && g.score1 !== g.score2);
  const anyG3 = g3Games.length > 0;
  for (const g of g3Games) {
    const t1win = g.score1 > g.score2;
    for (const slot of g.team1) { const e = g3WL.get(slot); if (e) { if (t1win) e.wins++; else e.losses++; } }
    for (const slot of g.team2) { const e = g3WL.get(slot); if (e) { if (!t1win) e.wins++; else e.losses++; } }
  }
  let moneyGame = { names: [], detail: null };
  if (anyG3) {
    const cands = [...g3WL.entries()].map(([slot, v]) => ({ slot, ...v })).filter(c => c.wins > 0);
    cands.sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : a.losses - b.losses);
    if (cands.length) {
      const top = cands[0];
      const tied = cands.filter(c => c.wins === top.wins && c.losses === top.losses);
      moneyGame = { names: tied.map(c => nameOf(c.slot)), detail: top.wins + "–" + top.losses + " in Game 3s" };
    }
  }
  return { theCloser, theSweeper, comebackKid, mvpPartner, moneyGame, anyG3 };
}

function computeCrownAwards() {
  const allGames = [];
  for (let mi = 0; mi < state.crownMatches.length; mi++) {
    const match = state.crownMatches[mi];
    const theme = match.theme;
    let _w1 = 0, _w2 = 0;
    for (let gi = 0; gi < match.games.length; gi++) {
      const g = match.games[gi];
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (theme && !isValidCrownGameScore(g.score1, g.score2, theme, mi)) break;
      allGames.push({ score1: g.score1, score2: g.score2, team1: match.team1, team2: match.team2, matchIdx: mi, gameIdx: gi });
      if (g.score1 > g.score2) _w1++; else _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
  }
  if (state.crownFinal) {
    let _w1 = 0, _w2 = 0;
    for (let gi = 0; gi < state.crownFinal.games.length; gi++) {
      const g = state.crownFinal.games[gi];
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;
      allGames.push({ score1: g.score1, score2: g.score2, team1: state.crownFinal.team1, team2: state.crownFinal.team2, matchIdx: -1, gameIdx: gi });
      if (g.score1 > g.score2) _w1++; else _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
  }
  const allMatches = [...state.crownMatches];
  if (state.crownFinal && isCrownMatchComplete(state.crownFinal)) allMatches.push(state.crownFinal);
  const perf  = computeCrownPerformanceAwards(allGames);
  const match = computeCrownMatchAwards(allGames, allMatches);
  return { ...perf, ...match };
}

function renderCrownAwardsStrip() {
  const a = computeCrownAwards();
  const wrap = el("div", { class: "awards-section" });
  const chip = (label, item, inlineDetail) => {
    const node = el("div", { class: "award-chip" });
    node.appendChild(el("div", { class: "award-label" }, label));
    const names = item.names;
    const valueText = names.length
      ? (names.length > 2 ? names.slice(0, 2).join(", ") + " +" + (names.length - 2) + " more" : names.join(", "))
      : "—";
    const valueEl = el("div", { class: "award-value" }, valueText);
    if (item.detail && names.length && inlineDetail) valueEl.appendChild(document.createTextNode(" · " + item.detail));
    node.appendChild(valueEl);
    if (item.detail && names.length && !inlineDetail) node.appendChild(el("div", { class: "award-detail" }, item.detail));
    return node;
  };
  const marquee = el("div", { class: "awards-strip marquee" });
  marquee.appendChild(chip("🌟 REG. SEASON MVP", a.mvp, true));
  marquee.appendChild(chip("💥 BIGGEST WIN", a.biggestWin, false));
  marquee.appendChild(chip("🤏 CLOSEST GAME", a.closestGame, false));
  marquee.appendChild(chip("🔥 HOT STREAK", a.hotStreak, true));
  wrap.appendChild(marquee);
  const secondary = el("div", { class: "awards-strip secondary" });
  if (a.theCloser.names.length)   secondary.appendChild(chip("🎯 THE CLOSER",    a.theCloser,  true));
  if (a.theSweeper.names.length)  secondary.appendChild(chip("🧹 THE SWEEPER",   a.theSweeper, true));
  if (a.comebackKid.names.length) secondary.appendChild(chip("💪 COMEBACK KID",  a.comebackKid, true));
  if (a.mvpPartner.names.length)  secondary.appendChild(chip("🤝 MVP PARTNER",   a.mvpPartner, true));
  if (a.theWall.names.length)     secondary.appendChild(chip("🧱 THE WALL",      a.theWall,    true));
  if (a.theEngine.names.length)   secondary.appendChild(chip("🚂 THE ENGINE",    a.theEngine,  true));
  if (a.anyG3 && a.moneyGame.names.length) secondary.appendChild(chip("💰 MONEY GAME CHAMP", a.moneyGame, true));
  if (secondary.children.length) wrap.appendChild(secondary);
  return wrap;
}

function renderAwardsStrip() {
  if (state.format === "crown") return renderCrownAwardsStrip();
  const a = computeAwards();

  const chip = (label, item, inlineDetail) => {
    const node = el("div", { class: "award-chip" });
