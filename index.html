    const names = item.names;
    const valueText = names.length
      ? (names.length > 2 ? names.slice(0, 2).join(", ") + " +" + (names.length - 2) + " more" : names.join(", "))
      : "—";
    const valueEl = el("div", { class: "award-value" }, valueText);
    if (item.detail && names.length && inlineDetail) {
      valueEl.appendChild(document.createTextNode(" · " + item.detail));
    }
    node.appendChild(valueEl);
    if (item.detail && names.length && !inlineDetail) {
      node.appendChild(el("div", { class: "award-detail" }, item.detail));
    }
    return node;
  };
  // Marquee — the four headline awards at full size.
  const marquee = el("div", { class: "awards-strip marquee" });
  marquee.appendChild(chip("🎯 MVP", a.mvp, true));
  marquee.appendChild(chip("💥 BIGGEST WIN", a.biggestWin, false));
  marquee.appendChild(chip("🤏 CLOSEST GAME", a.closestGame, false));
  marquee.appendChild(chip("🔥 HOT STREAK", a.hotStreak, true));
  wrap.appendChild(marquee);
  // Secondary — denser tile of supporting awards. Only shown if any exist.
  const secondary = el("div", { class: "awards-strip secondary" });
  if (a.theWall.names.length)      secondary.appendChild(chip("🛡️ THE WALL", a.theWall, true));
  if (a.coldStreak.names.length)   secondary.appendChild(chip("❄️ COLD STREAK", a.coldStreak, true));
  if (a.mostImproved.names.length) secondary.appendChild(chip("📈 MOST IMPROVED", a.mostImproved, true));
  if (a.gotStomped.names.length)   secondary.appendChild(chip("🥱 GOT STOMPED", a.gotStomped, false));
  if (a.bestDuo.names.length)      secondary.appendChild(chip("🤝 BEST DUO", a.bestDuo, true));
  if (a.closer.names.length)       secondary.appendChild(chip("🎯 CLOSER", a.closer, true));
  if (state.format === "stack") {
    if (a.climber.names.length) secondary.appendChild(chip("🧗 CLIMBER", a.climber, true));
    if (a.anchor.names.length)  secondary.appendChild(chip("⚓ ANCHOR", a.anchor, true));
  }
  if (secondary.children.length) wrap.appendChild(secondary);
  return wrap;
}

function runConfetti() {
  if (prefersReducedMotion()) return;   // honor reduced-motion: no confetti
  const canvas = el("canvas", {
    style: "position: fixed; inset: 0; z-index: 90; pointer-events: none;"
  });
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + "px";
  canvas.style.height = window.innerHeight + "px";
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const colors = ["#fbbf24", "#fde047", "#cbd5e1", "#d97706", "#38bdf8", "#a78bfa", "#10b981"];
  const N = 80;
  const parts = Array.from({ length: N }, () => ({
    x: Math.random() * canvas.width,
    y: -Math.random() * 80,
    vx: (Math.random() - 0.5) * 6,
    vy: 2 + Math.random() * 4,
    size: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.3,
  }));
  const start = performance.now();
  const totalMs = 2000;
  function frame(now) {
    const elapsed = now - start;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (const p of parts) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12; // gravity
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.4);
      ctx.restore();
    }
    if (elapsed < totalMs) {
      requestAnimationFrame(frame);
    } else {
      canvas.remove();
    }
  }
  requestAnimationFrame(frame);
}

function renderTextResultsCard(mode) {
  const card = el("div", { class: "card" });
  card.appendChild(el("h3", { style: "margin:0 0 10px;" },
    mode === "final" ? "📱 Text results" : "📱 Text standings"));
  card.appendChild(el("button", {
    class: "secondary",
    style: "width:100%;margin:0 0 10px;",
    onclick: openShareCardsModal,
  }, "Share Cards"));
  card.appendChild(el("button", {
    class: "secondary",
    style: "width:100%;margin:0 0 10px;",
    onclick: openQrSnapshotModal,
  }, "QR Snapshot"));
  if (!textResultsSupported()) {
    card.appendChild(el("p", { class: "muted", style: "margin:0;" },
      "Texting results isn't available for this format yet."));
    return card;
  }
  // inline-flex + min-height keeps the Text <a> and Copy <button> the same
  // height (the inline min-height also overrides the global button min-height,
  // which otherwise made Copy taller than Text).
  const btnStyle = "display:inline-flex;align-items:center;justify-content:center;min-height:44px;" +
    "text-decoration:none;background:var(--accent);" +
    "color:#1a1207;border:none;border-radius:8px;padding:0 16px;font-weight:600;font-size:14px;cursor:pointer;";
  const count = state.slots.filter(Boolean).length;
  for (let slot = 1; slot <= count; slot++) {
    const phone = (state.phones || [])[slot - 1];
    const row = el("div", { style: "display:flex;align-items:center;gap:8px;margin-bottom:6px;" });
    row.appendChild(el("div", { style: "flex:1;" }, nameOf(slot)));
    if (isValidPhone(phone)) {
      const body = buildResultsMessage(slot, mode);
      row.appendChild(el("a", { href: smsHref(phone, body), style: btnStyle }, "Text"));
      const copyBtn = el("button", { style: btnStyle + "background:var(--panel);color:var(--text);" }, "Copy");
      copyBtn.addEventListener("click", () => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(body).then(
            () => showToast("Copied " + nameOf(slot) + "'s recap"),
            () => showToast("Copy failed — long-press the Text draft instead"));
        }
      });
      row.appendChild(copyBtn);
    } else {
      row.appendChild(el("span", { class: "muted" }, "no number"));
    }
    card.appendChild(row);
  }
  return card;
}

function renderDoneScreen() {
  if (state.format === "crown") return renderDoneScreenCrown();
  const wrap = el("div");
  const champ = finalTier(0), cons = finalTier(1);
  const champWin = champ && champ.score1 > champ.score2 ? champ.team1 : (champ && champ.score2 > champ.score1 ? champ.team2 : null);
  const consWin  = cons && cons.score1  > cons.score2  ? cons.team1  : (cons && cons.score2  > cons.score1  ? cons.team2  : null);
  const ranking = finalRanking();

  // First-view confetti, gated on awardsShown
  if (!state.awardsShown) {
    state.awardsShown = true;
    save();
    // defer so confetti fires after the DOM is mounted
    queueMicrotask(runConfetti);
  }

  const card = el("div", { class: "card" });
  const champions = el("div", { class: "champions" });
  champions.appendChild(el("div", { class: "crown" }, "👑"));
  champions.appendChild(el("h1", null, "CHAMPIONS"));
  champions.appendChild(el("div", { class: "winners" }, champWin ? teamName(champWin) : "Tied!"));
  if (champ) champions.appendChild(renderScorecard(champ));

  if (cons) {
    const consBlock = el("div", { class: "consolation-block" });
    consBlock.appendChild(el("div", { class: "consolation-title" }, "🥈 Runner-Up Bracket"));
    consBlock.appendChild(el("div", { class: "consolation-winners" }, consWin ? teamName(consWin) : "Tied!"));
    consBlock.appendChild(renderScorecard(cons));
    champions.appendChild(consBlock);
  }

  card.appendChild(champions);
  wrap.appendChild(card);

  wrap.appendChild(renderSaveToLifetimeBlock());

  wrap.appendChild(renderPodium(ranking));
  // Surface the primary post-game action (texting) above the awards/standings
  // scroll instead of burying it at the bottom. Only formats that support
  // texting (RR/Gauntlet) get the card — others skip it rather than show a
  // dead "not available" placeholder.
  if (textResultsSupported()) wrap.appendChild(renderTextResultsCard("final"));
  else wrap.appendChild(renderShareCardsButtonCard());
  // Awards collapsed by default to shorten the results scroll — champions and
  // podium carry the celebration; tap to explore the full awards.
  const awardsDetails = el("details", { class: "history" });
  awardsDetails.appendChild(el("summary", null, el("span", null, "🏅 Awards")));
  awardsDetails.appendChild(renderAwardsStrip());
  wrap.appendChild(awardsDetails);

  // Final standings — uses the same renderStandingsCard, with finals included in totals
  const finalCard = el("div", { class: "card" });
  const head = el("div", { style: "display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 10px; flex-wrap: wrap;" },
    el("h3", { style: "margin: 0;" }, "Final Standings"),
    el("div", { style: "display:flex;align-items:center;gap:8px;flex-wrap:wrap;" },
      el("span", { class: "muted" }, "Includes finals games"),
      standingsViewToggle(), guideButton(state.format)),
  );
  finalCard.appendChild(head);

  const isStack = state.format === "stack";
  const isKing  = state.format === "king";
  const colSpan = isPointsView() ? 6 : ((isStack || isKing) ? 8 : 7);
  const dividerLabels = {};
  let dividerAt = 0;
  finalTiers().forEach((tier, i) => {
    if (i > 0) dividerLabels[dividerAt] = tier.name + " winners";
    dividerLabels[dividerAt + 2] = tier.name + " runners-up";
    dividerAt += 4;
  });
  if ((state.finals?.unseated || []).length) dividerLabels[dividerAt] = "Unseated";
  const tierDividerRow = (label) =>
    el("tr", { class: "tier-divider" },
      el("td", { colspan: String(colSpan) }, label));
  const table = el("table", { class: "standings", style: "margin-top: 10px;" });
  if (isStack) {
    const stackStats = computeStackStats(state.rounds.length);
    const bySlot = new Map(stackStats.map(s => [s.slot, s]));
    const doneStackPoints = isPointsView();
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }), el("col", { class: "c-name" }),
      ...Array.from({ length: doneStackPoints ? 4 : RANKING_COLS.stack.length }, () => el("col", {})));
    table.appendChild(colgroup);
    const doneStackHeaderThs = doneStackPoints ? pointsHeaderThs()
      : RANKING_COLS.stack.map(c => helpTh(c.id, c.hideMobile ? "col-hide-mobile" : ""));
    table.appendChild(el("thead", null, el("tr", null,
      plainTh("#"), plainTh("Player"), ...doneStackHeaderThs)));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = bySlot.get(rs.slot);
      const statTds = doneStackPoints ? pointsBodyTds(s, "stack") : [
        el("td", { class: "num" }, "" + s.gp),
        el("td", { class: "num" }, s.stackRate.toFixed(1)),
        el("td", { class: "num" }, s.wins + "–" + (s.gp - s.wins)), el("td", { class: "num col-hide-mobile" }, Math.round(s.winRate * 100) + "%"),
        el("td", { class: "num col-hide-mobile" }, "" + s.courtClimbs),
        el("td", { class: "num col-hide-mobile" }, "" + s.gamesOnCourt1),
      ];
      tbody.appendChild(el("tr", { class: standingsRowClass("r" + (i + 1), s.slot) },
        rankCell(i),
        standingNameCell(s),
        ...statTds,
      ));
    });
    table.appendChild(tbody);
  } else if (isKing) {
    const kingStats = computeKingStats(state.rounds.length);
    const byKingSlot = new Map(kingStats.map(s => [s.slot, s]));
    const doneKingPoints = isPointsView();
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }),
      el("col", { class: "c-name" }),
      ...Array.from({ length: doneKingPoints ? 4 : RANKING_COLS.king.length }, () => el("col", {})));
    table.appendChild(colgroup);
    const doneKingHeaderThs = doneKingPoints ? pointsHeaderThs()
      : RANKING_COLS.king.map(c => helpTh(c.id, c.hideMobile ? "col-hide-mobile" : ""));
    table.appendChild(el("thead", null, el("tr", null,
      plainTh("#"), plainTh("Player"), ...doneKingHeaderThs)));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = byKingSlot.get(rs.slot);
      const statTds = doneKingPoints ? pointsBodyTds(s, "king") : [
        el("td", { class: "num" }, "" + s.gp),
        el("td", { class: "num" }, s.kingRate.toFixed(1)),
        el("td", { class: "num" }, s.wins + "–" + (s.gp - s.wins)), el("td", { class: "num col-hide-mobile" }, Math.round(s.winRate * 100) + "%"),
        el("td", { class: "num col-hide-mobile" }, "" + s.kingCourtWins),
        el("td", { class: "num col-hide-mobile" }, (s.pointsScored / Math.max(1, s.gp)).toFixed(1)),
      ];
      tbody.appendChild(el("tr", { class: standingsRowClass("r" + (i + 1), s.slot) },
        rankCell(i),
        standingNameCell(s),
        ...statTds,
      ));
    });
    table.appendChild(tbody);
  } else {
    const allStats = computeStats(totalRegularRounds(), true);
    const marginBySlot = new Map(
      computeMarginStats(totalRegularRounds()).map(s => [s.slot, s.adjScore]));
    const fmt = state.format === "gauntlet" ? "gauntlet" : "rr";
    const donePoints = isPointsView();
    const doneColCount = donePoints ? 4 : RANKING_COLS[fmt].length;
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }), el("col", { class: "c-name" }),
      ...Array.from({ length: doneColCount }, () => el("col", {})));
    table.appendChild(colgroup);
    const doneHeaderStatThs = donePoints ? pointsHeaderThs()
      : RANKING_COLS[fmt].map(c => helpTh(c.id, c.hideMobile ? "col-hide-mobile" : ""));
    table.appendChild(el("thead", null, el("tr", null,
      plainTh("#"), plainTh("Player"), ...doneHeaderStatThs)));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = allStats.find(x => x.slot === rs.slot);
      const statTds = donePoints ? pointsBodyTds(s, fmt) : [
        el("td", { class: "num" }, "" + s.gp),
        el("td", {
          class: "num",
          style: (marginBySlot.get(s.slot) || 0) > 0 ? "color: var(--good);"
               : ((marginBySlot.get(s.slot) || 0) < 0 ? "color: var(--bad);" : ""),
        }, (marginBySlot.get(s.slot) || 0).toFixed(1)),
        el("td", { class: "num" }, s.wins + "–" + (s.gp - s.wins)), el("td", { class: "num col-hide-mobile" }, Math.round(s.winRate * 100) + "%"),
        el("td", { class: "num col-hide-mobile", style: s.avgDiff > 0 ? "color: var(--good);" : (s.avgDiff < 0 ? "color: var(--bad);" : "") },
          (s.avgDiff > 0 ? "+" : "") + s.avgDiff.toFixed(1)),
      ];
      tbody.appendChild(el("tr", { class: standingsRowClass("r" + (i + 1), s.slot) },
        rankCell(i),
        standingNameCell(s),
        ...statTds,
      ));
    });
    table.appendChild(tbody);
  }
  finalCard.appendChild(table);
  const footerText = isKing
    ? "Within each tier, King Score per game breaks ties."
    : isStack
      ? "Within each tier, Stack Score per game breaks ties."
      : "Within each tier, Adjusted Margin → win rate → head-to-head break ties.";
  finalCard.appendChild(el("p", { class: "standings-footer" }, footerText));
  wrap.appendChild(finalCard);

  wrap.appendChild(el("button", {
    class: "ghost",
    style: "width: 100%; margin-bottom: 10px;",
    onclick: () => { state.phase = "finals"; save(); render(); }
  }, "← Edit Final Scores"));

  wrap.appendChild(el("button", {
    class: "primary",
    style: "width: 100%;",
    onclick: () => {
      showConfirm("Start a new tournament? This clears all scores and names.", () => {
        const keptKeepAwake = state.keepAwake;
        const keptKeepAwakeAggressive = state.keepAwakeAggressive;
        state = newState();
        state.keepAwake = keptKeepAwake;
        state.keepAwakeAggressive = keptKeepAwakeAggressive;
        syncKeepAwakeToState();
        save(); render();
      }, { title: "Start new tournament", confirmText: "Start new", danger: true });
    }
  }, "Start New Tournament"));

  return wrap;
}

function openScheduleModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Full Schedule"));

  const list = el("div", { class: "schedule-list" });

  function gameRow(g, courtTag, courtClass) {
    const row = el("div", { class: "schedule-game" });
    const hcSched = (state.accessibilityPrefs && state.accessibilityPrefs.highContrastCourts) ? " hc" : "";
    row.appendChild(el("span", { class: "court-tag " + courtClass + hcSched }, courtTag));
    row.appendChild(el("span", { class: "game-text" },
      teamName(g.team1) + " vs " + teamName(g.team2)));
    const scoreText = isGameComplete(g)
      ? g.score1 + "–" + g.score2
      : "—";
    row.appendChild(el("span", { class: "game-score" }, scoreText));
    return row;
  }

  if (state.format === "crown") {
    (state.crownMatches || []).forEach((match, mi) => {
      const sched = CROWN_SCHEDULE[mi];
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, sched ? sched.name : "Match " + (mi + 1)));
      const g = { team1: match.team1, team2: match.team2,
        score1: isCrownMatchComplete(match) ? crownGamesWon(match, undefined, mi).gamesWon1 : null,
        score2: isCrownMatchComplete(match) ? crownGamesWon(match, undefined, mi).gamesWon2 : null };
      block.appendChild(gameRow(g, "👑", "c1"));
      list.appendChild(block);
    });
    if (state.crownFinal && (state.phase === "crown" || state.phase === "done")) {
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, "Crown Match"));
      const cf = state.crownFinal;
      const { gamesWon1, gamesWon2 } = crownGamesWon(cf);
      const finalComplete = isCrownMatchComplete(cf);
      const g = { team1: cf.team1, team2: cf.team2,
        score1: finalComplete ? gamesWon1 : null, score2: finalComplete ? gamesWon2 : null };
      block.appendChild(gameRow(g, "👑", "gold"));
      list.appendChild(block);
    }
    } else {
      state.rounds.forEach(r => {
        const block = el("div", { class: "schedule-round" });
        block.appendChild(el("div", { class: "schedule-round-title" }, "Round " + r.round));
        gamesOf(r).forEach(g => {
          block.appendChild(gameRow(g, courtTagLabel(g.court || 1), "c" + (g.court || 1)));
        });
      const byes = byesOf(r);
      if (byes.length) {
        block.appendChild(el("div", { class: "schedule-byes" },
          "☕ Sitting this round: " + byes.map(nameOf).join(", ")));
      }
      list.appendChild(block);
    });
    if (state.finals && (state.phase === "finals" || state.phase === "done")) {
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, "Finals"));
      finalTiers().forEach((g, i) => block.appendChild(gameRow(g, i === 0 ? "Champ" : "Cons", i === 0 ? "gold" : "silver")));
      list.appendChild(block);
    }
  }

  modal.appendChild(list);
  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 12px;",
    onclick: close,
  }, "Close"));
  bg.appendChild(modal);
  mountModal(bg, modal);
}

        "Win scores are fixed by Crown Court format — Opening to 11, Power Round to 11 (1.5×), Sudden Death to 7."));
    }
    winScoreRow = el("div", { class: "settings-row", style: state.format === "crown" ? "display:none;" : "" });
    winScoreRow.appendChild(el("label", null, "Win score"));
    const winSelect = el("select");
    [11, 15, 21].forEach(v => {

      winSelect.appendChild(opt);

    winScoreRow.appendChild(winSelect);
    modal.appendChild(winScoreRow);
    if (state.timeBudget.enabled && state.format !== "crown") winScoreRow.style.display = "none";

    if (state.phase === "playing" && state.format !== "crown") {
      modal.appendChild(el("div", { class: "ka-section-title" }, "Manage Players"));
      modal.appendChild(el("p", { class: "muted", style: "margin: 0 0 10px;" },
        "Takes effect next round."));
      const manageError = el("div", { class: "paste-error", style: "display:none;margin:0 0 8px;" });
      modal.appendChild(manageError);
      const refreshSettings = () => {
        close();
        render();
        openSettings();
      };
      const applyRosterResult = (result, message) => {
        if (!result || !result.ok) {
          manageError.textContent = (result && result.error) || "Could not update players.";
          manageError.style.display = "";
          return;
        }
        showToast(message);
        refreshSettings();
      };

      const courtRow = el("div", { class: "settings-row" });
      courtRow.appendChild(el("label", null, "Courts"));
      const courtSelect = el("select");
      [1,2,3,4,5,6].forEach(v => {
        const opt = el("option", { value: String(v) }, String(v));
        if (state.courtCount === v) opt.setAttribute("selected", "selected");
        courtSelect.appendChild(opt);
      });
      courtSelect.addEventListener("change", () => {
        const beforeState = stateSnapshotForUndo();
        const result = changeCourtCountMidEvent(parseInt(courtSelect.value, 10));
        if (!result || !result.ok) courtSelect.value = String(state.courtCount);
        if (result && result.ok && result.changed) {
          recordEvent({
            kind: "courtCount",
            label: mutationEventLabel("courtCount", { courts: state.courtCount }),
            beforeState,
            reversible: true,

      r.appendChild(el("div", { style: "flex:1;" }, key + " — " + roster[key]));

      del.addEventListener("click", () => { deleteRosterEntry(key); refreshRoster(); });
      r.appendChild(del);
      rosterWrap.appendChild(r);
    });
  }
  refreshRoster();
  modal.appendChild(rosterWrap);
  const clearNumsBtn = el("button", { class: "secondary", style: "width:100%;margin-top:6px;" }, "Clear all saved numbers");
  clearNumsBtn.addEventListener("click", () => {
    showConfirm("Delete all saved phone numbers?", () => {
      clearRoster();
      refreshRoster();
    }, { title: "Delete saved numbers", confirmText: "Delete", danger: true });
  });
  modal.appendChild(clearNumsBtn);
  modal.appendChild(el("p", { class: "muted", style: "margin:8px 0 0;font-size:13px;" },
    "Numbers are stored only in this browser (unencrypted) and are never sent anywhere — " +
    "they leave your device only when you tap Text or Copy. This app is hosted on a shared " +
    "github.io address, so other pages you host there could read them; use Clear All to remove."));

  const closeBtn = el("button", { style: "width: 100%; margin-top: 12px;", onclick: () => { syncKeepAwakeToState(); close(); render(); } }, "Done");
  modal.appendChild(closeBtn);

  // Divider before destructive actions
  modal.appendChild(el("div", {
    style: "border-top: 1px solid var(--border); margin: 16px 0 8px;"
  }));

  // Switch format — confirms-and-wipes if a tournament is in progress.
  const allFormats = [
    { id: "rr",       label: "Round Robin" },
    { id: "stack",    label: "Stack Format" },
    { id: "king",     label: "King of the Court" },
    { id: "gauntlet", label: "Gauntlet" },
    { id: "crown",    label: "Crown Court" },
  ];
  // Collapsed by default so the modal stays short and the Reset/Clear actions
  // below aren't buried under five format buttons.
  const fmtDetails = el("details", { style: "margin-top: 8px;" });
  fmtDetails.appendChild(el("summary", { style: "cursor:pointer;padding:8px 0;font-weight:600;color:var(--muted);" }, "Switch format"));
  allFormats.filter(f => f.id !== state.format).forEach(f => {
    fmtDetails.appendChild(el("button", {
      style: "width: 100%; margin-top: 8px;",
      onclick: () => {
        const inSetup = state.phase === "setup";
        const msg = inSetup
          ? "Switch to " + f.label + "?"
          : "Switch to " + f.label + "? This wipes the current tournament (names are kept).";
        showConfirm(msg, () => {
          if (inSetup) {
            state.format = f.id;
          } else {
            const keptNames = state.rawNames.slice();
            const keptWinScore = state.winScore;
            const keptWinBy = state.winBy;
            const keptScoringSystem = state.scoringSystem;
            const keptStackRounds = state.stackRounds;
            const keptKingRounds = state.kingRounds;
            const keptGauntletRounds = state.gauntletRounds;
            const keptKeepAwake = state.keepAwake;
            const keptKeepAwakeAggressive = state.keepAwakeAggressive;
            state = newState();
            state.rawNames = keptNames;
            state.winScore = keptWinScore;
            state.winBy = keptWinBy;
            state.scoringSystem = keptScoringSystem;
            state.format = f.id;
            state.stackRounds = keptStackRounds;
            state.kingRounds = keptKingRounds;
            state.gauntletRounds = keptGauntletRounds;
            state.keepAwake = keptKeepAwake;
            state.keepAwakeAggressive = keptKeepAwakeAggressive;
            syncKeepAwakeToState();
          }
          save();
          close();
          render();
        }, { title: "Switch format", confirmText: "Switch", danger: !inSetup });
      },
    }, "Switch to " + f.label));
  });
  modal.appendChild(fmtDetails);

  // Reset Tournament — visible only outside the setup phase
    if (state.phase !== "setup") {
      modal.appendChild(el("button", {
        style: "width: 100%; margin-top: 8px; background: var(--accent); color: #1a1207; border-color: var(--accent);",
        onclick: () => {
          const isCrown = state.format === "crown";
          const playerCount = isCrown ? 4 : activeCount();
          showConfirm("Reset scores and re-shuffle the schedule? Your " + playerCount + " names will be kept.", () => {
            const keptNames = state.slots.filter(Boolean);
            const keptPhones = (state.phones || []).slice();
            const keptPhoneByName = {};
            keptNames.forEach((n, i) => { if (n) keptPhoneByName[n] = keptPhones[i] || ""; });
            const keptWinScore = state.winScore;
            const keptWinBy = state.winBy;
            const keptScoringSystem = state.scoringSystem;
            const keptFormat = state.format;
            const keptCourtCount = state.courtCount;
            const keptRrRounds = state.rrRounds;
            const keptStackRounds = state.stackRounds;
            const keptKingRounds = state.kingRounds;
            const keptGauntletRounds = state.gauntletRounds;
            const keptKeepAwake = state.keepAwake;
            const keptKeepAwakeAggressive = state.keepAwakeAggressive;
            state = newState();
            state.format = keptFormat;
            state.courtCount = keptCourtCount;
            state.rrRounds = keptRrRounds;
            state.stackRounds = keptStackRounds;
            state.kingRounds = keptKingRounds;
            state.gauntletRounds = keptGauntletRounds;
            state.winScore = keptWinScore;
            state.winBy = keptWinBy;
            state.scoringSystem = keptScoringSystem;
            state.keepAwake = keptKeepAwake;
            state.keepAwakeAggressive = keptKeepAwakeAggressive;
            state.phase = "playing";
            state.currentRound = 1;
            if (isCrown) {
              const crowNames = keptNames.slice(0, 4);
              const shuffled = shuffle(crowNames.slice());
              state.rawNames = [...crowNames, "", "", "", ""];
              state.rawPhones = crowNames.map(n => keptPhoneByName[n] || "").concat(["", "", "", ""]);
              state.slots = [...shuffled, "", "", "", ""];
              writePlayersFromSlots(4, keptPhoneByName);
              state.tiebreakRandom = shuffle([0,1,2,3]);
              state.crownMatches = CROWN_SCHEDULE.map(s => ({
                team1: s.team1.slice(), team2: s.team2.slice(), theme: s.theme,
                games: [{score1:null,score2:null},{score1:null,score2:null},{score1:null,score2:null}],
              }));
              state.currentMatch = 0;
              state.crownFinal = null;
            } else {
              state.rawNames = keptNames.slice();
              state.rawPhones = keptNames.map(n => keptPhoneByName[n] || "");
              state.slots = shuffle(keptNames);
              writePlayersFromSlots(keptNames.length, keptPhoneByName);
              state.tiebreakRandom = shuffle(Array.from({ length: keptNames.length }, (_, i) => i));
              if (keptFormat === "stack") {
                state.rounds = [assignInitialStackCourts()];
              } else if (keptFormat === "king") {
                state.rounds = [assignInitialKingCourts()];
              } else if (keptFormat === "gauntlet") {
                state.rounds = [assignInitialGauntletCourts()];
              } else if (keptNames.length === 8 && state.courtCount === 2) {
                state.rrScheduleMode = "wh8";
                state.rrRounds = 7;
                state.rounds = generateRounds();
              } else {
                state.rrScheduleMode = "generated";
                state.rrRounds = Math.max(4, Math.min(12, parseInt(state.rrRounds, 10) || 7));
                state.rounds = generateRRSchedule(
                  Array.from({ length: keptNames.length }, (_, i) => i + 1),
                  state.courtCount,
                  state.rrRounds,
                  [],
                  mulberry32(state.scheduleSeed)
                );
              }
            }
            syncKeepAwakeToState();
            save();
            close();
            render();
          }, { title: "Reset tournament", confirmText: "Reset", danger: true });
        }
      }, "Reset Tournament"));
  }

  // Clear All — always visible
  modal.appendChild(el("button", {
    class: "danger",
    style: "width: 100%; margin-top: 8px;",
    onclick: () => {
      showConfirm("Clear all data including names? This can't be undone.", () => {
        clearRoster();
        const keptKeepAwakeClear = state.keepAwake;
        const keptKeepAwakeAggressiveClear = state.keepAwakeAggressive;
        state = newState();
        state.keepAwake = keptKeepAwakeClear;
        state.keepAwakeAggressive = keptKeepAwakeAggressiveClear;
        syncKeepAwakeToState();
        save();
        close();
        render();
      }, { title: "Clear all data", confirmText: "Clear all", danger: true });
    }
  }, "Clear All"));

  bg.appendChild(modal);
  mountModal(bg, modal);

  // Populate read-out if already enabled when modal opens (must run after modal is in DOM)
  if (state.timeBudget.enabled) {
    const { config, error, isTight, suggestion } = applyTimeBudgetSolve();
    updateTimeBudgetReadoutDOM(formatTimeBudgetReadout(config, state.timeBudget.minutes, suggestion), isTight, !!error);
  }
}

// ---------- lifetime: career view + player card ----------
function fmtPct(p) { return Math.round((p || 0) * 100) + "%"; }
function fmtCareerDate(ms) {
  if (!ms) return "—";
  try { return new Date(ms).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }
  catch (e) { return "—"; }
}

// Leaderboard modal: sortable, searchable table of every tracked career.
function openCareer() {
  const bg = el("div", { class: "modal-bg" });
  const modal = el("div", { class: "modal" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  modal.appendChild(el("h2", null, "Lifetime Stats"));
  const syncRow = buildSyncRow();
  if (syncRow) modal.appendChild(syncRow);

  // Reopen from scratch after an import/wipe so the table reflects the change,
  // including the empty <-> populated transition (which swaps the whole layout).
  const reopen = () => { close(); openCareer(); };

  const careers = LifetimeStore.careers();
  if (!careers.length) {
    modal.appendChild(el("p", { class: "muted" },
      "No lifetime stats yet — enable 'Save to lifetime stats' when you run a tournament."));
    modal.appendChild(buildDataRow(reopen));
    modal.appendChild(buildDataAboutSection());
    modal.appendChild(el("button", { style: "width:100%;margin-top:8px;", onclick: close }, "Done"));
    bg.appendChild(modal);
    mountModal(bg, modal);
    return;
  }

  // Column definitions: each has a value extractor for sorting.
  const cols = [
    { key: "player", label: "Player", num: false, val: c => (c.displayName || c.phoneKey || "").toLowerCase() },
    { key: "tournaments", label: "Tournaments", num: true, val: c => c.tournaments },
    { key: "wl", label: "W–L", num: true, val: c => c.wins - c.losses },
    { key: "winPct", label: "Win%", num: true, val: c => c.winPct },
    { key: "games", label: "Games", num: true, val: c => c.games },
    { key: "best", label: "Best finish", num: true, val: c => (c.bestFinish == null ? Infinity : c.bestFinish) },
  ];

  let sortKey = "winPct";
  let sortDir = -1;          // -1 desc, 1 asc
  let query = "";

  const search = el("input", {
    class: "name-input",
    type: "search",
    placeholder: "Search players…",
    "aria-label": "Search players",
    autocomplete: "off",
    style: "margin-bottom:12px;",
  });
  search.addEventListener("input", () => { query = search.value.trim().toLowerCase(); renderBody(); });
  modal.appendChild(search);

  const wrap = el("div", { style: "overflow-x:auto;" });
  const table = el("table", { style: "width:100%;border-collapse:collapse;font-size:14px;" });
  const thead = el("thead");
  const headRow = el("tr");
  const thStyle = (num) =>
    "padding:7px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap;text-align:" +
    (num ? "right" : "left") + ";";
  cols.forEach(col => {
    const arrow = sortKey === col.key ? (sortDir === -1 ? " ▾" : " ▴") : "";
    const th = el("th", {
      "data-key": col.key,
      style: thStyle(col.num),
      title: "Sort by " + col.label,
      onclick: () => {
        if (sortKey === col.key) { sortDir = -sortDir; }
        else { sortKey = col.key; sortDir = col.num ? -1 : 1; }   // numbers default desc, names asc
        renderHead();
        renderBody();
      },
    }, col.label + arrow);
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);
  const tbody = el("tbody");
  table.appendChild(tbody);
  wrap.appendChild(table);
  modal.appendChild(wrap);

  function renderHead() {
    Array.from(headRow.children).forEach((th, i) => {
      const col = cols[i];
      const arrow = sortKey === col.key ? (sortDir === -1 ? " ▾" : " ▴") : "";
      th.textContent = col.label + arrow;
    });
  }

  function renderBody() {
    tbody.textContent = "";
    const list = LifetimeStore.careers().filter(c => {
      if (!query) return true;
      return (c.displayName || "").toLowerCase().includes(query) ||
             (c.phoneKey || "").toLowerCase().includes(query);
    });
    const col = cols.find(c => c.key === sortKey);
    const tieTournaments = (a, b) => b.tournaments - a.tournaments;   // secondary: tournaments desc
    list.sort((a, b) => {
      const av = col.val(a), bv = col.val(b);
      let cmp;
      if (typeof av === "string") cmp = av < bv ? -1 : av > bv ? 1 : 0;
      else cmp = av - bv;
      cmp *= sortDir;
      if (cmp !== 0) return cmp;
      if (sortKey !== "tournaments") { const t = tieTournaments(a, b); if (t !== 0) return t; }
      return (a.displayName || "").localeCompare(b.displayName || "");
    });
    if (!list.length) {
      const tr = el("tr");
      const msg = query
        ? "No players match \"" + search.value + "\"."
        : "No lifetime stats yet — enable 'Save to lifetime stats' when you run a tournament.";
      tr.appendChild(el("td", { colspan: String(cols.length), class: "muted", style: "padding:12px 8px;text-align:center;" }, msg));
      tbody.appendChild(tr);
      return;
    }
    const tdNum = "padding:7px 8px;text-align:right;white-space:nowrap;";
    const tdName = "padding:7px 8px;text-align:left;";
    list.forEach(c => {
      const tr = el("tr", {
        style: "cursor:pointer;border-bottom:1px solid var(--border);",
        title: "View " + (c.displayName || c.phoneKey) + "'s career",
        onclick: () => openPlayerCard(c.phoneKey, renderBody),
      });
      tr.appendChild(el("td", { style: tdName },
        el("div", { style: "font-weight:600;" }, c.displayName || c.phoneKey || "Unknown")));
      tr.appendChild(el("td", { style: tdNum }, String(c.tournaments)));
      tr.appendChild(el("td", { style: tdNum }, c.wins + "–" + c.losses));
      tr.appendChild(el("td", { style: tdNum }, fmtPct(c.winPct)));
      tr.appendChild(el("td", { style: tdNum }, String(c.games)));
      tr.appendChild(el("td", { style: tdNum }, c.bestFinish == null ? "—" : "#" + c.bestFinish));
      tbody.appendChild(tr);
    });
  }

  renderBody();

  modal.appendChild(buildDataRow(reopen));
  modal.appendChild(buildDataAboutSection());
  modal.appendChild(el("button", { style: "width:100%;margin-top:8px;", onclick: close }, "Done"));
  bg.appendChild(modal);
  mountModal(bg, modal);
}

// Cloud-sync row for the Career modal header. Returns null when the Firebase
// bridge is absent (local-only build) so signed-out local use is unaffected.
// Signed out: a "Sign in to sync" button. Signed in: account email + a status
// chip (Synced / Pending(n) / Offline) + a Sign out button.
function buildSyncRow() {
  const fb = window.__rumbleFb;
  if (!fb) return null;
  const row = el("div", {
    style: "display:flex;align-items:center;gap:8px;margin:-4px 0 14px;flex-wrap:wrap;",
  });
  const user = fb.auth && fb.auth.currentUser;
  if (!user) {
    row.appendChild(el("button", {
      style: "flex:1;",
      onclick: lifetimeSignIn,
    }, "Sign in to sync"));
    let localCount = 0;
    try { localCount = LifetimeStore.anonymousPendingCount(); } catch (e) {}
    if (localCount > 0) {
      row.appendChild(el("div", {
        class: "muted",
        style: "flex-basis:100%;font-size:12px;",
      }, "On this device only — sign in to sync."));
    }
    return row;
  }
  const st = LifetimeStore.status();
  const chipLabel = !st.online ? "Offline"
    : st.pendingCount ? "Pending(" + st.pendingCount + ")"
    : "Synced";
  const chipColor = !st.online ? "var(--muted)"
    : st.pendingCount ? "var(--accent)"
    : "var(--good)";
  row.appendChild(el("div", {
    class: "muted",
    style: "flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;",
    title: user.email || "",
  }, user.email || "Signed in"));
  row.appendChild(el("span", {
    style: "font-size:12px;font-weight:600;padding:3px 8px;border-radius:999px;" +
      "border:1px solid var(--border);color:" + chipColor + ";white-space:nowrap;",
  }, chipLabel));
  row.appendChild(el("button", { onclick: lifetimeSignOut }, "Sign out"));
  return row;
}

// Data-management footer for the Career modal: export / import / wipe the active
// lifetime ledger. `refresh` re-renders the open modal after import/wipe.
function buildDataRow(refresh) {
  const row = el("div", {
    style: "display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);",
  });

  const exportBtn = el("button", { style: "flex:1;" }, "Export");
  exportBtn.addEventListener("click", () => {
    showConfirm(
      "This file contains your players' phone numbers, unencrypted. Only share it with people you trust.",
      () => {
        const blob = new Blob([LifetimeStore.exportJSON()], { type: "application/json" });
        downloadBlob(blob, "rumble-lifetime.json");
      },
      { title: "Export lifetime stats", confirmText: "Download" }
    );
  });

  const fileInput = el("input", {
    type: "file",
    accept: "application/json,.json",
    style: "display:none;",
  });
  fileInput.addEventListener("change", () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    file.text().then(text => {
      try {
        LifetimeStore.importJSON(text, { merge: true });
        showToast("Merged into this device's lifetime stats.");
        refresh();
      } catch (e) {
        showConfirm("Import failed: " + (e && e.message ? e.message : "could not read file") + ".",
          () => {}, { title: "Import lifetime stats", confirmText: "OK", cancelText: "Close" });
      }
    }).catch(() => {
      showConfirm("Import failed: could not read file.",
        () => {}, { title: "Import lifetime stats", confirmText: "OK", cancelText: "Close" });
    });
    fileInput.value = "";   // allow re-selecting the same file
  });
  const importBtn = el("button", { style: "flex:1;" }, "Import");
  importBtn.addEventListener("click", () => fileInput.click());

  const wipeBtn = el("button", { class: "danger", style: "flex:1;" }, "Wipe");
  wipeBtn.addEventListener("click", () => {
    const signedIn = LifetimeStore.status().signedIn;
    const msg = signedIn
      ? "Erase all lifetime stats — on this device and in your cloud space? This can't be undone."
      : "Erase all lifetime stats on this device? This can't be undone.";
    showConfirm(msg, () => {
      LifetimeStore.clearLedger();
      showToast("Lifetime stats erased.");
      refresh();
    }, { title: "Wipe lifetime stats", danger: true, confirmText: "Erase" });
  });

  row.appendChild(exportBtn);
  row.appendChild(importBtn);
  row.appendChild(wipeBtn);
  row.appendChild(fileInput);
  return row;
}

// "Your lifetime data" privacy blurb for the Career modal: a small toggle link
// that reveals where lifetime data lives, who can read it, and how to remove it.
// Collapsed by default to keep the modal compact.
function buildDataAboutSection() {
  const wrap = el("div", { style: "margin-top:10px;" });
  const blurb = el("p", {
    class: "muted",
    style: "display:none;font-size:12px;line-height:1.5;margin:8px 0 0;",
  },
    "Lifetime stats are stored on this device. When you sign in, they're also kept " +
    "in your own owner-scoped cloud space (Firestore, US / nam5 region) — only you " +
    "can read it. Remove one person with “Remove this player,” or erase everything " +
    "with Wipe; deletion clears both this device and the cloud. Data is retained " +
    "until you delete it.");
  const link = el("button", {
    style: "background:none;border:none;padding:0;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;",
    "aria-expanded": "false",
  }, "ⓘ About this data");
  link.addEventListener("click", () => {
    const open = blurb.style.display === "none";
    blurb.style.display = open ? "block" : "none";
    link.setAttribute("aria-expanded", open ? "true" : "false");
  });
  wrap.appendChild(link);
  wrap.appendChild(blurb);
  return wrap;
}

// Player career card: stacks over the leaderboard. `onRemoved` rebuilds the
// leaderboard table after a removal so the row disappears when we close.
function openPlayerCard(phoneKey, onRemoved) {
  const bg = el("div", { class: "modal-bg" });
  const modal = el("div", { class: "modal" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const c = LifetimeStore.career(phoneKey);
  modal.appendChild(el("h2", null, c.displayName || c.phoneKey || "Player"));
  if (c.displayName && c.phoneKey && c.displayName !== c.phoneKey) {
    modal.appendChild(el("p", { class: "muted", style: "margin:-6px 0 12px;font-size:13px;" }, c.phoneKey));
  }

  // Aggregates
  const stats = [
    ["Tournaments", String(c.tournaments)],
    ["W–L", c.wins + "–" + c.losses],
    ["Win%", fmtPct(c.winPct)],
    ["Games", String(c.games)],
    ["Points", String(c.pointsFor)],
    ["Avg point diff", (c.avgPointDiff >= 0 ? "+" : "") + c.avgPointDiff.toFixed(1)],
    ["Best finish", c.bestFinish == null ? "—" : "#" + c.bestFinish],
    ["🥇 / 🥈 / 🥉", (c.podiums[1] || 0) + " / " + (c.podiums[2] || 0) + " / " + (c.podiums[3] || 0)],
  ];
  const grid = el("div", { style: "display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;" });
  stats.forEach(([label, val]) => {
    const cell = el("div", { style: "background:var(--panel-2);border-radius:8px;padding:8px 10px;" });
    cell.appendChild(el("div", { class: "muted", style: "font-size:12px;" }, label));
    cell.appendChild(el("div", { style: "font-size:16px;font-weight:700;" }, val));
    grid.appendChild(cell);
  });
  modal.appendChild(grid);

  // Per-tournament history
  modal.appendChild(el("h3", null, "Tournaments"));
  const records = LifetimeStore.allRecords()
    .filter(t => t.results.some(r => r.phoneKey === phoneKey))
    .sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
  if (!records.length) {
    modal.appendChild(el("p", { class: "muted" }, "No tournaments recorded."));
  } else {
    const wrap = el("div", { style: "overflow-x:auto;" });
    const table = el("table", { style: "width:100%;border-collapse:collapse;font-size:14px;" });
    const thStyle = (align) => "padding:7px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;white-space:nowrap;text-align:" + align + ";";
    const head = el("tr");
    head.appendChild(el("th", { style: thStyle("left") }, "Date"));
    head.appendChild(el("th", { style: thStyle("left") }, "Format"));
    head.appendChild(el("th", { style: thStyle("right") }, "Finish"));
    head.appendChild(el("th", { style: thStyle("right") }, "W–L"));
    table.appendChild(el("thead", null, head));
    const tbody = el("tbody");
    records.forEach(t => {
      const r = t.results.find(x => x.phoneKey === phoneKey);
      const tr = el("tr", { style: "border-bottom:1px solid var(--border);" });
      tr.appendChild(el("td", { style: "padding:7px 8px;text-align:left;white-space:nowrap;" }, fmtCareerDate(t.completedAt)));
      tr.appendChild(el("td", { style: "padding:7px 8px;text-align:left;text-transform:capitalize;" }, t.format || "—"));
      tr.appendChild(el("td", { style: "padding:7px 8px;text-align:right;" }, r.finalRank == null ? "—" : "#" + r.finalRank));
      tr.appendChild(el("td", { style: "padding:7px 8px;text-align:right;white-space:nowrap;" }, r.wins + "–" + r.losses));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    modal.appendChild(wrap);
  }

  const backBtn = el("button", { style: "width:100%;margin-top:16px;", onclick: close }, "← Back");
  modal.appendChild(backBtn);

  const removeBtn = el("button", { class: "danger", style: "width:100%;margin-top:8px;" }, "Remove this player");
  removeBtn.addEventListener("click", () => {
    const signedIn = LifetimeStore.status().signedIn;
    showConfirm(
      "Remove " + (c.displayName || c.phoneKey) + " from lifetime stats? This deletes their results from every tournament on this device" +
        (signedIn ? " and in your cloud space." : "."),
      () => {
        LifetimeStore.removePlayer(phoneKey);
        close();
        if (typeof onRemoved === "function") onRemoved();
      },
      { title: "Remove player", confirmText: "Remove", danger: true }
    );
  });
  modal.appendChild(removeBtn);

  bg.appendChild(modal);
  mountModal(bg, modal);
}

// ---------- boot ----------
KeepAwake.setAggressive(!!state.keepAwakeAggressive);
if (state.keepAwake) {
  // Layer 1 (canvas) starts immediately. Layer 2 (WakeLock) and Layer 3 (AudioContext)
  // may be rejected by the browser without a prior user gesture — both are caught internally
  // and will retry on first user interaction or next visibility change.
  KeepAwake.enable();
  // Do not show toast on boot — only show when user explicitly enables via settings.
}
// Heartbeat: write lastSeenAt once/sec; detect idle gaps > 5 min and credit to pauseSec.
setInterval(() => {
  if (!state.timeBudget || state.phase === "setup" || state.phase === "done") return;
  const now = Date.now();
  const lastSeen = state.timeBudget.lastSeenAt || 0;
  if (lastSeen > 0 && now - lastSeen > 5 * 60 * 1000) {
    const gapSec = Math.round((now - lastSeen) / 1000);
    for (const r of state.rounds) {
      for (const court of gamesOf(r)) {
        if (court.gameStartedAt != null && court.gameEndedAt == null) {
          court.pauseSec = (court.pauseSec || 0) + gapSec;
        }
      }
    }
    save();
  }
  state.timeBudget.lastSeenAt = now;
}, 1000);

function setupDisplayModeRefresh() {
  if (!isDisplayMode() || displayRefreshStarted) return;
  displayRefreshStarted = true;
  displayLastSaved = localStorage.getItem(STORAGE_KEY);
  const refreshIfChanged = raw => {
    const nextRaw = raw === undefined ? localStorage.getItem(STORAGE_KEY) : raw;
    if (nextRaw === displayLastSaved) return;
    displayLastSaved = nextRaw;
    state = readDisplayState() || newState();
    render();
  };
  setInterval(() => refreshIfChanged(), 2000);
  window.addEventListener("storage", e => {
    if (e.key === STORAGE_KEY) refreshIfChanged(e.newValue);
  });
}

// RUMBLE:MODALS:end
// RUMBLE:BOOT:start
// Legacy tournaments started before tournamentId existed: stamp once and persist.
if (state && state.phase && state.phase !== "setup" && !state.tournamentId) {
  if (!state.startedAt) state.startedAt = 0;
  state.tournamentId = (state.scheduleSeed || 0) + "-" + state.startedAt;
  save();
}
setupDisplayModeRefresh();
render();
window.addEventListener("hashchange", () => {
  if (!isSnapshotRoute()) state = load() || newState();
  render();
});

// ---------- lifetime cloud sync: auth readiness hook (Phase C) ----------
// The Firebase bridge (C2) loads as a SEPARATE module AFTER this classic script.
// It may finish before or after this line runs, so cover both: register the hook
// it calls when ready, and also invoke now if it already signalled ready.
window.__onRumbleFbReady = setupLifetimeAuth;
if (window.__rumbleFbReady) setupLifetimeAuth();

// ---------- PWA: service worker registration + update chip ----------
// Register on secure contexts: https in production, and localhost/127.0.0.1 for
// local testing (both are valid SW secure contexts). file:// is excluded, so
// AirDrop use is unaffected (SW won't register there; the local file still runs).
// Uses the existing top-level el() DOM helper defined earlier in this file.
{
  const _host = location.hostname;
  const _swOk = "serviceWorker" in navigator &&
    (location.protocol === "https:" || _host === "localhost" || _host === "127.0.0.1" || _host === "[::1]");
  if (_swOk) {
    // Reload only when an UPDATE takes control — never on first-load claim().
    // hadController is false on a fresh first visit (clients.claim() fires
    // controllerchange then, which must NOT reload), true once controlled.
    const hadController = !!navigator.serviceWorker.controller;
    let _pwaReloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (hadController && !_pwaReloaded) { _pwaReloaded = true; location.reload(); }
    });

    navigator.serviceWorker.register("sw.js").then((reg) => {
      function showUpdateChip(worker) {
        if (document.getElementById("pwa-update-chip")) return;
        
        const card = el("div", {
          id: "pwa-update-chip",
          style: "position:fixed; left:50%; bottom:16px; transform:translateX(-50%); " +
            "z-index:300; background:var(--panel-2); color:var(--text); border:1px solid var(--border); " +
            "border-radius:16px; padding:16px; width:90%; max-width:340px; " +
            "box-shadow:0 10px 30px rgba(0,0,0,.55); display:flex; flex-direction:column; gap:12px; " +
            "font-family:inherit; animation: slideUp 0.3s ease-out;"
        });
        
        if (!document.getElementById("pwa-update-keyframes")) {
          const style = el("style", { id: "pwa-update-keyframes" }, `
            @keyframes slideUp {
              from { transform: translate(-50%, 100px); opacity: 0; }
              to { transform: translate(-50%, 0); opacity: 1; }
            }
          `);
          document.head.appendChild(style);
        }

        const header = el("div", { style: "display:flex; align-items:center; gap:8px;" },
          el("span", { style: "font-size:18px;" }, "🆕"),
          el("div", { style: "flex:1;" },
            el("h4", { style: "margin:0; font-size:15px; font-weight:700; color:var(--text);" }, "Update Available"),
            el("span", { id: "pwa-update-ver", style: "font-size:11px; color:var(--muted); font-weight:600;" }, "New version ready")
          ),
          el("button", {
            style: "background:transparent; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:0; line-height:1;",
            onclick: () => {
              card.remove();
            }
          }, "×")
        );
        card.appendChild(header);

        const body = el("div", { style: "font-size:13px; color:var(--muted); line-height:1.45; border-top:1px solid var(--border); padding-top:10px;" });
        const list = el("ul", { id: "pwa-update-list", style: "margin:0; padding-left:16px; display:flex; flex-direction:column; gap:4px;" });
        list.appendChild(el("li", null, "Performance improvements and bug fixes"));
        body.appendChild(list);
        card.appendChild(body);

        const btn = el("button", {
          style: "width:100%; min-height:40px; background:var(--accent); color:#1a1207; border:none; " +
            "border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; box-shadow: 0 4px 12px rgba(251,191,36,0.25);"
        }, "Update & Refresh 🚀");
        
        btn.addEventListener("click", () => {
          btn.disabled = true;
          btn.textContent = "Updating...";
          worker.postMessage("skipWaiting");
        });
        card.appendChild(btn);

        document.body.appendChild(card);

        fetch("version.json?cb=" + Date.now())
          .then(res => res.json())
          .then(data => {
            if (!Array.isArray(data) || data.length === 0) return;
            
            const latestVer = data[0].version;
            const verSpan = document.getElementById("pwa-update-ver");
            if (verSpan) verSpan.textContent = `Upgrading to ${latestVer}`;

            const currentIdx = data.findIndex(r => r.version === APP_VERSION);
            let changes = [];
            if (currentIdx !== -1) {
              for (let i = 0; i < currentIdx; i++) {
                changes = changes.concat(data[i].changes);
              }
            } else {
              changes = data[0].changes;
            }

            const ul = document.getElementById("pwa-update-list");
            if (ul && changes.length > 0) {
              ul.innerHTML = "";
              changes.slice(0, 4).forEach(ch => {
                ul.appendChild(el("li", null, ch));
              });
              if (changes.length > 4) {
                ul.appendChild(el("li", { style: "list-style:none; margin-left:-16px; font-style:italic;" }, `+ ${changes.length - 4} more updates...`));
              }
            }
          })
          .catch(() => {});
      }
      // Show the chip once a NEW worker is installed alongside an active controller.
      function trackWorker(worker) {
        if (!worker) return;
        if (worker.state === "installed" && navigator.serviceWorker.controller) {
          showUpdateChip(worker);
          return;
        }
        worker.addEventListener("statechange", () => {
          if (worker.state === "installed" && navigator.serviceWorker.controller) {
            showUpdateChip(worker);
          }
        });
      }
      // Cover all three sources: one already waiting, one mid-install, future updates.
      if (reg.waiting && navigator.serviceWorker.controller) showUpdateChip(reg.waiting);
      trackWorker(reg.installing);
      reg.addEventListener("updatefound", () => trackWorker(reg.installing));
    });
  }
}
// RUMBLE:BOOT:end
</script>

  when a LATER task calls LifetimeStore.setBackend(...). This module only sets up the
  Firebase SDK and exposes a bridge on window.__rumbleFb; it does NOT wire any backend,
  auth UI, or sync yet. Any failure here is swallowed so the app stays local-only.

  Vendoring note: we import the Firebase v11.10.0 modular ESM builds from the PINNED
  gstatic CDN URLs rather than vendoring them same-origin. True same-origin vendoring
  was attempted and verified impractical without a build step: the stock gstatic
  firebase-auth.js / firebase-firestore.js / firebase-app-check.js builds each hard-code
  an ABSOLUTE `import ... from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"`,
  so even copies served same-origin would still fetch firebase-app from gstatic. Rewriting
  those imports would require a bundler/build step, which this project intentionally avoids.
  Pinning the exact version URLs keeps loads deterministic and lets the SW precache them later.

  Config below is a Firebase WEB app config and the App Check reCAPTCHA v3 SITE key —
  both are publishable by design (security is enforced by App Check + Firestore rules).
