  const history = priorRounds || state.rounds || [];
  if (activeCourts >= 2 && history.length > 0) {
    const hist = {};  // slot → { courtNum: count }
    for (const r of history) {
      for (const g of gamesOf(r)) {
        const c = g.court || 1;
        for (const s of [...g.team1, ...g.team2]) {
          if (!hist[s]) hist[s] = {};
          hist[s][c] = (hist[s][c] || 0) + 1;
        }
      }
    }
    for (let c1 = 0; c1 < activeCourts - 1; c1++) {
      for (let c2 = c1 + 1; c2 < activeCourts; c2++) {
        for (const grp of ["a", "b"]) {
          const onC1 = courts[c1].filter(s => groupOf(s) === grp);
          const onC2 = courts[c2].filter(s => groupOf(s) === grp);
          let bestGain = 0, bestSwap = null;
          for (const s1 of onC1) {
            for (const s2 of onC2) {
              const h1 = (hist[s1] || {}), h2 = (hist[s2] || {});
              const c1Num = c1 + 1, c2Num = c2 + 1;
              const gain = ((h1[c1Num]||0) - (h1[c2Num]||0)) + ((h2[c2Num]||0) - (h2[c1Num]||0));
              if (gain > bestGain) { bestGain = gain; bestSwap = [s1, s2]; }
            }
          }
          if (bestSwap) {
            const [s1, s2] = bestSwap;
            courts[c1] = courts[c1].map(s => s === s1 ? s2 : s);
            courts[c2] = courts[c2].map(s => s === s2 ? s1 : s);
          }
        }
      }
    }
  }
  return courts;
}
// Computes the within-court pairing cost for a proposed team split.
// Lower = better. Used by pairMixedAware as the secondary sort key.
//   opts.history:  prior rounds (for repeat partner/opponent cost)
//   opts.chosen:   games already chosen this round (for intra-round cost)
//   opts.court:    court number for the game being formed
//   opts.stackBySlot: Map<slot, stackScore> (Stack format only)
//   opts.prevSameCourt: previous round's game on this court (Stack repeat check)
function pairingCost(t1, t2, opts) {
  opts = opts || {};
  // RR / King / Gauntlet: use the existing repeat-partner/opponent cost
  if (opts.stackBySlot) {
    // Stack: measure skill imbalance between teams + repeat penalty
    const s1 = (opts.stackBySlot.get(t1[0]) || 0) + (opts.stackBySlot.get(t1[1]) || 0);
    const s2 = (opts.stackBySlot.get(t2[0]) || 0) + (opts.stackBySlot.get(t2[1]) || 0);
    let cost = Math.abs(s1 - s2);
    if (opts.prevSameCourt) {
      const wasPair = (a, b) => {
        for (const t of [opts.prevSameCourt.team1, opts.prevSameCourt.team2]) {
          if (t.includes(a) && t.includes(b)) return true;
        }
        return false;
      };
      if (wasPair(t1[0], t1[1]) || wasPair(t2[0], t2[1])) cost += 1000;
    }
    return cost;
  }
  // Default: repeat cost via rrRoundCost
  const game = { court: opts.court || 1, team1: t1, team2: t2 };
  return rrRoundCost([...(opts.chosen || []), game], opts.history || []);
}

// Returns [team1, team2] — mixed-aware pairing for 4 slots on a court.
// Sorts candidate splits lexicographically: (badTeams, cost).
// When mixedMode is off, badTeams is always 0 → reduces to pure cost (byte-identical).
function pairMixedAware(four, opts) {
  const splits = rrTeamSplits(four);
  const scored = splits.map(([team1, team2]) => ({
    teams: [team1, team2],
    badTeams: mixedModeBadTeamCount([team1, team2]),
    cost: pairingCost(team1, team2, opts),
  }));
  scored.sort((a, b) => a.badTeams - b.badTeams || a.cost - b.cost);
  return scored[0].teams;
}

// Assigns players to courts via multi-restart search. Optimizes lexicographically:
//   (1) totalBadTeams — number of same-gender teams forced across all courts
//   (2) totalDeviation — sum of |assignedCourt - naturalCourt| per player
//   (3) repeatCost — rrRoundCost for the proposed games
// Returns { courts: Array<Array<slot>>, badTeams: number }.
function assignCourtsConstrained(playing, naturalCourt, activeCourts, history, rng) {
  if (!state.mixedMode || playing.length < activeCourts * 4) {
    // Fallback: simple slice (mixed off, or not enough players for full courts)
    const shuffled = seededShuffle(playing, rng);
    const courts = [];
    for (let c = 0; c < activeCourts; c++) courts.push(shuffled.slice(c * 4, c * 4 + 4));
    return { courts, badTeams: 0 };
  }
  let best = null;
  let bestKey = [Infinity, Infinity, Infinity];
  const restarts = 80;
  for (let attempt = 0; attempt < restarts; attempt++) {
    const shuffled = seededShuffle(playing, rng);
    const courts = [];
    for (let c = 0; c < activeCourts; c++) courts.push(shuffled.slice(c * 4, c * 4 + 4));
    // Score the assignment
    let badTeams = 0, deviation = 0;
    const games = [];
    for (let c = 0; c < activeCourts; c++) {
      const four = courts[c];
      if (four.length !== 4) continue;
      const [t1, t2] = pairMixedAware(four, { court: c + 1, history, chosen: games });
      games.push({ court: c + 1, team1: t1, team2: t2 });
      badTeams += mixedModeBadTeamCount([t1, t2]);
      for (const s of four) deviation += Math.abs((c + 1) - (naturalCourt[s] || (c + 1)));
    }
    const repeatCost = rrRoundCost(games, history);
    const key = [badTeams, deviation, repeatCost];
    if (key[0] < bestKey[0] || (key[0] === bestKey[0] && key[1] < bestKey[1]) ||
        (key[0] === bestKey[0] && key[1] === bestKey[1] && key[2] < bestKey[2])) {
      best = courts; bestKey = key;
    }
    if (bestKey[0] === 0 && bestKey[1] === 0) break;  // 0 badTeams + 0 deviation = perfect assignment
  }
  return { courts: best, badTeams: bestKey[0] };
}
function computeStackStats(throughRound) {
  const upTo = Math.min(throughRound || 0, state.rounds.length);
  let count = Math.max(playerCount(), (state.slots || []).length);
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    for (const g of gamesOf(r)) {
      [...g.team1, ...g.team2].forEach(slot => { if (slot > count) count = slot; });
    }
    byesOf(r).forEach(slot => { if (slot > count) count = slot; });
  }
  const stats = [];
  for (let s = 1; s <= count; s++) {
    stats.push({
      slot: s, name: nameOf(s),
      stackScore: 0,
      pointsScored: 0, pointsAgainst: 0,
      wins: 0, losses: 0,
      gp: 0, stackRate: 0, winRate: 0,
      gamesOnCourt1: 0, gamesOnCourt2: 0,
      courtClimbs: 0, courtDrops: 0,
      partnersUsed: new Set(),
      onePointGames: { wins: 0, losses: 0 },
    });
  }
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    const roundCourtCount = Math.max(1, gamesOf(r).length);
    for (const game of gamesOf(r)) {
      const courtKey = game.court || 1;
      const teams = [game.team1, game.team2];
      teams.forEach(t => {
        stats[t[0]-1].partnersUsed.add(t[1]);
        stats[t[1]-1].partnersUsed.add(t[0]);
        if (courtKey === 1) { stats[t[0]-1].gamesOnCourt1++; stats[t[1]-1].gamesOnCourt1++; }
        else                { stats[t[0]-1].gamesOnCourt2++; stats[t[1]-1].gamesOnCourt2++; }
      });
      // Only decided games contribute to the score/win tally — a tied score is
      // an in-progress game (the court/partner counters above are scheduling
      // facts and intentionally still count the current round).
      if (!isGameDecided(game)) continue;
      const t1Won = game.score1 > game.score2;
      const t2Won = game.score2 > game.score1;
      const margin = Math.abs(game.score1 - game.score2);
      for (const teamKey of ["team1", "team2"]) {
        const team = game[teamKey];
        const pts = teamKey === "team1" ? game.score1 : game.score2;
        const ag  = teamKey === "team1" ? game.score2 : game.score1;
        const won = (teamKey === "team1" && t1Won) || (teamKey === "team2" && t2Won);
        const lost = (teamKey === "team1" && t2Won) || (teamKey === "team2" && t1Won);
        const gain = stackScoreGain(pts, courtKey, roundCourtCount, won);
        for (const slot of team) {
          const st = stats[slot-1];
          st.stackScore += gain;
          st.pointsScored += pts;
          st.pointsAgainst += ag;
          st.gp++;
          if (won) st.wins++;
          if (lost) st.losses++;
          if (margin === 1) {
            if (won) st.onePointGames.wins++;
            else if (lost) st.onePointGames.losses++;
          }
        }
      }
    }
    // Climbs / drops: derived from the i → i+1 court transition (only after the
    // next round has actually been built).
    if (i + 1 < state.rounds.length) {
      const nextR = state.rounds[i + 1];
      const courtMap = round => {
        const map = new Map();
        gamesOf(round).forEach(g => [...g.team1, ...g.team2].forEach(slot => map.set(slot, g.court || 1)));
        return map;
      };
      const now = courtMap(r), next = courtMap(nextR);
      for (let s = 1; s <= stats.length; s++) {
        if (!now.has(s) || !next.has(s)) continue;
        if (next.get(s) < now.get(s)) stats[s-1].courtClimbs++;
        if (next.get(s) > now.get(s)) stats[s-1].courtDrops++;
      }
    }
  }
  stats.forEach(s => {
    s.stackRate = s.stackScore / Math.max(1, s.gp);
    s.winRate = s.wins / Math.max(1, s.gp);
  });
  return stats;
}

function tiebreakOrder(slot) {
  const tieRand = Array.isArray(state.tiebreakRandom) ? state.tiebreakRandom : [];
  const idx = tieRand.indexOf(slot - 1);
  return idx === -1 ? slot : idx;
}

// Sort by stack score descending, tiebreak by tiebreakRandom ordering of slots.
function rankPlayersStack(throughRound) {
  const stats = computeStackStats(throughRound);
  stats.sort((a, b) => {
    if (a.gp === 0 || b.gp === 0) {
      if (a.gp !== b.gp) return a.gp === 0 ? 1 : -1;
      return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
    }
    if (b.stackRate !== a.stackRate) return b.stackRate - a.stackRate;
    return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
  });
  return stats;
}

// Re-pair the four players assigned to a court for the next round.
//   slotsOnCourt:    the 4 slots that will play this court next round
//   prevSameCourt:   the prior round's game on THIS court (or null for round 1)
//   stackBySlot:     Map<slot, stackScore> at the time of pairing
// Returns [team1, team2], each a length-2 array of slots.
function pairForStackCourt(slotsOnCourt, prevSameCourt, stackBySlot) {
  const ranked = slotsOnCourt.slice().sort((a, b) => {
    const sa = stackBySlot.get(a) || 0;
    const sb = stackBySlot.get(b) || 0;
    if (sb !== sa) return sb - sa;
    return tiebreakOrder(a) - tiebreakOrder(b);
  });
  // Default: rank1 + rank4 vs rank2 + rank3
  let teamA = [ranked[0], ranked[3]];
  let teamB = [ranked[1], ranked[2]];
  if (prevSameCourt) {
    const wasPair = (a, b) => {
      for (const t of [prevSameCourt.team1, prevSameCourt.team2]) {
        if (t.includes(a) && t.includes(b)) return true;
      }
      return false;
    };
    if (wasPair(teamA[0], teamA[1]) || wasPair(teamB[0], teamB[1])) {
      // Swap rank-3 and rank-4 to break the repeat. Movement guarantees at most
      // one prior-round pair carries over, so this swap always breaks any
      // single repeat.
      teamA = [ranked[0], ranked[2]];
      teamB = [ranked[1], ranked[3]];
    }
  }
  return [teamA, teamB];
}

// Build the next stack round from the previous (which must be complete and
// non-tied — both score1 !== score2).
function buildNextLadderRound(prevRound, format) {
  if (!isRoundDecided(prevRound)) throw new Error("buildNextLadderRound called with undecided round");
  const round = prevRound.round + 1;
  const courtCount = ladderCourtCount(prevRound);
  const active = ladderActiveSlots(round, prevRound);
  const history = ladderHistoryThrough(prevRound.round);
  if (!history.length || history[history.length - 1] !== prevRound) history.push(prevRound);
  const rng = ladderRoundRng(round);
  const alloc = allocateByesMixed("losersSitCapped", {
    activeSlots: active,
    players: ladderPlayersFor(active),
    rounds: history,
    round,
    courtCount,
    rng,
  });
  const byeSet = new Set(alloc.byes);
  const seats = Array.from({ length: alloc.activeCourts }, () => []);
  const moversByTarget = new Map();
  const addMover = (slot, target, priority) => {
    if (byeSet.has(slot)) return;
    target = clampCourt(target, alloc.activeCourts);
    if (!moversByTarget.has(target)) moversByTarget.set(target, []);
    moversByTarget.get(target).push({ slot, target, priority, rand: rng() });
  };

  for (const g of gamesOf(prevRound)) {
    const winners = g.score1 > g.score2 ? g.team1 : g.team2;
    const losers = g.score1 > g.score2 ? g.team2 : g.team1;
    winners.forEach(slot => addMover(slot, (g.court || 1) - 1, 0));
    losers.forEach(slot => addMover(slot, (g.court || 1) + 1, 1));
  }

  const overflow = [];
  for (let court = 1; court <= alloc.activeCourts; court++) {
    const movers = (moversByTarget.get(court) || [])
      .sort((a, b) => a.priority - b.priority || a.rand - b.rand);
    while (movers.length && seats[court - 1].length < 4) seats[court - 1].push(movers.shift().slot);
    overflow.push(...movers);
  }
  overflow
    .sort((a, b) => a.priority - b.priority || a.rand - b.rand)
    .forEach(m => placeNearestCourt(seats, m.slot, m.target));

  const placed = new Set(seats.flat());
  const priorByes = new Set(byesOf(prevRound));
  const priorPlayed = new Set();
  gamesOf(prevRound).forEach(g => [...g.team1, ...g.team2].forEach(slot => priorPlayed.add(slot)));
  const beforePrev = history.filter(r => r !== prevRound && r.round !== prevRound.round);
  const returners = alloc.playing
    .filter(slot => !placed.has(slot))
    .map(slot => {
      const wasBye = priorByes.has(slot);
      const lastCourt = wasBye ? lastPlayedCourt(slot, beforePrev) : null;
      return {
        slot,
        target: clampCourt(lastCourt || alloc.activeCourts, alloc.activeCourts),
        priority: wasBye || priorPlayed.has(slot) ? 0 : 1,
        rand: rng(),
      };
    })
    .sort((a, b) => a.priority - b.priority || a.rand - b.rand);
  returners.forEach(r => placeNearestCourt(seats, r.slot, r.target));

  const games = [];
  const stackStats = format === "stack" ? computeStackStats(prevRound.round) : null;
  const stackBySlot = stackStats ? new Map(stackStats.map(s => [s.slot, s.stackScore])) : null;
  if (state.mixedMode) {
    // Mixed mode: use constrained assignment instead of movement-based seats
    const naturalCourt = {};
    const movers = new Map();  // slot → target court from movement
    for (const g of gamesOf(prevRound)) {
      const t1Won = g.score1 > g.score2;
      const winners = t1Won ? g.team1 : g.team2;
      const losers = t1Won ? g.team2 : g.team1;
      const court = g.court || 1;
      winners.forEach(s => movers.set(s, clampCourt(court - 1, alloc.activeCourts)));
      losers.forEach(s => movers.set(s, clampCourt(court + 1, alloc.activeCourts)));
    }
    alloc.playing.forEach(s => { if (!movers.has(s)) movers.set(s, Math.floor((alloc.activeCourts + 1) / 2)); });
    alloc.playing.forEach(s => { naturalCourt[s] = movers.get(s); });
    const result = assignCourtsConstrained(alloc.playing, naturalCourt, alloc.activeCourts, history, rng);
    for (let c = 0; c < result.courts.length; c++) {
      const four = result.courts[c];
      if (four.length !== 4) continue;
      const opts = format === "stack"
        ? { stackBySlot, prevSameCourt: gameForCourt(prevRound, c + 1) }
        : { history, chosen: games, court: c + 1 };
      const [t1, t2] = pairMixedAware(four, opts);
      games.push(makeGame(c + 1, t1, t2));
    }
  } else {
    for (let court = 1; court <= alloc.activeCourts; court++) {
      const slots = seats[court - 1];
      if (slots.length !== 4) continue;
      if (format === "stack") {
        const [team1, team2] = pairForStackCourt(slots, gameForCourt(prevRound, court), stackBySlot);
        games.push(makeGame(court, team1, team2));
      } else {
        const s = shuffle(slots);
        games.push(makeGame(court, [s[0], s[1]], [s[2], s[3]]));
      }
    }
  }
  return makeRound(round, games, alloc.byes);
}

function buildNextStackRound(prevRound) {
  return buildNextLadderRound(prevRound, "stack");
}

// === KING FORMAT ===
// Court 1 = King's Court (top). After each round: winners move/stay up, losers move/stay down.
// Random re-pairing on each court every round. Ranking = composite King Score.

function assignInitialKingCourts() {
  return assignInitialLadderCourts();
}

function computeKingStats(throughRound) {
  const count = statsSlotCount(throughRound, false);
  const stats = [];
  for (let s = 1; s <= count; s++) {
    stats.push({ slot: s, name: nameOf(s), wins: 0, pointsScored: 0, pointsAgainst: 0, kingCourtWins: 0, kingScore: 0,
      gp: 0, kingRate: 0, winRate: 0 });
  }
  const upTo = Math.min(throughRound || 0, state.rounds.length);
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    for (const game of gamesOf(r)) {
      const courtKey = game.court || 1;
      // Only decided games contribute to the score/win tally — a tied score is
      // an in-progress game (the court/partner counters above are scheduling
      // facts and intentionally still count the current round).
      if (!isGameDecided(game)) continue;
      const t1Won = game.score1 > game.score2;
      const t2Won = game.score2 > game.score1;
      for (const teamKey of ["team1", "team2"]) {
        const team = game[teamKey];
        const pts = teamKey === "team1" ? game.score1 : game.score2;
        const ag  = teamKey === "team1" ? game.score2 : game.score1;
        const won = (teamKey === "team1" && t1Won) || (teamKey === "team2" && t2Won);
        for (const slot of team) {
          const st = stats[slot - 1];
          st.pointsScored += pts;
          st.pointsAgainst += ag;
          st.gp++;
          if (won) {
            st.wins++;
            if (courtKey === 1) st.kingCourtWins++;
          }
        }
      }
    }
  }
  stats.forEach(s => { s.kingScore = s.wins + s.pointsScored + s.kingCourtWins; });
  stats.forEach(s => {
    s.kingRate = s.kingScore / Math.max(1, s.gp);
    s.winRate = s.wins / Math.max(1, s.gp);
  });
  return stats;
}

function rankPlayersKing(throughRound) {
  const stats = computeKingStats(throughRound);
  stats.sort((a, b) => {
    if (a.gp === 0 || b.gp === 0) {
      if (a.gp !== b.gp) return a.gp === 0 ? 1 : -1;
      return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
    }
    if (b.kingRate !== a.kingRate) return b.kingRate - a.kingRate;
    return tiebreakOrder(a.slot) - tiebreakOrder(b.slot);
  });
  return stats;
}

function buildNextKingRound(prevRound) {
  return buildNextLadderRound(prevRound, "king");
}

function kingMovementToastText(prevRound) {
  const c1 = gameForCourt(prevRound, 1), c2 = gameForCourt(prevRound, 2);
  if (!c1 || !c2 || gamesOf(prevRound).length !== 2) return "Next round ready";
  const c2Win  = c2.score1 > c2.score2 ? c2.team1 : c2.team2;
  const c1Lose = c1.score1 > c1.score2 ? c1.team2 : c1.team1;
  return teamName(c2Win) + " climb to King's Court · " + teamName(c1Lose) + " drop to Bottom";
}

// === GAUNTLET FORMAT ===
// Re-rank all 8 after every round. Court 1: #1+#4 vs #2+#3; Court 2: #5+#8 vs #6+#7.
// Reuses existing rankPlayers() (Adjusted Margin → win rate → h2h) — no new stats needed.

function buildGauntletPairing(ranked, roundNum) {
  const active = ladderActiveSlots(roundNum, null);
  const activeSet = new Set(active.length ? active : ranked);
  const rankedActive = ranked.filter(slot => activeSet.has(slot));
  const rng = ladderRoundRng(roundNum);
  const alloc = allocateByesMixed("rotation", {
    activeSlots: [...activeSet].sort((a, b) => a - b),
    players: ladderPlayersFor([...activeSet]),
    rounds: ladderHistoryThrough(roundNum - 1),
    round: roundNum,
    courtCount: ladderCourtCount(null),
    rng,
  });
  const playing = rankedActive.filter(slot => !alloc.byes.includes(slot));
  const games = [];
  if (state.mixedMode) {
    const naturalCourt = {};
    playing.forEach((s, i) => { naturalCourt[s] = Math.floor(i / 4) + 1; });
    const result = assignCourtsConstrained(playing, naturalCourt, alloc.activeCourts,
      ladderHistoryThrough(roundNum - 1), rng);
    for (let c = 0; c < result.courts.length; c++) {
      const four = result.courts[c];
      if (four.length !== 4) continue;
      const [t1, t2] = pairMixedAware(four, { history: ladderHistoryThrough(roundNum - 1), chosen: games, court: c + 1 });
      games.push(makeGame(c + 1, t1, t2));
    }
  } else {
    for (let c = 0; c < alloc.activeCourts; c++) {
      const block = playing.slice(c * 4, c * 4 + 4);
      if (block.length === 4) games.push(makeGame(c + 1, [block[0], block[3]], [block[1], block[2]]));
    }
  }
  return makeRound(roundNum, games, alloc.byes);
}

function assignInitialGauntletCourts() {
  const ranked = ladderActiveSlots(1, null).slice()
    .sort((a, b) => tiebreakOrder(a) - tiebreakOrder(b));
  return buildGauntletPairing(ranked, 1);
}

function buildNextGauntletRound(prevRound) {
  const activeSet = new Set(ladderActiveSlots(prevRound.round + 1, prevRound));
  const ranked = rankPlayers(prevRound.round).map(s => s.slot).filter(slot => activeSet.has(slot));
  return buildGauntletPairing(ranked, prevRound.round + 1);
}

// ---------- Crown Court logic ----------

// Takes winner's games won first, loser's games won second — caller resolves who won.
function matchPointsForMatch(gamesWonWinner, gamesWonLoser, theme) {
  const m = (CROWN_THEMES[theme] || {}).matchPointMultiplier || 1;
  if (gamesWonWinner === 2 && gamesWonLoser === 0) return { perWinner: 3 * m, perLoser: 0 };
  if (gamesWonWinner === 2 && gamesWonLoser === 1) return { perWinner: 2 * m, perLoser: 1 * m };
  return { perWinner: 0, perLoser: 0 };
}

function isValidCrownGameScore(s1, s2, theme, matchIdx) {
  if (s1 < 0 || s2 < 0) return false;
  const cfg = (matchIdx != null && state.timeBudget?.crownActiveThemes?.[matchIdx])
    || CROWN_THEMES[theme];
  if (!cfg) return true; // unknown theme: advisory only
  const winner = Math.max(s1, s2);
  const diff = Math.abs(s1 - s2);
  return winner >= cfg.winScore && diff >= cfg.winBy;
}

function crownGamesWon(match, maxGames, matchIdx) {
  const theme = match.theme; // set on match objects; undefined for test fixtures (no validation)
  let w1 = 0, w2 = 0;
  const games = maxGames != null ? match.games.slice(0, maxGames) : match.games;
  for (const g of games) {
    if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
    if (g.score1 === g.score2) break;
    if (theme && !isValidCrownGameScore(g.score1, g.score2, theme, matchIdx)) break;
    if (g.score1 > g.score2) w1++;
    else w2++;
    if (w1 === 2 || w2 === 2) break;
  }
  return { gamesWon1: w1, gamesWon2: w2 };
}

function isCrownMatchComplete(match) {
  // Rely solely on crownGamesWon reaching 2 wins — this enforces theme winScore/winBy via
  // isValidCrownGameScore. A 1-1 tie resolves only when game 3 produces a valid, non-equal score.
  const mi = state.crownMatches ? state.crownMatches.indexOf(match) : -1;
  const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi >= 0 ? mi : undefined);
  return gamesWon1 === 2 || gamesWon2 === 2;
}

function crownMatchWinner(match) {
  if (!isCrownMatchComplete(match)) return null;
  const mi = state.crownMatches ? state.crownMatches.indexOf(match) : -1;
  const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi >= 0 ? mi : undefined);
  if (gamesWon1 === gamesWon2) return null;
  return gamesWon1 > gamesWon2 ? "team1" : "team2";
}

function crownPlayerStats() {
  const stats = [1,2,3,4].map(slot => ({
    slot, name: nameOf(slot),
    matchPoints: 0,
    gamesWon: 0, gamesLost: 0,
    pointsScored: 0, pointDiff: 0,
  }));
  state.crownMatches.forEach((match, mi) => {
    if (!isCrownMatchComplete(match)) return;
    const { gamesWon1, gamesWon2 } = crownGamesWon(match, undefined, mi);
    const theme = CROWN_SCHEDULE[mi].theme;
    const winner = crownMatchWinner(match);
    if (!winner) return; // defensive: complete match always has a winner, but guard null explicitly
    const winTeam  = winner === "team1" ? match.team1 : match.team2;
    const loseTeam = winner === "team1" ? match.team2 : match.team1;
    const winGames = winner === "team1" ? gamesWon1 : gamesWon2;
    const loseGames = winner === "team1" ? gamesWon2 : gamesWon1;
    const pts = matchPointsForMatch(winGames, loseGames, theme);
    for (const slot of winTeam)  { stats[slot-1].matchPoints += pts.perWinner; }
    for (const slot of loseTeam) { stats[slot-1].matchPoints += pts.perLoser; }
    // Accumulate game stats using the same boundary as crownGamesWon (theme-aware)
    const games = [];
    let _w1 = 0, _w2 = 0;
    for (const g of match.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (match.theme && !isValidCrownGameScore(g.score1, g.score2, match.theme, mi)) break;
      games.push(g);
      if (g.score1 > g.score2) _w1++; else if (g.score2 > g.score1) _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
    for (const g of games) {
      for (const slot of match.team1) {
        stats[slot-1].pointsScored += g.score1;
        stats[slot-1].pointDiff    += (g.score1 - g.score2);
        if (g.score1 > g.score2) stats[slot-1].gamesWon++; else if (g.score2 > g.score1) stats[slot-1].gamesLost++;
      }
      for (const slot of match.team2) {
        stats[slot-1].pointsScored += g.score2;
        stats[slot-1].pointDiff    += (g.score2 - g.score1);
        if (g.score2 > g.score1) stats[slot-1].gamesWon++; else if (g.score1 > g.score2) stats[slot-1].gamesLost++;
      }
    }
  });
  return stats;
}

function crownLeaderboard() {
  const stats = crownPlayerStats();
  return stats.sort((a, b) => {
    if (b.matchPoints !== a.matchPoints) return b.matchPoints - a.matchPoints;
    if (b.pointsScored !== a.pointsScored) return b.pointsScored - a.pointsScored;
    if (b.pointDiff !== a.pointDiff) return b.pointDiff - a.pointDiff;
    return state.tiebreakRandom[a.slot-1] - state.tiebreakRandom[b.slot-1];
  });
}

function crownPairings(lb) {
  // rank 1 partners rank 4; rank 2 partners rank 3
  const team1 = [lb[0].slot, lb[3].slot];
  const team2 = [lb[1].slot, lb[2].slot];
  return { team1, team2 };
}

function finalRankingCrown() {
  if (!state.crownFinal || !isCrownMatchComplete(state.crownFinal)) {
    return crownLeaderboard();
  }
  const winner = crownMatchWinner(state.crownFinal);
  const crownWinTeam  = winner === "team1" ? state.crownFinal.team1 : (winner === "team2" ? state.crownFinal.team2 : null);
  const crownLoseTeam = winner === "team1" ? state.crownFinal.team2 : (winner === "team2" ? state.crownFinal.team1 : null);
  if (!crownWinTeam || !crownLoseTeam) return crownLeaderboard();

  const stats = crownPlayerStats();
  const { gamesWon1: cw1, gamesWon2: cw2 } = crownGamesWon(state.crownFinal);
  const crownWinGames  = winner === "team1" ? cw1 : cw2;
  const crownLoseGames = winner === "team1" ? cw2 : cw1;
  const crownPts = matchPointsForMatch(crownWinGames, crownLoseGames, "Crown");
  for (const slot of crownWinTeam)  stats[slot-1].matchPoints += crownPts.perWinner;
  for (const slot of crownLoseTeam) stats[slot-1].matchPoints += crownPts.perLoser;

  const crownFinalValidGames = [];
  { let _cw1 = 0, _cw2 = 0;
    for (const g of state.crownFinal.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;
      crownFinalValidGames.push(g);
      if (g.score1 > g.score2) _cw1++; else if (g.score2 > g.score1) _cw2++;
      if (_cw1 === 2 || _cw2 === 2) break;
    }
  }
  for (const g of crownFinalValidGames) {
    const t1win = g.score1 > g.score2;
    for (const slot of state.crownFinal.team1) {
      stats[slot-1].pointsScored += g.score1;
      stats[slot-1].pointDiff    += (g.score1 - g.score2);
      if (t1win) stats[slot-1].gamesWon++; else if (g.score2 > g.score1) stats[slot-1].gamesLost++;
    }
    for (const slot of state.crownFinal.team2) {
      stats[slot-1].pointsScored += g.score2;
      stats[slot-1].pointDiff    += (g.score2 - g.score1);
      if (g.score2 > g.score1) stats[slot-1].gamesWon++; else if (g.score1 > g.score2) stats[slot-1].gamesLost++;
    }
  }

  const sortWithin = (team) => team.slice().sort((a, b) => {
    const sa = stats[a-1], sb = stats[b-1];
    if (sb.matchPoints !== sa.matchPoints) return sb.matchPoints - sa.matchPoints;
    if (sb.pointsScored !== sa.pointsScored) return sb.pointsScored - sa.pointsScored;
    if (sb.pointDiff !== sa.pointDiff) return sb.pointDiff - sa.pointDiff;
    return state.tiebreakRandom[a-1] - state.tiebreakRandom[b-1];
  });

    const ordered = [...sortWithin(crownWinTeam), ...sortWithin(crownLoseTeam)];
    return ordered.map(slot => ({ ...stats[slot-1] }));
  }

  function shuffleRevealForRound(round) {
    const display = [];
    const groups = [];
    for (const g of gamesOf(round)) {
      const slots = [...(g.team1 || []), ...(g.team2 || [])];
      display.push(...slots.map(nameOf));
      groups.push({ label: shuffleRevealLabel(g.court || 1), count: slots.length });
    }
    const byes = byesOf(round);
    if (byes.length) {
      display.push(...byes.map(nameOf));
      groups.push({ label: "Sitting", count: byes.length });
    }
    return { display, groups };
  }

  function startTournament() {
    // No syncKeepAwakeToState() here — this function mutates state in-place rather than
    // replacing it, so keepAwake settings are already live. syncKeepAwakeToState() is only
    // needed after full state replacements (e.g. newState(), format-switch, data-clear).
    const isCrown = state.format === "crown";
    const setupCount = setupRosterCount();
    ensureSetupRosterArrays(setupCount);
    const rawEntries = (state.rawNames || []).map((name, i) => ({
      name: (name || "").trim(),
      phone: (state.rawPhones || [])[i] || "",
    }));
    let entries;
    if (isCrown) {
      entries = rawEntries.slice(0, 4);
    } else {
      entries = rawEntries.slice(0, setupCount);
    }
  const count = entries.length;
  const names = entries.map(e => e.name);
  const shuffled = shuffle(names);
  // Map each (trimmed, unique) name to its normalized phone for post-shuffle alignment.
  const phoneByName = {};
  entries.forEach(e => { if (e.name) phoneByName[e.name] = normalizePhone(e.phone || ""); });
  // Populate slotGroups from rawGroups via name lookup (must run BEFORE schedule generation)
  if (state.mixedMode) {
    const groupByName = {};
    entries.forEach((e, i) => { if (e.name) groupByName[e.name] = (state.rawGroups || [])[i] || ""; });
    state.slotGroups = shuffled.map(name => groupByName[name] || "");
  }

  state.scheduleSeed = makeScheduleSeed();
  state.startedAt = Date.now();
  state.tournamentId = state.scheduleSeed + "-" + state.startedAt;   // stable id for lifetime records
  state.tiebreakRandom = shuffle(Array.from({ length: count }, (_, i) => i));
  state.currentRound = 1;
  if (state.timeBudget && state.timeBudget.enabled) {
    state.timeBudget.startedAt = Date.now();
  }
  state.notifiedRounds = [];
  state.awardsShown = false;
  state.previousRanks = [];
  state.finals = null;

  if (isCrown) {
    state.crownMatches = CROWN_SCHEDULE.map(s => ({
      team1: s.team1.slice(),
      team2: s.team2.slice(),
      theme: s.theme,
      games: [
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
      ],
    }));
    state.currentMatch = 0;
    state.crownFinal = null;
    if (state.timeBudget?.enabled && state.timeBudget.plannedConfig?.preset) {
      const presetObj = CROWN_PRESETS.find(p => p.name === state.timeBudget.plannedConfig.preset);
      if (presetObj) {
        state.timeBudget.crownActiveThemes = presetObj.matches.map(m => ({
          winScore: m.target, winBy: m.winBy, scoring: m.scoring,
        }));
      }
    }
    // slots always stays 8 elements so nameOf()/format-switching never breaks
    state.slots = [...shuffled, "", "", "", ""];
    writePlayersFromSlots(count, phoneByName);
    state.phase = "playing";
    save();
    runShuffleReveal(shuffled.slice(), () => render());
    } else if (state.format === "stack") {
      state.slots = shuffled;
      writePlayersFromSlots(count, phoneByName);
      state.rounds = [assignInitialStackCourts()];
      state.phase = "playing";
      save();
      const reveal = shuffleRevealForRound(state.rounds[0]);
      runShuffleReveal(reveal.display, () => render(), {
        title: "Drawing courts…",
        groups: reveal.groups,
      });
    } else if (state.format === "king") {
      state.slots = shuffled;
      writePlayersFromSlots(count, phoneByName);
      state.rounds = [assignInitialKingCourts()];
      state.phase = "playing";
      save();
      const reveal = shuffleRevealForRound(state.rounds[0]);
      runShuffleReveal(reveal.display, () => render(), {
        title: "Drawing courts…",
        groups: reveal.groups,
      });
    } else if (state.format === "gauntlet") {
      state.slots = shuffled;
      writePlayersFromSlots(count, phoneByName);
      state.rounds = [assignInitialGauntletCourts()];
      state.phase = "playing";
      save();
      const reveal = shuffleRevealForRound(state.rounds[0]);
      runShuffleReveal(reveal.display, () => render(), {
        title: "Drawing courts…",
        groups: reveal.groups,
      });
  } else {
    state.slots = shuffled;
    writePlayersFromSlots(count, phoneByName);
    if (count === 8 && state.courtCount === 2 && !state.mixedMode) {
      state.rrScheduleMode = "wh8";
      state.rrRounds = 7;
      state.rounds = generateRounds();
    } else {
      state.rrScheduleMode = "generated";
      state.rrRounds = Math.max(4, Math.min(12, parseInt(state.rrRounds, 10) || 7));
      state.rounds = generateRRSchedule(
        Array.from({ length: count }, (_, i) => i + 1),
        state.courtCount,
        state.rrRounds,
        [],
        mulberry32(state.scheduleSeed)
      );
    }
    state.phase = "playing";
    save();
    runShuffleReveal(state.slots.slice(), () => render());
  }
  // Derive per-slot phones from the final slot order, and remember name→phone in the roster.
  entries.forEach(e => saveRosterEntry(e.name, e.phone || ""));
  save();
}

// ---------- phone / SMS utilities ----------
function normalizePhone(raw) {
  if (typeof raw !== "string") return "";
  const trimmed = raw.trim();
  const lead = trimmed.startsWith("+") ? "+" : "";
  return lead + trimmed.replace(/\D/g, "");
}
function isValidPhone(raw) {
  return normalizePhone(raw).replace(/\D/g, "").length >= 7;
}
function smsHref(phone, body) {
  const tail = body ? "?body=" + encodeURIComponent(body) : "";
  return "sms:" + normalizePhone(phone) + tail;
}

const ROSTER_KEY = "pb_roster_v1";
function loadRoster() {
  try {
    const r = JSON.parse(localStorage.getItem(ROSTER_KEY) || "{}");
    return (r && typeof r === "object" && !Array.isArray(r)) ? r : {};
  } catch (e) { return {}; }
}
function rosterPhoneFor(name) {
  if (!name) return "";
  return loadRoster()[name.trim().toLowerCase()] || "";
}
function saveRosterEntry(name, phone) {
  const key = (name || "").trim().toLowerCase();
  if (!key) return;
  const roster = loadRoster();
  if (isValidPhone(phone)) roster[key] = normalizePhone(phone);
  else delete roster[key];
  try { localStorage.setItem(ROSTER_KEY, JSON.stringify(roster)); } catch (e) {}
}
function deleteRosterEntry(name) {
  const key = (name || "").trim().toLowerCase();
  const roster = loadRoster();
  delete roster[key];
  try { localStorage.setItem(ROSTER_KEY, JSON.stringify(roster)); } catch (e) {}
}
function clearRoster() {
  try { localStorage.removeItem(ROSTER_KEY); } catch (e) {}
}

function textResultsSupported() {
  return state.format === "rr" || state.format === "gauntlet";
}

function buildPersonalRecap(slot, opts) {
  opts = opts || {};
  const isFinal = !!opts.final;
  const through = isFinal ? totalRegularRounds() : (opts.throughRound || state.currentRound || totalRegularRounds());
  const ranking = state.format === "crown"
    ? finalRankingCrown()
    : (isFinal ? finalRanking() : rankPlayersForFormat(through));
  const rankIdx = ranking.findIndex(s => s.slot === slot);
  let stats;
  if (state.format === "stack") stats = computeStackStats(through);
  else if (state.format === "king") stats = computeKingStats(through);
  else if (state.format === "crown") stats = crownPlayerStats();
  else stats = computeStats(through, isFinal);
  const st = stats.find(s => s.slot === slot) || { slot, name: nameOf(slot), gp: 0, wins: 0, losses: 0 };

  let wins = Number.isFinite(st.wins) ? st.wins : (Number.isFinite(st.gamesWon) ? st.gamesWon : 0);
  let losses = Number.isFinite(st.losses) ? st.losses : (Number.isFinite(st.gamesLost) ? st.gamesLost : 0);
  let ties = 0;
  const partners = new Map();
  let bestWin = null;
  let closestLoss = null;
  let byeCount = 0;
  let sameGroupPartnerSlot = null;  // first same-group partner (mixed best-effort fallback)
  const scanRound = (round, roundNum) => {
    if (byesOf(round).includes(slot)) byeCount++;
    gamesOf(round).forEach(g => {
      const on1 = (g.team1 || []).includes(slot);
      const on2 = (g.team2 || []).includes(slot);
      if (!on1 && !on2) return;
      const team = on1 ? g.team1 : g.team2;
      const partner = team.find(s => s !== slot);
      if (partner) partners.set(partner, (partners.get(partner) || 0) + 1);
      if (state.mixedMode && !isMixedTeam(team) && partner && sameGroupPartnerSlot === null) {
        sameGroupPartnerSlot = partner;
      }
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) return;
      if (g.score1 === g.score2) { ties++; return; }
      const myScore = on1 ? g.score1 : g.score2;
      const oppScore = on1 ? g.score2 : g.score1;
      const diff = myScore - oppScore;
      const entry = { round: roundNum, court: g.court || 1, diff: Math.abs(diff), score: myScore + "-" + oppScore };
      if (diff > 0 && (!bestWin || diff > bestWin.diff)) bestWin = { ...entry, diff };
      if (diff < 0 && (!closestLoss || Math.abs(diff) < closestLoss.diff)) closestLoss = entry;
    });
  };
  for (let i = 0; i < Math.min(through, state.rounds.length); i++) scanRound(state.rounds[i], i + 1);
  if (isFinal && state.finals) {
    finalTiers().forEach((g, i) => scanRound({ games: [g], byes: [] }, "F" + (i + 1)));
  }

  const mostCommonPartnerSlot = [...partners.entries()].sort((a, b) => b[1] - a[1] || a[0] - b[0])[0];
  const gp = Number.isFinite(st.gp) ? st.gp : (wins + losses + ties);
  const points = Number.isFinite(st.points) ? st.points : (Number.isFinite(st.pointsScored) ? st.pointsScored : 0);
  const diff = Number.isFinite(st.diff) ? st.diff : (Number.isFinite(st.pointDiff) ? st.pointDiff : 0);
  const avgPoints = Number.isFinite(st.avgPoints) ? st.avgPoints : points / Math.max(1, gp);
  const avgDiff = Number.isFinite(st.avgDiff) ? st.avgDiff : diff / Math.max(1, gp);
  if (!losses && gp > wins + ties) losses = gp - wins - ties;
  const name = nameOf(slot);
  const rank = rankIdx >= 0 ? rankIdx + 1 : null;
  const fieldSize = ranking.length || playerCount();
  const record = wins + "-" + losses + (ties ? "-" + ties : "");
  const partnerName = mostCommonPartnerSlot ? nameOf(mostCommonPartnerSlot[0]) : "";
  const headlineBits = [
    "You finished " + (rank ? ordinal(rank) : "unranked"),
    "went " + record
  ];
  if (bestWin) headlineBits.push("best win was Round " + bestWin.round);
  if (partnerName) headlineBits.push("most common partner was " + partnerName);
  return {
    slot, name, rank, fieldSize, gp, wins, losses, ties, record,
    avgPoints, avgDiff, bestWin, closestLoss,
    mostCommonPartner: mostCommonPartnerSlot ? { slot: mostCommonPartnerSlot[0], name: partnerName, games: mostCommonPartnerSlot[1] } : null,
    sameGroupPartner: sameGroupPartnerSlot ? { slot: sameGroupPartnerSlot, name: nameOf(sameGroupPartnerSlot) } : null,
    byeCount, headline: headlineBits.join(", ") + ".", awards: []
  };
}

function ordinal(n) {
  const v = n % 100;
  if (v >= 11 && v <= 13) return n + "th";
  const suffix = n % 10 === 1 ? "st" : (n % 10 === 2 ? "nd" : (n % 10 === 3 ? "rd" : "th"));
  return n + suffix;
}

function shareCardEscape(text) {
  return String(text == null ? "" : text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function buildShareCardModel(type, opts) {
  opts = opts || {};
  const title = opts.title || (type === "round" ? "Round Recap" : type === "player" ? "Player Recap" : "Rumble Pickleball");
  const lines = [];
  let footer = opts.footer || "Rumble Pickleball";
  if (type === "round") {
    const roundNum = opts.round || state.currentRound || 1;
    const round = state.rounds[roundNum - 1];
    lines.push("Round " + roundNum);
    gamesOf(round).forEach(g => {
      const score = (Number.isInteger(g.score1) ? g.score1 : "–") + "-" + (Number.isInteger(g.score2) ? g.score2 : "–");
      const winner = isGameDecided(g) ? (g.score1 > g.score2 ? teamName(g.team1) : teamName(g.team2)) : "in progress";
      lines.push("Court " + (g.court || 1) + ": " + winner + " · " + score);
    });
    const byes = byesOf(round);
    if (byes.length) lines.push("Sitting: " + byes.map(nameOf).join(", "));
    footer = "Standings through Round " + roundNum;
  } else if (type === "player") {
    const slot = opts.slot || 1;
    const recap = buildPersonalRecap(slot, { final: state.phase === "done", throughRound: opts.throughRound || state.currentRound });
    lines.push(recap.name);
    lines.push(recap.headline);
    lines.push("Record: " + recap.record + " · GP " + recap.gp);
    if (recap.bestWin) lines.push("Best win: Round " + recap.bestWin.round + " (" + recap.bestWin.score + ")");
    if (recap.mostCommonPartner) lines.push("Most common partner: " + recap.mostCommonPartner.name);
    if (recap.sameGroupPartner) lines.push("You teamed with " + recap.sameGroupPartner.name + " (same group — not enough of the other group to pair everyone).");
    if (recap.byeCount) lines.push("Byes: " + recap.byeCount);
  } else {
    const ranking = state.format === "crown" ? finalRankingCrown() : finalRanking();
    const champ = finalTier(0);
    const champWin = champ && champ.score1 > champ.score2 ? champ.team1 : (champ && champ.score2 > champ.score1 ? champ.team2 : null);
    if (champWin) lines.push("Champions: " + teamName(champWin));
    ranking.slice(0, opts.topCount || 6).forEach((s, i) => {
      lines.push((i + 1) + ". " + s.name);
    });
    footer = playerCount() + " players · " + effectiveCourtCountForFormat(state.format, state.courtCount) + " courts";
  }
  return { type: type || "podium", title, lines, footer };
}

function renderShareCardSvg(model) {
  const width = 1080, height = 1350;
  const lines = (model.lines || []).slice(0, 16);
  const bg = "#111827", panel = "#1f2937", text = "#f9fafb", muted = "#cbd5e1", gold = "#fbbf24";
  const lineNodes = lines.map((line, i) => {
    const size = i === 0 && model.type !== "podium" ? 48 : 38;
    return '<text x="96" y="' + (338 + i * 64) + '" font-size="' + size + '" font-weight="' + (i === 0 ? "800" : "600") + '" fill="' + text + '">' +
      shareCardEscape(line).slice(0, 76) + '</text>';
  }).join("");
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '">' +
    '<rect width="1080" height="1350" rx="0" fill="' + bg + '"/>' +
    '<rect x="54" y="54" width="972" height="1242" rx="36" fill="' + panel + '" stroke="' + gold + '" stroke-width="6"/>' +
    '<text x="96" y="150" font-size="34" font-weight="800" fill="' + gold + '">RUMBLE PICKLEBALL</text>' +
    '<text x="96" y="238" font-size="66" font-weight="900" fill="' + text + '">' + shareCardEscape(model.title).slice(0, 36) + '</text>' +
    lineNodes +
    '<text x="96" y="1228" font-size="30" font-weight="700" fill="' + muted + '">' + shareCardEscape(model.footer || "Rumble").slice(0, 72) + '</text>' +
    '</svg>';
}

function shareCardFileName(model, ext) {
  return "rumble-" + (model.type || "card") + "-" + Date.now() + "." + ext;
}

function downloadShareCard(model, format) {
  const svg = renderShareCardSvg(model);
  if (format === "png") {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 1080; canvas.height = 1350;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(img.src);
      canvas.toBlob(blob => downloadBlob(blob, shareCardFileName(model, "png")), "image/png");
    };
    img.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
  } else {
    downloadBlob(new Blob([svg], { type: "image/svg+xml" }), shareCardFileName(model, "svg"));
  }
}

function downloadBlob(blob, name) {
  if (!blob) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

function copyShareCardImage(model) {
  if (!navigator.clipboard || !window.ClipboardItem) {
    showToast("Image copy is not available here — download instead.");
    return;
  }
  const svg = renderShareCardSvg(model);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = 1080; canvas.height = 1350;
    canvas.getContext("2d").drawImage(img, 0, 0);
    URL.revokeObjectURL(img.src);
    canvas.toBlob(blob => {
      navigator.clipboard.write([new ClipboardItem({ "image/png": blob })])
        .then(() => showToast("Share card copied"))
        .catch(() => showToast("Copy failed — download instead."));
    }, "image/png");
  };
  img.src = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));
}

function formatNameForSnapshot(format) {
  return ({ rr: "Round Robin", stack: "Stack", king: "King", gauntlet: "Gauntlet", crown: "Crown" })[format] || "Round Robin";
}

function buildTournamentSnapshot(kind, opts) {
  opts = opts || {};
  const now = opts.now || Date.now();
  const through = state.phase === "done" || state.phase === "finals" ? totalRegularRounds() : Math.max(0, state.currentRound || 0);
  const final = state.phase === "done";
  const ranking = state.format === "crown"
    ? (final ? finalRankingCrown() : crownLeaderboard())
    : (final ? finalRanking() : rankPlayersForFormat(through));
  const stats = state.format === "stack" ? computeStackStats(through)
    : state.format === "king" ? computeKingStats(through)
      : state.format === "crown" ? crownPlayerStats()
        : computeStats(through, final);
  const bySlot = new Map(stats.map(s => [s.slot, s]));
  // RR/Gauntlet rank by Adjusted Margin, so show AM (regular rounds) as the score.
  const marginBySlot = (state.format === "rr" || state.format === "gauntlet")
    ? new Map(computeMarginStats(through).map(s => [s.slot, s.adjScore]))
    : new Map();
  const round = state.rounds[(state.currentRound || 1) - 1];
  const courts = gamesOf(round).map(g => ({
    court: g.court || 1,
    team1: (g.team1 || []).map(nameOf),
    team2: (g.team2 || []).map(nameOf),
    score1: Number.isInteger(g.score1) ? g.score1 : null,
    score2: Number.isInteger(g.score2) ? g.score2 : null
  }));
  const finals = state.finals ? finalTiers().map(g => ({
    name: g.name || "Final",
    court: g.court || 1,
    team1: (g.team1 || []).map(nameOf),
    team2: (g.team2 || []).map(nameOf),
    score1: Number.isInteger(g.score1) ? g.score1 : null,
    score2: Number.isInteger(g.score2) ? g.score2 : null
  })) : [];
  const podium = ranking.slice(0, 3).map((s, i) => ({ rank: i + 1, name: s.name || nameOf(s.slot) }));
  return {
    v: 1,
    createdAt: now,
    phase: state.phase,
    format: state.format,
    title: "Rumble Pickleball",
    summary: formatNameForSnapshot(state.format) + " · " + playerCount() + " players · " +
      effectiveCourtCountForFormat(state.format, state.courtCount) + " courts",
    standings: ranking.map((s, i) => {
      const st = bySlot.get(s.slot) || s;
      return {
        rank: i + 1,
        name: s.name || nameOf(s.slot),
        gp: st.gp || 0,
        score: marginBySlot.has(s.slot) ? marginBySlot.get(s.slot).toFixed(1)
          : Number.isFinite(st.stackRate) ? st.stackRate.toFixed(1)
            : Number.isFinite(st.kingRate) ? st.kingRate.toFixed(1)
              : Number.isFinite(st.matchPoints) ? st.matchPoints.toFixed(1) : ""
      };
    }),
    currentRound: state.currentRound || 0,
    courts,
    byes: byesOf(round).map(nameOf),
    finals,
    podium,
    kind: kind || "snapshot"
  };
}

function encodeSnapshotHash(payload) {
  const json = JSON.stringify(payload);
  const bytes = new TextEncoder().encode(json);
  let bin = "";
  bytes.forEach(b => { bin += String.fromCharCode(b); });
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
}

function decodeSnapshotHash(hash) {
  const clean = String(hash || "").replace(/^#?snapshot=/, "").replace(/-/g, "+").replace(/_/g, "/");
  const padded = clean + "=".repeat((4 - clean.length % 4) % 4);
  const bin = atob(padded);
  const bytes = Uint8Array.from(bin, ch => ch.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}

function snapshotUrl(payload) {
  const base = location.origin + location.pathname;
  return base + "#snapshot=" + encodeSnapshotHash(payload);
}

const QR_M_TABLE = [
  null,
  { total: 26, data: 16, ecc: 10, blocks: 1, align: [] },
  { total: 44, data: 28, ecc: 16, blocks: 1, align: [6, 18] },
  { total: 70, data: 44, ecc: 26, blocks: 1, align: [6, 22] },
  { total: 100, data: 64, ecc: 18, blocks: 2, align: [6, 26] },
  { total: 134, data: 86, ecc: 24, blocks: 2, align: [6, 30] },
  { total: 172, data: 108, ecc: 16, blocks: 4, align: [6, 34] },
  { total: 196, data: 124, ecc: 18, blocks: 4, align: [6, 22, 38] },
];

let _qrExp = null, _qrLog = null;
function qrInitGf() {
  if (_qrExp) return;
  _qrExp = Array(512).fill(0);
  _qrLog = Array(256).fill(0);
  let x = 1;
  for (let i = 0; i < 255; i++) {
    _qrExp[i] = x;
    _qrLog[x] = i;
    x <<= 1;
    if (x & 0x100) x ^= 0x11d;
  }
  for (let i = 255; i < 512; i++) _qrExp[i] = _qrExp[i - 255];
}
function qrMul(a, b) {

  return _qrExp[_qrLog[a] + _qrLog[b]];
}
function qrRsGenerator(degree) {

}
function qrRsRemainder(data, degree) {

function qrBitsForText(text, dataCodewords) {

  const push = (val, len) => { for (let i = len - 1; i >= 0; i--) bits.push((val >>> i) & 1); };
  push(0x4, 4);
  push(bytes.length, 8);
  bytes.forEach(b => push(b, 8));

  for (let i = 0; i < 4 && bits.length < max; i++) bits.push(0);
  while (bits.length % 8) bits.push(0);

  for (let i = 0; i < bits.length; i += 8) {
    let b = 0;
    for (let j = 0; j < 8; j++) b = (b << 1) | bits[i + j];
    codewords.push(b);
  }

}
function qrFormatBits() {

function qrMatrixForText(text) {

    const c = QR_M_TABLE[v];

    for (let y = -1; y <= 7; y++) for (let x = -1; x <= 7; x++) {
      const rr = r + y, cc = c + x;

    if (overlapsFinder(r, c)) return;
    for (let y = -2; y <= 2; y++) for (let x = -2; x <= 2; x++) {

  for (let i = 0; i < cfg.blocks; i++) {
    const block = data.slice(i * blockLen, (i + 1) * blockLen);
    blocks.push({ data: block, ecc: qrRsRemainder(block, cfg.ecc) });

  const codewords = [];
  for (let i = 0; i < blockLen; i++) blocks.forEach(b => codewords.push(b.data[i]));
  for (let i = 0; i < cfg.ecc; i++) blocks.forEach(b => codewords.push(b.ecc[i]));

  codewords.forEach(b => { for (let i = 7; i >= 0; i--) bits.push((b >>> i) & 1); });
  let bit = 0, upward = true;
  for (let col = size - 1; col > 0; col -= 2) {
    if (col === 6) col--;

      const row = upward ? size - 1 - i : i;
      for (let c = col; c >= col - 1; c--) {
        if (reserved[row][c]) continue;
        let v = bits[bit++] || 0;

  const fbit = i => ((fmt >>> i) & 1) === 1;

  set(8, 7, fbit(6)); set(8, 8, fbit(7)); set(7, 8, fbit(8));
  for (let i = 9; i < 15; i++) set(14 - i, 8, fbit(i));
  for (let i = 0; i < 8; i++) set(size - 1 - i, 8, fbit(i));
  for (let i = 8; i < 15; i++) set(8, size - 15 + i, fbit(i));

}

function renderQrSvg(matrix) {
  if (!Array.isArray(matrix)) return "";
  const scale = 8, quiet = 4, size = matrix.length + quiet * 2;
  const rects = [];
  matrix.forEach((row, r) => row.forEach((dark, c) => {
    if (dark) rects.push('<rect x="' + ((c + quiet) * scale) + '" y="' + ((r + quiet) * scale) + '" width="' + scale + '" height="' + scale + '"/>');
  }));
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + (size * scale) + '" height="' + (size * scale) + '" viewBox="0 0 ' + (size * scale) + ' ' + (size * scale) + '">' +
    '<rect width="100%" height="100%" fill="#fff"/><g fill="#000">' + rects.join("") + '</g></svg>';
}

function isSnapshotRoute() {
  return typeof location !== "undefined" && location.hash && location.hash.indexOf("#snapshot=") === 0;
}

function isDisplayMode() {
  return typeof location !== "undefined" && location.search.indexOf("display") !== -1;
}

function displayModeUrl() {
  return location.href.replace(/[?#].*$/, "") + "?display";
}

function displayScoreText(g) {
  const s1 = g.score1 == null ? "–" : g.score1;
  const s2 = g.score2 == null ? "–" : g.score2;
  return s1 + "-" + s2;
}

function displayMatchLine(g) {
  return {
    label: (g.court ? "Court " + g.court + ": " : "") + (g.team1 || []).join(" & ") + " vs " + (g.team2 || []).join(" & "),
    value: displayScoreText(g)
  };
}

function displayModeModel(snapshot) {
  const phase = snapshot.phase || "setup";
  const panels = [];
  let status = "Waiting to start";
  if (phase === "playing") status = "Round " + (snapshot.currentRound || 1);
  else if (phase === "finals") status = "Finals";
  else if (phase === "crown") status = "Crown Match";
  else if (phase === "done") status = "Final Results";

  if (phase === "setup") {
    panels.push({
      title: "Event",
      rows: [
        { label: "Format", value: formatNameForSnapshot(snapshot.format) },
        { label: "Field", value: snapshot.summary || "" },
        { label: "Status", value: "Waiting to start" }
      ]
    });
  } else if (phase === "finals" && snapshot.finals && snapshot.finals.length) {
    panels.push({
      title: "Finals",
      rows: snapshot.finals.map(g => ({
        label: (g.name || "Final") + (g.court ? " · Court " + g.court : ""),
        value: (g.team1 || []).join(" & ") + " vs " + (g.team2 || []).join(" & ") + " · " + displayScoreText(g)
      }))
    });
  } else if (phase === "done") {
    panels.push({
      title: "Podium",
      rows: (snapshot.podium || []).map(p => ({ label: "#" + p.rank, value: p.name }))
    });
  } else if (snapshot.courts && snapshot.courts.length) {
    panels.push({ title: "Courts", rows: snapshot.courts.map(displayMatchLine) });
  }

  if (snapshot.byes && snapshot.byes.length) {
    panels.push({ title: "Sitting This Round", rows: snapshot.byes.map(name => ({ label: name, value: "Bye" })) });
  }
  panels.push({
    title: phase === "done" ? "Final Standings" : "Top Standings",
    rows: (snapshot.standings || []).slice(0, 8).map(s => ({
      label: "#" + s.rank + " " + s.name,
      value: s.gp ? "GP " + s.gp + (s.score ? " · " + s.score : "") : (s.score || "")
    }))
  });
  return {
    title: snapshot.title || "Rumble Pickleball",
    summary: snapshot.summary || "",
    status,
    updatedAt: snapshot.createdAt || Date.now(),
    panels
  };
}

    el("div", { class: "display-status" }, model.status),

  const grid = el("div", { class: "display-grid" });
  (model.panels || []).forEach(panel => {

// Personalized recap for the player in `slot`. mode = "final" | { throughRound: N }.
// State-dependent: reads slots/finals/stats. Final-mode numbers come from
// computeStats(total, true) + finalRanking() order, matching the done screen.
function buildResultsMessage(slot, mode) {
  const isFinal = mode === "final";
  const through = isFinal ? totalRegularRounds() : mode.throughRound;
  const order = (isFinal ? finalRanking() : rankPlayers(through)).map(s => s.slot);
  const stats = computeStats(through, isFinal);
  const bySlot = {}; stats.forEach(s => { bySlot[s.slot] = s; });
  const amBySlot = {}; computeMarginStats(through).forEach(s => { amBySlot[s.slot] = s.adjScore; });
  const recap = buildPersonalRecap(slot, { final: isFinal, throughRound: through });
  const sign = d => (d > 0 ? "+" : "") + d;
  const lines = [];
  const youLine = "You: #" + recap.rank + " of " + recap.fieldSize +
    " (GP " + recap.gp + ", " + amBySlot[slot].toFixed(1) + " AM, " +
    (recap.wins / Math.max(1, recap.gp)).toFixed(1) + " W/game, " +
    sign(recap.avgDiff.toFixed(1)) + " diff/game)";
  const board = order.map((s, i) => {
    const st = bySlot[s];
    return (i + 1) + ". " + st.name + " (GP " + st.gp + ", " +
      amBySlot[s].toFixed(1) + " AM)";
  });
  if (isFinal) {
    lines.push("🏓 Rumble Pickleball — tonight's results", "", youLine, "");
    if (state.finals) {
      const champ = finalTier(0), cons = finalTier(1);
      const champWin = champ && champ.score1 > champ.score2 ? champ.team1 : (champ ? champ.team2 : null);
      const consWin  = cons && cons.score1  > cons.score2  ? cons.team1  : (cons ? cons.team2 : null);
      if (champWin) lines.push("🥇 " + teamName(champWin));
      if (consWin) lines.push("🥈 " + teamName(consWin));
      if (champWin || consWin) lines.push("");
    }
    lines.push("Final standings:", ...board, "", "GG! 🎾");
  } else {
    const byeLines = [];
    for (let i = 0; i < through && i < state.rounds.length; i++) {
      const byes = byesOf(state.rounds[i]);
      if (byes.length) byeLines.push("R" + (i + 1) + " sitting: " + byes.map(nameOf).join(", "));
    }
    lines.push(
      "🏓 Rumble Pickleball — standings through " + through + " round" + (through > 1 ? "s" : ""),
      "", youLine, "", "Standings:", ...board);
    if (byeLines.length) lines.push("", "Byes:", ...byeLines);
    lines.push("", "(not final — more rounds to play) 🎾");
  }
  return lines.join("\n");
}

function playerBySlot(slot) {
  return Array.isArray(state.players) ? state.players.find(p => p.slot === slot) : null;
}
function nameOf(slot) {
  const p = playerBySlot(slot);
  return (p && p.name) || (state.slots && state.slots[slot - 1]) || ("P" + slot);
}
function phoneOf(slot) {
  const p = playerBySlot(slot);
  return (p && p.phone) || ((state.phones || [])[slot - 1] || "");
}
function gamesOf(r) {
  if (!r) return [];
  if (Array.isArray(r.games)) return r.games.slice().sort((a, b) => (a.court || 0) - (b.court || 0));
  return [];
}
function byesOf(r) { return r && Array.isArray(r.byes) ? r.byes : []; }
function byePolicyText() {
  if (state.format === "gauntlet") return "Gauntlet assigns byes with the rotation policy before building rank blocks for the players who play.";
  if (state.format === "stack" || state.format === "king") return "Ladder formats balance byes first, then use the remaining players to fill courts by the format's movement rules.";
  return "Round Robin spreads byes across eligible active players before pairing the courts for the round.";
}
function finalsTierForSlot(slot) {
  for (const tier of finalTiers()) {
    if ([...(tier.team1 || []), ...(tier.team2 || [])].includes(slot)) return tier.name || "Final";
  }
  if ((state.finals?.unseated || []).includes(slot)) return "Unseated";
