<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8F%93%3C/text%3E%3C/svg%3E">
<title>Rumble Pickleball</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --border: #2e3946;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #fbbf24;
    --good: #10b981;
    --bad: #ef4444;
    --court1: #38bdf8;
    --court2: #a78bfa;
    --gold: #fbbf24;
    --silver: #cbd5e1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    line-height: 1.4;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: none;
  }
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px max(14px, env(safe-area-inset-left)) 80px max(14px, env(safe-area-inset-right));
  }
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
    padding: 4px 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 22px; font-weight: 700; }
  .progress {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(251, 191, 36, 0.12);
    padding: 8px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }
  button {
    font-family: inherit;
    font-size: 18px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-height: 60px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    color: #1a1207;
    border-color: var(--accent);
    font-size: 22px;
    padding: 18px 26px;
  }
  button.primary:disabled {
    background: var(--panel);
    color: var(--muted);
    border-color: var(--border);
  }
  button.danger { background: var(--bad); color: white; border-color: var(--bad); }
  button.ghost { background: transparent; }
  .icon-btn {
    width: 60px; min-width: 60px; height: 60px; min-height: 60px;
    padding: 0; font-size: 26px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .court-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) {
    .court-row { grid-template-columns: 1fr; }
  }
  .court-card {
    border-radius: 18px;
    padding: 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-top-width: 6px;
  }
  .court-card.c1 { border-top-color: var(--court1); }
  .court-card.c2 { border-top-color: var(--court2); }
  .court-card.gold { border-top-color: var(--gold); }
  .court-card.silver { border-top-color: var(--silver); }
  /* Stack format: top court gets a subtle gold treatment to read as "the top court" */
  .court-card.c1.stack-top {
    border-top-color: var(--gold);
    border-top-width: 6px;
    box-shadow: 0 0 18px rgba(251, 191, 36, 0.10);
  }
  .court-card.c1.stack-top .court-label { color: var(--gold); }
  .court-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .court-card.c1 .court-label { color: var(--court1); }
  .court-card.c2 .court-label { color: var(--court2); }
  .court-card.gold .court-label { color: var(--gold); }
  .court-card.silver .court-label { color: var(--silver); }
  .matchup {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .team-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 12px;
    align-items: center;
    background: var(--panel-2);
    border-radius: 12px;
    padding: 10px 12px;
    border-left: 4px solid transparent;
    transition: border-color 0.15s ease, background-color 0.15s ease;
  }
  .team-row.winner {
    border-left-color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .team-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }
  .team-row.winner .team-name { color: var(--good); }
  .score-input {
    width: 100%;
    font-size: 44px;
    font-weight: 800;
    text-align: center;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 10px;
    padding: 4px;
    height: 70px;
    -moz-appearance: textfield;
    appearance: textfield;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .score-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .score-input.winner {
    border-color: var(--good);
    color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .name-input {
    width: 100%;
    font-size: 22px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 12px;
    min-height: 60px;
    font-family: inherit;
  }
  .name-input:focus { outline: none; border-color: var(--accent); }
  .court-summary {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 10px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }
  .court-summary.winmsg { color: var(--good); font-weight: 700; }
  .court-summary.tiemsg { color: var(--accent); font-weight: 700; }

  table.standings { width: 100%; border-collapse: collapse; table-layout: fixed; }
  table.standings col.c-rank { width: 56px; }
  table.standings col.c-pts,
  table.standings col.c-w,
  table.standings col.c-diff { width: 72px; }
  table.standings col.c-stack-extra { width: 50px; }
  table.standings tr.tier-divider td {
    border-top: 1px solid var(--border);
    padding: 10px 8px 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }
  .standings-footer {
    margin: 12px 0 0;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
  }
  .rank-trajectory {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    font-weight: 700;
    vertical-align: middle;
    line-height: 1;
  }
  .rank-trajectory.up   { color: var(--good); }
  .rank-trajectory.down { color: var(--bad); }
  .rank-trajectory.same { color: var(--muted); }
  table.standings th, table.standings td {
    text-align: left;
    padding: 10px 6px;
    border-bottom: 1px solid var(--border);
  }
  table.standings th {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  table.standings td.num,
  table.standings th.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.standings td.num { font-size: 20px; font-weight: 700; }
  table.standings td.name { font-size: 20px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  table.standings tr.r1 td.name { color: var(--gold); }
  table.standings .rank {
    text-align: center;
    padding: 6px;
  }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 800;
    font-size: 18px;
    background: var(--panel-2);
    color: var(--muted);
  }
  .rank-badge.medal {
    font-size: 24px;
    background: transparent;
  }
  .partner-badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--muted);
    font-weight: 600;
    vertical-align: middle;
  }
  .partner-badge.done { color: var(--good); background: rgba(16, 185, 129, 0.15); }

  details.history {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
  }
  details.history summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: 700;
    user-select: none;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  details.history summary::-webkit-details-marker { display: none; }
  details.history summary::after { content: "▾"; color: var(--muted); }
  details.history[open] summary::after { content: "▴"; }
  details.history .body { padding: 0 16px 14px; }
  .history-round { padding: 12px 0; border-top: 1px solid var(--border); }
  .history-round:first-child { border-top: none; }
  .history-round-title {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .history-game {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 16px;
  }
  .history-game .court-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .history-game .court-tag.c1 { background: rgba(56, 189, 248, 0.15); color: var(--court1); }
  .history-game .court-tag.c2 { background: rgba(167, 139, 250, 0.15); color: var(--court2); }
  .history-game .game-text { flex: 1; }
  .history-game .game-score {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    font-size: 18px;
    flex-shrink: 0;
  }
  .winning-team { color: var(--good); font-weight: 700; }

  .setup-list { display: grid; gap: 10px; margin-bottom: 14px; }
  .format-chooser {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .format-chooser-label {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .format-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .format-option {
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    color: inherit;
    min-height: 84px;
  }
  .format-option.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .format-option-title {
    font-weight: 800;
    margin-bottom: 4px;
  }
  .format-option.active .format-option-title { color: var(--accent); }
  .format-option-blurb {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }
  @media (max-width: 480px) {
    .format-options { grid-template-columns: 1fr; }
  }

  .row-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .row-actions button.primary { flex: 3; min-width: 200px; }
  .row-actions button.secondary { flex: 1; min-width: 140px; }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    overflow-y: auto;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    max-width: 560px;
    width: 100%;
    margin: auto;
  }
  .modal h2 { margin-top: 0; }

  .seeds-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .seed-row {
    padding: 6px 10px;
    background: var(--panel-2);
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.3;
    display: flex;
    align-items: baseline;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .seed-rank {
    font-weight: 800;
    color: var(--accent);
    font-size: 16px;
    min-width: 26px;
  }
  .seed-meta { color: var(--muted); font-size: 12px; margin-left: auto; }

  .champions { text-align: center; padding: 24px 12px 8px; }
  .champions .crown { font-size: 80px; line-height: 1; }
  .champions h1 {
    font-size: 42px;
    margin: 8px 0 4px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .champions .winners {
    font-size: 36px;
    font-weight: 800;
    margin: 18px 0;
    line-height: 1.15;
  }
  .scorecard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px 16px;
    align-items: center;
    max-width: 480px;
    margin: 18px auto 0;
    padding: 14px 16px;
    background: var(--panel-2);
    border-radius: 12px;
  }
  .scorecard .sc-team {
    font-size: 18px;
    font-weight: 600;
  }
  .scorecard .sc-team.left { text-align: right; }
  .scorecard .sc-team.right { text-align: left; }
  .scorecard .sc-team.win { color: var(--good); font-weight: 800; }
  .scorecard .sc-score {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .champions .consolation-block {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .consolation-title {
    color: var(--silver);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .consolation-winners {
    font-size: 26px;
    font-weight: 800;
    margin: 8px 0;
  }
  .consolation-block .scorecard {
    margin-top: 12px;
    padding: 10px 14px;
    max-width: 420px;
  }
  .consolation-block .scorecard .sc-team { font-size: 16px; }
  .consolation-block .scorecard .sc-score { font-size: 28px; }

  h2, h3 { margin: 0 0 12px; }
  .muted { color: var(--muted); font-size: 14px; }

  /* Rules block (Setup + Settings) */
  details.rules {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin: 0 0 14px;
  }
  details.rules summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    user-select: none;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
  }
  details.rules summary::-webkit-details-marker { display: none; }
  details.rules summary::after { content: "▾"; color: var(--muted); }
  details.rules[open] summary::after { content: "▴"; }
  details.rules .rules-body {
    padding: 0 16px 14px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }
  details.rules .rules-body ul { margin: 0; padding-left: 20px; }
  details.rules .rules-body li { margin: 6px 0; }
  details.rules .rules-body strong { color: var(--text); }

  /* Paste-names link and modal */
  .paste-link {
    display: inline-block;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 8px 0;
    margin-bottom: 4px;
    cursor: pointer;
    text-decoration: underline;
    min-height: 36px;
  }
  .paste-textarea {
    width: 100%;
    min-height: 200px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
  }
  .paste-error {
    color: var(--bad);
    font-size: 14px;
    font-weight: 600;
    margin: 8px 0 0;
    min-height: 20px;
  }
  /* Shuffle reveal overlay */
  .shuffle-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
  }
  .shuffle-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .shuffle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 520px;
    width: 100%;
  }
  .shuffle-slot {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    transition: border-color 0.18s ease, color 0.18s ease;
  }
  .shuffle-slot.locked {
    border-color: var(--accent);
    color: var(--accent);
  }
  .shuffle-skip {
    margin-top: 18px;
    color: var(--muted);
    font-size: 13px;
  }
  .shuffle-groups {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 520px;
  }
  .shuffle-group-label {
    font-size: 14px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }
  /* Partner-preview chip in standings */
  .partner-chip {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    vertical-align: middle;
    white-space: nowrap;
  }
  .partner-chip.c1 { color: var(--court1); background: rgba(56, 189, 248, 0.15); }
  .partner-chip.c2 { color: var(--court2); background: rgba(167, 139, 250, 0.15); }
  /* Tap-winner quick-fill pill */
  .team-row {
    /* override existing 1fr 110px to allow pill column */
    grid-template-columns: 1fr auto 110px;
  }
  .quickfill-pill {
    background: rgba(251, 191, 36, 0.15);
    color: var(--accent);
    border: 1px solid rgba(251, 191, 36, 0.4);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    min-height: 36px;
    white-space: nowrap;
    align-self: center;
  }
  .quickfill-pill:active { background: rgba(251, 191, 36, 0.3); }
  /* Round-complete toast */
  .toast-stack {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 12px 22px;
    font-weight: 800;
    font-size: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transform: translateY(-16px);
    animation: toast-in 220ms ease-out forwards, toast-out 220ms ease-in 2280ms forwards;
  }
  @keyframes toast-in {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    to { opacity: 0; transform: translateY(-16px); }
  }
  /* Shimmer on the primary nav button */
  .row-actions button.primary.shimmering {
    animation: nav-shimmer 1500ms ease-out;
  }
  @keyframes nav-shimmer {
    0%   { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.5); }
    50%  { box-shadow: 0 0 24px 6px rgba(251, 191, 36, 0.5); }
    100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
  }
  /* Finals seed pills */
  .seed-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 4px;
    vertical-align: middle;
    line-height: 1.4;
  }
  .seed-pill.gold { background: rgba(251, 191, 36, 0.18); color: var(--gold); }
  .seed-pill.silver { background: rgba(203, 213, 225, 0.15); color: var(--silver); }

  .podium-step.gold .podium-bar {

  .podium-step.silver .podium-bar {

  .podium-step.bronze .podium-bar {

  /* Tournament awards */
  .awards-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;

      grid-template-columns: 1fr 1fr 1fr;
      max-width: 900px;
    }
  }
  .award-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;

  }
  .award-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;

    text-transform: uppercase;
  }
  .award-value {
    font-size: 16px;
    font-weight: 700;
    margin-top: 2px;
    line-height: 1.3;
  }
  .award-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  /* Settings inline select row */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    min-height: 60px;
  }
  .settings-row label { font-weight: 700; }
  .settings-row select {
    min-height: 44px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;

  }
  /* Schedule modal */
  .schedule-list { max-height: 60vh; overflow-y: auto; }
  .schedule-round {
    padding: 12px 0;
    border-top: 1px solid var(--border);
  }
  .schedule-round:first-child { border-top: none; }
  .schedule-round-title {
    font-size: 13px;
    color: var(--muted);
    font-weight: 800;
    letter-spacing: 0.06em;

  }
  .schedule-game {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 15px;
  }
  .schedule-game .court-tag {

    font-weight: 800;

  .schedule-game .court-tag.c1 { background: rgba(56, 189, 248, 0.15); color: var(--court1); }
  .schedule-game .court-tag.c2 { background: rgba(167, 139, 250, 0.15); color: var(--court2); }
  .schedule-game .court-tag.gold { background: rgba(251, 191, 36, 0.18); color: var(--gold); }
  .schedule-game .court-tag.silver { background: rgba(203, 213, 225, 0.15); color: var(--silver); }
  .schedule-game .game-text { flex: 1; }
  .schedule-game .game-score {
    font-weight: 800;
    font-variant-numeric: tabular-nums;

<body>
<div class="app" id="app"></div>
<script>
"use strict";

const STORAGE_KEY = "pb_tourney_v2";
const STORAGE_KEY_V1 = "pb_tourney_v1";

// Round-robin partner schedule (1-factorization of K8) — every pair appears exactly once across 7 rounds.
const SCHEDULE = [
  [[[1,2],[3,4]], [[5,6],[7,8]]],
  [[[1,3],[2,4]], [[5,7],[6,8]]],
  [[[1,4],[2,3]], [[5,8],[6,7]]],
  [[[1,5],[2,6]], [[3,7],[4,8]]],
  [[[1,6],[2,5]], [[3,8],[4,7]]],
  [[[1,7],[2,8]], [[3,5],[4,6]]],
  [[[1,8],[2,7]], [[3,6],[4,5]]],
];

// -------- self-tests (gated by ?test URL param) --------
function runSelfTests() {
  let failures = 0;
  const _origAssert = console.assert.bind(console);
  console.assert = (cond, ...rest) => {
    if (!cond) failures++;
    _origAssert(cond, ...rest);
  };
  // Tests are appended by feature tasks below.
  // Task 1 — newState defaults
  {
    const s = newState();
    console.assert(s.awardsShown === false, "newState.awardsShown=false");
    console.assert(s.winScore === 11, "newState.winScore=11");
    console.assert(Array.isArray(s.notifiedRounds) && s.notifiedRounds.length === 0,
      "newState.notifiedRounds=[]");
  }
  // Task 3 — parsePastedNames
  {
    const a = parsePastedNames("Adrian\nAlex\nJohn\nJoe\nKen\nKris\nSam\nTodd");
    console.assert(a.ok && a.names.length === 8 && a.names[0] === "Adrian", "parsePastedNames newline");
    const b = parsePastedNames("Adrian, Alex, John, Joe, Ken, Kris, Sam, Todd");
    console.assert(b.ok && b.names[7] === "Todd", "parsePastedNames comma");
    const c = parsePastedNames("Adrian\nAlex");
    console.assert(!c.ok && c.count === 2, "parsePastedNames too few");
    const d = parsePastedNames("a\nb\nc\nd\ne\nf\ng\nA"); // case dup
    console.assert(!d.ok, "parsePastedNames case-insensitive duplicate");
    const e = parsePastedNames("  Adrian  \n\n,Alex,John,Joe,Ken,Kris,Sam,Todd");
    console.assert(e.ok && e.names[0] === "Adrian", "parsePastedNames trims & strips empties");
  }
  // Task 5 — nextPartnerInfo
  {
    const saved = state;
    const fakeRounds = [
      { round:1, court1:{team1:[1,2],team2:[3,4],score1:null,score2:null}, court2:{team1:[5,6],team2:[7,8],score1:null,score2:null} },
      { round:2, court1:{team1:[1,3],team2:[2,4],score1:null,score2:null}, court2:{team1:[5,7],team2:[6,8],score1:null,score2:null} },
    ];
    state = { phase:"playing", slots:["A","B","C","D","E","F","G","H"], currentRound:1, rounds:fakeRounds };
    const r = nextPartnerInfo(1); // round 2 partners 1 with 3 on court 1
    console.assert(r && r.partner === 3 && r.courtKey === 1, "nextPartnerInfo slot 1 round 2", r);
    const r2 = nextPartnerInfo(8); // round 2: 8 with 6 on court 2
    console.assert(r2 && r2.partner === 6 && r2.courtKey === 2, "nextPartnerInfo slot 8 round 2", r2);
    state.currentRound = 7;
    console.assert(nextPartnerInfo(1) === null, "nextPartnerInfo no chip at round 7");
    state = saved;
  }
  // Task 10 — finalRanking
  // Verify tier ordering (champ-W > champ-L > cons-W > cons-L) holds
  // and that within each tier players are ordered by season ranking,
  // by deriving the expected order from rankPlayers(7) instead of
  // assuming a particular slot-to-season-rank mapping.
  {
    const saved = state;
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 0 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 0 },
    }));
    state = {
      phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds,
      currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 9, score2: 11 }, // team2 wins
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 }, // team1 wins
      },
      awardsShown: false, winScore: 11, notifiedRounds: [],
    };
    const seasonOrder = rankPlayers(7).map(s => s.slot);
    const seasonRankOf = slot => seasonOrder.indexOf(slot);
    const sortBySeason = arr => arr.slice().sort((a,b) => seasonRankOf(a) - seasonRankOf(b));
    const expected = [
      ...sortBySeason([2, 3]),  // championship winners
      ...sortBySeason([1, 4]),  // championship losers
      ...sortBySeason([5, 8]),  // consolation winners
      ...sortBySeason([6, 7]),  // consolation losers
    ];
    const order = finalRanking().map(s => s.slot);
    console.assert(JSON.stringify(order) === JSON.stringify(expected),
      "finalRanking tier order", { order, expected });
    state = saved;
  }
  // Task 12a — computeAwards
  {
    const saved = state;
    // Setup: every round-robin game is a 11-vs-1 blowout for team1, except court2
    // which is 11-vs-9. Championship is 11-vs-9, Consolation 11-vs-9.
    // Expected: Biggest Win is +10 (lots of ties — all team1 winners on c1).
    // Closest Game: 11-9 across many games; all tied at diff=2 with winScore=11.
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 1 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    state = {
      phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds, currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 11, score2: 9 },
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 },
      },
      awardsShown: false, winScore: 11, notifiedRounds: [],
    };
    const a = computeAwards();
    console.assert(a.mvp.names.length >= 1, "MVP has at least one name");
    console.assert(a.biggestWin.names.every(n => n.includes("+10")),
      "Biggest Win all +10", a.biggestWin);
    console.assert(a.closestGame.names.every(n => n === "11–9"),
      "Closest Game all 11–9", a.closestGame);
    console.assert(a.hotStreak.detail && /in a row/.test(a.hotStreak.detail),
      "Hot Streak detail", a.hotStreak);
    // Single-winner sanity: rebuild with only ONE blowout game
    const rounds2 = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 9 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    // Make round 1 court 1 a +10 blowout (the only one)
    rounds2[0].court1.score1 = 11; rounds2[0].court1.score2 = 1;
    state.rounds = rounds2;
    const b = computeAwards();
    console.assert(b.biggestWin.names.length === 1 && b.biggestWin.names[0].includes("+10"),
      "Biggest Win single", b.biggestWin);
    state = saved;
  }
  // Stack — stackScoreGain formula
  {
    // Court 2 win: 11 + 0 (not c1) + 3 (won) + 2 (climbed) = 16
    console.assert(stackScoreGain(11, false, true) === 16, "stackScoreGain c2 win");
    // Court 1 win: 11 + 5.5 (c1 bonus) + 3 (won) + 0 (no climb) = 19.5
    console.assert(stackScoreGain(11, true, true) === 19.5, "stackScoreGain c1 win");
    // Court 1 loss: 8 + 4 + 0 + 0 = 12
    console.assert(stackScoreGain(8, true, false) === 12, "stackScoreGain c1 loss");
    // Court 2 loss: 7 + 0 + 0 + 0 = 7
    console.assert(stackScoreGain(7, false, false) === 7, "stackScoreGain c2 loss");
    // Non-integer points: 0
    console.assert(stackScoreGain(null, true, true) === 0, "stackScoreGain null pts");
  }

  // Stack — buildNextStackRound movement
  {
    const saved = state;
    state = {
      phase: "playing", format: "stack", stackRounds: 4,
      slots: ["A","B","C","D","E","F","G","H"],
      currentRound: 1,
      // Court 1: (1,2) beat (3,4) 11-3.  Court 2: (5,6) beat (7,8) 11-9.
      rounds: [{
        round: 1,
        court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 3 },
        court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 9 },
      }],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      previousRanks: [], notifiedRounds: [], awardsShown: false,
      winScore: 11, finals: null,
    };
    const next = buildNextStackRound(state.rounds[0]);
    const newC1 = new Set([...next.court1.team1, ...next.court1.team2]);
    const newC2 = new Set([...next.court2.team1, ...next.court2.team2]);
    // c1 winners (1,2) stay; c2 winners (5,6) climb → new c1 = {1,2,5,6}
    console.assert(newC1.has(1) && newC1.has(2) && newC1.has(5) && newC1.has(6),
      "stack movement: c1 winners stay, c2 winners climb", [...newC1]);
    // c1 losers (3,4) drop; c2 losers (7,8) stay → new c2 = {3,4,7,8}
    console.assert(newC2.has(3) && newC2.has(4) && newC2.has(7) && newC2.has(8),
      "stack movement: c1 losers drop, c2 losers stay", [...newC2]);
    state = saved;
  }

  // Stack — pairForStackCourt repair when default pair repeats prior court pair
  {
    const saved = state;
    state = { tiebreakRandom: [0,1,2,3,4,5,6,7] };
    // Stack scores construct so ranking on this court is [1, 5, 6, 2] (rank 1..4).
    // Default pair: r1+r4 vs r2+r3 => (1,2) vs (5,6).
    // If prevSameCourt had teams (1,2) and (3,4), pair (1,2) was a team last
    // round → repair triggers, should swap r3,r4: (1,6) vs (5,2).
    const stackBySlot = new Map([[1, 100], [5, 80], [6, 60], [2, 40]]);
    const prev = { team1: [1, 2], team2: [3, 4] };
    const [tA, tB] = pairForStackCourt([1, 5, 6, 2], prev, stackBySlot);
    const sortedA = tA.slice().sort((a,b)=>a-b);
    const sortedB = tB.slice().sort((a,b)=>a-b);
    // After swap: teams should be (1,6) and (5,2), neither matching prev pair (1,2).
    console.assert(
      (sortedA[0] === 1 && sortedA[1] === 6 && sortedB[0] === 2 && sortedB[1] === 5) ||
      (sortedA[0] === 2 && sortedA[1] === 5 && sortedB[0] === 1 && sortedB[1] === 6),
      "pairForStackCourt repair", { tA, tB });
    // No-repair sanity: if prev had no overlap with current, default pairing stands.
    const [tC, tD] = pairForStackCourt([1, 5, 6, 2], { team1: [3, 4], team2: [7, 8] }, stackBySlot);
    const flat = [...tC, ...tD].sort((a,b)=>a-b);
    console.assert(flat.join(",") === "1,2,5,6", "pairForStackCourt no-repair players", flat);
    // Default pair should be (1,2) and (5,6).
    const tCs = tC.slice().sort((a,b)=>a-b);
    console.assert(tCs[0] === 1 && tCs[1] === 2, "pairForStackCourt no-repair default", tC);
    state = saved;
  }

  // Stack — rankPlayersStack sort order
  {
    const saved = state;
    // After 1 round on a stack tournament: c1 (1,2) beat (3,4) 11-1; c2 (5,6) beat (7,8) 11-9.
    // Slot 1: stackScore = stackScoreGain(11, true, true) = 19.5
    // Slot 3: stackScore = stackScoreGain(1, true, false)  = 1.5
    // Slot 5: stackScore = stackScoreGain(11, false, true) = 16
    // Slot 7: stackScore = stackScoreGain(9, false, false) = 9
    state = {
      format: "stack", stackRounds: 4,
      slots: ["A","B","C","D","E","F","G","H"],
      rounds: [{
        round: 1,
        court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 1 },
        court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 9 },
      }],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
    };
    const ranked = rankPlayersStack(1).map(s => s.slot);
    // Expected order: 1,2 (top), 5,6 (next), 7,8 (then), 3,4 (bottom).
    // Within ties, tiebreakRandom ordering [0..7] → ascending slot, so:
    console.assert(JSON.stringify(ranked) === JSON.stringify([1,2,5,6,7,8,3,4]),
      "rankPlayersStack order", ranked);
    state = saved;
  }

  // Stack — v1 → v2 migration
  {
    const v1key = "pb_tourney_v1";
    const v2key = "pb_tourney_v2";
    // Snapshot any current v2 data so we don't trash a real tournament.
    const savedV2 = localStorage.getItem(v2key);
    localStorage.removeItem(v2key);
    const v1state = {
      phase: "playing",
      rawNames: ["A","B","C","D","E","F","G","H"],
      slots:    ["A","B","C","D","E","F","G","H"],
      currentRound: 2,
      rounds: SCHEDULE.map((rd, i) => ({
        round: i + 1,
        court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: null, score2: null },
        court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: null, score2: null },
      })),
      finals: null,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      awardsShown: false,
      winScore: 11,
      notifiedRounds: [],
    };
    localStorage.setItem(v1key, JSON.stringify(v1state));
    const migrated = load();
    console.assert(migrated && migrated.format === "rr", "v1 migration → format rr", migrated && migrated.format);
    console.assert(migrated && migrated.stackRounds === 8, "v1 migration → stackRounds 8");
    console.assert(migrated && Array.isArray(migrated.previousRanks), "v1 migration → previousRanks []");
    console.assert(migrated && migrated.currentRound === 2, "v1 migration preserves state");
    console.assert(localStorage.getItem(v1key) === null, "v1 key cleared after migration");
    console.assert(localStorage.getItem(v2key) !== null, "v2 key written after migration");
    // Restore any prior v2 state (or clear if there was none).
    localStorage.removeItem(v2key);
    if (savedV2 !== null) localStorage.setItem(v2key, savedV2);
  }

  // Stack — computeAwards: Climber, Anchor, Closer, Best Duo
  {
    const saved = state;
    // 4-round Stack tournament. Court 1 winners stay, c2 climb. Construct
    // outcomes so slot 5 climbs once (R1 c2 win → R2 c1) and stays. Slot 1
    // anchors c1 throughout. Several 1-pt games to surface The Closer. A
    // duo (1,2) wins multiple times together.
    const r1 = {
      round: 1,
      court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 9 }, // (1,2) win, 1-pt margin? No, margin=2
      court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 10 }, // (5,6) win, 1-pt margin → climb
    };
    // Build round 2 from r1: new c1 = {1,2,5,6}, new c2 = {3,4,7,8}
    state = {
      format: "stack", stackRounds: 2,
      slots: ["A","B","C","D","E","F","G","H"],
      rounds: [r1],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: null, previousRanks: [], notifiedRounds: [], awardsShown: false,
      winScore: 11,
    };
    const r2 = buildNextStackRound(r1);
    // Decide r2: pretend the higher-stackscore team wins. Pick scores that
    // create another 1-pt game so The Closer surfaces.
    r2.court1.score1 = 11; r2.court1.score2 = 10;  // 1-pt margin
    r2.court2.score1 = 11; r2.court2.score2 = 5;
    state.rounds.push(r2);
    state.phase = "done";
    const a = computeAwards();
    console.assert(a.climber.names.length >= 1, "Climber populated", a.climber);
    console.assert(/climb/.test(a.climber.detail || ""), "Climber detail", a.climber);
    console.assert(a.anchor.names.length >= 1, "Anchor populated", a.anchor);
    console.assert(/Court 1/.test(a.anchor.detail || ""), "Anchor detail", a.anchor);
    console.assert(a.closer.names.length >= 1, "Closer populated (1-pt games existed)", a.closer);
    console.assert(/1-pt games/.test(a.closer.detail || ""), "Closer detail format", a.closer);
    console.assert(a.bestDuo.names.length >= 1, "Best Duo populated", a.bestDuo);
    console.assert(/%/.test(a.bestDuo.detail || ""), "Best Duo win-rate detail", a.bestDuo);
    state = saved;
  }

  // Stack — RR mode hides Climber/Anchor; Closer hidden when no 1-pt games
  {
    const saved = state;
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 9 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    state = {
      format: "rr", stackRounds: 8, phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds, currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 11, score2: 9 },
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 },
      },
      awardsShown: false, winScore: 11, notifiedRounds: [], previousRanks: [],
    };
    const a = computeAwards();
    console.assert(a.climber.names.length === 0, "RR hides Climber", a.climber);
    console.assert(a.anchor.names.length === 0,  "RR hides Anchor",  a.anchor);
    console.assert(a.closer.names.length === 0,  "Closer empty when no 1-pt games", a.closer);
    state = saved;
  }

  console.log(`[self-tests] complete — ${failures} failure(s)`);
  console.assert = _origAssert;
}
if (typeof location !== "undefined" && location.search.includes("test")) {
  queueMicrotask(runSelfTests);
}

let state = load() || newState();

function newState() {
  return {
    phase: "setup",                                  // setup | playing | finals | done
    format: "rr",                                    // "rr" | "stack"
    stackRounds: 8,                                  // only used when format === "stack"
    rawNames: ["", "", "", "", "", "", "", ""],      // pre-shuffle, used on setup screen
    slots:    ["", "", "", "", "", "", "", ""],      // post-shuffle, slot index 0..7 = slot 1..8
    currentRound: 1,
    rounds: [],                                      // populated on Start
    finals: null,                                    // {championship, consolation}
    tiebreakRandom: [],                              // stable per-tournament random for final tiebreak
    awardsShown: false,
    winScore: 11,
    notifiedRounds: [],
    previousRanks: [],                               // stack: prior-round rank order (slots), drives trajectory arrows
  };
}
// Apply field defaults to any persisted state (used by both v2 load and v1 migration).
function backfillStateDefaults(obj) {
  if (typeof obj.awardsShown !== "boolean") obj.awardsShown = false;
  if (typeof obj.winScore !== "number") obj.winScore = 11;
  if (!Array.isArray(obj.notifiedRounds)) obj.notifiedRounds = [];
  if (obj.format !== "stack") obj.format = "rr";
  if (typeof obj.stackRounds !== "number") obj.stackRounds = 8;
  if (!Array.isArray(obj.previousRanks)) obj.previousRanks = [];
  return obj;
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && obj.phase) return backfillStateDefaults(obj);
    }
    // v1 migration: any v1 state loads as a Round Robin in-progress tournament.
    const v1raw = localStorage.getItem(STORAGE_KEY_V1);
    if (v1raw) {
      const v1 = JSON.parse(v1raw);
      if (v1 && v1.phase) {
        const migrated = backfillStateDefaults(v1);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
          localStorage.removeItem(STORAGE_KEY_V1);
        } catch (e) { /* non-fatal */ }
        return migrated;
      }
    }
    return null;
  } catch (e) { return null; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("save failed", e); }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function runShuffleReveal(finalSlots, onDone, opts) {
  opts = opts || {};
  const overlay = el("div", { class: "shuffle-overlay" });
  overlay.appendChild(el("div", { class: "shuffle-title" }, opts.title || "Drawing slots…"));
  const cells = [];
  if (opts.groups) {
    // Two labeled groups (Stack format: Court 1 / Court 2).
    const groupsWrap = el("div", { class: "shuffle-groups" });
    let cellIdx = 0;
    for (const group of opts.groups) {
      groupsWrap.appendChild(el("div", { class: "shuffle-group-label" }, group.label));
      const grid = el("div", { class: "shuffle-grid" });
      for (let k = 0; k < group.count; k++) {
        const c = el("div", { class: "shuffle-slot" }, finalSlots[cellIdx]);
        grid.appendChild(c);
        cells.push(c);
        cellIdx++;
      }
      groupsWrap.appendChild(grid);
    }
    overlay.appendChild(groupsWrap);
  } else {
    const grid = el("div", { class: "shuffle-grid" });
    for (let i = 0; i < 8; i++) {
      const c = el("div", { class: "shuffle-slot" }, finalSlots[i]);
      grid.appendChild(c);
      cells.push(c);
    }
    overlay.appendChild(grid);
  }
  overlay.appendChild(el("div", { class: "shuffle-skip" }, "Tap anywhere to skip"));
  document.body.appendChild(overlay);

  const startTime = performance.now();
  const totalMs = 1200;
  let frame;
  let done = false;

  function finish() {
    if (done) return;
    done = true;
    cancelAnimationFrame(frame);
    // lock-in: show finalSlots with locked styling
    for (let i = 0; i < 8; i++) {
      cells[i].textContent = finalSlots[i];
      cells[i].classList.add("locked");
    }
    setTimeout(() => {
      overlay.remove();
      onDone();
    }, 220);
  }

  overlay.addEventListener("click", finish);

  function tick(now) {
    const elapsed = now - startTime;
    if (elapsed >= totalMs) { finish(); return; }
    // ease-out: shuffle frequency slows toward the end
    const progress = elapsed / totalMs;
    const interval = 60 + 280 * progress; // 60ms early, 340ms late
    const stepIndex = Math.floor(elapsed / interval);
    // re-randomize cells (cosmetic only — finalSlots is the real assignment)
    const perm = shuffle(finalSlots);
    for (let i = 0; i < 8; i++) cells[i].textContent = perm[i];
    // progressive lock-in: start locking final cells in the last 35% of the animation
    if (progress > 0.65) {
      const lockedCount = Math.min(8, Math.floor((progress - 0.65) / 0.35 * 8) + 1);
      for (let i = 0; i < lockedCount; i++) {
        cells[i].textContent = finalSlots[i];
        cells[i].classList.add("locked");
      }
    }
    frame = requestAnimationFrame(tick);
  }
  frame = requestAnimationFrame(tick);
}

// Returns a fresh array of 7 round objects with randomized court 1/2 flip.
function generateRounds() {
  return SCHEDULE.map((roundDef, idx) => {
    const flip = Math.random() < 0.5;
    const c1 = flip ? roundDef[0] : roundDef[1];
    const c2 = flip ? roundDef[1] : roundDef[0];
    return {
      round: idx + 1,
      court1: { team1: c1[0].slice(), team2: c1[1].slice(), score1: null, score2: null },
      court2: { team1: c2[0].slice(), team2: c2[1].slice(), score1: null, score2: null },
    };
  });
}

// ============== Stack Format engine ==============
// Stack rounds use the same court1/court2 game shape as RR, but the schedule
// is built incrementally: each round's pairings depend on the prior round's
// scores. state.rounds.length grows as the tournament progresses.

function assignInitialStackCourts() {
  const slots = shuffle([1,2,3,4,5,6,7,8]);
  const c1 = shuffle(slots.slice(0, 4));
  const c2 = shuffle(slots.slice(4));
  return {
    round: 1,
    court1: { team1: [c1[0], c1[1]], team2: [c1[2], c1[3]], score1: null, score2: null },
    court2: { team1: [c2[0], c2[1]], team2: [c2[2], c2[3]], score1: null, score2: null },
  };
}

// Stack score gain for one player on one completed game.
//   pts:      points their team scored
//   isCourt1: was this game on Court 1?
//   won:      did their team win?
function stackScoreGain(pts, isCourt1, won) {
  if (!Number.isInteger(pts)) return 0;
  let gain = pts;
  if (isCourt1) gain += pts * 0.5;
  if (won) gain += 3;
  if (won && !isCourt1) gain += 2; // climbing bonus: a win on Court 2 earns a climb
  return gain;
}

// Per-player stack stats through the given round (1-based, inclusive).
function computeStackStats(throughRound) {
  const stats = [];
  for (let s = 1; s <= 8; s++) {
    stats.push({
      slot: s, name: nameOf(s),
      stackScore: 0,
      pointsScored: 0, pointsAgainst: 0,
      wins: 0, losses: 0,
      gamesOnCourt1: 0, gamesOnCourt2: 0,
      courtClimbs: 0, courtDrops: 0,
      partnersUsed: new Set(),
      onePointGames: { wins: 0, losses: 0 },
    });
  }
  const upTo = Math.min(throughRound || 0, state.rounds.length);
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    for (const courtKey of [1, 2]) {
      const game = courtKey === 1 ? r.court1 : r.court2;
      const teams = [game.team1, game.team2];
      teams.forEach(t => {
        stats[t[0]-1].partnersUsed.add(t[1]);
        stats[t[1]-1].partnersUsed.add(t[0]);
        if (courtKey === 1) { stats[t[0]-1].gamesOnCourt1++; stats[t[1]-1].gamesOnCourt1++; }
        else                { stats[t[0]-1].gamesOnCourt2++; stats[t[1]-1].gamesOnCourt2++; }
      });
      if (!isGameComplete(game)) continue;
      const t1Won = game.score1 > game.score2;
      const t2Won = game.score2 > game.score1;
      const margin = Math.abs(game.score1 - game.score2);
      for (const teamKey of ["team1", "team2"]) {
        const team = game[teamKey];
        const pts = teamKey === "team1" ? game.score1 : game.score2;
        const ag  = teamKey === "team1" ? game.score2 : game.score1;
        const won = (teamKey === "team1" && t1Won) || (teamKey === "team2" && t2Won);
        const lost = (teamKey === "team1" && t2Won) || (teamKey === "team2" && t1Won);
        const gain = stackScoreGain(pts, courtKey === 1, won);
        for (const slot of team) {
          const st = stats[slot-1];
          st.stackScore += gain;
          st.pointsScored += pts;
          st.pointsAgainst += ag;
          if (won) st.wins++;
          if (lost) st.losses++;
          if (margin === 1) {
            if (won) st.onePointGames.wins++;
            else if (lost) st.onePointGames.losses++;
          }
        }
      }
    }
    // Climbs / drops: derived from the i → i+1 court transition (only after the
    // next round has actually been built).
    if (i + 1 < state.rounds.length) {
      const nextR = state.rounds[i + 1];
      const onC1Now  = new Set([...r.court1.team1,     ...r.court1.team2]);
      const onC1Next = new Set([...nextR.court1.team1, ...nextR.court1.team2]);
      for (let s = 1; s <= 8; s++) {
        const wasC1 = onC1Now.has(s);
        const willC1 = onC1Next.has(s);
        if (!wasC1 && willC1) stats[s-1].courtClimbs++;
        if (wasC1 && !willC1) stats[s-1].courtDrops++;
      }
    }
  }
  return stats;
}

// Sort by stack score descending, tiebreak by tiebreakRandom ordering of slots.
function rankPlayersStack(throughRound) {
  const stats = computeStackStats(throughRound);
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  stats.sort((a, b) => {
    if (b.stackScore !== a.stackScore) return b.stackScore - a.stackScore;
    return tieRand.indexOf(a.slot - 1) - tieRand.indexOf(b.slot - 1);
  });
  return stats;
}

// Re-pair the four players assigned to a court for the next round.
//   slotsOnCourt:    the 4 slots that will play this court next round
//   prevSameCourt:   the prior round's game on THIS court (or null for round 1)
//   stackBySlot:     Map<slot, stackScore> at the time of pairing
// Returns [team1, team2], each a length-2 array of slots.
function pairForStackCourt(slotsOnCourt, prevSameCourt, stackBySlot) {
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  const ranked = slotsOnCourt.slice().sort((a, b) => {
    const sa = stackBySlot.get(a) || 0;
    const sb = stackBySlot.get(b) || 0;
    if (sb !== sa) return sb - sa;
    return tieRand.indexOf(a - 1) - tieRand.indexOf(b - 1);
  });
  // Default: rank1 + rank4 vs rank2 + rank3
  let teamA = [ranked[0], ranked[3]];
  let teamB = [ranked[1], ranked[2]];
  if (prevSameCourt) {
    const wasPair = (a, b) => {
      for (const t of [prevSameCourt.team1, prevSameCourt.team2]) {
        if (t.includes(a) && t.includes(b)) return true;
      }
      return false;
    };
    if (wasPair(teamA[0], teamA[1]) || wasPair(teamB[0], teamB[1])) {
      // Swap rank-3 and rank-4 to break the repeat. Movement guarantees at most
      // one prior-round pair carries over, so this swap always breaks any
      // single repeat.
      teamA = [ranked[0], ranked[2]];
      teamB = [ranked[1], ranked[3]];
    }
  }
  return [teamA, teamB];
}

// Build the next stack round from the previous (which must be complete and
// non-tied — both score1 !== score2).
function buildNextStackRound(prevRound) {
  const c1 = prevRound.court1, c2 = prevRound.court2;
  const c1Win  = c1.score1 > c1.score2 ? c1.team1 : c1.team2;
  const c1Lose = c1.score1 > c1.score2 ? c1.team2 : c1.team1;
  const c2Win  = c2.score1 > c2.score2 ? c2.team1 : c2.team2;
  const c2Lose = c2.score1 > c2.score2 ? c2.team2 : c2.team1;
  const newC1Slots = [...c1Win, ...c2Win];
  const newC2Slots = [...c1Lose, ...c2Lose];

  const stackStats = computeStackStats(prevRound.round);
  const stackBySlot = new Map(stackStats.map(s => [s.slot, s.stackScore]));

  const [c1A, c1B] = pairForStackCourt(newC1Slots, c1, stackBySlot);
  const [c2A, c2B] = pairForStackCourt(newC2Slots, c2, stackBySlot);

  return {
    round: prevRound.round + 1,
    court1: { team1: c1A, team2: c1B, score1: null, score2: null },
    court2: { team1: c2A, team2: c2B, score1: null, score2: null },
  };
}

function startTournament() {
  // Compute the assignment up-front (real source of truth).
  state.slots = shuffle(state.rawNames.map(s => s.trim()));
  state.tiebreakRandom = shuffle([0,1,2,3,4,5,6,7]);
  state.currentRound = 1;
  state.notifiedRounds = [];
  state.awardsShown = false;
  state.previousRanks = [];
  state.finals = null;
  if (state.format === "stack") {
    state.rounds = [assignInitialStackCourts()];
  } else {
    state.rounds = generateRounds();
  }
  state.phase = "playing";
  save();
  // Cosmetic reveal animation, then render the playing screen.
  if (state.format === "stack") {
    const r1 = state.rounds[0];
    const c1Slots = [...r1.court1.team1, ...r1.court1.team2];
    const c2Slots = [...r1.court2.team1, ...r1.court2.team2];
    const display = [...c1Slots.map(nameOf), ...c2Slots.map(nameOf)];
    runShuffleReveal(display, () => render(), {
      title: "Drawing courts…",
      groups: [
        { label: "🏆 Court 1", count: 4 },
        { label: "Court 2",    count: 4 },
      ],
    });
  } else {
    runShuffleReveal(state.slots.slice(), () => render());
  }
}

function nameOf(slot) { return state.slots[slot - 1] || ("P" + slot); }
function teamName(team) { return nameOf(team[0]) + " & " + nameOf(team[1]); }
function isGameComplete(g) { return Number.isInteger(g.score1) && Number.isInteger(g.score2); }
function isRoundComplete(r) { return isGameComplete(r.court1) && isGameComplete(r.court2); }

function computeStats(throughRound, includeFinals) {
  const stats = [];
  for (let s = 1; s <= 8; s++) {
    stats.push({ slot: s, name: nameOf(s), points: 0, wins: 0, losses: 0, diff: 0, played: 0, partnersUsed: new Set() });
  }
  const games = [];
  for (let i = 0; i < (throughRound || 0) && i < state.rounds.length; i++) {
    games.push({ ...state.rounds[i].court1, isFinal: false });
    games.push({ ...state.rounds[i].court2, isFinal: false });
  }
  if (includeFinals && state.finals) {
    games.push({ ...state.finals.championship, isFinal: true });
    games.push({ ...state.finals.consolation, isFinal: true });
  }
  for (const g of games) {
    if (!g.isFinal) {
      stats[g.team1[0]-1].partnersUsed.add(g.team1[1]);
      stats[g.team1[1]-1].partnersUsed.add(g.team1[0]);
      stats[g.team2[0]-1].partnersUsed.add(g.team2[1]);
      stats[g.team2[1]-1].partnersUsed.add(g.team2[0]);
    }
    if (!isGameComplete(g)) continue;
    const t1Win = g.score1 > g.score2;
    const t2Win = g.score2 > g.score1;
    for (const slot of g.team1) {
      const st = stats[slot-1];
      st.points += g.score1; st.diff += (g.score1 - g.score2); st.played++;
      if (t1Win) st.wins++; else if (t2Win) st.losses++;
    }
    for (const slot of g.team2) {
      const st = stats[slot-1];
      st.points += g.score2; st.diff += (g.score2 - g.score1); st.played++;
      if (t2Win) st.wins++; else if (t1Win) st.losses++;
    }
  }
  return stats;
}

function headToHead(slotA, slotB, throughRound) {
  let diff = 0;
  for (let i = 0; i < throughRound && i < state.rounds.length; i++) {
    const r = state.rounds[i];
    for (const g of [r.court1, r.court2]) {
      if (!isGameComplete(g)) continue;
      const aOn1 = g.team1.includes(slotA);
      const aOn2 = g.team2.includes(slotA);
      const bOn1 = g.team1.includes(slotB);
      const bOn2 = g.team2.includes(slotB);
      if (aOn1 && bOn2)      diff += (g.score1 - g.score2);
      else if (aOn2 && bOn1) diff += (g.score2 - g.score1);
    }
  }
  return diff;
}

function rankPlayers(throughRound) {
  const stats = computeStats(throughRound, false);
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  stats.sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.wins   !== a.wins)   return b.wins   - a.wins;
    if (b.diff   !== a.diff)   return b.diff   - a.diff;
    const h2h = headToHead(a.slot, b.slot, throughRound);
    if (h2h !== 0) return -h2h;
    return tieRand.indexOf(a.slot - 1) - tieRand.indexOf(b.slot - 1);
  });
  return stats;
}

// Format-aware overall ranking through `throughRound` (1-based, inclusive).
function rankPlayersForFormat(throughRound) {
  return state.format === "stack" ? rankPlayersStack(throughRound) : rankPlayers(throughRound);
}

function buildFinals() {
  const total = totalRegularRounds();
  const ranked = rankPlayersForFormat(total).map(s => s.slot);
  state.finals = {
    championship: { team1: [ranked[0], ranked[3]], team2: [ranked[1], ranked[2]], score1: null, score2: null },
    consolation:  { team1: [ranked[4], ranked[7]], team2: [ranked[5], ranked[6]], score1: null, score2: null },
  };
  state.phase = "finals";
  save();
}

// Returns { partner: number, courtKey: 1|2 } for the given player's next round,
// or null if there's no next round or no rounds yet. Partner chips are an RR
// affordance — Stack rounds are built incrementally so the next pairing isn't
// known until after advancing.
function nextPartnerInfo(slot) {
  if (state.phase !== "playing") return null;
  if (state.format === "stack") return null;
  if (state.currentRound >= 7) return null;
  const next = state.rounds[state.currentRound]; // currentRound is 1-based; this is round N+1
  if (!next) return null;
  for (const courtKey of [1, 2]) {
    const game = courtKey === 1 ? next.court1 : next.court2;
    for (const team of [game.team1, game.team2]) {
      const idx = team.indexOf(slot);
      if (idx !== -1) return { partner: team[1 - idx], courtKey };
    }
  }
  return null;
}

function showToast(text) {
  let stack = document.querySelector(".toast-stack");
  if (!stack) {
    stack = el("div", { class: "toast-stack" });
    document.body.appendChild(stack);
  }
  const t = el("div", { class: "toast" }, text);
  stack.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}

function maybeFireRoundComplete(primaryBtn) {
  if (state.phase !== "playing") return;
  const idx = state.currentRound - 1;
  const round = state.rounds[idx];
  if (!round) return;
  // In Stack format, a tied round can't advance the tournament — don't celebrate it yet.
  const advanceable = state.format === "stack" ? isRoundDecided(round) : isRoundComplete(round);
  if (!advanceable) return;
  if (state.notifiedRounds.includes(state.currentRound)) return;
  state.notifiedRounds.push(state.currentRound);
  save();
  showToast("🎉 Round " + state.currentRound + " complete!");
  if (primaryBtn) {
    primaryBtn.classList.remove("shimmering");
    // force reflow so the keyframe restarts
    void primaryBtn.offsetWidth;
    primaryBtn.classList.add("shimmering");
    setTimeout(() => primaryBtn.classList.remove("shimmering"), 1600);
  }
}

// rank: 1-based seed number; kind: "gold" (championship) or "silver" (consolation)
function seedPill(rank, kind) {
  return el("span", { class: "seed-pill " + kind }, "#" + rank);
}

// Returns an array of 8 stat objects in tournament-outcome tier order
// (champ-W > champ-L > cons-W > cons-L). Falls back to season order if finals
// are missing or undecided. The within-tier sort is by season rank (which is
// format-aware: rankPlayers for RR, rankPlayersStack for Stack).
function finalRanking() {
  const seasonOrder = rankPlayersForFormat(totalRegularRounds());
  const seasonRank = new Map();
  seasonOrder.forEach((s, i) => seasonRank.set(s.slot, i));
  const bySlot = new Map();
  seasonOrder.forEach(s => bySlot.set(s.slot, s));

  const f = state.finals;
  const allDecided = f
    && isGameComplete(f.championship) && f.championship.score1 !== f.championship.score2
    && isGameComplete(f.consolation)  && f.consolation.score1  !== f.consolation.score2;
  if (!allDecided) return seasonOrder.slice();

  const champWinTeam  = f.championship.score1 > f.championship.score2 ? f.championship.team1 : f.championship.team2;
  const champLoseTeam = f.championship.score1 > f.championship.score2 ? f.championship.team2 : f.championship.team1;
  const consWinTeam   = f.consolation.score1  > f.consolation.score2  ? f.consolation.team1  : f.consolation.team2;
  const consLoseTeam  = f.consolation.score1  > f.consolation.score2  ? f.consolation.team2  : f.consolation.team1;

  const sortByseason = arr => arr.slice().sort((a, b) => seasonRank.get(a) - seasonRank.get(b));
  const ordered = [
    ...sortByseason(champWinTeam),
    ...sortByseason(champLoseTeam),
    ...sortByseason(consWinTeam),
    ...sortByseason(consLoseTeam),
  ];
  return ordered.map(slot => bySlot.get(slot));
}

// ====================== rendering ======================
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      const v = props[k];
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "style") e.setAttribute("style", v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());
  if (state.phase === "setup")        app.appendChild(renderSetup());

function canStart() {

  if (trimmed.some(n => !n)) return false;

}

// Returns { ok: true, names: string[8] } or { ok: false, count: number, error: string }.
// Splits on newlines or commas, trims, drops empties. Validates exactly 8 unique
// (case-insensitive, matching canStart()'s gate).
function parsePastedNames(text) {
  const parts = String(text || "")
    .split(/[\n,]/)
    .map(s => s.trim())
    .filter(Boolean);
  const lower = parts.map(s => s.toLowerCase());
  const uniqueCount = new Set(lower).size;
  if (parts.length !== 8 || uniqueCount !== 8) {
    return { ok: false, count: parts.length, error:
      `found ${parts.length}${parts.length === uniqueCount ? "" : ` (${parts.length - uniqueCount} duplicate)`} — need 8 unique names` };
  }
  return { ok: true, names: parts };
}

function openPasteModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Paste 8 names"));
  modal.appendChild(el("p", { class: "muted", style: "margin: 0 0 12px;" },
    "One name per line, or comma-separated. Whitespace is trimmed."));

  const textarea = el("textarea", {
    class: "paste-textarea",
    placeholder: "Adrian\nAlex\nJohn\nJoe\nKen\nKris\nSam\nTodd",
    autocomplete: "off",
    autocapitalize: "words",
    autocorrect: "off",
    spellcheck: "false",
  });
  modal.appendChild(textarea);

  const errorLine = el("div", { class: "paste-error" });
  modal.appendChild(errorLine);

  const fillBtn = el("button", {
    class: "primary",
    style: "width: 100%; margin-top: 12px;",
    onclick: () => {
      const result = parsePastedNames(textarea.value);
      if (!result.ok) {
        errorLine.textContent = result.error;
        return;
      }
      for (let i = 0; i < 8; i++) state.rawNames[i] = result.names[i];
      save();
      close();
      render();
    }
  }, "Fill names");
  modal.appendChild(fillBtn);

  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 8px;",
    onclick: close,
  }, "Cancel"));

  bg.appendChild(modal);
  document.body.appendChild(bg);
  setTimeout(() => textarea.focus(), 0);
}

// ---------- playing screens ----------
function isGameDecided(g) { return isGameComplete(g) && g.score1 !== g.score2; }
function isRoundDecided(r) { return isGameDecided(r.court1) && isGameDecided(r.court2); }

function movementToastText(prevRound, newRound) {
  // climbers = c2 winners (now on new c1)
  const c2Win = prevRound.court2.score1 > prevRound.court2.score2 ? prevRound.court2.team1 : prevRound.court2.team2;
  const c1Lose = prevRound.court1.score1 > prevRound.court1.score2 ? prevRound.court1.team2 : prevRound.court1.team1;
  return teamName(c2Win) + " climb to Court 1 · " + teamName(c1Lose) + " drop to Court 2";
}

function renderPlaying() {
  const wrap = el("div");
  const round = state.rounds[state.currentRound - 1];
  const isStack = state.format === "stack";
  const total = totalRegularRounds();

  // Refresh hooks injected by score inputs
  const refreshes = [];
  const refresh = () => refreshes.forEach(fn => fn());

  wrap.appendChild(renderRoundCourts(round, false, refreshes));

  // navigation row
  // RR: round is "advanceable" when both scores are present (ties allowed).
  // Stack: round is "advanceable" only when both courts are decided (no ties).
  const advanceReady = isStack ? isRoundDecided(round) : isRoundComplete(round);
  const allRoundsAdvanceable = isStack
    ? (state.rounds.length === total && state.rounds.every(isRoundDecided))
    : state.rounds.every(isRoundComplete);
  const actions = el("div", { class: "row-actions" });
  if (state.currentRound > 1) {
    actions.appendChild(el("button", {
      class: "secondary",
      onclick: () => { state.currentRound--; save(); render(); }
    }, "← Round " + (state.currentRound - 1)));
  }
  let primaryBtn;
  if (state.currentRound < total) {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        if (isStack) {
          if (!isRoundDecided(round)) return;
          // Build the next round if it doesn't already exist (e.g. user went
          // back, then advanced again — keep the existing pairing). previousRanks
          // is snapshotted only on first-time advance so backward navigation
          // doesn't clobber the baseline used for trajectory arrows.
          let toastMsg = null;
          if (state.rounds.length === state.currentRound) {
            state.previousRanks = rankPlayersStack(state.currentRound).map(s => s.slot);
            const next = buildNextStackRound(round);
            state.rounds.push(next);
            toastMsg = movementToastText(round, next);
          }
          state.currentRound++;
          save();
          render();
          if (toastMsg) showToast(toastMsg);
        } else {
          if (!isRoundComplete(round)) return;
          state.currentRound++;
          save();
          render();
        }
      }
    }, "Round " + (state.currentRound + 1) + " →");
    primaryBtn.disabled = !advanceReady;
  } else {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        // Re-evaluate at click time — score inputs may have completed the
        // round since this button was rendered.
        const ready = isStack
          ? (state.rounds.length === total && state.rounds.every(isRoundDecided))
          : state.rounds.every(isRoundComplete);
        if (ready) { buildFinals(); render(); }
      }
    }, "Build Finals →");
    primaryBtn.disabled = !allRoundsAdvanceable;
  }
  actions.appendChild(primaryBtn);
  wrap.appendChild(actions);

  // standings
  const standingsOpts = () => {
    const completedRounds = state.rounds.slice(0, state.currentRound).filter(isRoundComplete).length;
    const sub = completedRounds > 0
      ? "Through " + completedRounds + " round" + (completedRounds > 1 ? "s" : "")
      : "Awaiting first scores";
    return { subtitle: sub };
  };
  let standingsCard = renderStandingsCard(state.currentRound, standingsOpts());
  wrap.appendChild(standingsCard);

  // history
  const history = renderHistory(state.currentRound);
  if (history) wrap.appendChild(history);

  // Wire refresh: update primary button state + replace standings live
  refreshes.push(() => {
    if (state.currentRound < total) {
      primaryBtn.disabled = isStack ? !isRoundDecided(round) : !isRoundComplete(round);
    } else {
      primaryBtn.disabled = isStack
        ? !(state.rounds.length === total && state.rounds.every(isRoundDecided))
        : !state.rounds.every(isRoundComplete);
    }
    const newStandings = renderStandingsCard(state.currentRound, standingsOpts());
    standingsCard.replaceWith(newStandings);
    standingsCard = newStandings;
    maybeFireRoundComplete(primaryBtn);
  });

  return wrap;
}

function renderRoundCourts(round, isFinals, refreshes) {
  const wrap = el("div", { class: "court-row" });
  if (isFinals) {
    const seeds = seedRankBySlot();
    wrap.appendChild(renderCourtCard(round.championship, "champ", refreshes, { kind: "gold", seeds }));
    wrap.appendChild(renderCourtCard(round.consolation,  "cons",  refreshes, { kind: "silver", seeds }));
  } else {
    wrap.appendChild(renderCourtCard(round.court1, 1, refreshes));
    wrap.appendChild(renderCourtCard(round.court2, 2, refreshes));
  }
  return wrap;
}

function renderCourtCard(game, courtKey, refreshes, seedInfo) {
  let className = "court-card";
  let labelText = "";
  const isStack = state.format === "stack";
  if (courtKey === "champ")     { className += " gold";   labelText = "🏆 CHAMPIONSHIP"; }
  else if (courtKey === "cons") { className += " silver"; labelText = "🥈 CONSOLATION"; }
  else if (courtKey === 1) {
    className += " c1" + (isStack ? " stack-top" : "");
    labelText = isStack ? "🏆 COURT 1" : "SOUTH COURT";
  } else {
    className += " c2" + (isStack ? " stack-bot" : "");
    labelText = isStack ? "COURT 2" : "NORTH COURT";
  }

  const card = el("div", { class: className });
  card.appendChild(el("div", { class: "court-label" }, labelText));
  if (courtKey === "champ") {
    card.appendChild(el("div", { class: "pairing-caption" },
      "Balanced pairing — top seed + 4th vs 2nd + 3rd"));
  }

  const matchup = el("div", { class: "matchup" });
  const team1Wrap = renderTeamRow(game, "team1", "score1", "score2", refreshes, seedInfo);
  const team2Wrap = renderTeamRow(game, "team2", "score2", "score1", refreshes, seedInfo);
  matchup.appendChild(team1Wrap.node);
  matchup.appendChild(team2Wrap.node);
  card.appendChild(matchup);

  const summary = el("div", { class: "court-summary" });
  card.appendChild(summary);

  const updateSummary = () => {
    const s1 = game.score1, s2 = game.score2;
    if (Number.isInteger(s1) && Number.isInteger(s2)) {
      if (s1 > s2)      { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team1) + " win by " + (s1 - s2); }
      else if (s2 > s1) { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team2) + " win by " + (s2 - s1); }
      else              { summary.className = "court-summary tiemsg"; summary.textContent = "Tied — enter a tiebreaker"; }
    } else {
      summary.className = "court-summary";
      summary.textContent = "Awaiting scores";
    }
    team1Wrap.applyWinnerStyle();
    team2Wrap.applyWinnerStyle();
  };
  updateSummary();
  refreshes.push(updateSummary);

  return card;
}

function renderTeamRow(game, teamKey, scoreKey, otherScoreKey, refreshes, seedInfo) {
  const team = game[teamKey];
  const node = el("div", { class: "team-row" });
  if (seedInfo) {
    const kind = seedInfo.kind; // "gold" or "silver"
    const seeds = seedInfo.seeds; // Map<slot, rank>
    const nameNode = el("div", { class: "team-name" });
    nameNode.appendChild(seedPill(seeds.get(team[0]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[0])));
    nameNode.appendChild(document.createTextNode(" & "));
    nameNode.appendChild(seedPill(seeds.get(team[1]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[1])));
    node.appendChild(nameNode);
  } else {
    node.appendChild(el("div", { class: "team-name" }, nameOf(team[0]) + " & " + nameOf(team[1])));
  }

  // Quick-fill pill: shown only when both scores are null.
  const pillSlot = el("div");  // takes the auto column even when empty
  node.appendChild(pillSlot);

  const input = el("input", {
    class: "score-input",
    type: "number",
    inputmode: "numeric",
    pattern: "[0-9]*",
    min: "0",
    placeholder: "–",
    value: Number.isInteger(game[scoreKey]) ? String(game[scoreKey]) : "",
    "aria-label": "Score for " + nameOf(team[0]) + " and " + nameOf(team[1]),
  });
  input.addEventListener("input", () => {
    const v = input.value.trim();
    if (v === "") {
      game[scoreKey] = null;
    } else {
      const n = parseInt(v, 10);
      if (!Number.isNaN(n) && n >= 0) game[scoreKey] = n;
    }
    save();
    refreshes.forEach(fn => fn());
  });
  node.appendChild(input);

  function applyWinnerStyle() {
    const a = game[scoreKey], b = game[otherScoreKey];
    const isWinner = Number.isInteger(a) && Number.isInteger(b) && a > b;
    node.classList.toggle("winner", isWinner);
    input.classList.toggle("winner", isWinner);
  }

  function refreshPill() {
    pillSlot.textContent = "";
    // Quick-fill is a Round-screen feature only; suppress on Finals matchups.
    if (state.phase !== "playing") return;
    const bothBlank = !Number.isInteger(game.score1) && !Number.isInteger(game.score2);
    if (!bothBlank) return;
    const pill = el("button", {
      class: "quickfill-pill",
      title: "Mark this team as winner with " + state.winScore + " points",
    }, "× " + state.winScore);
    pill.addEventListener("click", () => {
      game[scoreKey] = state.winScore;
      save();
      refreshes.forEach(fn => fn());
      // Focus the opponent's input so the user can type the loser's score.
      const allInputs = node.parentElement.querySelectorAll(".score-input");
      for (const inp of allInputs) {
        if (inp !== input) { inp.focus(); break; }
      }
    });
    pillSlot.appendChild(pill);
  }
  refreshPill();
  refreshes.push(refreshPill);

  return { node, applyWinnerStyle };
}

const MEDALS = ["🥇", "🥈", "🥉"];

function rankCell(i) {
  if (i < 3) return el("td", { class: "rank" }, el("span", { class: "rank-badge medal" }, MEDALS[i]));
  return el("td", { class: "rank" }, el("span", { class: "rank-badge" }, "" + (i + 1)));
}

function trajectorySpan(slot, currentIdx) {
  const prev = state.previousRanks || [];
  if (prev.length !== 8) return null;
  const prevIdx = prev.indexOf(slot);
  if (prevIdx < 0) return null;
  const diff = prevIdx - currentIdx;
  if (diff > 0)  return el("span", { class: "rank-trajectory up",   title: "Up " + diff }, "▲" + diff);
  if (diff < 0)  return el("span", { class: "rank-trajectory down", title: "Down " + (-diff) }, "▼" + (-diff));
  return el("span", { class: "rank-trajectory same", title: "No change" }, "—");
}

      }, (s.diff > 0 ? "+" : "") + s.diff),
    ));
