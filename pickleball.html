function renderStackStandingsCard(throughRound, opts) {
  opts = opts || {};
  const stats = rankPlayersStack(throughRound);
  const card = el("div", { class: "card" });
  const head = el("div", { style: "display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap;" },
    el("h3", { style: "margin: 0;" }, opts.title || "Live Standings"),
    opts.subtitle ? el("span", { class: "muted" }, opts.subtitle) : null,
  );
  card.appendChild(head);
  const table = el("table", { class: "standings" });
  const colgroup = el("colgroup", null,
    el("col", { class: "c-rank" }),
    el("col", { class: "c-name" }),
    el("col", { class: "c-pts" }),
    el("col", { class: "c-w" }),
    el("col", { class: "c-stack-extra" }),
    el("col", { class: "c-stack-extra" }),
  );
  table.appendChild(colgroup);
  table.appendChild(el("thead", null, el("tr", null,
    el("th", { style: "text-align: center;" }, "#"),
    el("th", null, "Player"),
    el("th", { class: "num", title: "Stack Score" }, "SS"),
    el("th", { class: "num", title: "Wins–Losses" }, "W–L"),
    el("th", { class: "num", title: "Court climbs (C2 → C1)" }, "🔼"),
    el("th", { class: "num", title: "Games on Court 1" }, "⏱"),
  )));
  const tbody = el("tbody");
  stats.forEach((s, i) => {
    const traj = trajectorySpan(s.slot, i);
    const rankTd = el("td", { class: "rank" });
    if (i < 3) rankTd.appendChild(el("span", { class: "rank-badge medal" }, MEDALS[i]));
    else       rankTd.appendChild(el("span", { class: "rank-badge" }, "" + (i + 1)));
    if (traj) rankTd.appendChild(traj);
    tbody.appendChild(el("tr", { class: "r" + (i + 1) },
      rankTd,
      el("td", { class: "name" }, s.name),
      el("td", { class: "num" }, s.stackScore.toFixed(1)),
      el("td", { class: "num" }, s.wins + "–" + s.losses),
      el("td", { class: "num" }, "" + s.courtClimbs),
      el("td", { class: "num" }, "" + s.gamesOnCourt1),
    ));
  });
  table.appendChild(tbody);
  card.appendChild(table);
  return card;
}

function renderHistory(currentRound) {
  const past = state.rounds.slice(0, currentRound - 1);
  if (past.length === 0) return null;
  const details = el("details", { class: "history" });
  details.appendChild(el("summary", null,
    el("span", null, "History (" + past.length + " round" + (past.length > 1 ? "s" : "") + ")")
  ));
  const body = el("div", { class: "body" });
  past.forEach(r => {
    const block = el("div", { class: "history-round" });
    block.appendChild(el("div", { class: "history-round-title" }, "Round " + r.round));
    const isStack = state.format === "stack";
    const c1Label = isStack ? "Court 1" : "South";
    const c2Label = isStack ? "Court 2" : "North";
    [{ g: r.court1, num: 1, label: c1Label }, { g: r.court2, num: 2, label: c2Label }].forEach(({ g, num, label }) => {
      const t1Win = isGameComplete(g) && g.score1 > g.score2;
      const t2Win = isGameComplete(g) && g.score2 > g.score1;
      const scoreText = (Number.isInteger(g.score1) ? g.score1 : "–") + "–" + (Number.isInteger(g.score2) ? g.score2 : "–");
      const row = el("div", { class: "history-game" },
        el("span", { class: "court-tag c" + num }, label),
        el("span", { class: "game-text" },
          el("span", { class: t1Win ? "winning-team" : "" }, teamName(g.team1)),
          " vs ",
          el("span", { class: t2Win ? "winning-team" : "" }, teamName(g.team2)),
        ),
        el("span", { class: "game-score" }, scoreText),
      );
      block.appendChild(row);
    });
    body.appendChild(block);
  });
  details.appendChild(body);
  return details;
}

// For the current finals, returns a Map<slot, rank> using the format's season order.
function seedRankBySlot() {
  const ranked = rankPlayersForFormat(totalRegularRounds());
  const m = new Map();
  ranked.forEach((s, i) => m.set(s.slot, i + 1));
  return m;
}

// ---------- finals screen ----------
function renderFinalsScreen() {
  const wrap = el("div");
  const isStack = state.format === "stack";
  const total = totalRegularRounds();
  const ranked = rankPlayersForFormat(total);

  // Seeds card
  const seedsCard = el("div", { class: "card" });
  seedsCard.appendChild(el("h3", null, "Seeds (after " + total + " rounds)"));
  const grid = el("div", { class: "seeds-grid" });
  ranked.forEach((s, i) => {
    const meta = isStack
      ? s.stackScore.toFixed(1) + " SS · " + s.wins + "W"
      : s.points + " pts · " + s.wins + "W";
    grid.appendChild(el("div", { class: "seed-row" },
      el("span", { class: "seed-rank" }, "#" + (i + 1)),
      el("span", null, s.name),
      el("span", { class: "seed-meta" }, meta),
    ));
  });
  seedsCard.appendChild(grid);
  wrap.appendChild(seedsCard);

  const refreshes = [];
  wrap.appendChild(renderRoundCourts(state.finals, true, refreshes));

  const finalsDecided = (g) => isGameComplete(g) && g.score1 !== g.score2;
  const finalsReady = () =>
    finalsDecided(state.finals.championship) && finalsDecided(state.finals.consolation);

  const finishBtn = el("button", {
    class: "primary",
    style: "width: 100%; margin-bottom: 8px;",
    onclick: () => {
      if (finalsReady()) {
        state.phase = "done";
        save();
        render();
      }
    }
  }, "👑 Crown Champions");
  finishBtn.disabled = !finalsReady();
  refreshes.push(() => {
    finishBtn.disabled = !finalsReady();
  });
  wrap.appendChild(finishBtn);

  wrap.appendChild(el("button", {
    class: "ghost",
    style: "width: 100%;",
    onclick: () => {
      state.phase = "playing";
      state.currentRound = total;
      state.finals = null;
      save(); render();
    }
  }, "← Back to Round " + total));
  return wrap;
}

// ---------- done screen ----------
function renderPodium(ranking) {
  const isStack = state.format === "stack";
  let labelBySlot;
  if (isStack) {
    const stackStats = computeStackStats(state.rounds.length);
    labelBySlot = new Map(stackStats.map(s => [s.slot, s.stackScore.toFixed(1) + " SS"]));
  } else {
    const stats = computeStats(7, true);
    labelBySlot = new Map(stats.map(s => [s.slot, s.points + " pts"]));
  }
  const order = ["silver", "gold", "bronze"]; // visual left/center/right
  const ranks = [ranking[1], ranking[0], ranking[2]]; // map to visual order
  const emojis = { silver: "🥈", gold: "🥇", bronze: "🥉" };
  const podium = el("div", { class: "podium" });
  order.forEach((kind, i) => {
    const r = ranks[i];
    const step = el("div", { class: "podium-step " + kind });

    step.appendChild(el("div", { class: "podium-bar" }, emojis[kind]));

function renderScorecard(game) {
  const win1 = game.score1 > game.score2;
  const win2 = game.score2 > game.score1;
  return el("div", { class: "scorecard" },
    el("div", { class: "sc-team left" + (win1 ? " win" : "") }, teamName(game.team1)),
    el("div", { class: "sc-score" }, game.score1 + " – " + game.score2),
    el("div", { class: "sc-team right" + (win2 ? " win" : "") }, teamName(game.team2)),
  );
}

// Returns { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo }.
// Each award is { names: string[], detail: string|null }. names is empty if no
// qualifying entry; multiple names indicate ties. climber/anchor are only
// populated for Stack format; closer/bestDuo apply to both formats.
function computeAwards() {
  const isStack = state.format === "stack";

  // MVP — format-aware: Stack uses Stack Score, RR uses raw points.
  let mvp;
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxSS = ss.reduce((m, s) => Math.max(m, s.stackScore), 0);
    const winners = ss.filter(s => s.stackScore === maxSS && maxSS > 0);
    mvp = winners.length
      ? { names: winners.map(s => nameOf(s.slot)), detail: maxSS.toFixed(1) + " SS" }
      : { names: [], detail: null };
  } else {
    const stats = computeStats(7, true);
    const maxPts = stats.reduce((m, s) => Math.max(m, s.points), 0);
    const mvpNames = stats.filter(s => s.points === maxPts).map(s => nameOf(s.slot));
    mvp = { names: mvpNames, detail: maxPts + " pts" };
  }

  // Build chronological game list: regular rounds (each has c1, c2), then champ, cons.
  const games = [];
  const c1Tag = isStack ? "Court 1" : "South";
  const c2Tag = isStack ? "Court 2" : "North";
  for (let r = 0; r < state.rounds.length; r++) {
    const round = state.rounds[r];
    games.push({ ...round.court1, label: "R" + (r + 1) + " " + c1Tag });
    games.push({ ...round.court2, label: "R" + (r + 1) + " " + c2Tag });
  }
  if (state.finals) {
    games.push({ ...state.finals.championship, label: "Championship" });
    games.push({ ...state.finals.consolation,  label: "Consolation" });
  }
  // Two views of the game list:
  //   completed  — every game that has both scores (ties included). Used for Hot Streak so a tied game properly resets streaks.
  //   decided    — completed AND non-tied. Used for Biggest Win / Closest Game.
  const completed = games.filter(g => isGameComplete(g));
  const decided = completed.filter(g => g.score1 !== g.score2);

  // For each decided game, derive the winner-side summary.
  const summarized = decided.map(g => {
    const team1Won = g.score1 > g.score2;
    const winTeam = team1Won ? g.team1 : g.team2;
    const winScore = team1Won ? g.score1 : g.score2;
    const loseScore = team1Won ? g.score2 : g.score1;
    return {
      diff: winScore - loseScore,
      winTeam,
      winScore,
      loseScore,
      label: g.label,
    };
  });

  // Biggest Win — largest diff. Tied diffs all win; report all winning teams.
  let biggestWin = { names: [], detail: null };
  if (summarized.length) {
    const maxDiff = Math.max(...summarized.map(s => s.diff));
    const winners = summarized.filter(s => s.diff === maxDiff);
    biggestWin = {
      names: winners.map(w => teamName(w.winTeam) + " +" + w.diff),
      detail: winners.map(w => w.winScore + "–" + w.loseScore + " · " + w.label).join(" / "),
    };
  }

  // Closest Game — smallest diff; tiebreak by descending winning score.
  // Multiple games matching the best (diff, -winScore) pair are all reported.
  let closestGame = { names: [], detail: null };
  if (summarized.length) {
    const minDiff = Math.min(...summarized.map(s => s.diff));
    const closestSet = summarized.filter(s => s.diff === minDiff);
    const maxWinScore = Math.max(...closestSet.map(s => s.winScore));
    const tied = closestSet.filter(s => s.winScore === maxWinScore);
    closestGame = {
      names: tied.map(t => t.winScore + "–" + t.loseScore),
      detail: tied.map(t => t.label).join(" / "),
    };
  }

  // Hot Streak — longest consecutive-wins run for a single player.
  // Iterates every completed game (including ties) so a tied game resets
  // streaks for all four involved players.
  const streaks = new Map(); // slot -> current run
  const best = new Map();    // slot -> max run seen
  for (const g of completed) {
    if (g.score1 === g.score2) {
      for (const slot of [...g.team1, ...g.team2]) {
        best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
        streaks.set(slot, 0);
      }
      continue;
    }
    const team1Won = g.score1 > g.score2;
    const winners = team1Won ? g.team1 : g.team2;
    const losers = team1Won ? g.team2 : g.team1;
    for (const slot of winners) {
      streaks.set(slot, (streaks.get(slot) || 0) + 1);
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot)));
    }
    for (const slot of losers) {
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
      streaks.set(slot, 0);
    }
  }
  for (const [slot, cur] of streaks) {
    best.set(slot, Math.max(best.get(slot) || 0, cur));
  }
  const maxStreak = best.size ? Math.max(...best.values()) : 0;
  const streakSlots = maxStreak > 0
    ? [...best.entries()].filter(([, v]) => v === maxStreak).map(([k]) => k)
    : [];
  const hotStreak = streakSlots.length
    ? { names: streakSlots.map(nameOf), detail: maxStreak + " in a row" }
    : { names: [], detail: null };

  // Climber — most courtClimbs (Stack only).
  // Anchor  — most gamesOnCourt1 (Stack only).
  let climber = { names: [], detail: null };
  let anchor  = { names: [], detail: null };
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxClimbs = ss.reduce((m, s) => Math.max(m, s.courtClimbs), 0);
    if (maxClimbs > 0) {
      const c = ss.filter(s => s.courtClimbs === maxClimbs);
      climber = { names: c.map(s => nameOf(s.slot)), detail: maxClimbs + " climb" + (maxClimbs > 1 ? "s" : "") };
    }
    const maxC1 = ss.reduce((m, s) => Math.max(m, s.gamesOnCourt1), 0);
    if (maxC1 > 0) {
      const a = ss.filter(s => s.gamesOnCourt1 === maxC1);
      anchor = { names: a.map(s => nameOf(s.slot)), detail: maxC1 + " on Court 1" };
    }
  }

  // Closer — best W-L in 1-point games (both formats). Hidden if no 1-pt games.
  // "Best" = most wins, tiebreak fewest losses; ties listed.
  const opg = new Map();
  for (let s = 1; s <= 8; s++) opg.set(s, { wins: 0, losses: 0 });
  let anyOPG = false;
  for (const g of decided) {
    if (Math.abs(g.score1 - g.score2) !== 1) continue;
    anyOPG = true;
    const t1Won = g.score1 > g.score2;
    for (const slot of g.team1) {
      if (t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
    for (const slot of g.team2) {
      if (!t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
  }
  let closer = { names: [], detail: null };
  if (anyOPG) {
    const candidates = [...opg.entries()]
      .map(([slot, v]) => ({ slot, ...v }))
      .filter(c => c.wins > 0);
    if (candidates.length) {
      candidates.sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        return a.losses - b.losses;
      });
      const top = candidates[0];
      const tied = candidates.filter(c => c.wins === top.wins && c.losses === top.losses);
      closer = {
        names: tied.map(c => nameOf(c.slot)),
        detail: top.wins + "–" + top.losses + " in 1-pt games",
      };
    }
  }

  // Best Duo — partner pair with highest win rate together (min 1 win).
  // Win-rate ties broken by aggregate point differential across their games together.
  const pairKey = (a, b) => a < b ? a + "-" + b : b + "-" + a;
  const duos = new Map();
  for (const g of decided) {
    for (const teamKey of ["team1", "team2"]) {
      const team = g[teamKey];
      const pts = teamKey === "team1" ? g.score1 : g.score2;
      const ag  = teamKey === "team1" ? g.score2 : g.score1;
      const won = pts > ag;
      const k = pairKey(team[0], team[1]);
      if (!duos.has(k)) duos.set(k, {
        slots: [team[0], team[1]].sort((a,b)=>a-b),
        games: 0, wins: 0, losses: 0, diff: 0,
      });
      const e = duos.get(k);
      e.games++;
      if (won) e.wins++; else e.losses++;
      e.diff += (pts - ag);
    }
  }
  let bestDuo = { names: [], detail: null };
  const eligibleDuos = [...duos.values()].filter(e => e.wins >= 1);
  if (eligibleDuos.length) {
    eligibleDuos.sort((a, b) => {
      const wrA = a.wins / a.games;
      const wrB = b.wins / b.games;
      if (wrB !== wrA) return wrB - wrA;
      return b.diff - a.diff;
    });
    const top = eligibleDuos[0];
    const topRate = top.wins / top.games;
    const tied = eligibleDuos.filter(e =>
      (e.wins / e.games) === topRate && e.diff === top.diff
    );
    bestDuo = {
      names: tied.map(e => teamName(e.slots)),
      detail: top.wins + "–" + top.losses + " (" + Math.round(topRate * 100) + "%)",
    };
  }

  return { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo };
}

function renderAwardsStrip() {
  const a = computeAwards();
  const wrap = el("div", { class: "awards-strip" });
  const chip = (label, item, inlineDetail) => {
    const node = el("div", { class: "award-chip" });
    node.appendChild(el("div", { class: "award-label" }, label));
    const valueText = item.names.length ? item.names.join(", ") : "—";
    const valueEl = el("div", { class: "award-value" }, valueText);
    if (item.detail && item.names.length && inlineDetail) {
      valueEl.appendChild(document.createTextNode(" · " + item.detail));
    }
    node.appendChild(valueEl);
    if (item.detail && item.names.length && !inlineDetail) {
      node.appendChild(el("div", { class: "award-detail" }, item.detail));
    }
    return node;
  };
  wrap.appendChild(chip("🎯 MVP", a.mvp, true));            // inline detail
  wrap.appendChild(chip("💥 BIGGEST WIN", a.biggestWin, false));
  wrap.appendChild(chip("🤏 CLOSEST GAME", a.closestGame, false));
  wrap.appendChild(chip("🔥 HOT STREAK", a.hotStreak, true)); // inline detail
  if (state.format === "stack") {
    wrap.appendChild(chip("🧗 CLIMBER", a.climber, true));
    wrap.appendChild(chip("⚓ ANCHOR", a.anchor, true));
  }
  if (a.closer.names.length) {
    wrap.appendChild(chip("🎯 CLOSER", a.closer, true));
  }
  if (a.bestDuo.names.length) {
    wrap.appendChild(chip("🤝 BEST DUO", a.bestDuo, true));
  }
  return wrap;
}

function runConfetti() {
  const canvas = el("canvas", {
    style: "position: fixed; inset: 0; z-index: 90; pointer-events: none;"
  });
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + "px";
  canvas.style.height = window.innerHeight + "px";
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const colors = ["#fbbf24", "#fde047", "#cbd5e1", "#d97706", "#38bdf8", "#a78bfa", "#10b981"];
  const N = 80;
  const parts = Array.from({ length: N }, () => ({
    x: Math.random() * canvas.width,
    y: -Math.random() * 80,
    vx: (Math.random() - 0.5) * 6,
    vy: 2 + Math.random() * 4,
    size: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.3,
  }));
  const start = performance.now();
  const totalMs = 2000;
  function frame(now) {
    const elapsed = now - start;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (const p of parts) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12; // gravity
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.4);
      ctx.restore();
    }
    if (elapsed < totalMs) {
      requestAnimationFrame(frame);
    } else {
      canvas.remove();
    }
  }
  requestAnimationFrame(frame);
}

function renderDoneScreen() {
  const wrap = el("div");
  const f = state.finals;
  const champ = f.championship, cons = f.consolation;
  const champWin = champ.score1 > champ.score2 ? champ.team1 : (champ.score2 > champ.score1 ? champ.team2 : null);
  const consWin  = cons.score1  > cons.score2  ? cons.team1  : (cons.score2  > cons.score1  ? cons.team2  : null);
  const ranking = finalRanking();

  // First-view confetti, gated on awardsShown
  if (!state.awardsShown) {
    state.awardsShown = true;
    save();
    // defer so confetti fires after the DOM is mounted
    queueMicrotask(runConfetti);
  }

  const card = el("div", { class: "card" });
  const champions = el("div", { class: "champions" });
  champions.appendChild(el("div", { class: "crown" }, "👑"));
  champions.appendChild(el("h1", null, "CHAMPIONS"));
  champions.appendChild(el("div", { class: "winners" }, champWin ? teamName(champWin) : "Tied!"));
  champions.appendChild(renderScorecard(champ));

  const consBlock = el("div", { class: "consolation-block" });
  consBlock.appendChild(el("div", { class: "consolation-title" }, "🥈 Runner-Up Bracket"));
  consBlock.appendChild(el("div", { class: "consolation-winners" }, consWin ? teamName(consWin) : "Tied!"));
  consBlock.appendChild(renderScorecard(cons));
  champions.appendChild(consBlock);

  card.appendChild(champions);
  wrap.appendChild(card);

  wrap.appendChild(renderPodium(ranking));
  wrap.appendChild(renderAwardsStrip());

  // Final standings — uses the same renderStandingsCard, with finals included in totals
  const finalCard = el("div", { class: "card" });
  const head = el("div", { style: "display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 10px; flex-wrap: wrap;" },
    el("h3", { style: "margin: 0;" }, "Final Standings"),
    el("span", { class: "muted" }, "Includes finals games"),
  );
  finalCard.appendChild(head);

  const isStack = state.format === "stack";
  const colSpan = isStack ? 6 : 5;
  // Tier dividers go BEFORE the listed rank index (0-based). Tier boundaries:
  // 0–1 champ-W, 2–3 champ-L, 4–5 cons-W, 6–7 cons-L.
  const dividerLabels = {
    2: "Championship runners-up",
    4: "Consolation winners",
    6: "Consolation runners-up",
  };
  const tierDividerRow = (label) =>
    el("tr", { class: "tier-divider" },
      el("td", { colspan: String(colSpan) }, label));
  const table = el("table", { class: "standings", style: "margin-top: 10px;" });
  if (isStack) {
    const stackStats = computeStackStats(state.rounds.length);
    const bySlot = new Map(stackStats.map(s => [s.slot, s]));
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }),
      el("col", { class: "c-name" }),
      el("col", { class: "c-pts" }),
      el("col", { class: "c-w" }),
      el("col", { class: "c-stack-extra" }),
      el("col", { class: "c-stack-extra" }),
    );
    table.appendChild(colgroup);
    table.appendChild(el("thead", null, el("tr", null,
      el("th", { style: "text-align: center;" }, "#"),
      el("th", null, "Player"),
      el("th", { class: "num", title: "Stack Score" }, "SS"),
      el("th", { class: "num", title: "Wins–Losses" }, "W–L"),
      el("th", { class: "num", title: "Court climbs" }, "🔼"),
      el("th", { class: "num", title: "Games on Court 1" }, "⏱"),
    )));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = bySlot.get(rs.slot);
      tbody.appendChild(el("tr", { class: "r" + (i + 1) },
        rankCell(i),
        el("td", { class: "name" }, s.name),
        el("td", { class: "num" }, s.stackScore.toFixed(1)),
        el("td", { class: "num" }, s.wins + "–" + s.losses),
        el("td", { class: "num" }, "" + s.courtClimbs),
        el("td", { class: "num" }, "" + s.gamesOnCourt1),
      ));
    });
    table.appendChild(tbody);
  } else {
    const allStats = computeStats(7, true);
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }),
      el("col", { class: "c-name" }),
      el("col", { class: "c-pts" }),
      el("col", { class: "c-w" }),
      el("col", { class: "c-diff" }),
    );
    table.appendChild(colgroup);
    table.appendChild(el("thead", null, el("tr", null,
      el("th", { style: "text-align: center;" }, "#"),
      el("th", null, "Player"),
      el("th", { class: "num" }, "PTS"),
      el("th", { class: "num" }, "W"),
      el("th", { class: "num" }, "+/–"),
    )));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = allStats.find(x => x.slot === rs.slot);
      tbody.appendChild(el("tr", { class: "r" + (i + 1) },
        rankCell(i),
        el("td", { class: "name" }, s.name),
        el("td", { class: "num" }, "" + s.points),
        el("td", { class: "num" }, "" + s.wins),
        el("td", { class: "num", style: s.diff > 0 ? "color: var(--good);" : (s.diff < 0 ? "color: var(--bad);" : "") },
          (s.diff > 0 ? "+" : "") + s.diff),
      ));
    });
    table.appendChild(tbody);
  }
  finalCard.appendChild(table);
  finalCard.appendChild(el("p", { class: "standings-footer" },
    "Within each tier, season points → wins → differential break ties."));
  wrap.appendChild(finalCard);

  wrap.appendChild(el("button", {
    class: "ghost",
    style: "width: 100%; margin-bottom: 10px;",
    onclick: () => { state.phase = "finals"; save(); render(); }
  }, "← Edit Final Scores"));

  wrap.appendChild(el("button", {
    class: "primary",
    style: "width: 100%;",
    onclick: () => {
      if (confirm("Start a new tournament? This clears all scores and names.")) {
        state = newState(); save(); render();
      }
    }
  }, "Start New Tournament"));

  return wrap;
}

// ---------- settings modal ----------
function openScheduleModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Full Schedule"));

  const list = el("div", { class: "schedule-list" });

  function gameRow(g, courtTag, courtClass) {
    const row = el("div", { class: "schedule-game" });
    row.appendChild(el("span", { class: "court-tag " + courtClass }, courtTag));
    row.appendChild(el("span", { class: "game-text" },
      teamName(g.team1) + " vs " + teamName(g.team2)));
    const scoreText = isGameComplete(g)
      ? g.score1 + "–" + g.score2
      : "—";
    row.appendChild(el("span", { class: "game-score" }, scoreText));
    return row;
  }

  const isStack = state.format === "stack";
  const c1Tag = isStack ? "Court 1" : "South";
  const c2Tag = isStack ? "Court 2" : "North";
  state.rounds.forEach(r => {
    const block = el("div", { class: "schedule-round" });
    block.appendChild(el("div", { class: "schedule-round-title" }, "Round " + r.round));
    block.appendChild(gameRow(r.court1, c1Tag, "c1"));
    block.appendChild(gameRow(r.court2, c2Tag, "c2"));
    list.appendChild(block);
  });

  if (state.finals && (state.phase === "finals" || state.phase === "done")) {
    const block = el("div", { class: "schedule-round" });
    block.appendChild(el("div", { class: "schedule-round-title" }, "Finals"));
    block.appendChild(gameRow(state.finals.championship, "Champ", "gold"));
    block.appendChild(gameRow(state.finals.consolation,  "Cons",  "silver"));
    list.appendChild(block);
  }

  modal.appendChild(list);
  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 12px;",
    onclick: close,
  }, "Close"));
  bg.appendChild(modal);
  document.body.appendChild(bg);
}

function openHowItWorksModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "How this works"));

  // Show both formats. The active format is expanded; the other is collapsed.
  const sections = [
    { id: "rr",    label: "Round Robin", bullets: RULES_RR },
    { id: "stack", label: "Stack Format", bullets: RULES_STACK },
  ];
  for (const s of sections) {
    const isActive = state.format === s.id;
    const det = el("details", { class: "rules", style: "margin-bottom: 10px;" });
    if (isActive) det.setAttribute("open", "");
    det.appendChild(el("summary", null, s.label));
    const body = el("div", { class: "rules-body" });
    body.appendChild(renderRulesUl(s.bullets));
    det.appendChild(body);
    modal.appendChild(det);
  }

  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 12px;",
    onclick: close,
  }, "Close"));
  bg.appendChild(modal);
  document.body.appendChild(bg);
}

function openSettings() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Settings"));

  modal.appendChild(el("button", {
    style: "width: 100%; margin-bottom: 12px;",
    onclick: () => { close(); openHowItWorksModal(); },
  }, "How this works"));

  if (state.phase !== "setup") {
    modal.appendChild(el("button", {
      style: "width: 100%; margin-bottom: 12px;",
      onclick: () => { close(); openScheduleModal(); },
    }, "View full schedule"));
  }

  if (state.phase === "setup") {
    modal.appendChild(el("p", { class: "muted" },
      "Tournament hasn't started yet. Edit names directly on the setup screen."));
  } else {
    modal.appendChild(el("h3", null, "Edit Names"));
    modal.appendChild(el("p", { class: "muted", style: "margin: 0 0 10px;" },
      "Slots are fixed. Renaming updates the player everywhere."));
    for (let i = 0; i < 8; i++) {
      const input = el("input", {
        class: "name-input",
        style: "margin-bottom: 8px;",
        type: "text",
        value: state.slots[i] || "",
        autocomplete: "off",
        autocapitalize: "words",
        autocorrect: "off",
        spellcheck: "false",
      });
      input.addEventListener("input", () => {
        state.slots[i] = input.value;
        save();
      });
      modal.appendChild(input);
    }

    const winScoreRow = el("div", { class: "settings-row" });
    winScoreRow.appendChild(el("label", null, "Win score"));
    const winSelect = el("select");
    [11, 15, 21].forEach(v => {
      const opt = el("option", { value: String(v) }, String(v));
      if (state.winScore === v) opt.setAttribute("selected", "selected");
      winSelect.appendChild(opt);
    });
    winSelect.addEventListener("change", () => {
      state.winScore = parseInt(winSelect.value, 10);
      save();
    });
    winScoreRow.appendChild(winSelect);
    modal.appendChild(winScoreRow);

    if (state.format === "stack") {
      const noGamesPlayed = !state.rounds.some(r =>
        isGameComplete(r.court1) || isGameComplete(r.court2)
      );
      const roundsRow = el("div", { class: "settings-row" });
      roundsRow.appendChild(el("label", null, "Stack rounds"));
      const sel = el("select");
      [4, 6, 8, 10, 12].forEach(v => {
        const opt = el("option", { value: String(v) }, String(v));
        if (state.stackRounds === v) opt.setAttribute("selected", "selected");
        sel.appendChild(opt);
      });
      if (!noGamesPlayed) sel.disabled = true;
      sel.addEventListener("change", () => {
        state.stackRounds = parseInt(sel.value, 10);
        save();
      });
      roundsRow.appendChild(sel);
      modal.appendChild(roundsRow);
      if (!noGamesPlayed) {
        modal.appendChild(el("p", { class: "muted", style: "font-size: 11px; margin: 0 0 6px;" },
          "Locked once games begin."));
      }
    }
  }

  const closeBtn = el("button", { style: "width: 100%; margin-top: 12px;", onclick: () => { close(); render(); } }, "Done");
  modal.appendChild(closeBtn);

  // Divider before destructive actions
  modal.appendChild(el("div", {
    style: "border-top: 1px solid var(--border); margin: 16px 0 8px;"
  }));

  // Switch format — confirms-and-wipes if a tournament is in progress.
  const otherFormatLabel = state.format === "stack" ? "Round Robin" : "Stack Format";
  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 8px;",
    onclick: () => {
      const newFormat = state.format === "stack" ? "rr" : "stack";
      const inSetup = state.phase === "setup";
      const msg = inSetup
        ? "Switch to " + otherFormatLabel + "?"
        : "Switch to " + otherFormatLabel + "? This wipes the current tournament (names are kept).";
      if (!confirm(msg)) return;
      if (inSetup) {
        state.format = newFormat;
      } else {
        const keptNames = state.rawNames.slice();
        const keptWinScore = state.winScore;
        const keptStackRounds = state.stackRounds;
        state = newState();
        state.rawNames = keptNames;
        state.winScore = keptWinScore;
        state.format = newFormat;
        state.stackRounds = keptStackRounds;
      }
      save();
      close();
      render();
    },
  }, "Switch to " + otherFormatLabel));

  // Reset Tournament — visible only outside the setup phase
  if (state.phase !== "setup") {
    modal.appendChild(el("button", {
      style: "width: 100%; margin-top: 8px; background: var(--accent); color: #1a1207; border-color: var(--accent);",
      onclick: () => {
        if (!confirm("Reset scores and re-shuffle the schedule? Your 8 names will be kept.")) return;
        const keptNames = state.slots.slice();
        const keptWinScore = state.winScore;
        const keptFormat = state.format;
        const keptStackRounds = state.stackRounds;
        state = newState();
        state.format = keptFormat;
        state.stackRounds = keptStackRounds;
        state.rawNames = keptNames.slice();
        state.slots = shuffle(keptNames);
        state.tiebreakRandom = shuffle([0,1,2,3,4,5,6,7]);
        state.rounds = keptFormat === "stack" ? [assignInitialStackCourts()] : generateRounds();
        state.winScore = keptWinScore;
        state.phase = "playing";
        state.currentRound = 1;
        save();
        close();
        render();
      }
    }, "Reset Tournament"));
  }

  // Clear All — always visible
  modal.appendChild(el("button", {
    class: "danger",
    style: "width: 100%; margin-top: 8px;",
    onclick: () => {
      if (!confirm("Clear all data including names? This can't be undone.")) return;
      state = newState();
      save();
      close();
      render();
    }
  }, "Clear All"));

  bg.appendChild(modal);
  document.body.appendChild(bg);
}

// ---------- boot ----------
render();
</script>
</body>
</html>
