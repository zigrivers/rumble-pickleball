// Returns { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo }.
// Each award is { names: string[], detail: string|null }. names is empty if no
// qualifying entry; multiple names indicate ties. climber/anchor are only
// populated for Stack format; closer/bestDuo apply to both formats.
function computeAwards() {
  const isStack = state.format === "stack";

  // MVP — format-aware: Stack uses Stack Score, King uses King Score, RR uses raw points.
  let mvp;
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxSS = ss.reduce((m, s) => Math.max(m, s.stackScore), 0);
    const winners = ss.filter(s => s.stackScore === maxSS && maxSS > 0);
    mvp = winners.length
      ? { names: winners.map(s => nameOf(s.slot)), detail: maxSS.toFixed(1) + " SS" }
      : { names: [], detail: null };
  } else if (state.format === "king") {
    const ks = computeKingStats(state.rounds.length);
    const maxKS = ks.reduce((m, s) => Math.max(m, s.kingScore), 0);
    const winners = ks.filter(s => s.kingScore === maxKS && maxKS > 0);
    mvp = winners.length
      ? { names: winners.map(s => nameOf(s.slot)), detail: maxKS + " KS" }
      : { names: [], detail: null };
  } else {
    const stats = computeStats(totalRegularRounds(), true);
    const maxPts = stats.reduce((m, s) => Math.max(m, s.points), 0);
    const mvpNames = stats.filter(s => s.points === maxPts).map(s => nameOf(s.slot));
    mvp = { names: mvpNames, detail: maxPts + " pts" };
  }

  // Build chronological game list: regular rounds (each has c1, c2), then champ, cons.
  const games = [];
  const c1Tag = { stack: "Court 1", king: "King's Court", gauntlet: "Court 1" }[state.format] || "South";
  const c2Tag = { stack: "Court 2", king: "Bottom Court", gauntlet: "Court 2" }[state.format] || "North";
  for (let r = 0; r < state.rounds.length; r++) {
    const round = state.rounds[r];
    games.push({ ...round.court1, label: "R" + (r + 1) + " " + c1Tag });
    games.push({ ...round.court2, label: "R" + (r + 1) + " " + c2Tag });
  }
  if (state.finals) {
    games.push({ ...state.finals.championship, label: "Championship" });
    games.push({ ...state.finals.consolation,  label: "Consolation" });
  }
  // Two views of the game list:
  //   completed  — every game that has both scores (ties included). Used for Hot Streak so a tied game properly resets streaks.
  //   decided    — completed AND non-tied. Used for Biggest Win / Closest Game.
  const completed = games.filter(g => isGameComplete(g));
  const decided = completed.filter(g => g.score1 !== g.score2);

  // For each decided game, derive winner/loser-side summaries.
  const summarized = decided.map(g => {
    const team1Won = g.score1 > g.score2;
    const winTeam = team1Won ? g.team1 : g.team2;
    const loseTeam = team1Won ? g.team2 : g.team1;
    const winScore = team1Won ? g.score1 : g.score2;
    const loseScore = team1Won ? g.score2 : g.score1;
    return {
      diff: winScore - loseScore,
      winTeam,
      loseTeam,
      winScore,
      loseScore,
      label: g.label,
    };
  });

  // Biggest Win — largest diff. Tied diffs all win; report all winning teams.
  let biggestWin = { names: [], detail: null };
  if (summarized.length) {
    const maxDiff = Math.max(...summarized.map(s => s.diff));
    const winners = summarized.filter(s => s.diff === maxDiff);
    biggestWin = {
      names: winners.map(w => teamName(w.winTeam) + " +" + w.diff),
      detail: winners.map(w => w.winScore + "–" + w.loseScore + " · " + w.label).join(" / "),
    };
  }

  // Closest Game — smallest diff; tiebreak by descending winning score.
  // Multiple games matching the best (diff, -winScore) pair are all reported.
  // Headline is the winning team(s); the score + location go in the detail.
  let closestGame = { names: [], detail: null };
  if (summarized.length) {
    const minDiff = Math.min(...summarized.map(s => s.diff));
    const closestSet = summarized.filter(s => s.diff === minDiff);
    const maxWinScore = Math.max(...closestSet.map(s => s.winScore));
    const tied = closestSet.filter(s => s.winScore === maxWinScore);
    closestGame = {
      names: tied.map(t => teamName(t.winTeam)),
      detail: tied.map(t => t.winScore + "–" + t.loseScore + " · " + t.label).join(" / "),
    };
  }

  // Hot Streak — longest consecutive-wins run for a single player.
  // Iterates every completed game (including ties) so a tied game resets
  // streaks for all four involved players.
  const streaks = new Map(); // slot -> current run
  const best = new Map();    // slot -> max run seen
  for (const g of completed) {
    if (g.score1 === g.score2) {
      for (const slot of [...g.team1, ...g.team2]) {
        best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
        streaks.set(slot, 0);
      }
      continue;
    }
    const team1Won = g.score1 > g.score2;
    const winners = team1Won ? g.team1 : g.team2;
    const losers = team1Won ? g.team2 : g.team1;
    for (const slot of winners) {
      streaks.set(slot, (streaks.get(slot) || 0) + 1);
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot)));
    }
    for (const slot of losers) {
      best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
      streaks.set(slot, 0);
    }
  }
  for (const [slot, cur] of streaks) {
    best.set(slot, Math.max(best.get(slot) || 0, cur));
  }
  const maxStreak = best.size ? Math.max(...best.values()) : 0;
  const streakSlots = maxStreak > 0
    ? [...best.entries()].filter(([, v]) => v === maxStreak).map(([k]) => k)
    : [];
  const hotStreak = streakSlots.length
    ? { names: streakSlots.map(nameOf), detail: maxStreak + " in a row" }
    : { names: [], detail: null };

  // Climber — most courtClimbs (Stack only).
  // Anchor  — most gamesOnCourt1 (Stack only).
  let climber = { names: [], detail: null };
  let anchor  = { names: [], detail: null };
  if (isStack) {
    const ss = computeStackStats(state.rounds.length);
    const maxClimbs = ss.reduce((m, s) => Math.max(m, s.courtClimbs), 0);
    if (maxClimbs > 0) {
      const c = ss.filter(s => s.courtClimbs === maxClimbs);
      climber = { names: c.map(s => nameOf(s.slot)), detail: maxClimbs + " climb" + (maxClimbs > 1 ? "s" : "") };
    }
    const maxC1 = ss.reduce((m, s) => Math.max(m, s.gamesOnCourt1), 0);
    if (maxC1 > 0) {
      const a = ss.filter(s => s.gamesOnCourt1 === maxC1);
      anchor = { names: a.map(s => nameOf(s.slot)), detail: maxC1 + " on Court 1" };
    }
  }

  // Closer — best W-L in 1-point games (both formats). Hidden if no 1-pt games.
  // "Best" = most wins, tiebreak fewest losses; ties listed.
  const opg = new Map();
  for (let s = 1; s <= 8; s++) opg.set(s, { wins: 0, losses: 0 });
  let anyOPG = false;
  for (const g of decided) {
    if (Math.abs(g.score1 - g.score2) !== 1) continue;
    anyOPG = true;
    const t1Won = g.score1 > g.score2;
    for (const slot of g.team1) {
      if (t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
    for (const slot of g.team2) {
      if (!t1Won) opg.get(slot).wins++; else opg.get(slot).losses++;
    }
  }
  let closer = { names: [], detail: null };
  if (anyOPG) {
    const candidates = [...opg.entries()]
      .map(([slot, v]) => ({ slot, ...v }))
      .filter(c => c.wins > 0);
    if (candidates.length) {
      candidates.sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        return a.losses - b.losses;
      });
      const top = candidates[0];
      const tied = candidates.filter(c => c.wins === top.wins && c.losses === top.losses);
      closer = {
        names: tied.map(c => nameOf(c.slot)),
        detail: top.wins + "–" + top.losses + " in 1-pt games",
      };
    }
  }

  // Best Duo — partner pair with highest win rate together (min 1 win).
  // Win-rate ties broken by aggregate point differential across their games together.
  const pairKey = (a, b) => a < b ? a + "-" + b : b + "-" + a;
  const duos = new Map();
  for (const g of decided) {
    for (const teamKey of ["team1", "team2"]) {
      const team = g[teamKey];
      const pts = teamKey === "team1" ? g.score1 : g.score2;
      const ag  = teamKey === "team1" ? g.score2 : g.score1;
      const won = pts > ag;
      const k = pairKey(team[0], team[1]);
      if (!duos.has(k)) duos.set(k, {
        slots: [team[0], team[1]].sort((a,b)=>a-b),
        games: 0, wins: 0, losses: 0, diff: 0,
      });
      const e = duos.get(k);
      e.games++;
      if (won) e.wins++; else e.losses++;
      e.diff += (pts - ag);
    }
  }
  let bestDuo = { names: [], detail: null };
  const eligibleDuos = [...duos.values()].filter(e => e.wins >= 1);
  if (eligibleDuos.length) {
    eligibleDuos.sort((a, b) => {
      const wrA = a.wins / a.games;
      const wrB = b.wins / b.games;
      if (wrB !== wrA) return wrB - wrA;
      return b.diff - a.diff;
    });
    const top = eligibleDuos[0];
    const topRate = top.wins / top.games;
    const tied = eligibleDuos.filter(e =>
      (e.wins / e.games) === topRate && e.diff === top.diff
    );
    bestDuo = {
      names: tied.map(e => teamName(e.slots)),
      detail: top.wins + "–" + top.losses + " (" + Math.round(topRate * 100) + "%)",
    };
  }

  // The Wall — lowest avg points conceded per completed game.
  let theWall = { names: [], detail: null };
  {
    const conceded = new Map(); // slot -> { totalAg, games }
    for (let s = 1; s <= 8; s++) conceded.set(s, { totalAg: 0, games: 0 });
    for (const g of completed) {
      for (const slot of g.team1) { const e = conceded.get(slot); e.totalAg += g.score2; e.games++; }
      for (const slot of g.team2) { const e = conceded.get(slot); e.totalAg += g.score1; e.games++; }
    }
    const entries = [...conceded.entries()]
      .filter(([, v]) => v.games > 0)
      .map(([slot, v]) => ({ slot, avg: v.totalAg / v.games }));
    if (entries.length) {
      const minAvg = Math.min(...entries.map(e => e.avg));
      const tied = entries.filter(e => e.avg === minAvg);
      theWall = {
        names: tied.map(e => nameOf(e.slot)),
        detail: minAvg.toFixed(1) + " allowed/game",
      };
    }
  }

  // Cold Streak — longest consecutive-losses run for a single player.
  // Mirrors Hot Streak: ties reset both teams' streaks.
  let coldStreak = { names: [], detail: null };
  {
    const lossStreaks = new Map();
    const lossBest    = new Map();
    for (const g of completed) {
      if (g.score1 === g.score2) {
        for (const slot of [...g.team1, ...g.team2]) {
          lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot) || 0));
          lossStreaks.set(slot, 0);
        }
        continue;
      }
      const t1Won = g.score1 > g.score2;
      const losers  = t1Won ? g.team2 : g.team1;
      const winners = t1Won ? g.team1 : g.team2;
      for (const slot of losers) {
        lossStreaks.set(slot, (lossStreaks.get(slot) || 0) + 1);
        lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot)));
      }
      for (const slot of winners) {
        lossBest.set(slot, Math.max(lossBest.get(slot) || 0, lossStreaks.get(slot) || 0));
        lossStreaks.set(slot, 0);
      }
    }
    for (const [slot, cur] of lossStreaks) {
      lossBest.set(slot, Math.max(lossBest.get(slot) || 0, cur));
    }
    const maxLoss = lossBest.size ? Math.max(...lossBest.values()) : 0;
    if (maxLoss > 0) {
      const tied = [...lossBest.entries()].filter(([, v]) => v === maxLoss).map(([k]) => k);
      coldStreak = { names: tied.map(nameOf), detail: maxLoss + " in a row" };
    }
  }

  // Most Improved — biggest jump in rank from after round 2 to final standings.
  // Skipped if we don't have a finalRanking (no decided finals) or fewer than
  // 2 rounds of data. Sample is noisy with so few rounds — that's part of the
  // fun.
  let mostImproved = { names: [], detail: null };
  if (state.rounds.length >= 2 && state.finals
      && isGameComplete(state.finals.championship) && state.finals.championship.score1 !== state.finals.championship.score2
      && isGameComplete(state.finals.consolation)  && state.finals.consolation.score1  !== state.finals.consolation.score2) {
    const earlyRanked = rankPlayersForFormat(2);
    const earlyRankBy = new Map();
    earlyRanked.forEach((s, i) => earlyRankBy.set(s.slot, i + 1));
    const finalRanked = finalRanking();
    const finalRankBy = new Map();
    finalRanked.forEach((s, i) => finalRankBy.set(s.slot, i + 1));
    let bestImprov = 0;
    let topSlots = [];
    for (const slot of earlyRankBy.keys()) {
      const improv = (earlyRankBy.get(slot) || 0) - (finalRankBy.get(slot) || 0);
      if (improv > bestImprov) { bestImprov = improv; topSlots = [slot]; }
      else if (improv === bestImprov && bestImprov > 0) { topSlots.push(slot); }
    }
    if (topSlots.length) {
      mostImproved = {
        names: topSlots.map(nameOf),
        detail: "↑" + bestImprov + " spot" + (bestImprov > 1 ? "s" : "") + " from R2",
      };
    }
  }

  // Got Stomped — losing team in the biggest blowout; mirrors Biggest Win.
  let gotStomped = { names: [], detail: null };
  if (summarized.length) {
    const maxDiff = Math.max(...summarized.map(s => s.diff));
    const blowouts = summarized.filter(s => s.diff === maxDiff);
    gotStomped = {
      names: blowouts.map(b => teamName(b.loseTeam) + " −" + b.diff),
      detail: blowouts.map(b => b.winScore + "–" + b.loseScore + " · " + b.label).join(" / "),
    };
  }

  return { mvp, biggestWin, closestGame, hotStreak, climber, anchor, closer, bestDuo,
           theWall, coldStreak, mostImproved, gotStomped };
}

function computeCrownPerformanceAwards(allGames) {
  const lb = crownLeaderboard();
  const mvp = { names: [nameOf(lb[0].slot)], detail: lb[0].matchPoints.toFixed(1) + " mp" };
  const summarized = allGames.map(g => {
    const t1win = g.score1 > g.score2;
    return {
      diff: Math.abs(g.score1 - g.score2),
      winTeam: t1win ? g.team1 : g.team2,
      loseTeam: t1win ? g.team2 : g.team1,
      winScore: t1win ? g.score1 : g.score2,
      loseScore: t1win ? g.score2 : g.score1,
    };
  });
  const maxDiff = summarized.length ? Math.max(...summarized.map(s => s.diff)) : 0;
  const biggestWin = summarized.length
    ? { names: summarized.filter(s => s.diff === maxDiff).map(w => teamName(w.winTeam) + " +" + w.diff), detail: null }
    : { names: [], detail: null };
  let closestGame = { names: [], detail: null };
  if (summarized.length) {
    const minDiff = Math.min(...summarized.map(s => s.diff));
    const closestSet = summarized.filter(s => s.diff === minDiff);
    const maxWinScore = Math.max(...closestSet.map(s => s.winScore));
    const closest = closestSet.filter(s => s.winScore === maxWinScore);
    closestGame = { names: closest.map(g => teamName(g.winTeam)), detail: closest[0].winScore + "–" + closest[0].loseScore };
  }
  const streaks = new Map(), best = new Map();
  for (const g of allGames) {
    if (g.score1 === g.score2) {
      for (const slot of [...g.team1, ...g.team2]) {
        best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0));
        streaks.set(slot, 0);
      }
      continue;
    }
    const t1win = g.score1 > g.score2;
    const winners = t1win ? g.team1 : g.team2;
    const losers  = t1win ? g.team2 : g.team1;
    for (const slot of winners) { streaks.set(slot, (streaks.get(slot) || 0) + 1); best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot))); }
    for (const slot of losers)  { best.set(slot, Math.max(best.get(slot) || 0, streaks.get(slot) || 0)); streaks.set(slot, 0); }
  }
  for (const [slot, cur] of streaks) best.set(slot, Math.max(best.get(slot) || 0, cur));
  const maxStreak = best.size ? Math.max(...best.values()) : 0;
  const hotStreak = maxStreak > 0
    ? { names: [...best.entries()].filter(([, v]) => v === maxStreak).map(([s]) => nameOf(s)), detail: maxStreak + " in a row" }
    : { names: [], detail: null };
  const conceded = new Map([1, 2, 3, 4].map(s => [s, { total: 0, games: 0 }]));
  for (const g of allGames) {
    for (const slot of g.team1) { const e = conceded.get(slot); if (e) { e.total += g.score2; e.games++; } }
    for (const slot of g.team2) { const e = conceded.get(slot); if (e) { e.total += g.score1; e.games++; } }
  }
  const wallEntries = [...conceded.entries()].filter(([, v]) => v.games > 0).map(([slot, v]) => ({ slot, avg: v.total / v.games }));
  const minWall = wallEntries.length ? Math.min(...wallEntries.map(e => e.avg)) : Infinity;
  const theWall = wallEntries.length
    ? { names: wallEntries.filter(e => e.avg === minWall).map(e => nameOf(e.slot)), detail: minWall.toFixed(1) + " allowed/game" }
    : { names: [], detail: null };
  const scored = new Map([1, 2, 3, 4].map(s => [s, 0]));
  for (const g of allGames) {
    for (const slot of g.team1) scored.set(slot, scored.get(slot) + g.score1);
    for (const slot of g.team2) scored.set(slot, scored.get(slot) + g.score2);
  }
  const maxScored = Math.max(...scored.values());
  const theEngine = maxScored > 0
    ? { names: [...scored.entries()].filter(([, v]) => v === maxScored).map(([s]) => nameOf(s)), detail: maxScored + " total pts" }
    : { names: [], detail: null };
  return { mvp, biggestWin, closestGame, hotStreak, theWall, theEngine };
}

function computeCrownMatchAwards(allGames, allMatches) {
  const closerWL = new Map([1, 2, 3, 4].map(s => [s, { wins: 0, losses: 0 }]));
  let anyClose = false;
  for (const g of allGames) {
    const maxScore = Math.max(g.score1, g.score2);
    const diff = Math.abs(g.score1 - g.score2);
    if (!(maxScore >= 7 && diff <= 2)) continue;
    anyClose = true;
    const t1win = g.score1 > g.score2;
    for (const slot of g.team1) { if (t1win) closerWL.get(slot).wins++; else closerWL.get(slot).losses++; }
    for (const slot of g.team2) { if (!t1win) closerWL.get(slot).wins++; else closerWL.get(slot).losses++; }
  }
  let theCloser = { names: [], detail: null };
  if (anyClose) {
    const cands = [...closerWL.entries()].map(([slot, v]) => ({ slot, ...v })).filter(c => c.wins > 0);
    cands.sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : a.losses - b.losses);
    if (cands.length) {
      const top = cands[0];
      const tied = cands.filter(c => c.wins === top.wins && c.losses === top.losses);
      theCloser = { names: tied.map(c => nameOf(c.slot)), detail: top.wins + "–" + top.losses + " in close games" };
    }
  }
  const sweepCount = new Map([1, 2, 3, 4].map(s => [s, 0]));
  for (const match of allMatches) {
    const { gamesWon1, gamesWon2 } = crownGamesWon(match);
    if (gamesWon1 === 2 && gamesWon2 === 0) {
      for (const slot of match.team1) sweepCount.set(slot, sweepCount.get(slot) + 1);
    } else if (gamesWon2 === 2 && gamesWon1 === 0) {
      for (const slot of match.team2) sweepCount.set(slot, sweepCount.get(slot) + 1);
    }
  }
  const maxSweeps = Math.max(...sweepCount.values());
  const theSweeper = maxSweeps > 0
    ? { names: [...sweepCount.entries()].filter(([, v]) => v === maxSweeps).map(([s]) => nameOf(s)), detail: maxSweeps + " sweep" + (maxSweeps > 1 ? "s" : "") }
    : { names: [], detail: null };
  const comebackCount = new Map([1, 2, 3, 4].map(s => [s, 0]));
  for (const match of allMatches) {
    if (!isCrownMatchComplete(match)) continue;
    const g0 = match.games[0];
    if (!Number.isInteger(g0.score1) || !Number.isInteger(g0.score2)) continue;
    if (g0.score1 === g0.score2) continue;
    const g0winner = g0.score1 > g0.score2 ? "team1" : "team2";
    const matchW = crownMatchWinner(match);
    if (matchW && g0winner !== matchW) {
      const winSlots = matchW === "team1" ? match.team1 : match.team2;
      for (const slot of winSlots) comebackCount.set(slot, comebackCount.get(slot) + 1);
    }
  }
  const maxComebacks = Math.max(...comebackCount.values());
  const comebackKid = maxComebacks > 0
    ? { names: [...comebackCount.entries()].filter(([, v]) => v === maxComebacks).map(([s]) => nameOf(s)), detail: maxComebacks + " comeback" + (maxComebacks > 1 ? "s" : "") }
    : { names: [], detail: null };
  const partnerWR = new Map([1, 2, 3, 4].map(s => [s, { won: 0, played: 0 }]));
  for (let s = 1; s <= 4; s++) {
    for (const match of allMatches) {
      if (!isCrownMatchComplete(match)) continue;
      const teamIsTeam1 = match.team1.includes(s);
      const teamIsTeam2 = match.team2.includes(s);
      if (!teamIsTeam1 && !teamIsTeam2) continue;
      const { gamesWon1, gamesWon2 } = crownGamesWon(match);
      const e = partnerWR.get(s);
      e.won += teamIsTeam1 ? gamesWon1 : gamesWon2;
      e.played += gamesWon1 + gamesWon2;
    }
  }
  const partnerRatio = (e) => e.played > 0 ? e.won / e.played : 0;
  const maxPWR = Math.max(...[...partnerWR.values()].map(partnerRatio));
  const mvpPartner = maxPWR > 0
    ? { names: [...partnerWR.entries()].filter(([, v]) => partnerRatio(v) === maxPWR).map(([s]) => nameOf(s)),
        detail: Math.round(maxPWR * 100) + "% game win rate" }
    : { names: [], detail: null };
  const g3WL = new Map([1, 2, 3, 4].map(s => [s, { wins: 0, losses: 0 }]));
  const g3Games = allGames.filter(g => g.gameIdx === 2 && g.score1 !== g.score2);
  const anyG3 = g3Games.length > 0;
  for (const g of g3Games) {
    const t1win = g.score1 > g.score2;
    for (const slot of g.team1) { const e = g3WL.get(slot); if (e) { if (t1win) e.wins++; else e.losses++; } }
    for (const slot of g.team2) { const e = g3WL.get(slot); if (e) { if (!t1win) e.wins++; else e.losses++; } }
  }
  let moneyGame = { names: [], detail: null };
  if (anyG3) {
    const cands = [...g3WL.entries()].map(([slot, v]) => ({ slot, ...v })).filter(c => c.wins > 0);
    cands.sort((a, b) => b.wins !== a.wins ? b.wins - a.wins : a.losses - b.losses);
    if (cands.length) {
      const top = cands[0];
      const tied = cands.filter(c => c.wins === top.wins && c.losses === top.losses);
      moneyGame = { names: tied.map(c => nameOf(c.slot)), detail: top.wins + "–" + top.losses + " in Game 3s" };
    }
  }
  return { theCloser, theSweeper, comebackKid, mvpPartner, moneyGame, anyG3 };
}

function computeCrownAwards() {
  const allGames = [];
  for (let mi = 0; mi < state.crownMatches.length; mi++) {
    const match = state.crownMatches[mi];
    const theme = match.theme;
    let _w1 = 0, _w2 = 0;
    for (let gi = 0; gi < match.games.length; gi++) {
      const g = match.games[gi];
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (theme && !isValidCrownGameScore(g.score1, g.score2, theme)) break;
      allGames.push({ score1: g.score1, score2: g.score2, team1: match.team1, team2: match.team2, matchIdx: mi, gameIdx: gi });
      if (g.score1 > g.score2) _w1++; else _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
  }
  if (state.crownFinal) {
    let _w1 = 0, _w2 = 0;
    for (let gi = 0; gi < state.crownFinal.games.length; gi++) {
      const g = state.crownFinal.games[gi];
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;
      allGames.push({ score1: g.score1, score2: g.score2, team1: state.crownFinal.team1, team2: state.crownFinal.team2, matchIdx: -1, gameIdx: gi });
      if (g.score1 > g.score2) _w1++; else _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
  }
  const allMatches = [...state.crownMatches];
  if (state.crownFinal && isCrownMatchComplete(state.crownFinal)) allMatches.push(state.crownFinal);
  const perf  = computeCrownPerformanceAwards(allGames);
  const match = computeCrownMatchAwards(allGames, allMatches);
  return { ...perf, ...match };
}

function renderCrownAwardsStrip() {
  const a = computeCrownAwards();
  const wrap = el("div", { class: "awards-section" });
  const chip = (label, item, inlineDetail) => {
    const node = el("div", { class: "award-chip" });
    node.appendChild(el("div", { class: "award-label" }, label));
    const names = item.names;
    const valueText = names.length

  if (a.theEngine.names.length)   secondary.appendChild(chip("🚂 THE ENGINE",    a.theEngine,  true));
  if (a.anyG3 && a.moneyGame.names.length) secondary.appendChild(chip("💰 MONEY GAME CHAMP", a.moneyGame, true));

function runConfetti() {
  const canvas = el("canvas", {
    style: "position: fixed; inset: 0; z-index: 90; pointer-events: none;"
  });
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + "px";
  canvas.style.height = window.innerHeight + "px";
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const colors = ["#fbbf24", "#fde047", "#cbd5e1", "#d97706", "#38bdf8", "#a78bfa", "#10b981"];
  const N = 80;
  const parts = Array.from({ length: N }, () => ({
    x: Math.random() * canvas.width,
    y: -Math.random() * 80,
    vx: (Math.random() - 0.5) * 6,
    vy: 2 + Math.random() * 4,
    size: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.3,
  }));
  const start = performance.now();
  const totalMs = 2000;
  function frame(now) {
    const elapsed = now - start;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (const p of parts) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12; // gravity
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.4);
      ctx.restore();
    }
    if (elapsed < totalMs) {
      requestAnimationFrame(frame);
    } else {
      canvas.remove();
    }
  }
  requestAnimationFrame(frame);
}

  if (state.format === "crown") return renderDoneScreenCrown();
  const wrap = el("div");
  const f = state.finals;
  const champ = f.championship, cons = f.consolation;
  const champWin = champ.score1 > champ.score2 ? champ.team1 : (champ.score2 > champ.score1 ? champ.team2 : null);
  const consWin  = cons.score1  > cons.score2  ? cons.team1  : (cons.score2  > cons.score1  ? cons.team2  : null);
  const ranking = finalRanking();

  // First-view confetti, gated on awardsShown

    );

      el("col", { class: "c-rank" }),

      el("col", { class: "c-pts" }),
      el("col", { class: "c-w" }),
      el("col", { class: "c-stack-extra" }),

      el("th", { class: "num col-hide-mobile", title: "Points scored" }, "PTS"),
    )));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = byKingSlot.get(rs.slot);
      tbody.appendChild(el("tr", { class: "r" + (i + 1) },
        rankCell(i),
        el("td", { class: "name" }, s.name),
        el("td", { class: "num" }, "" + s.kingScore),

        el("td", { class: "num col-hide-mobile" }, "" + s.pointsScored),

    });
    table.appendChild(tbody);
  } else {
    const allStats = computeStats(totalRegularRounds(), true);
    const colgroup = el("colgroup", null,
      el("col", { class: "c-rank" }),
      el("col", { class: "c-name" }),
      el("col", { class: "c-pts" }),
      el("col", { class: "c-w" }),
      el("col", { class: "c-diff" }),
    );
    table.appendChild(colgroup);
    table.appendChild(el("thead", null, el("tr", null,
      el("th", { style: "text-align: center;" }, "#"),
      el("th", null, "Player"),
      el("th", { class: "num" }, "PTS"),
      el("th", { class: "num" }, "W"),
      el("th", { class: "num col-hide-mobile" }, "+/–"),
    )));
    const tbody = el("tbody");
    ranking.forEach((rs, i) => {
      if (dividerLabels[i]) tbody.appendChild(tierDividerRow(dividerLabels[i]));
      const s = allStats.find(x => x.slot === rs.slot);
      tbody.appendChild(el("tr", { class: "r" + (i + 1) },
        rankCell(i),
        el("td", { class: "name" }, s.name),
        el("td", { class: "num" }, "" + s.points),
        el("td", { class: "num" }, "" + s.wins),

      ));
    });
    table.appendChild(tbody);
  }
  finalCard.appendChild(table);
  const footerText = isKing
    ? "Within each tier, King Score (wins + points + Court 1 wins) breaks ties."
    : "Within each tier, season points → wins → differential break ties.";
  finalCard.appendChild(el("p", { class: "standings-footer" }, footerText));
  wrap.appendChild(finalCard);

  wrap.appendChild(el("button", {
    class: "ghost",
    style: "width: 100%; margin-bottom: 10px;",
    onclick: () => { state.phase = "finals"; save(); render(); }
  }, "← Edit Final Scores"));

  wrap.appendChild(el("button", {
    class: "primary",
    style: "width: 100%;",
    onclick: () => {
      if (confirm("Start a new tournament? This clears all scores and names.")) {
        const keptKeepAwake = state.keepAwake;
        const keptKeepAwakeAggressive = state.keepAwakeAggressive;
        state = newState();
        state.keepAwake = keptKeepAwake;
        state.keepAwakeAggressive = keptKeepAwakeAggressive;
        syncKeepAwakeToState();
        save(); render();
      }
    }
  }, "Start New Tournament"));

  return wrap;
}

function openScheduleModal() {
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Full Schedule"));

  const list = el("div", { class: "schedule-list" });

  function gameRow(g, courtTag, courtClass) {
    const row = el("div", { class: "schedule-game" });
    row.appendChild(el("span", { class: "court-tag " + courtClass }, courtTag));
    row.appendChild(el("span", { class: "game-text" },
      teamName(g.team1) + " vs " + teamName(g.team2)));
    const scoreText = isGameComplete(g)
      ? g.score1 + "–" + g.score2
      : "—";
    row.appendChild(el("span", { class: "game-score" }, scoreText));
    return row;
  }

  if (state.format === "crown") {
    (state.crownMatches || []).forEach((match, mi) => {
      const sched = CROWN_SCHEDULE[mi];
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, sched ? sched.name : "Match " + (mi + 1)));
      const g = { team1: match.team1, team2: match.team2,
        score1: isCrownMatchComplete(match) ? crownGamesWon(match).gamesWon1 : null,
        score2: isCrownMatchComplete(match) ? crownGamesWon(match).gamesWon2 : null };
      block.appendChild(gameRow(g, "👑", "c1"));
      list.appendChild(block);
    });
    if (state.crownFinal && (state.phase === "crown" || state.phase === "done")) {
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, "Crown Match"));
      const cf = state.crownFinal;
      const { gamesWon1, gamesWon2 } = crownGamesWon(cf);
      const finalComplete = isCrownMatchComplete(cf);
      const g = { team1: cf.team1, team2: cf.team2,
        score1: finalComplete ? gamesWon1 : null, score2: finalComplete ? gamesWon2 : null };
      block.appendChild(gameRow(g, "👑", "gold"));
      list.appendChild(block);
    }
  } else {
    const c1Tag = { stack: "Court 1", king: "King's Court", gauntlet: "Court 1" }[state.format] || "South";
    const c2Tag = { stack: "Court 2", king: "Bottom",       gauntlet: "Court 2" }[state.format] || "North";
    state.rounds.forEach(r => {
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, "Round " + r.round));
      block.appendChild(gameRow(r.court1, c1Tag, "c1"));
      block.appendChild(gameRow(r.court2, c2Tag, "c2"));
      list.appendChild(block);
    });
    if (state.finals && (state.phase === "finals" || state.phase === "done")) {
      const block = el("div", { class: "schedule-round" });
      block.appendChild(el("div", { class: "schedule-round-title" }, "Finals"));
      block.appendChild(gameRow(state.finals.championship, "Champ", "gold"));
      block.appendChild(gameRow(state.finals.consolation,  "Cons",  "silver"));
      list.appendChild(block);
    }
  }

  modal.appendChild(list);
  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 12px;",
    onclick: close,
  }, "Close"));
  bg.appendChild(modal);
  document.body.appendChild(bg);
}

      const sel = el("select");
      [6,7,8,9,10,11,12].forEach(v => {
        const opt = el("option", { value: String(v) }, String(v));
        if ((isFmt ? state.kingRounds : state.gauntletRounds) === v) opt.setAttribute("selected", "selected");
        sel.appendChild(opt);
      });
      if (!noGamesPlayed) sel.disabled = true;
      sel.addEventListener("change", () => {
        if (isFmt) state.kingRounds = parseInt(sel.value, 10);
        else state.gauntletRounds = parseInt(sel.value, 10);
        save();
      });
      roundsRow.appendChild(sel);
      modal.appendChild(roundsRow);
      if (!noGamesPlayed) {
        modal.appendChild(el("p", { class: "muted", style: "font-size: 11px; margin: 0 0 6px;" },
          "Locked once games begin."));
      }
    }
  }

  // ---- Display & TV ----
  modal.appendChild(el("div", { class: "ka-section-title" }, "Display & TV"));

  // Primary toggle: Keep display awake
  const kaPrimaryRow = el("div", { class: "ka-row" });
  const kaPrimaryText = el("div", { class: "ka-text" });
  kaPrimaryText.appendChild(el("div", { class: "ka-title" }, "Keep display awake"));
  kaPrimaryText.appendChild(el("div", { class: "ka-sub" },
    "Prevents your Mac and AirPlay TVs from sleeping during a tournament."));
  const kaPrimarySwitch = el("label", { class: "ka-switch" });
  const kaPrimaryInput = el("input", { type: "checkbox" });
  if (state.keepAwake) kaPrimaryInput.setAttribute("checked", "checked");
  kaPrimarySwitch.appendChild(kaPrimaryInput);
  kaPrimarySwitch.appendChild(el("span", { class: "slider" }));
  kaPrimaryRow.appendChild(kaPrimaryText);
  kaPrimaryRow.appendChild(kaPrimarySwitch);
  modal.appendChild(kaPrimaryRow);

  // Sub-toggle: Aggressive mode (silent audio)
  const kaAggRow = el("div", { class: "ka-row indent" });
  const kaAggText = el("div", { class: "ka-text" });
  kaAggText.appendChild(el("div", { class: "ka-title" }, "Aggressive mode (silent audio)"));
  kaAggText.appendChild(el("div", { class: "ka-sub" },
    "Enable if your TV still sleeps. Adds a silent audio loop."));
  const kaAggSwitch = el("label", { class: "ka-switch" });
  const kaAggInput = el("input", { type: "checkbox" });
  if (state.keepAwakeAggressive) kaAggInput.setAttribute("checked", "checked");
  if (!state.keepAwake) kaAggInput.disabled = true;
  kaAggSwitch.appendChild(kaAggInput);
  kaAggSwitch.appendChild(el("span", { class: "slider" }));
  kaAggRow.appendChild(kaAggText);
  kaAggRow.appendChild(kaAggSwitch);
  modal.appendChild(kaAggRow);

  // Status row (live)
  const kaStatusRow = el("div", { class: "ka-row" });
  const kaStatusLabel = el("div", { class: "ka-text" });
  kaStatusLabel.appendChild(el("div", { class: "ka-title" }, "Status"));
  const kaStatusDisplay = el("div", { class: "ka-status-text" });
  kaStatusRow.appendChild(kaStatusLabel);
  kaStatusRow.appendChild(kaStatusDisplay);
  modal.appendChild(kaStatusRow);

  function refreshKaStatus() {
    const s = KeepAwake.getStatus();
    let dotClass = "gray", text = "Keep-awake off", detail = "";
    if (!s.active) {
      // off — always gray, ignore stale errors from prior session
    } else if (s.error && !s.canvasRunning) {
      dotClass = "red"; text = "Keep-awake error"; detail = s.error;
    } else if (s.active && s.canvasRunning && s.wakeLockHeld) {
      dotClass = "green"; text = "Keep-awake active";
    } else if (s.active && s.canvasRunning && !s.wakeLockHeld) {
      dotClass = "yellow"; text = "Keep-awake partial";
      detail = "wake lock unavailable";
    } else if (s.active && !s.canvasRunning) {
      dotClass = "red"; text = "Keep-awake error"; detail = s.error || "canvas not running";
    }
    kaStatusDisplay.innerHTML = "";
    kaStatusDisplay.appendChild(el("span", { class: "ka-status-dot " + dotClass }));
    kaStatusDisplay.appendChild(el("span", null, text));
    if (detail) kaStatusDisplay.appendChild(el("span", { class: "ka-detail" }, "(" + detail + ")"));
  }
  refreshKaStatus();
  statusTimer = setInterval(() => {
    if (!document.body.contains(bg)) { clearInterval(statusTimer); statusTimer = null; return; }
    refreshKaStatus();
  }, 2000);

  kaPrimaryInput.addEventListener("change", () => {
    state.keepAwake = kaPrimaryInput.checked;
    if (state.keepAwake) {
      KeepAwake.enable();
      showKeepAwakeActivationToast();
    } else {
      KeepAwake.disable();
      state.keepAwakeAggressive = false;
      kaAggInput.checked = false;
      KeepAwake.setAggressive(false);
      _keepAwakeToastShown = false;
    }
    kaAggInput.disabled = !state.keepAwake;
    save();
    refreshKaStatus();
  });
  kaAggInput.addEventListener("change", () => {
    state.keepAwakeAggressive = kaAggInput.checked;
    KeepAwake.setAggressive(state.keepAwakeAggressive);
    save();
    refreshKaStatus();
  });

  const closeBtn = el("button", { style: "width: 100%; margin-top: 12px;", onclick: () => { syncKeepAwakeToState(); close(); render(); } }, "Done");
  modal.appendChild(closeBtn);

  // Divider before destructive actions
  modal.appendChild(el("div", {
    style: "border-top: 1px solid var(--border); margin: 16px 0 8px;"
  }));

  // Switch format — confirms-and-wipes if a tournament is in progress.
  const allFormats = [
    { id: "rr",       label: "Round Robin" },
    { id: "stack",    label: "Stack Format" },
    { id: "king",     label: "King of the Court" },
    { id: "gauntlet", label: "Gauntlet" },
    { id: "crown",    label: "Crown Court" },
  ];
  allFormats.filter(f => f.id !== state.format).forEach(f => {
    modal.appendChild(el("button", {
      style: "width: 100%; margin-top: 8px;",
      onclick: () => {
        const inSetup = state.phase === "setup";
        const msg = inSetup
          ? "Switch to " + f.label + "?"
          : "Switch to " + f.label + "? This wipes the current tournament (names are kept).";
        if (!confirm(msg)) return;
        if (inSetup) {
          state.format = f.id;
        } else {
          const keptNames = state.rawNames.slice();
          const keptWinScore = state.winScore;
          const keptWinBy = state.winBy;
          const keptScoringSystem = state.scoringSystem;
          const keptStackRounds = state.stackRounds;
          const keptKingRounds = state.kingRounds;
          const keptGauntletRounds = state.gauntletRounds;
          const keptKeepAwake = state.keepAwake;
          const keptKeepAwakeAggressive = state.keepAwakeAggressive;
          state = newState();
          state.rawNames = keptNames;
          state.winScore = keptWinScore;
          state.winBy = keptWinBy;
          state.scoringSystem = keptScoringSystem;
          state.format = f.id;
          state.stackRounds = keptStackRounds;
          state.kingRounds = keptKingRounds;
          state.gauntletRounds = keptGauntletRounds;
          state.keepAwake = keptKeepAwake;
          state.keepAwakeAggressive = keptKeepAwakeAggressive;
          syncKeepAwakeToState();
        }
        save();
        close();
        render();
      },
    }, "Switch to " + f.label));
  });

  // Reset Tournament — visible only outside the setup phase
  if (state.phase !== "setup") {
    modal.appendChild(el("button", {
      style: "width: 100%; margin-top: 8px; background: var(--accent); color: #1a1207; border-color: var(--accent);",
      onclick: () => {
        const isCrown = state.format === "crown";
        const playerCount = isCrown ? 4 : 8;
        if (!confirm("Reset scores and re-shuffle the schedule? Your " + playerCount + " names will be kept.")) return;
        const keptNames = state.slots.slice();
        const keptWinScore = state.winScore;
        const keptWinBy = state.winBy;
        const keptScoringSystem = state.scoringSystem;
        const keptFormat = state.format;
        const keptStackRounds = state.stackRounds;
        const keptKingRounds = state.kingRounds;
        const keptGauntletRounds = state.gauntletRounds;
        const keptKeepAwake = state.keepAwake;
        const keptKeepAwakeAggressive = state.keepAwakeAggressive;
        state = newState();
        state.format = keptFormat;
        state.stackRounds = keptStackRounds;
        state.kingRounds = keptKingRounds;
        state.gauntletRounds = keptGauntletRounds;
        state.winScore = keptWinScore;
        state.winBy = keptWinBy;
        state.scoringSystem = keptScoringSystem;
        state.keepAwake = keptKeepAwake;
        state.keepAwakeAggressive = keptKeepAwakeAggressive;
        state.phase = "playing";
        state.currentRound = 1;
        if (isCrown) {
          const crowNames = keptNames.slice(0, 4);
          const shuffled = shuffle(crowNames.slice());
          state.rawNames = [...crowNames, "", "", "", ""];
          state.slots = [...shuffled, "", "", "", ""];
          state.tiebreakRandom = shuffle([0,1,2,3]);
          state.crownMatches = CROWN_SCHEDULE.map(s => ({
            team1: s.team1.slice(), team2: s.team2.slice(), theme: s.theme,
            games: [{score1:null,score2:null},{score1:null,score2:null},{score1:null,score2:null}],
          }));
          state.currentMatch = 0;
          state.crownFinal = null;
        } else {
          state.rawNames = keptNames.slice();
          state.slots = shuffle(keptNames);
          state.tiebreakRandom = shuffle([0,1,2,3,4,5,6,7]);
          state.rounds = keptFormat === "stack"    ? [assignInitialStackCourts()]
                       : keptFormat === "king"     ? [assignInitialKingCourts()]
                       : keptFormat === "gauntlet" ? [assignInitialGauntletCourts()]
                       : generateRounds();
        }
        syncKeepAwakeToState();
        save();
        close();
        render();
      }
    }, "Reset Tournament"));
  }

  // Clear All — always visible
  modal.appendChild(el("button", {
    class: "danger",
    style: "width: 100%; margin-top: 8px;",
    onclick: () => {
      if (!confirm("Clear all data including names? This can't be undone.")) return;
      const keptKeepAwakeClear = state.keepAwake;
      const keptKeepAwakeAggressiveClear = state.keepAwakeAggressive;
      state = newState();
      state.keepAwake = keptKeepAwakeClear;
      state.keepAwakeAggressive = keptKeepAwakeAggressiveClear;
      syncKeepAwakeToState();
      save();
      close();
      render();
    }
  }, "Clear All"));

  bg.appendChild(modal);
  document.body.appendChild(bg);
}

// ---------- boot ----------
KeepAwake.setAggressive(!!state.keepAwakeAggressive);
if (state.keepAwake) {
  // Layer 1 (canvas) starts immediately. Layer 2 (WakeLock) and Layer 3 (AudioContext)
  // may be rejected by the browser without a prior user gesture — both are caught internally
  // and will retry on first user interaction or next visibility change.
  KeepAwake.enable();
  // Do not show toast on boot — only show when user explicitly enables via settings.
}
// Heartbeat: write lastSeenAt once/sec; detect idle gaps > 5 min and credit to pauseSec.
setInterval(() => {
  if (!state.timeBudget || state.phase === "setup" || state.phase === "done") return;
  const now = Date.now();
  const lastSeen = state.timeBudget.lastSeenAt || 0;
  if (lastSeen > 0 && now - lastSeen > 5 * 60 * 1000) {
    const gapSec = Math.round((now - lastSeen) / 1000);
    for (const r of state.rounds) {
      for (const court of [r.court1, r.court2]) {
        if (court.gameStartedAt != null && court.gameEndedAt == null) {
          court.pauseSec = (court.pauseSec || 0) + gapSec;
        }
      }
    }
    save();
  }
  state.timeBudget.lastSeenAt = now;
}, 1000);

render();
</script>
</body>
</html>
