  const upTo = Math.min(throughRound || 0, state.rounds.length);
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    for (const courtKey of [1, 2]) {
      const game = courtKey === 1 ? r.court1 : r.court2;
      const teams = [game.team1, game.team2];
      teams.forEach(t => {
        stats[t[0]-1].partnersUsed.add(t[1]);
        stats[t[1]-1].partnersUsed.add(t[0]);
        if (courtKey === 1) { stats[t[0]-1].gamesOnCourt1++; stats[t[1]-1].gamesOnCourt1++; }
        else                { stats[t[0]-1].gamesOnCourt2++; stats[t[1]-1].gamesOnCourt2++; }
      });
      if (!isGameComplete(game)) continue;
      const t1Won = game.score1 > game.score2;
      const t2Won = game.score2 > game.score1;
      const margin = Math.abs(game.score1 - game.score2);
      for (const teamKey of ["team1", "team2"]) {
        const team = game[teamKey];
        const pts = teamKey === "team1" ? game.score1 : game.score2;
        const ag  = teamKey === "team1" ? game.score2 : game.score1;
        const won = (teamKey === "team1" && t1Won) || (teamKey === "team2" && t2Won);
        const lost = (teamKey === "team1" && t2Won) || (teamKey === "team2" && t1Won);
        const gain = stackScoreGain(pts, courtKey === 1, won);
        for (const slot of team) {
          const st = stats[slot-1];
          st.stackScore += gain;
          st.pointsScored += pts;
          st.pointsAgainst += ag;
          if (won) st.wins++;
          if (lost) st.losses++;
          if (margin === 1) {
            if (won) st.onePointGames.wins++;
            else if (lost) st.onePointGames.losses++;
          }
        }
      }
    }
    // Climbs / drops: derived from the i → i+1 court transition (only after the
    // next round has actually been built).
    if (i + 1 < state.rounds.length) {
      const nextR = state.rounds[i + 1];
      const onC1Now  = new Set([...r.court1.team1,     ...r.court1.team2]);
      const onC1Next = new Set([...nextR.court1.team1, ...nextR.court1.team2]);
      for (let s = 1; s <= 8; s++) {
        const wasC1 = onC1Now.has(s);
        const willC1 = onC1Next.has(s);
        if (!wasC1 && willC1) stats[s-1].courtClimbs++;
        if (wasC1 && !willC1) stats[s-1].courtDrops++;
      }
    }
  }
  return stats;
}

// Sort by stack score descending, tiebreak by tiebreakRandom ordering of slots.
function rankPlayersStack(throughRound) {
  const stats = computeStackStats(throughRound);
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  stats.sort((a, b) => {
    if (b.stackScore !== a.stackScore) return b.stackScore - a.stackScore;
    return tieRand.indexOf(a.slot - 1) - tieRand.indexOf(b.slot - 1);
  });
  return stats;
}

// Re-pair the four players assigned to a court for the next round.
//   slotsOnCourt:    the 4 slots that will play this court next round
//   prevSameCourt:   the prior round's game on THIS court (or null for round 1)
//   stackBySlot:     Map<slot, stackScore> at the time of pairing
// Returns [team1, team2], each a length-2 array of slots.
function pairForStackCourt(slotsOnCourt, prevSameCourt, stackBySlot) {
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  const ranked = slotsOnCourt.slice().sort((a, b) => {
    const sa = stackBySlot.get(a) || 0;
    const sb = stackBySlot.get(b) || 0;
    if (sb !== sa) return sb - sa;
    return tieRand.indexOf(a - 1) - tieRand.indexOf(b - 1);
  });
  // Default: rank1 + rank4 vs rank2 + rank3
  let teamA = [ranked[0], ranked[3]];
  let teamB = [ranked[1], ranked[2]];
  if (prevSameCourt) {
    const wasPair = (a, b) => {
      for (const t of [prevSameCourt.team1, prevSameCourt.team2]) {
        if (t.includes(a) && t.includes(b)) return true;
      }
      return false;
    };
    if (wasPair(teamA[0], teamA[1]) || wasPair(teamB[0], teamB[1])) {
      // Swap rank-3 and rank-4 to break the repeat. Movement guarantees at most
      // one prior-round pair carries over, so this swap always breaks any
      // single repeat.
      teamA = [ranked[0], ranked[2]];
      teamB = [ranked[1], ranked[3]];
    }
  }
  return [teamA, teamB];
}

// Build the next stack round from the previous (which must be complete and
// non-tied — both score1 !== score2).
function buildNextStackRound(prevRound) {
  const c1 = prevRound.court1, c2 = prevRound.court2;
  const c1Win  = c1.score1 > c1.score2 ? c1.team1 : c1.team2;
  const c1Lose = c1.score1 > c1.score2 ? c1.team2 : c1.team1;
  const c2Win  = c2.score1 > c2.score2 ? c2.team1 : c2.team2;
  const c2Lose = c2.score1 > c2.score2 ? c2.team2 : c2.team1;
  const newC1Slots = [...c1Win, ...c2Win];
  const newC2Slots = [...c1Lose, ...c2Lose];

  const stackStats = computeStackStats(prevRound.round);
  const stackBySlot = new Map(stackStats.map(s => [s.slot, s.stackScore]));

  const [c1A, c1B] = pairForStackCourt(newC1Slots, c1, stackBySlot);
  const [c2A, c2B] = pairForStackCourt(newC2Slots, c2, stackBySlot);

  return {
    round: prevRound.round + 1,
    court1: { team1: c1A, team2: c1B, score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    court2: { team1: c2A, team2: c2B, score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
  };
}

// === KING FORMAT ===
// Court 1 = King's Court (top). After each round: winners move/stay up, losers move/stay down.
// Random re-pairing on each court every round. Ranking = composite King Score.

function assignInitialKingCourts() {
  const slots = shuffle([1,2,3,4,5,6,7,8]);
  const c1 = shuffle(slots.slice(0, 4));
  const c2 = shuffle(slots.slice(4));
  return {
    round: 1,
    court1: { team1: [c1[0], c1[1]], team2: [c1[2], c1[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    court2: { team1: [c2[0], c2[1]], team2: [c2[2], c2[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
  };
}

function computeKingStats(throughRound) {
  const stats = [];
  for (let s = 1; s <= 8; s++) {
    stats.push({ slot: s, name: nameOf(s), wins: 0, pointsScored: 0, kingCourtWins: 0, kingScore: 0 });
  }
  const upTo = Math.min(throughRound || 0, state.rounds.length);
  for (let i = 0; i < upTo; i++) {
    const r = state.rounds[i];
    for (const courtKey of [1, 2]) {
      const game = courtKey === 1 ? r.court1 : r.court2;
      if (!isGameComplete(game)) continue;
      const t1Won = game.score1 > game.score2;
      const t2Won = game.score2 > game.score1;
      for (const teamKey of ["team1", "team2"]) {
        const team = game[teamKey];
        const pts = teamKey === "team1" ? game.score1 : game.score2;
        const won = (teamKey === "team1" && t1Won) || (teamKey === "team2" && t2Won);
        for (const slot of team) {
          const st = stats[slot - 1];
          st.pointsScored += pts;
          if (won) {
            st.wins++;
            if (courtKey === 1) st.kingCourtWins++;
          }
        }
      }
    }
  }
  stats.forEach(s => { s.kingScore = s.wins + s.pointsScored + s.kingCourtWins; });
  return stats;
}

function rankPlayersKing(throughRound) {
  const stats = computeKingStats(throughRound);
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8)
    ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  stats.sort((a, b) => {
    if (b.kingScore !== a.kingScore) return b.kingScore - a.kingScore;
    return tieRand.indexOf(a.slot - 1) - tieRand.indexOf(b.slot - 1);
  });
  return stats;
}

function buildNextKingRound(prevRound) {
  if (!isRoundDecided(prevRound)) throw new Error("buildNextKingRound called with undecided round");
  const c1 = prevRound.court1, c2 = prevRound.court2;
  const c1Win  = c1.score1 > c1.score2 ? c1.team1 : c1.team2;
  const c1Lose = c1.score1 > c1.score2 ? c1.team2 : c1.team1;
  const c2Win  = c2.score1 > c2.score2 ? c2.team1 : c2.team2;
  const c2Lose = c2.score1 > c2.score2 ? c2.team2 : c2.team1;
  // Movement: winners pool → King's Court; losers pool → Bottom Court. Random re-pair on each.
  const newC1 = shuffle([...c1Win, ...c2Win]);
  const newC2 = shuffle([...c1Lose, ...c2Lose]);
  return {
    round: prevRound.round + 1,
    court1: { team1: [newC1[0], newC1[1]], team2: [newC1[2], newC1[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    court2: { team1: [newC2[0], newC2[1]], team2: [newC2[2], newC2[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
  };
}

function kingMovementToastText(prevRound) {
  const c2Win  = prevRound.court2.score1 > prevRound.court2.score2
    ? prevRound.court2.team1 : prevRound.court2.team2;
  const c1Lose = prevRound.court1.score1 > prevRound.court1.score2
    ? prevRound.court1.team2 : prevRound.court1.team1;
  return teamName(c2Win) + " climb to King's Court · " + teamName(c1Lose) + " drop to Bottom";
}

// === GAUNTLET FORMAT ===
// Re-rank all 8 after every round. Court 1: #1+#4 vs #2+#3; Court 2: #5+#8 vs #6+#7.
// Reuses existing rankPlayers() (points scored → wins → diff → h2h) — no new stats needed.

function buildGauntletPairing(ranked, roundNum) {
  return {
    round: roundNum,
    court1: { team1: [ranked[0], ranked[3]], team2: [ranked[1], ranked[2]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    court2: { team1: [ranked[4], ranked[7]], team2: [ranked[5], ranked[6]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
  };
}

function assignInitialGauntletCourts() {
  // rankPlayers(0) returns all players with 0 stats → sorted by tiebreakRandom (already set in startTournament).
  const ranked = rankPlayers(0).map(s => s.slot);
  return buildGauntletPairing(ranked, 1);
}

function buildNextGauntletRound(prevRound) {
  const ranked = rankPlayers(prevRound.round).map(s => s.slot);
  return buildGauntletPairing(ranked, prevRound.round + 1);
}

// ---------- Crown Court logic ----------

// Takes winner's games won first, loser's games won second — caller resolves who won.
function matchPointsForMatch(gamesWonWinner, gamesWonLoser, theme) {
  const m = (CROWN_THEMES[theme] || {}).matchPointMultiplier || 1;
  if (gamesWonWinner === 2 && gamesWonLoser === 0) return { perWinner: 3 * m, perLoser: 0 };
  if (gamesWonWinner === 2 && gamesWonLoser === 1) return { perWinner: 2 * m, perLoser: 1 * m };
  return { perWinner: 0, perLoser: 0 };
}

function isValidCrownGameScore(s1, s2, theme) {
  if (s1 < 0 || s2 < 0) return false;
  const cfg = CROWN_THEMES[theme];
  if (!cfg) return true; // unknown theme: advisory only
  const winner = Math.max(s1, s2);
  const diff = Math.abs(s1 - s2);
  return winner >= cfg.winScore && diff >= cfg.winBy;
}

function crownGamesWon(match, maxGames) {
  const theme = match.theme; // set on match objects; undefined for test fixtures (no validation)
  let w1 = 0, w2 = 0;
  const games = maxGames != null ? match.games.slice(0, maxGames) : match.games;
  for (const g of games) {
    if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
    if (g.score1 === g.score2) break;
    if (theme && !isValidCrownGameScore(g.score1, g.score2, theme)) break;
    if (g.score1 > g.score2) w1++;
    else w2++;
    if (w1 === 2 || w2 === 2) break;
  }
  return { gamesWon1: w1, gamesWon2: w2 };
}

function isCrownMatchComplete(match) {
  // Rely solely on crownGamesWon reaching 2 wins — this enforces theme winScore/winBy via
  // isValidCrownGameScore. A 1-1 tie resolves only when game 3 produces a valid, non-equal score.
  const { gamesWon1, gamesWon2 } = crownGamesWon(match);
  return gamesWon1 === 2 || gamesWon2 === 2;
}

function crownMatchWinner(match) {
  if (!isCrownMatchComplete(match)) return null;
  const { gamesWon1, gamesWon2 } = crownGamesWon(match);
  if (gamesWon1 === gamesWon2) return null;
  return gamesWon1 > gamesWon2 ? "team1" : "team2";
}

function crownPlayerStats() {
  const stats = [1,2,3,4].map(slot => ({
    slot, name: nameOf(slot),
    matchPoints: 0,
    gamesWon: 0, gamesLost: 0,
    pointsScored: 0, pointDiff: 0,
  }));
  state.crownMatches.forEach((match, mi) => {
    if (!isCrownMatchComplete(match)) return;
    const { gamesWon1, gamesWon2 } = crownGamesWon(match);
    const theme = CROWN_SCHEDULE[mi].theme;
    const winner = crownMatchWinner(match);
    if (!winner) return; // defensive: complete match always has a winner, but guard null explicitly
    const winTeam  = winner === "team1" ? match.team1 : match.team2;
    const loseTeam = winner === "team1" ? match.team2 : match.team1;
    const winGames = winner === "team1" ? gamesWon1 : gamesWon2;
    const loseGames = winner === "team1" ? gamesWon2 : gamesWon1;
    const pts = matchPointsForMatch(winGames, loseGames, theme);
    for (const slot of winTeam)  { stats[slot-1].matchPoints += pts.perWinner; }
    for (const slot of loseTeam) { stats[slot-1].matchPoints += pts.perLoser; }
    // Accumulate game stats using the same boundary as crownGamesWon (theme-aware)
    const games = [];
    let _w1 = 0, _w2 = 0;
    for (const g of match.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (match.theme && !isValidCrownGameScore(g.score1, g.score2, match.theme)) break;
      games.push(g);
      if (g.score1 > g.score2) _w1++; else if (g.score2 > g.score1) _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
    for (const g of games) {
      for (const slot of match.team1) {
        stats[slot-1].pointsScored += g.score1;
        stats[slot-1].pointDiff    += (g.score1 - g.score2);
        if (g.score1 > g.score2) stats[slot-1].gamesWon++; else if (g.score2 > g.score1) stats[slot-1].gamesLost++;
      }
      for (const slot of match.team2) {
        stats[slot-1].pointsScored += g.score2;
        stats[slot-1].pointDiff    += (g.score2 - g.score1);
        if (g.score2 > g.score1) stats[slot-1].gamesWon++; else if (g.score1 > g.score2) stats[slot-1].gamesLost++;
      }
    }
  });
  return stats;
}

function crownLeaderboard() {
  const stats = crownPlayerStats();
  return stats.sort((a, b) => {
    if (b.matchPoints !== a.matchPoints) return b.matchPoints - a.matchPoints;
    if (b.pointsScored !== a.pointsScored) return b.pointsScored - a.pointsScored;
    if (b.pointDiff !== a.pointDiff) return b.pointDiff - a.pointDiff;
    return state.tiebreakRandom[a.slot-1] - state.tiebreakRandom[b.slot-1];
  });
}

function crownPairings(lb) {
  // rank 1 partners rank 4; rank 2 partners rank 3
  const team1 = [lb[0].slot, lb[3].slot];
  const team2 = [lb[1].slot, lb[2].slot];
  return { team1, team2 };
}

function finalRankingCrown() {
  if (!state.crownFinal || !isCrownMatchComplete(state.crownFinal)) {
    return crownLeaderboard();
  }
  const winner = crownMatchWinner(state.crownFinal);
  const crownWinTeam  = winner === "team1" ? state.crownFinal.team1 : (winner === "team2" ? state.crownFinal.team2 : null);
  const crownLoseTeam = winner === "team1" ? state.crownFinal.team2 : (winner === "team2" ? state.crownFinal.team1 : null);
  if (!crownWinTeam || !crownLoseTeam) return crownLeaderboard();

  const stats = crownPlayerStats();
  const { gamesWon1: cw1, gamesWon2: cw2 } = crownGamesWon(state.crownFinal);
  const crownWinGames  = winner === "team1" ? cw1 : cw2;
  const crownLoseGames = winner === "team1" ? cw2 : cw1;
  const crownPts = matchPointsForMatch(crownWinGames, crownLoseGames, "Crown");
  for (const slot of crownWinTeam)  stats[slot-1].matchPoints += crownPts.perWinner;
  for (const slot of crownLoseTeam) stats[slot-1].matchPoints += crownPts.perLoser;

  const crownFinalValidGames = [];
  { let _cw1 = 0, _cw2 = 0;
    for (const g of state.crownFinal.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;
      crownFinalValidGames.push(g);
      if (g.score1 > g.score2) _cw1++; else if (g.score2 > g.score1) _cw2++;
      if (_cw1 === 2 || _cw2 === 2) break;
    }
  }
  for (const g of crownFinalValidGames) {
    const t1win = g.score1 > g.score2;
    for (const slot of state.crownFinal.team1) {
      stats[slot-1].pointsScored += g.score1;
      stats[slot-1].pointDiff    += (g.score1 - g.score2);
      if (t1win) stats[slot-1].gamesWon++; else if (g.score2 > g.score1) stats[slot-1].gamesLost++;
    }
    for (const slot of state.crownFinal.team2) {
      stats[slot-1].pointsScored += g.score2;
      stats[slot-1].pointDiff    += (g.score2 - g.score1);
      if (g.score2 > g.score1) stats[slot-1].gamesWon++; else if (g.score1 > g.score2) stats[slot-1].gamesLost++;
    }
  }

  const sortWithin = (team) => team.slice().sort((a, b) => {
    const sa = stats[a-1], sb = stats[b-1];
    if (sb.matchPoints !== sa.matchPoints) return sb.matchPoints - sa.matchPoints;
    if (sb.pointsScored !== sa.pointsScored) return sb.pointsScored - sa.pointsScored;
    if (sb.pointDiff !== sa.pointDiff) return sb.pointDiff - sa.pointDiff;
    return state.tiebreakRandom[a-1] - state.tiebreakRandom[b-1];
  });

  const ordered = [...sortWithin(crownWinTeam), ...sortWithin(crownLoseTeam)];
  return ordered.map(slot => ({ ...stats[slot-1] }));
}

function startTournament() {
  // No syncKeepAwakeToState() here — this function mutates state in-place rather than
  // replacing it, so keepAwake settings are already live. syncKeepAwakeToState() is only
  // needed after full state replacements (e.g. newState(), format-switch, data-clear).
  const isCrown = state.format === "crown";
  const count = isCrown ? 4 : 8;
  const names = state.rawNames.slice(0, count).map(s => s.trim());
  const shuffled = shuffle(names);

  state.tiebreakRandom = shuffle(isCrown ? [0,1,2,3] : [0,1,2,3,4,5,6,7]);
  state.currentRound = 1;
  state.notifiedRounds = [];
  state.awardsShown = false;
  state.previousRanks = [];
  state.finals = null;

  if (isCrown) {
    state.crownMatches = CROWN_SCHEDULE.map(s => ({
      team1: s.team1.slice(),
      team2: s.team2.slice(),
      theme: s.theme,
      games: [
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
        { score1: null, score2: null, team1: s.team1.slice(), team2: s.team2.slice() },
      ],
    }));
    state.currentMatch = 0;
    state.crownFinal = null;
    // slots always stays 8 elements so nameOf()/format-switching never breaks
    state.slots = [...shuffled, "", "", "", ""];
    state.phase = "playing";
    save();
    runShuffleReveal(shuffled.slice(), () => render());
  } else if (state.format === "stack") {
    state.slots = shuffled;
    state.rounds = [assignInitialStackCourts()];
    state.phase = "playing";
    save();
    const r1 = state.rounds[0];
    const c1Slots = [...r1.court1.team1, ...r1.court1.team2];
    const c2Slots = [...r1.court2.team1, ...r1.court2.team2];
    const display = [...c1Slots.map(nameOf), ...c2Slots.map(nameOf)];
    runShuffleReveal(display, () => render(), {
      title: "Drawing courts…",
      groups: [
        { label: "🏆 Court 1", count: 4 },
        { label: "Court 2",    count: 4 },
      ],
    });
  } else if (state.format === "king") {
    state.slots = shuffled;
    state.rounds = [assignInitialKingCourts()];
    state.phase = "playing";
    save();
    const r1k = state.rounds[0];
    const kC1Slots = [...r1k.court1.team1, ...r1k.court1.team2];
    const kC2Slots = [...r1k.court2.team1, ...r1k.court2.team2];
    const kDisplay = [...kC1Slots.map(nameOf), ...kC2Slots.map(nameOf)];
    runShuffleReveal(kDisplay, () => render(), {
      title: "Drawing courts…",
      groups: [
        { label: "👑 King's Court", count: 4 },
        { label: "Bottom Court",   count: 4 },
      ],
    });
  } else if (state.format === "gauntlet") {
    state.slots = shuffled;
    state.rounds = [assignInitialGauntletCourts()];
    state.phase = "playing";
    save();
    const r1g = state.rounds[0];
    const gC1Slots = [...r1g.court1.team1, ...r1g.court1.team2];
    const gC2Slots = [...r1g.court2.team1, ...r1g.court2.team2];
    const gDisplay = [...gC1Slots.map(nameOf), ...gC2Slots.map(nameOf)];
    runShuffleReveal(gDisplay, () => render(), {
      title: "Drawing courts…",
      groups: [
        { label: "Court 1 (Top)", count: 4 },
        { label: "Court 2",       count: 4 },
      ],
    });
  } else {
    state.slots = shuffled;
    state.rounds = generateRounds();
    state.phase = "playing";
    save();
    runShuffleReveal(state.slots.slice(), () => render());
  }
}

function nameOf(slot) { return state.slots[slot - 1] || ("P" + slot); }
function teamName(team) { return nameOf(team[0]) + " & " + nameOf(team[1]); }
function isGameComplete(g) { return Number.isInteger(g.score1) && Number.isInteger(g.score2); }
function isRoundComplete(r) { return isGameComplete(r.court1) && isGameComplete(r.court2); }

function computeStats(throughRound, includeFinals) {
  const stats = [];
  for (let s = 1; s <= 8; s++) {
    stats.push({ slot: s, name: nameOf(s), points: 0, wins: 0, losses: 0, diff: 0, played: 0, partnersUsed: new Set() });
  }
  const games = [];
  for (let i = 0; i < (throughRound || 0) && i < state.rounds.length; i++) {
    games.push({ ...state.rounds[i].court1, isFinal: false });
    games.push({ ...state.rounds[i].court2, isFinal: false });
  }
  if (includeFinals && state.finals) {
    games.push({ ...state.finals.championship, isFinal: true });
    games.push({ ...state.finals.consolation, isFinal: true });
  }
  for (const g of games) {
    if (!g.isFinal) {
      stats[g.team1[0]-1].partnersUsed.add(g.team1[1]);
      stats[g.team1[1]-1].partnersUsed.add(g.team1[0]);
      stats[g.team2[0]-1].partnersUsed.add(g.team2[1]);
      stats[g.team2[1]-1].partnersUsed.add(g.team2[0]);
    }
    if (!isGameComplete(g)) continue;
    const t1Win = g.score1 > g.score2;
    const t2Win = g.score2 > g.score1;
    for (const slot of g.team1) {
      const st = stats[slot-1];
      st.points += g.score1; st.diff += (g.score1 - g.score2); st.played++;
      if (t1Win) st.wins++; else if (t2Win) st.losses++;
    }
    for (const slot of g.team2) {
      const st = stats[slot-1];
      st.points += g.score2; st.diff += (g.score2 - g.score1); st.played++;
      if (t2Win) st.wins++; else if (t1Win) st.losses++;
    }
  }
  return stats;
}

function headToHead(slotA, slotB, throughRound) {
  let diff = 0;
  for (let i = 0; i < throughRound && i < state.rounds.length; i++) {
    const r = state.rounds[i];
    for (const g of [r.court1, r.court2]) {
      if (!isGameComplete(g)) continue;
      const aOn1 = g.team1.includes(slotA);
      const aOn2 = g.team2.includes(slotA);
      const bOn1 = g.team1.includes(slotB);
      const bOn2 = g.team2.includes(slotB);
      if (aOn1 && bOn2)      diff += (g.score1 - g.score2);
      else if (aOn2 && bOn1) diff += (g.score2 - g.score1);
    }
  }
  return diff;
}

function rankPlayers(throughRound) {
  const stats = computeStats(throughRound, false);
  const tieRand = (state.tiebreakRandom && state.tiebreakRandom.length === 8) ? state.tiebreakRandom : [0,1,2,3,4,5,6,7];
  stats.sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.wins   !== a.wins)   return b.wins   - a.wins;
    if (b.diff   !== a.diff)   return b.diff   - a.diff;
    const h2h = headToHead(a.slot, b.slot, throughRound);
    if (h2h !== 0) return -h2h;
    return tieRand.indexOf(a.slot - 1) - tieRand.indexOf(b.slot - 1);
  });
  return stats;
}

// Format-aware overall ranking through `throughRound` (1-based, inclusive).
function rankPlayersForFormat(throughRound) {
  if (state.format === "stack") return rankPlayersStack(throughRound);
  if (state.format === "king")  return rankPlayersKing(throughRound);
  return rankPlayers(throughRound); // rr, gauntlet: same ranking
}

function buildFinals() {
  const total = totalRegularRounds();
  const ranked = rankPlayersForFormat(total).map(s => s.slot);
  state.finals = {
    championship: { team1: [ranked[0], ranked[3]], team2: [ranked[1], ranked[2]], score1: null, score2: null },
    consolation:  { team1: [ranked[4], ranked[7]], team2: [ranked[5], ranked[6]], score1: null, score2: null },
  };
  state.phase = "finals";
  save();
}

// Returns { partner: number, courtKey: 1|2 } for the given player's next round,
// or null if there's no next round or no rounds yet. Partner chips are an RR
// affordance — Stack rounds are built incrementally so the next pairing isn't
// known until after advancing.
function nextPartnerInfo(slot) {
  if (state.phase !== "playing") return null;
  if (state.format === "stack" || state.format === "king" || state.format === "gauntlet") return null;
  if (state.currentRound >= 7) return null;
  const next = state.rounds[state.currentRound]; // currentRound is 1-based; this is round N+1
  if (!next) return null;
  for (const courtKey of [1, 2]) {
    const game = courtKey === 1 ? next.court1 : next.court2;
    for (const team of [game.team1, game.team2]) {
      const idx = team.indexOf(slot);
      if (idx !== -1) return { partner: team[1 - idx], courtKey };
    }
  }
  return null;
}

function showToast(text) {
  let stack = document.querySelector(".toast-stack");
  if (!stack) {
    stack = el("div", { class: "toast-stack" });
    document.body.appendChild(stack);
  }
  const t = el("div", { class: "toast" }, text);
  stack.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}

function maybeFireRoundComplete(primaryBtn) {
  if (state.phase !== "playing") return;
  const idx = state.currentRound - 1;
  const round = state.rounds[idx];
  if (!round) return;
  // In Stack format, a tied round can't advance the tournament — don't celebrate it yet.
  const advanceable = (state.format === "stack" || state.format === "king")
    ? isRoundDecided(round)
    : isRoundComplete(round);
  if (!advanceable) return;
  if (state.notifiedRounds.includes(state.currentRound)) return;
  state.notifiedRounds.push(state.currentRound);
  save();
  showToast("🎉 Round " + state.currentRound + " complete!");
  if (primaryBtn) {
    primaryBtn.classList.remove("shimmering");
    // force reflow so the keyframe restarts
    void primaryBtn.offsetWidth;
    primaryBtn.classList.add("shimmering");
    setTimeout(() => primaryBtn.classList.remove("shimmering"), 1600);
  }
}

// Returns an array of 8 stat objects in tournament-outcome tier order
// (champ-W > champ-L > cons-W > cons-L). Falls back to season order if finals
// are missing or undecided. The within-tier sort is by season rank (which is
// format-aware: rankPlayers for RR, rankPlayersStack for Stack).
function finalRanking() {
  const seasonOrder = rankPlayersForFormat(totalRegularRounds());
  const seasonRank = new Map();
  seasonOrder.forEach((s, i) => seasonRank.set(s.slot, i));
  const bySlot = new Map();
  seasonOrder.forEach(s => bySlot.set(s.slot, s));

  const f = state.finals;
  const allDecided = f
    && isGameComplete(f.championship) && f.championship.score1 !== f.championship.score2
    && isGameComplete(f.consolation)  && f.consolation.score1  !== f.consolation.score2;
  if (!allDecided) return seasonOrder.slice();

  const champWinTeam  = f.championship.score1 > f.championship.score2 ? f.championship.team1 : f.championship.team2;
  const champLoseTeam = f.championship.score1 > f.championship.score2 ? f.championship.team2 : f.championship.team1;
  const consWinTeam   = f.consolation.score1  > f.consolation.score2  ? f.consolation.team1  : f.consolation.team2;
  const consLoseTeam  = f.consolation.score1  > f.consolation.score2  ? f.consolation.team2  : f.consolation.team1;

  const sortByseason = arr => arr.slice().sort((a, b) => seasonRank.get(a) - seasonRank.get(b));
  const ordered = [
    ...sortByseason(champWinTeam),
    ...sortByseason(champLoseTeam),
    ...sortByseason(consWinTeam),
    ...sortByseason(consLoseTeam),
  ];
  return ordered.map(slot => bySlot.get(slot));
}

// ====================== rendering ======================
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) {
    for (const k in props) {
      const v = props[k];
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "style") e.setAttribute("style", v);
      else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());
  if (state.phase === "setup")        app.appendChild(renderSetup());
  else if (state.phase === "playing") app.appendChild(renderPlaying());
  else if (state.phase === "finals")  app.appendChild(renderFinalsScreen());
  else if (state.phase === "crown")   app.appendChild(renderCrownPhaseScreen());
  else if (state.phase === "done")    app.appendChild(renderDoneScreen());
  window.scrollTo({ top: 0, behavior: "auto" });
  if (state.phase === "playing") {

  return 7;

function canStart() {
  const count = state.format === "crown" ? 4 : 8;
  const trimmed = (state.rawNames || []).slice(0, count).map(n => (n || "").trim());
  if (trimmed.length < count || trimmed.some(n => !n)) return false;
  return new Set(trimmed.map(n => n.toLowerCase())).size === count;
}

// Returns { ok: true, names: string[] } or { ok: false, count: number, error: string }.
// Splits on newlines or commas, trims, drops empties. Validates exactly `count` unique
// (case-insensitive). count defaults to 8 for backward compat with existing callers.
function parsePastedNames(text, count) {
  count = count || 8;
  const parts = String(text || "")
    .split(/[\n,]/)
    .map(s => s.trim())
    .filter(Boolean);
  const lower = parts.map(s => s.toLowerCase());
  const uniqueCount = new Set(lower).size;
  if (parts.length !== count || uniqueCount !== count) {
    return { ok: false, count: parts.length, error:
      `found ${parts.length}${parts.length === uniqueCount ? "" : ` (${parts.length - uniqueCount} duplicate)`} — need ${count} unique names` };
  }
  return { ok: true, names: parts };
}

function openPasteModal() {
  const playerCount = state.format === "crown" ? 4 : 8;
  const bg = el("div", { class: "modal-bg" });
  const close = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) close(); });

  const modal = el("div", { class: "modal" });
  modal.appendChild(el("h2", null, "Paste " + playerCount + " names"));
  modal.appendChild(el("p", { class: "muted", style: "margin: 0 0 12px;" },
    "One name per line, or comma-separated. Whitespace is trimmed."));

  const textarea = el("textarea", {
    class: "paste-textarea",
    placeholder: playerCount === 4 ? "Adrian\nAlex\nKen\nSam" : "Adrian\nAlex\nJohn\nJoe\nKen\nKris\nSam\nTodd",
    autocomplete: "off",
    autocapitalize: "words",
    autocorrect: "off",
    spellcheck: "false",
  });
  modal.appendChild(textarea);

  const errorLine = el("div", { class: "paste-error" });
  modal.appendChild(errorLine);

  const fillBtn = el("button", {
    class: "primary",
    style: "width: 100%; margin-top: 12px;",
    onclick: () => {
      const result = parsePastedNames(textarea.value, playerCount);
      if (!result.ok) {
        errorLine.textContent = result.error;
        return;
      }
      for (let i = 0; i < playerCount; i++) state.rawNames[i] = result.names[i];
      // rawNames[playerCount..7] intentionally untouched to preserve names on format switch
      save();
      close();
      render();
    }
  }, "Fill names");
  modal.appendChild(fillBtn);

  modal.appendChild(el("button", {
    style: "width: 100%; margin-top: 8px;",
    onclick: close,
  }, "Cancel"));

  bg.appendChild(modal);
  document.body.appendChild(bg);
  setTimeout(() => textarea.focus(), 0);
}

function isGameDecided(g) { return isGameComplete(g) && g.score1 !== g.score2; }
function isRoundDecided(r) { return isGameDecided(r.court1) && isGameDecided(r.court2); }

function movementToastText(prevRound, newRound) {
  // climbers = c2 winners (now on new c1)
  const c2Win = prevRound.court2.score1 > prevRound.court2.score2 ? prevRound.court2.team1 : prevRound.court2.team2;
  const c1Lose = prevRound.court1.score1 > prevRound.court1.score2 ? prevRound.court1.team2 : prevRound.court1.team1;
  return teamName(c2Win) + " climb to Court 1 · " + teamName(c1Lose) + " drop to Court 2";
}

function renderCrownMatchCard(match, sched, externalRefreshes) {
  const refreshes = externalRefreshes || [];
  const themeConfig = CROWN_THEMES[sched.theme] || CROWN_THEMES["Opening"];
  const { gamesWon1, gamesWon2 } = crownGamesWon(match);
  const matchComplete = isCrownMatchComplete(match);
  // Game 3 enablement is based only on games 1-2, not the final result — keeps Game 3 editable after a 2-1 match.
  const { gamesWon1: g12w1, gamesWon2: g12w2 } = crownGamesWon(match, 2);

  const card = el("div", { class: "court-card crown c1", style: "max-width:560px;margin:0 auto 14px;" });
  card.appendChild(el("div", { class: "court-label" }, "👑 " + sched.name.toUpperCase()));

  const scoreIndicator = el("div", {
    style: "text-align:center;font-size:14px;color:var(--muted);margin-bottom:12px;"
  }, "Match score: " + gamesWon1 + "–" + gamesWon2);
  card.appendChild(scoreIndicator);

  if (sched.theme === "Sudden Death") card.appendChild(renderRallyScoringHelp());

  const crownOpts = { winScore: themeConfig.winScore, winBy: themeConfig.winBy, theme: sched.theme };
  const gamesWrap = el("div");

  for (let gi = 0; gi < 3; gi++) {
    const game = match.games[gi];
    if (!game.team1) game.team1 = match.team1;
    if (!game.team2) game.team2 = match.team2;
    const isGame3 = gi === 2;
    const game3Needed = g12w1 === 1 && g12w2 === 1;
    const game3NotNeeded = (g12w1 === 2 && g12w2 === 0) || (g12w2 === 2 && g12w1 === 0);

    const game3Disabled = isGame3 && !game3Needed; // disabled until 1-1 split
    const gameCard = el("div", {
      style: "margin-bottom:10px;" + (game3Disabled ? "opacity:0.4;pointer-events:none;" : "")
    });
    const labelText = isGame3
      ? "Game 3" + (game3NotNeeded ? " (not needed — sweep)" : game3Needed ? " (play now)" : " (if needed)")
      : "Game " + (gi + 1);
    const labelEl = el("div", {
      class: "muted",
      style: "font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;"
    }, labelText);
    gameCard.appendChild(labelEl);

    const matchup = el("div", { class: "matchup" });
    const t1Wrap = renderTeamRow(game, "team1", "score1", "score2", refreshes, crownOpts);
    const t2Wrap = renderTeamRow(game, "team2", "score2", "score1", refreshes, crownOpts);
    matchup.appendChild(t1Wrap.node);
    matchup.appendChild(t2Wrap.node);
    gameCard.appendChild(matchup);

    const summary = el("div", { class: "court-summary" });
    gameCard.appendChild(summary);
    const capturedGame = game;
    const updateSummary = () => {
      const s1 = capturedGame.score1, s2 = capturedGame.score2;
      if (Number.isInteger(s1) && Number.isInteger(s2)) {
        if (s1 === s2) {
          summary.className = "court-summary tiemsg"; summary.textContent = "Tied — enter a tiebreaker";
        } else if (!isValidCrownGameScore(s1, s2, sched.theme)) {
          summary.className = "court-summary tiemsg";
          summary.textContent = "Need " + themeConfig.winScore + "+ pts, win by " + themeConfig.winBy;
        } else if (s1 > s2) {
          summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(match.team1) + " win";
        } else {
          summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(match.team2) + " win";
        }
      } else {
        summary.className = "court-summary";
        summary.textContent = "Awaiting scores";
      }
      t1Wrap.applyWinnerStyle();
      t2Wrap.applyWinnerStyle();
      const { gamesWon1: w1, gamesWon2: w2 } = crownGamesWon(match);
      scoreIndicator.textContent = "Match score: " + w1 + "–" + w2;
    };
    updateSummary();
    refreshes.push(updateSummary);

    gamesWrap.appendChild(gameCard);

    if (isGame3) {
      const capturedCard = gameCard;
      const capturedGame3 = game;
      refreshes.push(() => {
        const { gamesWon1: cw1, gamesWon2: cw2 } = crownGamesWon(match, 2);
        const nowSweep = (cw1 === 2 && cw2 === 0) || (cw2 === 2 && cw1 === 0);
        const nowNeeded = cw1 === 1 && cw2 === 1;
        const nowDisabled = !nowNeeded;
        // Clear stale game 3 scores when a sweep makes game 3 not needed
        if (nowDisabled && (Number.isInteger(capturedGame3.score1) || Number.isInteger(capturedGame3.score2))) {
          capturedGame3.score1 = null;
          capturedGame3.score2 = null;
          save();
          render(); // full re-render so DOM inputs reflect cleared scores
          return;
        }
        capturedCard.style.opacity = nowDisabled ? "0.4" : "";
        capturedCard.style.pointerEvents = nowDisabled ? "none" : "";
        labelEl.textContent = "Game 3" + (nowSweep ? " (not needed — sweep)" : nowNeeded ? " (play now)" : " (if needed)");
      });
    }
  }
  card.appendChild(gamesWrap);

  const completeBanner = el("div");
  const updateCompleteBanner = () => {
    completeBanner.textContent = "";
    if (isCrownMatchComplete(match) && sched.theme !== "Crown" && state.currentMatch < 2) {
      const nextSched = CROWN_SCHEDULE[state.currentMatch + 1];
      completeBanner.appendChild(el("div", {
        style: "margin-top:12px;padding:10px 12px;background:var(--panel-2);border-radius:10px;text-align:center;color:var(--muted);font-size:14px;"
      },
        el("div", { style: "margin-bottom:4px;color:var(--good);font-weight:700;" }, "Match Complete!"),
        el("div", null, "Next: " + nextSched.name),
      ));
    }
  };
  updateCompleteBanner();
  refreshes.push(updateCompleteBanner);
  card.appendChild(completeBanner);

  return card;
}

function buildCrownMatch() {
  const lb = crownLeaderboard();
  const { team1, team2 } = crownPairings(lb);
  const sameTeam = (a, b) => [...a].sort().join() === [...b].sort().join();
  // Preserve existing Crown Match scores if the pairing is unchanged.
  if (state.crownFinal && sameTeam(state.crownFinal.team1, team1) && sameTeam(state.crownFinal.team2, team2)) {
    state.phase = "crown";
    save();
    return;
  }
  state.crownFinal = {
    team1, team2,
    theme: "Crown",
    games: [
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
      { score1: null, score2: null, team1: team1.slice(), team2: team2.slice() },
    ],
  };
  state.phase = "crown";
  save();
}

// ---------- Crown history ----------
function renderCrownHistory() {
  const completed = state.crownMatches.filter(isCrownMatchComplete);
  if (!completed.length) return null;
  const det = el("details", { class: "rules", style: "margin:0 0 14px;" });
  det.appendChild(el("summary", null, "Match History (" + completed.length + " complete)"));
  const body = el("div", { class: "rules-body" });
  state.crownMatches.forEach((match, mi) => {
    if (!isCrownMatchComplete(match)) return;
    const sched = CROWN_SCHEDULE[mi];
    const { gamesWon1, gamesWon2 } = crownGamesWon(match);
    const winner = crownMatchWinner(match);
    const section = el("div", { style: "margin-bottom:12px;" });
    section.appendChild(el("div", { style: "font-weight:700;margin-bottom:4px;" }, sched.name));
    // Valid games (same early-exit logic as crownGamesWon)
    const games = [];
    let _w1 = 0, _w2 = 0;
    for (const g of match.games) {
      if (!Number.isInteger(g.score1) || !Number.isInteger(g.score2)) break;
      if (g.score1 === g.score2) break;
      if (!isValidCrownGameScore(g.score1, g.score2, sched.theme)) break;
      games.push(g);
      if (g.score1 > g.score2) _w1++; else if (g.score2 > g.score1) _w2++;
      if (_w1 === 2 || _w2 === 2) break;
    }
    games.forEach((g, gi) => {
      const t1w = g.score1 > g.score2;
      section.appendChild(el("div", { style: "font-size:13px;color:var(--muted);margin-bottom:2px;" },
        "G" + (gi+1) + ": " +
        nameOf(match.team1[0]) + "/" + nameOf(match.team1[1]) + (t1w ? " ✓" : "") + " " +
        g.score1 + "–" + g.score2 + " " +
        nameOf(match.team2[0]) + "/" + nameOf(match.team2[1]) + (!t1w && g.score2 > g.score1 ? " ✓" : "")
      ));
    });
    const winnerName = winner === "team1" ? teamName(match.team1) : teamName(match.team2);
    section.appendChild(el("div", { style: "font-size:13px;font-weight:700;margin-top:4px;color:var(--good);" },
      "Winner: " + winnerName + " (" + gamesWon1 + "–" + gamesWon2 + ")"
    ));
    body.appendChild(section);
  });
  det.appendChild(body);
  return det;
}

function renderCrownMatchScorecard(crownFinal) {

  for (const g of crownFinal.games) {

    if (!isValidCrownGameScore(g.score1, g.score2, "Crown")) break;

function renderPodiumCrown(ranking) {

  const loseTeam = winner === "team1" ? state.crownFinal.team2 : state.crownFinal.team1;
  const winGames  = winner === "team1" ? gamesWon1 : gamesWon2;
  const loseGames = winner === "team1" ? gamesWon2 : gamesWon1;
  const pts = matchPointsForMatch(winGames, loseGames, "Crown");

// ---------- playing screens ----------
function renderPlaying() {
  if (state.format === "crown") return renderCrownPlaying();
  const wrap = el("div");
  const round = state.rounds[state.currentRound - 1];
  const isStack       = state.format === "stack";
  const isKing        = state.format === "king";
  const isGauntlet    = state.format === "gauntlet";
  const isIncremental = isStack || isKing || isGauntlet; // rounds built one at a time
  const requiresDecided = isStack || isKing;             // ties block advancement
  const total = totalRegularRounds();

  // Refresh hooks injected by score inputs
  const refreshes = [];
  const refresh = () => refreshes.forEach(fn => fn());

  wrap.appendChild(renderRoundCourts(round, false, refreshes));

  // navigation row
  // RR: round is "advanceable" when both scores are present (ties allowed).
  // Stack: round is "advanceable" only when both courts are decided (no ties).
  const advanceReady = requiresDecided ? isRoundDecided(round) : isRoundComplete(round);
  const allRoundsAdvanceable = requiresDecided
    ? (state.rounds.length === total && state.rounds.every(isRoundDecided))
    : isIncremental
      ? (state.rounds.length === total && state.rounds.every(isRoundComplete))
      : state.rounds.every(isRoundComplete);
  const actions = el("div", { class: "row-actions" });
  if (state.currentRound > 1) {
    actions.appendChild(el("button", {
      class: "secondary",
      onclick: () => { state.currentRound--; save(); render(); }
    }, "← Round " + (state.currentRound - 1)));
  }
  let primaryBtn;
  if (state.currentRound < total) {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        if (isIncremental) {
          if (requiresDecided ? !isRoundDecided(round) : !isRoundComplete(round)) return;
          // Build the next round if it doesn't already exist (e.g. user went
          // back, then advanced again — keep the existing pairing). previousRanks
          // is snapshotted only on first-time advance so backward navigation
          // doesn't clobber the baseline used for trajectory arrows.
          let toastMsg = null;
          if (state.rounds.length === state.currentRound) {
            state.previousRanks = rankPlayersForFormat(state.currentRound).map(s => s.slot);
            if (isStack) {
              const next = buildNextStackRound(round);
              state.rounds.push(next);
              toastMsg = movementToastText(round, next);
            } else if (isKing) {
              const next = buildNextKingRound(round);
              state.rounds.push(next);
              toastMsg = kingMovementToastText(round);
            } else {
              state.rounds.push(buildNextGauntletRound(round));
            }
          }
          state.currentRound++;
          save();
          render();
          if (toastMsg) showToast(toastMsg);
        } else {
          if (!isRoundComplete(round)) return;
          state.currentRound++;
          save();
          render();
        }
      }
    }, "Round " + (state.currentRound + 1) + " →");
    primaryBtn.disabled = !advanceReady;
  } else {
    primaryBtn = el("button", {
      class: "primary",
      onclick: () => {
        // Re-evaluate at click time — score inputs may have completed the
        // round since this button was rendered.
        const ready = requiresDecided
          ? (state.rounds.length === total && state.rounds.every(isRoundDecided))
          : isIncremental
            ? (state.rounds.length === total && state.rounds.every(isRoundComplete))
            : state.rounds.every(isRoundComplete);
        if (ready) { buildFinals(); render(); }
      }
    }, "Build Finals →");
    primaryBtn.disabled = !allRoundsAdvanceable;
  }
  actions.appendChild(primaryBtn);
  wrap.appendChild(actions);

  // standings
  const standingsOpts = () => {
    const completedRounds = state.rounds.slice(0, state.currentRound).filter(isRoundComplete).length;
    const sub = completedRounds > 0
      ? "Through " + completedRounds + " round" + (completedRounds > 1 ? "s" : "")
      : "Awaiting first scores";
    return { subtitle: sub };
  };
  let standingsCard = renderStandingsCard(state.currentRound, standingsOpts());
  wrap.appendChild(standingsCard);

  // history
  const history = renderHistory(state.currentRound);
  if (history) wrap.appendChild(history);

  // Wire refresh: update primary button state + replace standings live
  refreshes.push(() => {
    if (state.currentRound < total) {
      primaryBtn.disabled = requiresDecided ? !isRoundDecided(round) : !isRoundComplete(round);
    } else {
      primaryBtn.disabled = requiresDecided
        ? !(state.rounds.length === total && state.rounds.every(isRoundDecided))
        : isIncremental
          ? !(state.rounds.length === total && state.rounds.every(isRoundComplete))
          : !state.rounds.every(isRoundComplete);
    }
    const newStandings = renderStandingsCard(state.currentRound, standingsOpts());
    standingsCard.replaceWith(newStandings);
    standingsCard = newStandings;
    maybeFireRoundComplete(primaryBtn);
  });

  return wrap;
}

function renderRoundCourts(round, isFinals, refreshes) {
  const wrap = el("div", { class: "court-row" });
  if (isFinals) {
    const seeds = seedRankBySlot();
    wrap.appendChild(renderCourtCard(round.championship, "champ", refreshes, { kind: "gold", seeds }));
    wrap.appendChild(renderCourtCard(round.consolation,  "cons",  refreshes, { kind: "silver", seeds }));
  } else {
    wrap.appendChild(renderCourtCard(round.court1, 1, refreshes));
    wrap.appendChild(renderCourtCard(round.court2, 2, refreshes));
  }
  return wrap;
}

function renderCourtCard(game, courtKey, refreshes, seedInfo) {
  let className = "court-card";
  let labelText = "";
  const isStack = state.format === "stack";
  if (courtKey === "champ")     { className += " gold";   labelText = "🏆 CHAMPIONSHIP"; }
  else if (courtKey === "cons") { className += " silver"; labelText = "🥈 CONSOLATION"; }
  else if (courtKey === 1) {
    className += " c1" + (isStack ? " stack-top" : "");
    labelText = { stack: "🏆 COURT 1", king: "👑 KING'S COURT", gauntlet: "COURT 1 (TOP)" }[state.format] || "SOUTH COURT";
  } else {
    className += " c2" + (isStack ? " stack-bot" : "");
    labelText = { stack: "COURT 2", king: "BOTTOM COURT", gauntlet: "COURT 2" }[state.format] || "NORTH COURT";
  }

  const card = el("div", { class: className });
  card.appendChild(el("div", { class: "court-label" }, labelText));
  if (courtKey === "champ") {
    card.appendChild(el("div", { class: "pairing-caption" },
      "Balanced pairing — top seed + 4th vs 2nd + 3rd"));
  }

  const matchup = el("div", { class: "matchup" });
  const team1Wrap = renderTeamRow(game, "team1", "score1", "score2", refreshes, seedInfo);
  const team2Wrap = renderTeamRow(game, "team2", "score2", "score1", refreshes, seedInfo);
  matchup.appendChild(team1Wrap.node);
  matchup.appendChild(team2Wrap.node);
  card.appendChild(matchup);

  const summary = el("div", { class: "court-summary" });
  card.appendChild(summary);

  const updateSummary = () => {
    const s1 = game.score1, s2 = game.score2;
    if (Number.isInteger(s1) && Number.isInteger(s2)) {
      if (s1 > s2)      { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team1) + " win by " + (s1 - s2); }
      else if (s2 > s1) { summary.className = "court-summary winmsg"; summary.textContent = "🎉 " + teamName(game.team2) + " win by " + (s2 - s1); }
      else              { summary.className = "court-summary tiemsg"; summary.textContent = "Tied — enter a tiebreaker"; }
    } else {
      summary.className = "court-summary";
      summary.textContent = "Awaiting scores";
    }
    team1Wrap.applyWinnerStyle();
    team2Wrap.applyWinnerStyle();
  };
  updateSummary();
  refreshes.push(updateSummary);

  return card;
}

function renderTeamRow(game, teamKey, scoreKey, otherScoreKey, refreshes, opts) {
  const team = game[teamKey];
  // Normalise legacy callers that pass a raw seeds Map as opts.
  if (opts instanceof Map) opts = { seeds: opts };
  const seeds = opts && opts.seeds ? opts.seeds : null;
  const kind = opts && opts.kind != null ? opts.kind : null;
  const quickFillTarget = (opts && opts.winScore != null) ? opts.winScore : state.winScore;
  const crownTheme = opts && opts.theme ? opts.theme : null;

  const node = el("div", { class: "team-row" });
  if (seeds) {
    const nameNode = el("div", { class: "team-name" });
    nameNode.appendChild(seedPill(seeds.get(team[0]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[0])));
    nameNode.appendChild(document.createTextNode(" & "));
    nameNode.appendChild(seedPill(seeds.get(team[1]), kind));
    nameNode.appendChild(document.createTextNode(nameOf(team[1])));
    node.appendChild(nameNode);
  } else {
    node.appendChild(el("div", { class: "team-name" }, nameOf(team[0]) + " & " + nameOf(team[1])));
  }

  // Quick-fill pill: shown only when both scores are null.
  const pillSlot = el("div");  // takes the auto column even when empty
  node.appendChild(pillSlot);

  const input = el("input", {
    class: "score-input",
    type: "number",
    inputmode: "numeric",
    pattern: "[0-9]*",
    min: "0",
    placeholder: "–",
    value: Number.isInteger(game[scoreKey]) ? String(game[scoreKey]) : "",
    "aria-label": "Score for " + nameOf(team[0]) + " and " + nameOf(team[1]),
  });
  input.addEventListener("input", () => {
    const v = input.value.trim();
    if (v === "") {
      game[scoreKey] = null;
    } else {
      const n = parseInt(v, 10);
      if (!Number.isNaN(n) && n >= 0) game[scoreKey] = n;
    }
    if (game.gameEndedAt == null && Number.isInteger(game.score1) && Number.isInteger(game.score2)) {
      game.gameEndedAt = Date.now();
      let roundIdx = -1, courtIdx = -1;
      for (let ri = 0; ri < state.rounds.length; ri++) {
        if (state.rounds[ri].court1 === game) { roundIdx = ri; courtIdx = 0; break; }
        if (state.rounds[ri].court2 === game) { roundIdx = ri; courtIdx = 1; break; }
      }
      if (roundIdx !== -1 && game.gameStartedAt > 0) {
        const durSec = Math.max(0, Math.round((game.gameEndedAt - game.gameStartedAt) / 1000) - (game.pauseSec || 0));
        const winnerScore = Math.max(game.score1, game.score2), loserScore = Math.min(game.score1, game.score2);
        try {
          const durLog = JSON.parse(localStorage.getItem("pb_durations_v1") || "[]");
          durLog.push({ ts: game.gameEndedAt, format: state.format, target: state.winScore,
            winBy: state.winBy, scoring: state.scoringSystem, courtIndex: courtIdx,
            durationSec: durSec, winnerScore, loserScore, roundIndex: roundIdx });
          if (durLog.length > 200) durLog.splice(0, durLog.length - 200);
          localStorage.setItem("pb_durations_v1", JSON.stringify(durLog));
        } catch (e) {}
      }
    }
    save();
    refreshes.forEach(fn => fn());
  });
  node.appendChild(input);

  function applyWinnerStyle() {
    const a = game[scoreKey], b = game[otherScoreKey];
    let isWinner = Number.isInteger(a) && Number.isInteger(b) && a > b;
    if (isWinner && crownTheme) isWinner = isValidCrownGameScore(a, b, crownTheme);
    node.classList.toggle("winner", isWinner);
    input.classList.toggle("winner", isWinner);
  }

  function refreshPill() {
    pillSlot.textContent = "";
    // Quick-fill is a Round/Crown-screen feature; suppress on Finals matchups.
    if (state.phase !== "playing" && state.phase !== "crown") return;
    const bothBlank = !Number.isInteger(game.score1) && !Number.isInteger(game.score2);
    if (!bothBlank) return;
    const pill = el("button", {
      class: "quickfill-pill",
      title: "Fill " + quickFillTarget + " pts for this team — still enter the other score",
    }, "× " + quickFillTarget);
    pill.addEventListener("click", () => {
      game[scoreKey] = quickFillTarget;
      save();
      refreshes.forEach(fn => fn());
      // Focus the opponent's input so the user can type the loser's score.
      const allInputs = node.parentElement.querySelectorAll(".score-input");
      for (const inp of allInputs) {
        if (inp !== input) { inp.focus(); break; }
      }
    });
    pillSlot.appendChild(pill);
  }
  refreshPill();
  refreshes.push(refreshPill);

  return { node, applyWinnerStyle };
}

const MEDALS = ["🥇", "🥈", "🥉"];

function rankCell(i) {
  if (i < 3) return el("td", { class: "rank" }, el("span", { class: "rank-badge medal" }, MEDALS[i]));
  return el("td", { class: "rank" }, el("span", { class: "rank-badge" }, "" + (i + 1)));
}

function trajectorySpan(slot, currentIdx) {
  const prev = state.previousRanks || [];
  if (prev.length !== 8) return null;
  const prevIdx = prev.indexOf(slot);
  if (prevIdx < 0) return null;
  const diff = prevIdx - currentIdx;
  if (diff > 0)  return el("span", { class: "rank-trajectory up",   title: "Up " + diff }, "▲" + diff);
  if (diff < 0)  return el("span", { class: "rank-trajectory down", title: "Down " + (-diff) }, "▼" + (-diff));
  return el("span", { class: "rank-trajectory same", title: "No change" }, "—");
}

// For the current finals, returns a Map<slot, rank> using the format's season order.
function seedRankBySlot() {
  const ranked = rankPlayersForFormat(totalRegularRounds());
  const m = new Map();
  ranked.forEach((s, i) => m.set(s.slot, i + 1));
  return m;
}

// ---------- finals screen ----------
function renderFinalsScreen() {
  const wrap = el("div");
  const isStack = state.format === "stack";
  const isKing = state.format === "king";
  const total = totalRegularRounds();
  const ranked = rankPlayersForFormat(total);

  // Seeds card
  const seedsCard = el("div", { class: "card" });
  seedsCard.appendChild(el("h3", null, "Seeds (after " + total + " rounds)"));
  const grid = el("div", { class: "seeds-grid" });
  ranked.forEach((s, i) => {
    const meta = isStack
      ? s.stackScore.toFixed(1) + " SS · " + s.wins + "W"
      : isKing
        ? s.kingScore + " KS · " + s.wins + "W"
        : s.points + " pts · " + s.wins + "W";
    grid.appendChild(el("div", { class: "seed-row" },
      el("span", { class: "seed-rank" }, "#" + (i + 1)),
      el("span", null, s.name),
      el("span", { class: "seed-meta" }, meta),
    ));
  });
  seedsCard.appendChild(grid);
  wrap.appendChild(seedsCard);

  const refreshes = [];
  wrap.appendChild(renderRoundCourts(state.finals, true, refreshes));

  const finalsDecided = (g) => isGameComplete(g) && g.score1 !== g.score2;
  const finalsReady = () =>
    finalsDecided(state.finals.championship) && finalsDecided(state.finals.consolation);

  const finishBtn = el("button", {
    class: "primary",
    style: "width: 100%; margin-bottom: 8px;",
    onclick: () => {
      if (finalsReady()) {
        state.phase = "done";
        save();
        render();
      }
    }
  }, "👑 Crown Champions");
  finishBtn.disabled = !finalsReady();
  refreshes.push(() => {
    finishBtn.disabled = !finalsReady();
  });
  wrap.appendChild(finishBtn);

  wrap.appendChild(el("button", {
    class: "ghost",
    style: "width: 100%;",
    onclick: () => {
      state.phase = "playing";
      state.currentRound = total;
      state.finals = null;
      save(); render();
    }
  }, "← Back to Round " + total));
  return wrap;
}

function renderPodium(ranking) {
  const isStack = state.format === "stack";
  let labelBySlot;
  if (isStack) {
    const stackStats = computeStackStats(state.rounds.length);
    labelBySlot = new Map(stackStats.map(s => [s.slot, s.stackScore.toFixed(1) + " SS"]));
  } else if (state.format === "king") {
    const ks = computeKingStats(state.rounds.length);
    labelBySlot = new Map(ks.map(s => [s.slot, s.kingScore + " KS"]));
  } else {
    const stats = computeStats(totalRegularRounds(), true);
    labelBySlot = new Map(stats.map(s => [s.slot, s.points + " pts"]));
  }
  const order = ["silver", "gold", "bronze"]; // visual left/center/right
  const ranks = [ranking[1], ranking[0], ranking[2]]; // map to visual order
  const emojis = { silver: "🥈", gold: "🥇", bronze: "🥉" };
  const podium = el("div", { class: "podium" });
  order.forEach((kind, i) => {
    const r = ranks[i];

    step.appendChild(el("div", { class: "podium-name" }, r.name));
    step.appendChild(el("div", { class: "podium-points" }, labelBySlot.get(r.slot)));
    step.appendChild(el("div", { class: "podium-bar" }, emojis[kind]));
    podium.appendChild(step);
  });
  return podium;
}
