<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8F%93%3C/text%3E%3C/svg%3E">
<title>Rumble Pickleball</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --border: #2e3946;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #fbbf24;
    --good: #10b981;
    --bad: #ef4444;
    --court1: #38bdf8;
    --court2: #a78bfa;
    --gold: #fbbf24;
    --silver: #cbd5e1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 18px;
    line-height: 1.4;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior-y: none;
  }
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px max(14px, env(safe-area-inset-left)) 80px max(14px, env(safe-area-inset-right));
  }
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 14px;
    padding: 4px 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 22px; font-weight: 700; }
  .progress {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(251, 191, 36, 0.12);
    padding: 8px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }
  button {
    font-family: inherit;
    font-size: 18px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    min-height: 60px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    color: #1a1207;
    border-color: var(--accent);
    font-size: 22px;
    padding: 18px 26px;
  }
  button.primary:disabled {
    background: var(--panel);
    color: var(--muted);
    border-color: var(--border);
  }
  button.danger { background: var(--bad); color: white; border-color: var(--bad); }
  button.ghost { background: transparent; }
  .icon-btn {
    width: 60px; min-width: 60px; height: 60px; min-height: 60px;
    padding: 0; font-size: 26px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .court-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 720px) {
    .court-row { grid-template-columns: 1fr; }
  }
  .court-card {
    border-radius: 18px;
    padding: 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-top-width: 6px;
  }
  .court-card.c1 { border-top-color: var(--court1); }
  .court-card.c2 { border-top-color: var(--court2); }
  .court-card.gold { border-top-color: var(--gold); }
  .court-card.silver { border-top-color: var(--silver); }
  /* Stack format: top court gets a subtle gold treatment to read as "the top court" */
  .court-card.c1.stack-top {
    border-top-color: var(--gold);
    border-top-width: 6px;
    box-shadow: 0 0 18px rgba(251, 191, 36, 0.10);
  }
  .court-card.c1.stack-top .court-label { color: var(--gold); }
  .court-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .court-card.c1 .court-label { color: var(--court1); }
  .court-card.c2 .court-label { color: var(--court2); }
  .court-card.gold .court-label { color: var(--gold); }
  .court-card.silver .court-label { color: var(--silver); }
  .matchup {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .team-row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 12px;
    align-items: center;
    background: var(--panel-2);
    border-radius: 12px;
    padding: 10px 12px;
    border-left: 4px solid transparent;
    transition: border-color 0.15s ease, background-color 0.15s ease;
  }
  .team-row.winner {
    border-left-color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .team-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
  }
  .team-row.winner .team-name { color: var(--good); }
  .score-input {
    width: 100%;
    font-size: 44px;
    font-weight: 800;
    text-align: center;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 10px;
    padding: 4px;
    height: 70px;
    -moz-appearance: textfield;
    appearance: textfield;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .score-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .score-input:placeholder-shown:not(:focus) {
    border-color: rgba(255, 255, 255, 0.22);
  }
  .score-input.winner {
    border-color: var(--good);
    color: var(--good);
    background: rgba(16, 185, 129, 0.08);
  }
  .name-input {
    width: 100%;
    font-size: 22px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 12px;
    min-height: 60px;
    font-family: inherit;
  }
  .name-input:focus { outline: none; border-color: var(--accent); }
  .court-summary {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 10px;
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }
  .court-summary.winmsg { color: var(--good); font-weight: 700; }
  .court-summary.tiemsg { color: var(--accent); font-weight: 700; }

  table.standings { width: 100%; border-collapse: collapse; table-layout: fixed; }
  table.standings col.c-rank { width: 56px; }
  table.standings col.c-pts,
  table.standings col.c-w,
  table.standings col.c-diff { width: 72px; }
  table.standings col.c-stack-extra { width: 50px; }
  @media (max-width: 480px) {
    table.standings col.c-rank { width: 44px; }
    table.standings col.c-pts,
    table.standings col.c-w { width: 60px; }
    table.standings col.c-diff { width: 0; }
    table.standings col.c-stack-extra { width: 0; }
    table.standings th.col-hide-mobile,
    table.standings td.col-hide-mobile { display: none; padding: 0; }
  }
  table.standings tr.tier-divider td {
    border-top: 1px solid var(--border);
    padding: 10px 8px 4px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
  }
  .standings-footer {
    margin: 12px 0 0;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.4;
  }
  .rank-trajectory {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    font-weight: 700;
    vertical-align: middle;
    line-height: 1;
  }
  .rank-trajectory.up   { color: var(--good); }
  .rank-trajectory.down { color: var(--bad); }
  .rank-trajectory.same { color: var(--muted); }
  table.standings th, table.standings td {
    text-align: left;
    padding: 10px 6px;
    border-bottom: 1px solid var(--border);
  }
  table.standings th {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  table.standings td.num,
  table.standings th.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.standings td.num { font-size: 20px; font-weight: 700; }
  table.standings td.name { font-size: 20px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  table.standings tr.r1 td.name { color: var(--gold); }
  table.standings .rank {
    text-align: center;
    padding: 6px;
  }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-weight: 800;
    font-size: 18px;
    background: var(--panel-2);
    color: var(--muted);
  }
  .rank-badge.medal {
    font-size: 24px;
    background: transparent;
  }
  .partner-badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--muted);
    font-weight: 600;
    vertical-align: middle;
  }
  .partner-badge.done { color: var(--good); background: rgba(16, 185, 129, 0.15); }

  details.history {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
  }
  details.history summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 18px;
    font-size: 18px;
    font-weight: 700;
    user-select: none;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  details.history summary::-webkit-details-marker { display: none; }
  details.history summary::after { content: "▾"; color: var(--muted); }
  details.history[open] summary::after { content: "▴"; }
  details.history .body { padding: 0 16px 14px; }
  .history-round { padding: 12px 0; border-top: 1px solid var(--border); }
  .history-round:first-child { border-top: none; }
  .history-round-title {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .history-game {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 16px;
  }
  .history-game .court-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .history-game .court-tag.c1 { background: rgba(56, 189, 248, 0.15); color: var(--court1); }
  .history-game .court-tag.c2 { background: rgba(167, 139, 250, 0.15); color: var(--court2); }
  .history-game .game-text { flex: 1; }
  .history-game .game-score {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    font-size: 18px;
    flex-shrink: 0;
  }
  .winning-team { color: var(--good); font-weight: 700; }

  .setup-list { display: grid; gap: 10px; margin-bottom: 14px; }
  .format-chooser {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .format-chooser-label {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .format-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .format-option {
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    color: inherit;
    min-height: 84px;
  }
  .format-option.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .format-option-title {
    font-weight: 800;
    margin-bottom: 4px;
  }
  .format-option.active .format-option-title { color: var(--accent); }
  .format-option-blurb {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }
  @media (max-width: 480px) {
    .format-options { grid-template-columns: 1fr; }
    .title { font-size: 15px; white-space: nowrap; }
  }

  /* Crown Court format */
  .court-card.crown:not(.c1):not(.c2):not(.gold):not(.silver) {
    border-top-color: var(--gold);
    box-shadow: 0 0 32px rgba(251, 191, 36, 0.15);
  }
  .court-card.crown:not(.c1):not(.c2):not(.gold):not(.silver) .court-label { color: var(--gold); }

  .row-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .row-actions button.primary { flex: 3; min-width: 200px; }
  .row-actions button.secondary { flex: 1; min-width: 140px; }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    overflow-y: auto;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    max-width: 560px;
    width: 100%;
    margin: auto;
  }
  .modal h2 { margin-top: 0; }

  .seeds-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  .seed-row {
    padding: 6px 10px;
    background: var(--panel-2);
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.3;
    display: flex;
    align-items: baseline;
    gap: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .seed-rank {
    font-weight: 800;
    color: var(--accent);
    font-size: 16px;
    min-width: 26px;
  }
  .seed-meta { color: var(--muted); font-size: 12px; margin-left: auto; }

  .champions { text-align: center; padding: 24px 12px 8px; }
  .champions .crown { font-size: 80px; line-height: 1; }
  .champions h1 {
    font-size: 42px;
    margin: 8px 0 4px;
    color: var(--gold);
    letter-spacing: 0.04em;
  }
  .champions .winners {
    font-size: 36px;
    font-weight: 800;
    margin: 18px 0;
    line-height: 1.15;
  }
  .scorecard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px 16px;
    align-items: center;
    max-width: 480px;
    margin: 18px auto 0;
    padding: 14px 16px;
    background: var(--panel-2);
    border-radius: 12px;
  }
  .scorecard .sc-team {
    font-size: 18px;
    font-weight: 600;
  }
  .scorecard .sc-team.left { text-align: right; }
  .scorecard .sc-team.right { text-align: left; }
  .scorecard .sc-team.win { color: var(--good); font-weight: 800; }
  .scorecard .sc-score {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .champions .consolation-block {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .consolation-title {
    color: var(--silver);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .consolation-winners {
    font-size: 26px;
    font-weight: 800;
    margin: 8px 0;
  }
  .consolation-block .scorecard {
    margin-top: 12px;
    padding: 10px 14px;
    max-width: 420px;
  }
  .consolation-block .scorecard .sc-team { font-size: 16px; }
  .consolation-block .scorecard .sc-score { font-size: 28px; }
  @media (max-width: 480px) {
    .scorecard { grid-template-columns: 1fr; gap: 2px; padding: 10px 16px; text-align: center; }
    .scorecard .sc-team.left, .scorecard .sc-team.right { text-align: center; }
    .scorecard .sc-score { font-size: 32px; margin: 2px 0; }
  }

  h2, h3 { margin: 0 0 12px; }
  .muted { color: var(--muted); font-size: 14px; }

  /* Rules block (Setup + Settings) */
  details.rules {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin: 0 0 14px;
  }
  details.rules summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    font-size: 16px;
    font-weight: 700;
    user-select: none;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
  }
  details.rules summary::-webkit-details-marker { display: none; }
  details.rules summary::after { content: "▾"; color: var(--muted); }
  details.rules[open] summary::after { content: "▴"; }
  details.rules .rules-body {
    padding: 0 16px 14px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }
  details.rules .rules-body ul { margin: 0; padding-left: 20px; }
  details.rules .rules-body li { margin: 6px 0; }
  details.rules .rules-body strong { color: var(--text); }

  /* Paste-names link and modal */
  .paste-link {
    display: inline-block;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    background: none;
    border: none;
    padding: 8px 0;
    margin-bottom: 4px;
    cursor: pointer;
    text-decoration: underline;
    min-height: 36px;
  }
  .paste-textarea {
    width: 100%;
    min-height: 200px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
  }
  .paste-error {
    color: var(--bad);
    font-size: 14px;
    font-weight: 600;
    margin: 8px 0 0;
    min-height: 20px;
  }
  /* Shuffle reveal overlay */
  .shuffle-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
  }
  .shuffle-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .shuffle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 520px;
    width: 100%;
  }
  .shuffle-slot {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 14px;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    transition: border-color 0.18s ease, color 0.18s ease;
  }
  .shuffle-slot.locked {
    border-color: var(--accent);
    color: var(--accent);
  }
  .shuffle-skip {
    margin-top: 18px;
    color: var(--muted);
    font-size: 13px;
  }
  .shuffle-groups {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 520px;
  }
  .shuffle-group-label {
    font-size: 14px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }
  /* Partner-preview chip in standings */
  .partner-chip {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    vertical-align: middle;
    white-space: nowrap;
  }
  .partner-chip.c1 { color: var(--court1); background: rgba(56, 189, 248, 0.15); }
  .partner-chip.c2 { color: var(--court2); background: rgba(167, 139, 250, 0.15); }
  /* Tap-winner quick-fill pill */
  .team-row {
    /* override existing 1fr 110px to allow pill column */
    grid-template-columns: 1fr auto 110px;
  }
  .quickfill-pill {
    background: rgba(251, 191, 36, 0.15);
    color: var(--accent);
    border: 1px solid rgba(251, 191, 36, 0.4);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    min-height: 36px;
    white-space: nowrap;
    align-self: center;
  }
  .quickfill-pill:active { background: rgba(251, 191, 36, 0.3); }
  /* Round-complete toast */
  .toast-stack {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);

<body>
<div class="app" id="app"></div>
<script>
"use strict";

const STORAGE_KEY    = "pb_tourney_v4";
const STORAGE_KEY_V3 = "pb_tourney_v3";
const STORAGE_KEY_V2 = "pb_tourney_v2";
const STORAGE_KEY_V1 = "pb_tourney_v1";

// Round-robin partner schedule (1-factorization of K8) — every pair appears exactly once across 7 rounds.
const SCHEDULE = [
  [[[1,2],[3,4]], [[5,6],[7,8]]],
  [[[1,3],[2,4]], [[5,7],[6,8]]],
  [[[1,4],[2,3]], [[5,8],[6,7]]],
  [[[1,5],[2,6]], [[3,7],[4,8]]],
  [[[1,6],[2,5]], [[3,8],[4,7]]],
  [[[1,7],[2,8]], [[3,5],[4,6]]],
  [[[1,8],[2,7]], [[3,6],[4,5]]],
];

const CROWN_SCHEDULE = [
  { team1: [1,2], team2: [3,4], theme: "Opening",      name: "Round 1 — Opening" },
  { team1: [1,3], team2: [2,4], theme: "Power Round",  name: "Round 2 — Power Round" },
  { team1: [1,4], team2: [2,3], theme: "Sudden Death", name: "Round 3 — Sudden Death" },
];
const CROWN_THEMES = {
  "Opening":     { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 1 },
  "Power Round": { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 1.5 },
  "Sudden Death":{ winScore: 7,  winBy: 2, scoring: "rally",   matchPointMultiplier: 1 },
  "Crown":       { winScore: 11, winBy: 2, scoring: "sideout", matchPointMultiplier: 2 },
};

// -------- Group B: time-budget algorithm (pure functions) --------

// Returns [low, high] game-duration estimate in minutes.
// calibration: {pointsPerMinute: {sideout, rally}} from pb_calibration_v1, or null.
function estimateGameMinutes(target, winBy, scoring, calibration) {
  const ppmSideout = calibration?.pointsPerMinute?.sideout ?? 0.85;
  const ppmRally   = calibration?.pointsPerMinute?.rally   ?? 2.0;
  // loser scores ~60-65% of winner, so avg total points ≈ 1.6-1.65× target
  const pointsRatio = scoring === "rally" ? 1.65 : 1.6;
  const ppm         = scoring === "rally" ? ppmRally : ppmSideout;
  const mid         = pointsRatio * target / ppm * (winBy === 1 ? 0.85 : 1.0);
  return [Math.round(mid * 0.7), Math.round(mid * 1.3)];
}

// Returns [low, high] round-duration estimate in minutes.
// courtCount > 1: applies 1.15× slowest-court variance (parallel courts finish at different times).
function estimateRoundMinutes(target, winBy, scoring, courtCount, calibration) {
  const [gameLow, gameHigh] = estimateGameMinutes(target, winBy, scoring, calibration);
  const variance = courtCount > 1 ? 1.15 : 1.0;
  return [
    Math.round(gameLow  * variance + 2.5),
    Math.round(gameHigh * variance + 2.5),
  ];
}

// Picks the richest win condition (target/winBy/scoring) that fits the time budget.
// Returns {target, winBy, scoring} or {error, suggestion}.
// T_finals uses low estimate (optimistic) so tight budgets aren't prematurely rejected.
// Round comparison uses midpoint (expected) — optimistic for rounds would bias toward overruns.
function solveWinCondition(format, rounds, budgetMin, calibration) {
  const SETUP_OVERHEAD = 5;
  const TARGETS = [21, 15, 11, 9, 7];  // richest first in each scoring system

  const [finalsLo] = estimateRoundMinutes(11, 2, "sideout", 2, calibration);
  const budgetForRounds = budgetMin - SETUP_OVERHEAD - finalsLo;
  if (budgetForRounds <= 0) return { error: "no_fit_finals" };

  const targetTRound = budgetForRounds / rounds;

  // Iterate in lexicographic richness order: sideout > rally, higher target, winBy 2 > 1
  for (const scoring of ["sideout", "rally"]) {
    for (const target of TARGETS) {
      for (const winBy of [2, 1]) {
        const [lo, hi] = estimateRoundMinutes(target, winBy, scoring, 2, calibration);
        if ((lo + hi) / 2 <= targetTRound) return { target, winBy, scoring };
      }
    }
  }

  let suggestion;
  if (format === "rr") {
    suggestion = "RR is fixed at 7 rounds — increase time, or switch to a different format.";
  } else if (format === "crown") {
    suggestion = "Increase time to at least 90 minutes.";
  } else {
    const fmt = format.charAt(0).toUpperCase() + format.slice(1);
    suggestion = `Reduce ${fmt} rounds (currently ${rounds}) or increase time.`;
  }
  return { error: "no_fit", suggestion };
}

// -------- self-tests (gated by ?test URL param) --------
function runSelfTests() {
  let failures = 0;
  const _origAssert = console.assert.bind(console);
  console.assert = (cond, ...rest) => {
    if (!cond) failures++;
    _origAssert(cond, ...rest);
  };
  // Tests are appended by feature tasks below.
  // Task 1 — newState defaults
  {
    const s = newState();
    console.assert(s.awardsShown === false, "newState.awardsShown=false");
    console.assert(s.winScore === 11, "newState.winScore=11");
    console.assert(Array.isArray(s.notifiedRounds) && s.notifiedRounds.length === 0,
      "newState.notifiedRounds=[]");
  }
  // Task 3 — parsePastedNames
  {
    const a = parsePastedNames("Adrian\nAlex\nJohn\nJoe\nKen\nKris\nSam\nTodd");
    console.assert(a.ok && a.names.length === 8 && a.names[0] === "Adrian", "parsePastedNames newline");
    const b = parsePastedNames("Adrian, Alex, John, Joe, Ken, Kris, Sam, Todd");
    console.assert(b.ok && b.names[7] === "Todd", "parsePastedNames comma");
    const c = parsePastedNames("Adrian\nAlex");
    console.assert(!c.ok && c.count === 2, "parsePastedNames too few");
    const d = parsePastedNames("a\nb\nc\nd\ne\nf\ng\nA"); // case dup
    console.assert(!d.ok, "parsePastedNames case-insensitive duplicate");
    const e = parsePastedNames("  Adrian  \n\n,Alex,John,Joe,Ken,Kris,Sam,Todd");
    console.assert(e.ok && e.names[0] === "Adrian", "parsePastedNames trims & strips empties");
  }
  // Task 5 — nextPartnerInfo
  {
    const saved = state;
    const fakeRounds = [
      { round:1, court1:{team1:[1,2],team2:[3,4],score1:null,score2:null}, court2:{team1:[5,6],team2:[7,8],score1:null,score2:null} },
      { round:2, court1:{team1:[1,3],team2:[2,4],score1:null,score2:null}, court2:{team1:[5,7],team2:[6,8],score1:null,score2:null} },
    ];
    state = { phase:"playing", slots:["A","B","C","D","E","F","G","H"], currentRound:1, rounds:fakeRounds };
    const r = nextPartnerInfo(1); // round 2 partners 1 with 3 on court 1
    console.assert(r && r.partner === 3 && r.courtKey === 1, "nextPartnerInfo slot 1 round 2", r);
    const r2 = nextPartnerInfo(8); // round 2: 8 with 6 on court 2
    console.assert(r2 && r2.partner === 6 && r2.courtKey === 2, "nextPartnerInfo slot 8 round 2", r2);
    state.currentRound = 7;
    console.assert(nextPartnerInfo(1) === null, "nextPartnerInfo no chip at round 7");
    state = saved;
  }
  // Task 10 — finalRanking
  // Verify tier ordering (champ-W > champ-L > cons-W > cons-L) holds
  // and that within each tier players are ordered by season ranking,
  // by deriving the expected order from rankPlayers(7) instead of
  // assuming a particular slot-to-season-rank mapping.
  {
    const saved = state;
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 0 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 0 },
    }));
    state = {
      phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds,
      currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 9, score2: 11 }, // team2 wins
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 }, // team1 wins
      },
      awardsShown: false, winScore: 11, notifiedRounds: [],
    };
    const seasonOrder = rankPlayers(7).map(s => s.slot);
    const seasonRankOf = slot => seasonOrder.indexOf(slot);
    const sortBySeason = arr => arr.slice().sort((a,b) => seasonRankOf(a) - seasonRankOf(b));
    const expected = [
      ...sortBySeason([2, 3]),  // championship winners
      ...sortBySeason([1, 4]),  // championship losers
      ...sortBySeason([5, 8]),  // consolation winners
      ...sortBySeason([6, 7]),  // consolation losers
    ];
    const order = finalRanking().map(s => s.slot);
    console.assert(JSON.stringify(order) === JSON.stringify(expected),
      "finalRanking tier order", { order, expected });
    state = saved;
  }
  // Task 12a — computeAwards
  {
    const saved = state;
    // Setup: every round-robin game is a 11-vs-1 blowout for team1, except court2
    // which is 11-vs-9. Championship is 11-vs-9, Consolation 11-vs-9.
    // Expected: Biggest Win is +10 (lots of ties — all team1 winners on c1).
    // Closest Game: 11-9 across many games; all tied at diff=2 with winScore=11.
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 1 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    state = {
      phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds, currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 11, score2: 9 },
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 },
      },
      awardsShown: false, winScore: 11, notifiedRounds: [],
    };
    const a = computeAwards();
    console.assert(a.mvp.names.length >= 1, "MVP has at least one name");
    console.assert(a.biggestWin.names.every(n => n.includes("+10")),
      "Biggest Win all +10", a.biggestWin);
    console.assert(a.closestGame.names.length > 0 && a.closestGame.names.every(n => n.includes(" & ")),
      "Closest Game names are team names", a.closestGame);
    console.assert(/11–9/.test(a.closestGame.detail || ""),
      "Closest Game detail includes score", a.closestGame);
    console.assert(a.hotStreak.detail && /in a row/.test(a.hotStreak.detail),
      "Hot Streak detail", a.hotStreak);
    // New awards
    console.assert(a.theWall.names.length > 0 && /allowed\/game/.test(a.theWall.detail || ""),
      "The Wall populated", a.theWall);
    console.assert(a.coldStreak.names.length > 0 && /in a row/.test(a.coldStreak.detail || ""),
      "Cold Streak populated (someone has consecutive losses)", a.coldStreak);
    console.assert(a.gotStomped.names.length > 0 && a.gotStomped.names.every(n => n.includes("−10")),
      "Got Stomped all −10", a.gotStomped);
    // Most Improved: needs finalRanking decided. With this state, someone moved.
    console.assert(a.mostImproved.names.length >= 0, "Most Improved field exists", a.mostImproved);
    // Single-winner sanity: rebuild with only ONE blowout game
    const rounds2 = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 9 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    // Make round 1 court 1 a +10 blowout (the only one)
    rounds2[0].court1.score1 = 11; rounds2[0].court1.score2 = 1;
    state.rounds = rounds2;
    const b = computeAwards();
    console.assert(b.biggestWin.names.length === 1 && b.biggestWin.names[0].includes("+10"),
      "Biggest Win single", b.biggestWin);
    state = saved;
  }
  // Stack — stackScoreGain formula
  {
    // Court 2 win: 11 + 0 (not c1) + 3 (won) + 2 (climbed) = 16
    console.assert(stackScoreGain(11, false, true) === 16, "stackScoreGain c2 win");
    // Court 1 win: 11 + 5.5 (c1 bonus) + 3 (won) + 0 (no climb) = 19.5
    console.assert(stackScoreGain(11, true, true) === 19.5, "stackScoreGain c1 win");
    // Court 1 loss: 8 + 4 + 0 + 0 = 12
    console.assert(stackScoreGain(8, true, false) === 12, "stackScoreGain c1 loss");
    // Court 2 loss: 7 + 0 + 0 + 0 = 7
    console.assert(stackScoreGain(7, false, false) === 7, "stackScoreGain c2 loss");
    // Non-integer points: 0
    console.assert(stackScoreGain(null, true, true) === 0, "stackScoreGain null pts");
  }

  // Stack — buildNextStackRound movement
  {
    const saved = state;
    state = {
      phase: "playing", format: "stack", stackRounds: 4,
      slots: ["A","B","C","D","E","F","G","H"],
      currentRound: 1,
      // Court 1: (1,2) beat (3,4) 11-3.  Court 2: (5,6) beat (7,8) 11-9.
      rounds: [{
        round: 1,
        court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 3 },
        court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 9 },
      }],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      previousRanks: [], notifiedRounds: [], awardsShown: false,
      winScore: 11, finals: null,
    };
    const next = buildNextStackRound(state.rounds[0]);
    const newC1 = new Set([...next.court1.team1, ...next.court1.team2]);
    const newC2 = new Set([...next.court2.team1, ...next.court2.team2]);
    // c1 winners (1,2) stay; c2 winners (5,6) climb → new c1 = {1,2,5,6}
    console.assert(newC1.has(1) && newC1.has(2) && newC1.has(5) && newC1.has(6),
      "stack movement: c1 winners stay, c2 winners climb", [...newC1]);
    // c1 losers (3,4) drop; c2 losers (7,8) stay → new c2 = {3,4,7,8}
    console.assert(newC2.has(3) && newC2.has(4) && newC2.has(7) && newC2.has(8),
      "stack movement: c1 losers drop, c2 losers stay", [...newC2]);
    state = saved;
  }

  // Stack — pairForStackCourt repair when default pair repeats prior court pair
  {
    const saved = state;
    state = { tiebreakRandom: [0,1,2,3,4,5,6,7] };
    // Stack scores construct so ranking on this court is [1, 5, 6, 2] (rank 1..4).
    // Default pair: r1+r4 vs r2+r3 => (1,2) vs (5,6).
    // If prevSameCourt had teams (1,2) and (3,4), pair (1,2) was a team last
    // round → repair triggers, should swap r3,r4: (1,6) vs (5,2).
    const stackBySlot = new Map([[1, 100], [5, 80], [6, 60], [2, 40]]);
    const prev = { team1: [1, 2], team2: [3, 4] };
    const [tA, tB] = pairForStackCourt([1, 5, 6, 2], prev, stackBySlot);
    const sortedA = tA.slice().sort((a,b)=>a-b);
    const sortedB = tB.slice().sort((a,b)=>a-b);
    // After swap: teams should be (1,6) and (5,2), neither matching prev pair (1,2).
    console.assert(
      (sortedA[0] === 1 && sortedA[1] === 6 && sortedB[0] === 2 && sortedB[1] === 5) ||
      (sortedA[0] === 2 && sortedA[1] === 5 && sortedB[0] === 1 && sortedB[1] === 6),
      "pairForStackCourt repair", { tA, tB });
    // No-repair sanity: if prev had no overlap with current, default pairing stands.
    const [tC, tD] = pairForStackCourt([1, 5, 6, 2], { team1: [3, 4], team2: [7, 8] }, stackBySlot);
    const flat = [...tC, ...tD].sort((a,b)=>a-b);
    console.assert(flat.join(",") === "1,2,5,6", "pairForStackCourt no-repair players", flat);
    // Default pair should be (1,2) and (5,6).
    const tCs = tC.slice().sort((a,b)=>a-b);
    console.assert(tCs[0] === 1 && tCs[1] === 2, "pairForStackCourt no-repair default", tC);
    state = saved;
  }

  // Stack — rankPlayersStack sort order
  {
    const saved = state;
    // After 1 round on a stack tournament: c1 (1,2) beat (3,4) 11-1; c2 (5,6) beat (7,8) 11-9.
    // Slot 1: stackScore = stackScoreGain(11, true, true) = 19.5
    // Slot 3: stackScore = stackScoreGain(1, true, false)  = 1.5
    // Slot 5: stackScore = stackScoreGain(11, false, true) = 16
    // Slot 7: stackScore = stackScoreGain(9, false, false) = 9
    state = {
      format: "stack", stackRounds: 4,
      slots: ["A","B","C","D","E","F","G","H"],
      rounds: [{
        round: 1,
        court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 1 },
        court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 9 },
      }],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
    };
    const ranked = rankPlayersStack(1).map(s => s.slot);
    // Expected order: 1,2 (top), 5,6 (next), 7,8 (then), 3,4 (bottom).
    // Within ties, tiebreakRandom ordering [0..7] → ascending slot, so:
    console.assert(JSON.stringify(ranked) === JSON.stringify([1,2,5,6,7,8,3,4]),
      "rankPlayersStack order", ranked);
    state = saved;
  }

  // Stack — v1 → v3 migration (v1 data migrates directly to current STORAGE_KEY)
  {
    // Snapshot current v3 and v2 data so we don't trash a real tournament.
    const savedV3 = localStorage.getItem(STORAGE_KEY);
    const savedV2 = localStorage.getItem(STORAGE_KEY_V2);
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY_V2);
    const v1state = {
      phase: "playing",
      rawNames: ["A","B","C","D","E","F","G","H"],
      slots:    ["A","B","C","D","E","F","G","H"],
      currentRound: 2,
      rounds: SCHEDULE.map((rd, i) => ({
        round: i + 1,
        court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: null, score2: null },
        court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: null, score2: null },
      })),
      finals: null,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      awardsShown: false,
      winScore: 11,
      notifiedRounds: [],
    };
    localStorage.setItem(STORAGE_KEY_V1, JSON.stringify(v1state));
    const migrated = load();
    console.assert(migrated && migrated.format === "rr", "v1 migration → format rr", migrated && migrated.format);
    console.assert(migrated && migrated.stackRounds === 8, "v1 migration → stackRounds 8");
    console.assert(migrated && Array.isArray(migrated.previousRanks), "v1 migration → previousRanks []");
    console.assert(migrated && migrated.currentRound === 2, "v1 migration preserves state");
    console.assert(localStorage.getItem(STORAGE_KEY_V1) === null, "v1 key cleared after migration");
    console.assert(localStorage.getItem(STORAGE_KEY) !== null, "v3 key written after migration");
    // Restore any prior state (or clear if there was none).
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY_V2);
    if (savedV3 !== null) localStorage.setItem(STORAGE_KEY, savedV3);
    if (savedV2 !== null) localStorage.setItem(STORAGE_KEY_V2, savedV2);
  }

  // Stack — computeAwards: Climber, Anchor, Closer, Best Duo
  {
    const saved = state;
    // 4-round Stack tournament. Court 1 winners stay, c2 climb. Construct
    // outcomes so slot 5 climbs once (R1 c2 win → R2 c1) and stays. Slot 1
    // anchors c1 throughout. Several 1-pt games to surface The Closer. A
    // duo (1,2) wins multiple times together.
    const r1 = {
      round: 1,
      court1: { team1: [1,2], team2: [3,4], score1: 11, score2: 9 }, // (1,2) win, 1-pt margin? No, margin=2
      court2: { team1: [5,6], team2: [7,8], score1: 11, score2: 10 }, // (5,6) win, 1-pt margin → climb
    };
    // Build round 2 from r1: new c1 = {1,2,5,6}, new c2 = {3,4,7,8}
    state = {
      format: "stack", stackRounds: 2,
      slots: ["A","B","C","D","E","F","G","H"],
      rounds: [r1],
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: null, previousRanks: [], notifiedRounds: [], awardsShown: false,
      winScore: 11,
    };
    const r2 = buildNextStackRound(r1);
    // Decide r2: pretend the higher-stackscore team wins. Pick scores that
    // create another 1-pt game so The Closer surfaces.
    r2.court1.score1 = 11; r2.court1.score2 = 10;  // 1-pt margin
    r2.court2.score1 = 11; r2.court2.score2 = 5;
    state.rounds.push(r2);
    state.phase = "done";
    const a = computeAwards();
    console.assert(a.climber.names.length >= 1, "Climber populated", a.climber);
    console.assert(/climb/.test(a.climber.detail || ""), "Climber detail", a.climber);
    console.assert(a.anchor.names.length >= 1, "Anchor populated", a.anchor);
    console.assert(/Court 1/.test(a.anchor.detail || ""), "Anchor detail", a.anchor);
    console.assert(a.closer.names.length >= 1, "Closer populated (1-pt games existed)", a.closer);
    console.assert(/1-pt games/.test(a.closer.detail || ""), "Closer detail format", a.closer);
    console.assert(a.bestDuo.names.length >= 1, "Best Duo populated", a.bestDuo);
    console.assert(/%/.test(a.bestDuo.detail || ""), "Best Duo win-rate detail", a.bestDuo);
    state = saved;
  }

  // Stack — RR mode hides Climber/Anchor; Closer hidden when no 1-pt games
  {
    const saved = state;
    const rounds = SCHEDULE.map((rd, i) => ({
      round: i + 1,
      court1: { team1: rd[0][0].slice(), team2: rd[0][1].slice(), score1: 11, score2: 9 },
      court2: { team1: rd[1][0].slice(), team2: rd[1][1].slice(), score1: 11, score2: 9 },
    }));
    state = {
      format: "rr", stackRounds: 8, phase: "done",
      slots: ["A","B","C","D","E","F","G","H"],
      rounds, currentRound: 7,
      tiebreakRandom: [0,1,2,3,4,5,6,7],
      finals: {
        championship: { team1: [1,4], team2: [2,3], score1: 11, score2: 9 },
        consolation:  { team1: [5,8], team2: [6,7], score1: 11, score2: 9 },
      },
      awardsShown: false, winScore: 11, notifiedRounds: [], previousRanks: [],
    };
    const a = computeAwards();
    console.assert(a.climber.names.length === 0, "RR hides Climber", a.climber);
    console.assert(a.anchor.names.length === 0,  "RR hides Anchor",  a.anchor);
    console.assert(a.closer.names.length === 0,  "Closer empty when no 1-pt games", a.closer);
    state = saved;
  }

  // KeepAwake — defaults & backfill
  {
    const s = newState();
    console.assert(s.keepAwake === true, "newState.keepAwake=true (default for new tournaments)");
    console.assert(s.keepAwakeAggressive === false, "newState.keepAwakeAggressive=false (off by default)");
    const stub = { phase: "playing", format: "rr" };
    backfillStateDefaults(stub);
    console.assert(stub.keepAwake === true, "backfill: missing keepAwake → true");
    console.assert(stub.keepAwakeAggressive === false, "backfill: missing keepAwakeAggressive → false");
    const stub2 = { phase: "playing", format: "rr", keepAwake: false, keepAwakeAggressive: true };
    backfillStateDefaults(stub2);
    console.assert(stub2.keepAwake === false, "backfill: respects existing keepAwake=false");
    console.assert(stub2.keepAwakeAggressive === true, "backfill: respects existing keepAwakeAggressive=true");
  }

  // KeepAwake — getStatus shape, enable/disable idempotency, cleanup
  {
    // Reset module to a known state regardless of boot-time enable.
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    const s0 = KeepAwake.getStatus();
    console.assert(typeof s0 === "object" && s0 !== null, "getStatus returns object");
    console.assert("active" in s0 && "wakeLockHeld" in s0 && "canvasRunning" in s0
      && "audioRunning" in s0 && "error" in s0, "getStatus has correct shape", s0);
    console.assert(s0.active === false, "getStatus.active=false when disabled");

    KeepAwake.enable();
    KeepAwake.enable(); // second call is a no-op
    const canvasCount = document.querySelectorAll("canvas.ka-canvas").length;
    console.assert(canvasCount === 1, "enable is idempotent — exactly one ka-canvas", canvasCount);
    console.assert(KeepAwake._rafHandle !== null, "enable starts rAF loop");
    const s1 = KeepAwake.getStatus();
    console.assert(s1.active === true, "getStatus.active=true after enable");
    console.assert(s1.canvasRunning === true, "getStatus.canvasRunning=true after enable");

    KeepAwake.disable();
    const canvasAfter = document.querySelectorAll("canvas.ka-canvas").length;
    console.assert(canvasAfter === 0, "disable removes canvas", canvasAfter);
    console.assert(KeepAwake._rafHandle === null, "disable cancels rAF");
    console.assert(KeepAwake._wakeLock === null, "disable releases wake lock reference");
    console.assert(KeepAwake._audioCtx === null, "disable stops audio context");
    const s2 = KeepAwake.getStatus();
    console.assert(s2.active === false && s2.canvasRunning === false && s2.audioRunning === false,
      "getStatus reflects disabled state", s2);

    // Aggressive toggle: setAggressive(true) starts audio, false stops it.
    KeepAwake.enable();
    KeepAwake.setAggressive(true);
    const s3 = KeepAwake.getStatus();
    // audioRunning may be false if browser blocks AudioContext without user gesture — that's expected
    console.assert(KeepAwake._aggressive === true, "setAggressive(true) marks aggressive mode");
    KeepAwake.setAggressive(false);
    const s4 = KeepAwake.getStatus();
    console.assert(s4.audioRunning === false, "setAggressive(false) stops audio (audioRunning=false)", s4);
    console.assert(KeepAwake._audioCtx === null, "setAggressive(false) clears AudioContext");

    // Restore prior state so the rest of the page keeps working as expected.
    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // KeepAwake — aggressive pre-set before enable() starts Layer 3
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    KeepAwake.setAggressive(true); // set BEFORE enable
    KeepAwake.enable();
    console.assert(KeepAwake._aggressive === true, "pre-set aggressive preserved through enable()");
    // AudioContext may be blocked by browser without user gesture — just verify _aggressive flag
    console.assert(KeepAwake._aggressive === true, "Layer 3 attempted when aggressive pre-set before enable");

    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // KeepAwake — keepAwake:false preserved across format switch via syncKeepAwakeToState
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    const savedState = state;
    const s = newState();
    s.keepAwake = false;
    s.keepAwakeAggressive = false;
    state = s;
    syncKeepAwakeToState();
    console.assert(!KeepAwake._enabled, "syncKeepAwakeToState: keepAwake=false disables module");
    state = savedState;

    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
    else KeepAwake.disable();
  }

  // KeepAwake — _reVerify() restarts Layer 1 when rafHandle is null
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    KeepAwake.enable();
    // Simulate Layer 1 having lapsed by manually nulling the handle
    if (KeepAwake._rafHandle) cancelAnimationFrame(KeepAwake._rafHandle);
    KeepAwake._rafHandle = null;
    KeepAwake._reVerify();
    console.assert(KeepAwake._rafHandle !== null, "_reVerify() restarts Layer 1 when rafHandle is null");

    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // KeepAwake — canvas count stays exactly 1 across multiple render() calls
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    KeepAwake.enable();
    render(); render(); render();
    const canvasCount = document.querySelectorAll("canvas.ka-canvas").length;
    console.assert(canvasCount === 1, "canvas count stays 1 across multiple render() calls", canvasCount);

    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // KeepAwake — keepAwake:false preserved in newState() (simulates Start New Tournament)
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    const savedState = state;
    const s = newState();
    // Simulate user having turned off keep-awake before starting a new tournament
    const keepAwakeWas = false;
    const keepAwakeAggressiveWas = false;
    s.keepAwake = keepAwakeWas;
    s.keepAwakeAggressive = keepAwakeAggressiveWas;
    state = s;
    syncKeepAwakeToState();
    console.assert(state.keepAwake === false, "newState preserves keepAwake=false");
    console.assert(!KeepAwake._enabled, "module disabled after newState with keepAwake=false");
    state = savedState;

    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
    else KeepAwake.disable();
  }

  // KeepAwake — _visibilityHandler installed unconditionally at enable()
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    // Clear any existing handler
    if (KeepAwake._visibilityHandler) {
      document.removeEventListener("visibilitychange", KeepAwake._visibilityHandler);
      KeepAwake._visibilityHandler = null;
    }

    KeepAwake.enable();
    console.assert(typeof KeepAwake._visibilityHandler === "function",
      "_visibilityHandler installed by enable() regardless of WakeLock support");

    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // KeepAwake — syncKeepAwakeToState handles aggressive:true with already-enabled module
  {
    const wasEnabled = KeepAwake._enabled;
    const wasAggressive = KeepAwake._aggressive;
    if (wasEnabled) KeepAwake.disable();
    KeepAwake.setAggressive(false);

    const savedState = state;
    const s = newState();
    s.keepAwake = true;
    s.keepAwakeAggressive = true;
    state = s;

    KeepAwake.enable(); // already enabled before sync
    syncKeepAwakeToState();
    console.assert(KeepAwake._enabled, "module stays enabled after syncKeepAwakeToState with keepAwake=true");
    console.assert(KeepAwake._aggressive, "module stays aggressive after syncKeepAwakeToState with keepAwakeAggressive=true");
    state = savedState;

    KeepAwake.disable();
    KeepAwake.setAggressive(wasAggressive);
    if (wasEnabled) KeepAwake.enable();
  }

  // ---- Crown Court tests ----
  // matchPointsForMatch
  {
    const r1 = matchPointsForMatch(2, 0, "Opening");
    console.assert(r1.perWinner === 3 && r1.perLoser === 0, "matchPointsForMatch(2,0,Opening)", r1);
    const r2 = matchPointsForMatch(2, 1, "Opening");
    console.assert(r2.perWinner === 2 && r2.perLoser === 1, "matchPointsForMatch(2,1,Opening)", r2);
    const r3 = matchPointsForMatch(2, 0, "Power Round");
    console.assert(r3.perWinner === 4.5 && r3.perLoser === 0, "matchPointsForMatch(2,0,PowerRound)", r3);
    const r4 = matchPointsForMatch(2, 1, "Power Round");
    console.assert(r4.perWinner === 3 && r4.perLoser === 1.5, "matchPointsForMatch(2,1,PowerRound)", r4);
    const r5 = matchPointsForMatch(2, 0, "Sudden Death");
    console.assert(r5.perWinner === 3 && r5.perLoser === 0, "matchPointsForMatch(2,0,SuddenDeath)", r5);
    const r6 = matchPointsForMatch(2, 0, "Crown");
    console.assert(r6.perWinner === 6 && r6.perLoser === 0, "matchPointsForMatch(2,0,Crown)", r6);
    const r7 = matchPointsForMatch(2, 1, "Crown");
    console.assert(r7.perWinner === 4 && r7.perLoser === 2, "matchPointsForMatch(2,1,Crown)", r7);
  }

  // crownPairings: rank1+4 vs rank2+3
  {
    const lb = [
      { slot: 1, matchPoints: 8, pointsScored: 100, pointDiff: 20 },
      { slot: 2, matchPoints: 6, pointsScored: 90, pointDiff: 10 },
      { slot: 3, matchPoints: 5, pointsScored: 80, pointDiff: 5 },
      { slot: 4, matchPoints: 3, pointsScored: 60, pointDiff: -5 },
    ];
    const p = crownPairings(lb);
    console.assert(p.team1.includes(1) && p.team1.includes(4), "crownPairings team1 = rank1+4", p);
    console.assert(p.team2.includes(2) && p.team2.includes(3), "crownPairings team2 = rank2+3", p);
  }

  // isCrownMatchComplete and crownMatchWinner
  {
    const sweep = {
      team1: [1,2], team2: [3,4],
      games: [
        { score1: 11, score2: 5 },
        { score1: 11, score2: 7 },
        { score1: null, score2: null },
      ],
    };
    console.assert(isCrownMatchComplete(sweep), "2-0 sweep is complete");
    console.assert(crownMatchWinner(sweep) === "team1", "2-0 sweep winner is team1");

    const tied = {
      team1: [1,2], team2: [3,4],
      games: [
        { score1: 11, score2: 5 },
        { score1: 5, score2: 11 },
        { score1: null, score2: null },
      ],
    };
    console.assert(!isCrownMatchComplete(tied), "1-1 with no game 3 is not complete");

    const decided = {
      team1: [1,2], team2: [3,4],
      games: [
        { score1: 11, score2: 5 },
        { score1: 5, score2: 11 },
        { score1: 11, score2: 9 },
      ],
    };
    console.assert(isCrownMatchComplete(decided), "1-1 game3 complete is done");
    console.assert(crownMatchWinner(decided) === "team1", "team1 wins game3");
  }

  // finalRankingCrown: Crown winners rank above losers regardless of regular-season pts
  {
    const savedState = state;
    const makeCrownMatch = (t1, t2, gw1, gw2, theme) => ({
      team1: t1, team2: t2, theme,
      games: gw1 === 2 && gw2 === 0
        ? [{ score1:11, score2:5 }, { score1:11, score2:5 }, { score1:null, score2:null }]
        : gw1 === 0 && gw2 === 2
          ? [{ score1:5, score2:11 }, { score1:5, score2:11 }, { score1:null, score2:null }]
          : [{ score1:11, score2:5 }, { score1:5, score2:11 }, { score1:11, score2:9 }],
    });
    state = {
      phase: "done", format: "crown",
      slots: ["A","B","C","D","","","",""],
      crownMatches: [
        makeCrownMatch([1,2],[3,4], 0, 2, CROWN_SCHEDULE[0].theme),
        makeCrownMatch([1,3],[2,4], 0, 2, CROWN_SCHEDULE[1].theme),
        makeCrownMatch([1,4],[2,3], 0, 2, CROWN_SCHEDULE[2].theme),
      ],
      crownFinal: {
        team1: [1,2], team2: [3,4], theme: "Crown",
        games: [
          { score1: 11, score2: 5 },
          { score1: 11, score2: 7 },
          { score1: null, score2: null },
        ],
      },
      tiebreakRandom: [0,1,2,3],
      awardsShown: false,
    };
    const ranking = finalRankingCrown();
    console.assert(ranking.length === 4, "finalRankingCrown returns 4 players");
    const topTwo = [ranking[0].slot, ranking[1].slot].sort((a,b)=>a-b);
    console.assert(topTwo[0] === 1 && topTwo[1] === 2, "Crown winners rank top 2", topTwo);
    const bottomTwo = [ranking[2].slot, ranking[3].slot].sort((a,b)=>a-b);
    console.assert(bottomTwo[0] === 3 && bottomTwo[1] === 4, "Crown losers rank bottom 2", bottomTwo);
    state = savedState;
  }

  // v2 → v3 migration: existing v2 state loads with no data loss
  {
    const savedV3 = localStorage.getItem(STORAGE_KEY);
    const savedV2 = localStorage.getItem(STORAGE_KEY_V2);
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY_V2);
    const v2state = {
      phase: "playing", format: "rr",
      rawNames: ["A","B","C","D","E","F","G","H"],
      slots:    ["A","B","C","D","E","F","G","H"],
      currentRound: 3,

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function runShuffleReveal(finalSlots, onDone, opts) {
  opts = opts || {};
  const overlay = el("div", { class: "shuffle-overlay" });
  overlay.appendChild(el("div", { class: "shuffle-title" }, opts.title || "Drawing slots…"));
  const cells = [];
  if (opts.groups) {
    // Two labeled groups (Stack format: Court 1 / Court 2).
    const groupsWrap = el("div", { class: "shuffle-groups" });
    let cellIdx = 0;
    for (const group of opts.groups) {
      groupsWrap.appendChild(el("div", { class: "shuffle-group-label" }, group.label));
      const grid = el("div", { class: "shuffle-grid" });
      for (let k = 0; k < group.count; k++) {
        const c = el("div", { class: "shuffle-slot" }, finalSlots[cellIdx]);
        grid.appendChild(c);
        cells.push(c);
        cellIdx++;
      }
      groupsWrap.appendChild(grid);
    }
    overlay.appendChild(groupsWrap);
  } else {
    const grid = el("div", { class: "shuffle-grid" });
    for (let i = 0; i < finalSlots.length; i++) {
      const c = el("div", { class: "shuffle-slot" }, finalSlots[i]);
      grid.appendChild(c);
      cells.push(c);
    }
    overlay.appendChild(grid);
  }
  overlay.appendChild(el("div", { class: "shuffle-skip" }, "Tap anywhere to skip"));
  document.body.appendChild(overlay);

  const startTime = performance.now();
  const totalMs = finalSlots.length <= 4 ? 1600 : 1200; // longer reveal for 4-player to maintain suspense
  let frame;
  let done = false;

  function finish() {
    if (done) return;
    done = true;
    cancelAnimationFrame(frame);
    // lock-in: show finalSlots with locked styling
    for (let i = 0; i < cells.length; i++) {
      cells[i].textContent = finalSlots[i];
      cells[i].classList.add("locked");
    }
    setTimeout(() => {
      overlay.remove();
      onDone();
    }, 220);
  }

  overlay.addEventListener("click", finish);

  function tick(now) {
    const elapsed = now - startTime;
    if (elapsed >= totalMs) { finish(); return; }
    // ease-out: shuffle frequency slows toward the end
    const progress = elapsed / totalMs;
    const interval = 60 + 280 * progress; // 60ms early, 340ms late
    const stepIndex = Math.floor(elapsed / interval);
    // re-randomize cells (cosmetic only — finalSlots is the real assignment)
    const perm = shuffle(finalSlots);
    for (let i = 0; i < cells.length; i++) cells[i].textContent = perm[i];
    // progressive lock-in: start locking final cells in the last 35% of the animation
    if (progress > 0.65) {
      const lockedCount = Math.min(cells.length, Math.floor((progress - 0.65) / 0.35 * cells.length) + 1);
      for (let i = 0; i < lockedCount; i++) {
        cells[i].textContent = finalSlots[i];
        cells[i].classList.add("locked");
      }
    }
    frame = requestAnimationFrame(tick);
  }
  frame = requestAnimationFrame(tick);
}

// Returns a fresh array of 7 round objects with randomized court 1/2 flip.
function generateRounds() {
  return SCHEDULE.map((roundDef, idx) => {
    const flip = Math.random() < 0.5;
    const c1 = flip ? roundDef[0] : roundDef[1];
    const c2 = flip ? roundDef[1] : roundDef[0];
    return {
      round: idx + 1,
      court1: { team1: c1[0].slice(), team2: c1[1].slice(), score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
      court2: { team1: c2[0].slice(), team2: c2[1].slice(), score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    };
  });
}

// ============== Stack Format engine ==============
// Stack rounds use the same court1/court2 game shape as RR, but the schedule
// is built incrementally: each round's pairings depend on the prior round's
// scores. state.rounds.length grows as the tournament progresses.

function assignInitialStackCourts() {
  const slots = shuffle([1,2,3,4,5,6,7,8]);
  const c1 = shuffle(slots.slice(0, 4));
  const c2 = shuffle(slots.slice(4));
  return {
    round: 1,
    court1: { team1: [c1[0], c1[1]], team2: [c1[2], c1[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
    court2: { team1: [c2[0], c2[1]], team2: [c2[2], c2[3]], score1: null, score2: null, gameStartedAt: Date.now(), gameEndedAt: null, pauseSec: 0 },
  };
}

// Stack score gain for one player on one completed game.
//   pts:      points their team scored
//   isCourt1: was this game on Court 1?
//   won:      did their team win?
function stackScoreGain(pts, isCourt1, won) {
  if (!Number.isInteger(pts)) return 0;
  let gain = pts;
  if (isCourt1) gain += pts * 0.5;
  if (won) gain += 3;
  if (won && !isCourt1) gain += 2; // climbing bonus: a win on Court 2 earns a climb
  return gain;
}

      partnersUsed: new Set(),
